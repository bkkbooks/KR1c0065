body:
  text: 虞東學詩卷八宗人府主事顧鎮撰小雅三北山之什陟彼北山言采其杞偕偕士子朝夕從事王事靡盬憂我父母溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在牀或不已於行或不知叫號或慘慘劬勞或棲遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎或出入風議或靡事不為母音米下音戸彭音旁行戸郎反議為去平通大東言賦之不均北山言役之不均范傳鄧元錫曰雅之盛也上恤其私故盡瘁而忘其勞雅之變也上不恤其私故盡瘁而哀其病盖四牡皇華之意索矣故序以為刺幽王也北山行役所過也采芑感時物也偕偕强壯貌毛傳即下未老方剛也經言士子序稱大夫序以大夫為列朝之通稱而作詩者固士也一章但言王事不可以不堅固而朝夕從事以貽父母憂不言勞而勞可知矣二章言地廣人衆而我獨從事反若以我為獨賢而任之者不均甚矣不斥王而斥大夫謹厚之至也集傳三章承獨賢之意而言四牡彭彭王事傍傍即朝夕從事也嘉我未老以下所謂偕偕而獨賢也鮮少也以為少而難得也集傳將任也謂其肯任事也田間旅與膂同集傳後三章皆言不均之實四章五章猶言勞逸不同耳末章言湛樂飲酒與慘慘畏咎則有安危之判矣出入風議與靡事不為則有雲泥之隔矣詩測前三章詞氣藴藉後三章稍露連用十二或字戞然竟止體格尤竒前人以大東為盧仝月蝕之祖此則昌黎南山所自出也錢飲光曰鞅掌掌不離鞅猶云身不離鞍馬耳毛傳則謂之失容陟山采芑義當屬興毛傳缺無將大車祗自塵兮無思百憂袛自疷兮無將大車維塵㝠㝠無思百憂不出于熲無將大車維塵雍兮無思百憂祇自重兮劉曰疧當作􅕆眉貧反冥莫迥反雍於勇反釋文作壅集傳誤作雝今改正重直用反大夫悔將小人而箋言進舉小人使得居位其説未盡按王風大車為大夫所乗必當時尊貴用事者疑作詩者誤比匪人如荀文若之于曹操栁子厚之于王叔文張魏公之于秦檜皆將大車而悔之者也三章皆以塵言所謂元䂓塵汚人也先言塵次言㝠後言雍小人之勢曰盛皆始者將之之過也無思百憂祗自􅕆兮言已愧悔無及勿復思為百方補救徒自取病也不出于熲不能自明之意詩緝重者在在罣滯不得輕舒皆悔意也毛不言興宜從集傳為興明明上天照臨下土我征徂西至於艽野二月初吉載離寒暑心之憂矣其毒太苦念彼共人涕零如雨豈不懷歸畏此罪罟昔我往矣日月方除曷云其還歳聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懐顧豈不懐歸畏此譴怒昔我往矣日月方奥曷云其還政事愈蹙歲聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆嗟爾君子無恒安處靖共爾位正直是與神之聽之式穀以女嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福野神與反除去聲暇音豫戚音蹙福音偪西征大夫困於久役懼罹于罪而作此詩序曰大夫悔仕於亂世盖視北山之怨更深矣鄧潛谷云世亂則彦聖有技必置之艱虞投之煩劇甚而扢齕之靡所不至故北山傷其獨勞小明畏其罪罟此篇詩義説者紛錯箋以共人指君固屬迂曲後儒或謂大夫之友隱居不仕者丘氏或謂先時曽諫阻大夫之仕者陳氏皆無可据惟謝叠山謂共人即靖共爾位之君子與詩人志同道合者也其言通貫前後集傳用其意而言之未詳今分章推衍之一章呼天愬之曰明明照臨望其察也徂西而至于艽野二月而載離寒暑既逺且久而猶不得歸故憂之而以為毒苦也已固毒苦矣由今時事蹙急觀之我温恭自持之僚友雖處於朝而上無愛惜善類者不知果能免于禍患否所以念之而涕零如雨也謝氏我豈不欲歸與共事哉誠恐以罪相加如網罟之取物而物不知爾輔氏二章言昔以歲除而往日望還歸而今又歲暮則經年矣前言二月至艽野則初行當在前歲之除孔䟽乃以二月之朔為除舊布新恐非其義身獨事煩我勞不遑每念良友懐思顧望徒以恐遭不測之譴怒故不敢歸爾三章言以歲除啟行則冬去春來時方向暖故曰奥也孔䟽疑于此章奥字故以除為二月以就奥字之解不知歲除即已向春春令固主奥也及今采蕭穫菽之時謂歳暮也猶不得歸問誰强我仕者而毒苦至是豈非自貽之戚乎于是懷良友而出宿誠恐有反覆不可知之變箋謂不以正道見罪者是也盖在朝多反側之人往往自處逸樂而以枉法中人于罪故四五兩章呼僚友而告之曰爾雖無出外征行之苦然不可以安處安息為常必自靖其職敬共罔懈惟正直之人是與是好縱不諧於世定當為神明所祐而與爾以善介爾以福則可以定反覆而罪罟譴怒不能及矣盖仕亂世者惟敬共可免故君子本共而又勉以靖共盖即沔水卒章之義毛傳艽野逺荒之地按説文艽逺荒也孔䟽以為地名不可考鼔鐘將將淮水湯湯憂心且傷淑人君子懐允不忘鼓鐘喈喈淮木湝湝憂心且悲淑人君子其德不囘鼓鐘伐鼛淮有三洲憂心且妯淑人君子其德不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭欽讀如簮質疑云平去通本義曰序言刺幽王不知所刺何事據詩文則是作樂淮上矣然考詩書史記皆無幽王東廵之事詩緝則謂古事亦有不見於史而因經以見者今仍王氏幽王淮上之説前三章言聞其樂而憂傷因思古之君子也作樂必先擊鐘所謂金奏也孔䟽三章兼言伐鼛則舉其大者言之輔氏考鐘者必伐鼓也嘉樂不野合鄭箋而鐘聲之揚乃在淮水之上始而湯湯水溢之時繼而湝湝見衆水入淮徐鍇則水漸平矣至于水落洲見而猶聞其聲言其久在淮上流連忘反是以憂之傷悲且妯妯之言悼也鄭箋思昔先王仁厚為善人為君子詩緝令人沒世不忘由其徳無囘邪無愆尤也詩所曰猶尤也舊訓為若未妥末章承上淑人君子而言言其樂足以昭徳也詩所將將喈喈言其聲之揚而衆范氏欽欽則言其聲之節有度也錢氏古者堂上之樂皆受笙均堂下之樂皆受磬均熊氏笙磬同音則樂無不和矣雅二雅也南二南也集傳升笙間合之次序也籥樂終而執籥為文舞也詩所曰其始終條理歌舞音容皆無奪倫而不僭忒非淑人君子之徳誰能與之傷今王之不然也郝仲輿曰是役也未必無朝㑹而詩但言鼓鐘淮水以諷其荒樂逺遊無復先王修禮輯玉之典所以為刺按康成緯書注以此篇為刺昭王孔氏謂鄭初未見毛詩故用三家説耳今詩列幽王衆篇之申不應為昭王也一統志淮水在河南南陽府唐縣東南一百八十里即禹貢導淮自桐栢者今桐栢支岡有水泉潛流三十里東出大復山經汝寧信陽東流㑹泗沂自泗州龜山北流入淮安府界瀠洄府城東入於海陳氏樂書云鼛鼓以臯為義欲役之緩謂之鼛鼓中髙而両端下考工記韗人為臯鼓長尋有四尺鼓四尺倨勾磬折注磬折中曲之不參正也楚茨以下十篇辨余初讀楚茨以下諸詩亦嘗疑于序説頗采陳氏樂書及集傳後説以為豳雅今觀楚茨信南山二篇所陳皆祭祀之事其差排行禮節次與禮經纖悉皆合在豳公時不應如此明備若詩係周公追叙更不得以手定儀文被之先世以渉于誣也躋彼公堂稱彼兕觥豳之民也執豕于牢酌之用匏豳之君也其時風俗淳古儀節簡脱二詩何以獨異即甫田大田並有田祖田畯之文康成亦援籥章為説其實祈年吹豳雅未聞有琴瑟之用此豳雅之説未可信也至謂公卿力農奉祭則特牲少牢兩篇既無祭祊之節而送尸亦安得用金奏耶吳易堂云禮記大夫之臣不稽首此云小大稽首其非公卿之詩决矣竊考編詩限斷其在前王時者並無竄入後王之編而就一王之世或事在晚歲而詩反居前或事在初年而詩反居後從其義類為次也今按刺幽之詩節南山以下十二篇皆小人女子搆讒召禍之事大東以下六篇則賦役不均而天下皆困事以類從故年難順叙要在幽世之限斷畫如也涕泣之道至是已窮而心猶不已乃稱引古昔以動其深思故鼓鐘篇反覆于君子之德而盛稱古樂之不僭愚謂陳古之義當自鼓鐘始序特於楚茨著其説耳然集傳信鼓鐘之思古而于楚茨以下盡改序説者以鼓鐘有憂心之語而餘詩無之也不知詩人感傷時事述古興懐其所指陳皆非無為周家以穡事開國而幽王政煩賦重田卒汙萊故楚茨四詩反覆農事宣王以奮武中興而幽王荒於酒色朝㑹盡廢故瞻洛四詩鋪陳盛美皆所以鼓舞歆動之至頍弁為角弓之反車牽為白華之反規切尤深矣安知當日不授諸瞽矇以朝夕諷于王側如王式之諫昌邑者乎奈何以辭害義放廢古説使前後緯繣難通而好為新論者復妄生穿鑿而詩義之晦至小雅為甚故先序十篇之大義如此然後别而論之楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以享以祀以妥以侑以介景福濟濟蹌蹌絜爾牛羊以往烝嘗或剝或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬壽無疆執爨踖踖為俎孔碩或燔或炙君婦莫莫為豆孔庶為賓為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬壽攸酢我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神􅄝飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考孔惠孔時維其盡之子子孫孫勿替引之福方墨反祊古音方慶古音羌三章去入通四章熯愆孫平上通五章平上去通告字不入韻六章奏古則故反音鏃後同信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畆上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百穀疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賓壽考萬年中田有廬疆埸有𤓰是剝是菹獻之皇祖曾孫壽考受天之祜祭以清酒從以騂牡享于祖考執其鸞刀以啟其毛取其血膋是烝是享苾苾芬芬祀事孔明先祖是皇報以介福萬壽無疆畆滿以反或古于逼反四章𤓰音孤平上通五章酒牡考一韻刀毛膋一韻詩緝云楚茨四篇惟楚茨首二句言當時所見餘皆全述古事盖詩人遐想太平之盛恨不生乎其時也古義云楚茨信南山同為一時之作楚茨詳于後而畧于前自祭祊以前但以祀事孔明一語該之信南山詳于前而畧于後自薦熟以後亦但以祀事孔明一語該之古人文字互見如此又云楚茨有鼓鐘送尸之節固非公卿奉祭之禮信南山有從以騂牡之語明是周有天下所尚亦豈豳侯所有今按楚茨首章感今日之荒蕪思昔年之豐穰所謂傷今思古也楚楚茨生衆也王氏抽發也集傳訓除今從吕記及嚴切言今茨棘之所生乃自昔我蓺黍稷之地王氏而所蓺之黍與與然茂盛所蓺之稷翼翼然整齊及其收也倉既盈而無以藏之則露積為庾其數至億成民如此然後致力于神為酒食以享祀焉疏云享食雖總于祭因其在前則為灌及朝踐其説是也由是尸入祝詔主人拜安尸使之坐尸即至尊之位或不自安則以拜安之郊特牲註此妥尸之禮也尸三飯告飽凡三次告飽共九飯賈疏一口謂之一飯祝侑主人拜三拜三侑祝言而不拜主人拜而不言儀詳特牲少牢二篇此侑尸之禮也妥侑相繼皆在迎尸初入之時所以助孝子受大福也解頥曰一章主酒食言二章主牛羊言祭祊以下始行祀禮也濟濟蹌蹌與祭者有容儀也孔疏絜爾牛羊在滌而芻之也劉彜過此以往將有事于烝嘗古義則有解剝其皮者内饔有煮熟之者亨人有陳其體骨于俎者外饔有分齊其肉所當用本王肅釋毛義者小子皆預言其事未及行禮也古義四時之祭獨舉烝嘗者田功成而品物備也舊説祊有二一是正祭之祊在廟門内之西一是繹祭之祊在廟門外之西何𤣥子謂祊祭自在門内原無二祊禮器所謂設祭于堂為祊于外盖對堂而言則門為外非謂祊在門外何説是也祊祭求神以後始行薦熟之禮則下章執㸑云云也時祭當自禰以上而云先祖者據逺可以該近孔疏皇之為言煌煌然也徐鉉説毛傳非本其生存謂之祖言其精氣謂之神孔疏保安也毛傳先祖之神安之于是饗其祭祀也錢飲光曰如集傳謂神保尸之嘉號則五章神保聿歸之前不應變言皇尸載起矣對先祖言故曰孝孫萬壽無疆正介福之實所謂有慶也三章言薦熟而及獻酬之事少牢篇有饔㸑廪㸑據下為俎言之則饔㸑也踖踖敬謹也俎之類不一有肵俎折俎阼俎賓俎主婦俎祝俎佐食俎惟事尸之俎載牲體骨凡九故以孔碩言之所謂獻熟也吕記燔燔肉炙炙肝鄭箋特牲篇主人獻尸賓長以肝從主婦獻尸兄弟以燔從孔疏所謂從獻也箋混為一者訛君婦謂后也箋記凡祭祀后夫人主共籩豆莫莫清静而敬至也毛傳豆之類亦不一有朝事之豆饋食之豆后酳尸之加豆酳尸畢之羞豆豆兼内羞庶羞故曰孔庶此后薦豆之事也古義賓客四方來助祭者周禮注大賓要服以内諸侯大客謂其孤卿此下則旅酬之事禮器云周旅酬六尸是尸亦旅酬今舉賓客則專指賓主兄弟耳傳以賓客句屬上謂繹而賓尸及賓客者訛禮儀笑語即獻酬中事也卒盡也度法也獲得也謂得其時宜也傳義上章既言神保是饗矣此乃言神保是格者惚怳以交于神明所謂洋洋如在不可度思也必執前後以擬議之何氏錢氏則非矣神報孝孫以萬壽之福亦猶賓之酢主人因上文獻酬而言也四章言飲福之事詩緝熯竭也傳訓敬釋詁文今從朱禮行既久筋力竭矣而式禮莫愆敬之至也集傳工官也工祝盖大祝之官古義于時祭將畢佐食取黍搏之以授尸尸執以命祝祝受以嘏于主人少牢所謂致告以徂賚之也苾芬孝祀以下皆嘏詞之意鄭箋言爾飲食芳潔故報爾以福祿使其來如期多如法爾禮容莊敬將事敏疾誠正慎固蘇氏故報爾以衆善之極集傳至萬億之多也補傳五章言祭畢送神之事禮儀既備束前文也鐘鼔既戒夙具送尸之用也疏謂擊鐘以告戒廟中之人非是于是孝孫往立堂下西面之位工祝乃傳尸意告利成于主人集傳神具醉止即致告之詞也疏云命當由尊者出非主人所當先發箋謂告尸以利成者非由是尸起而金奏肆夏以送之神即安歸於天焉盖神本無形立尸象之尸起則神歸矣諸宰膳夫之屬古義膳夫親徹阼俎餘則其屬徹之君婦親徹籩豆而九嬪贊之皆以疾為敬不以禮終惰事也既歸賓客之俎同姓則留與之燕鄭箋坊記所謂因其酒肉聚其宗族以教民睦也先諸宰後君婦者内外之辨也田間燕而曰私對賔客言之則為私也田間六章承上燕私而述其事祭在廟燕在寢集傳前廟以奉神後寢以藏衣冠故祭時之樂入于寢而奏之也以綏後祿鄭謂後日之福祿不如蘇謂祭之餘福也爾殽將而莫怨具慶燕之事也小大猶長幼也鄭箋凡在燕者皆稽首而言曰向者之祭神既嗜君飲食而俾之壽考矣又言其祭之順理適時子孫當不廢而引長之集傳傷今之或替也所以諷王者微矣詩緝曰楚茨信南山一體之詩楚茨先傷今而後思古信南山便從思古起即所以傷今矣信通作伸蜿蜒之貎占義似勝舊説南山終南山盖咏畿内之地非以山言也甸治也毛傳禹治之而曾孫復田之盖溝洫之法始于夏而大備于周也鄭以甸為丘甸之甸亦通然曰治之則丘甸在其中矣畇畇墾闢貎毛傳曽孫衍序者以為成王今不敢質也田盡乎原隰故據原隰言之古義畫其大界曰疆析其條理曰理下言南東其畆即理也韋昭云下曰􅅵髙曰畝畝隴也􅅵乃隴中水道地勢東南下故順其勢以為遂為溝而或南其畝或東其畝也劉氏遂隴首也溝井溝也匠人為溝洫隴下之􅅵廣尺深尺隴首之遂倍于畝一井之溝倍于遂一成之洫倍于溝一同之澮倍于洫皆縱横布之故劉彛言其遂東入于溝則其畝南其遂南入于溝則其畝東也一章言其得地制二章言其得天時故冬有積雪春而益以小雨則饒洽而百穀生也三章疆埸翼翼承我疆我理言黍稷彧彧承生我百穀言穀可收曰穡説文言此彧彧而茂盛者曾孫之穡也于以為酒則三酒五齊無不備于以為食則潔粢豐盛無不宜于以畀尸則可以妥侑于以畀賓則可以獻酬箋言齋戒以賜尸賓者訛由是神降之福而壽考萬年此與下章皆先事擬議之辭田間而此章專言酒食四章專言豆實也何𤣥子疑七菹無𤓰然天子庶羞百二十品七菹何足盡之孔疏云場人祭祀供其果蓏是祭必有𤓰菹矣籩人豆實無𤓰菹文不具耳獻皇祖而受天祜亦預擬其必然也五章乃言灌地迎牲朝踐之事清酒鬱鬯之屬集傳非三酒之清酒郊特牲灌用鬯臭既灌然後迎牲文在迎牲前故當為鬱鬯鄭以清為𤣥酒亦非𤣥酒設而不用與灌無渉也周尚赤故用騂牡享于祖考箋謂納亨時納亨者謂牽牲入廟將殺授亨人也納亨而謂之享者牽之而入以告肥是亦享也鸞刀刀環有鈴者鸞即鈴也祭義云祭之日君牽牲卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退據此則執鸞刀者卿大夫非君也若君親制割則在羞嚌薦腥薦熟時非啟毛取血時也集傳訛毛以告純血以告殺膋以升臭合之黍稷實之于蕭合馨香也鄭箋六章乃言饋獻薦熟之事牲既殺矣臭既升矣于時始薦黍稷故以苾芬言祀事孔明言自是而後所行祀禮甚明如楚茨篇執㸑以下事也介福萬壽向所預擬者而今乃非虚語矣屢陳之以歆動幽王望其力農務本以纘先業延福祚也不知稼穡艱難不念小民之依亦罔或克壽與此詩所陳反正間耳何𤣥子以楚茨為秋嘗信南山為冬烝按詩特陳古力農奉祭之事耳原不必指為何時之祭况楚茨明有以往烝嘗之文何緣獨指為嘗渾之正得倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止烝我髦士以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女曽孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曽孫不怒農夫克敏曽孫之稼如茨如梁曽孫之庾如坁如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬壽無疆三章右有俱音以敏古音每後同大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀既庭且碩曽孫是若既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫穉此有不斂穧彼有遺秉此有滯穗伊寡婦之利曽孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福火音毁穉火上去通三章平去通前二篇陳古王者力農以奉宗廟之祭此二篇則古者祈禳報賽以及省耕省斂之事也甫田首章言古者税法輕而民食福十千者萬畝之入一成之數也食農者王者廵省而行補助也自古猶言自昔言自昔豐年之法如此今周王親適南畝吕記見農夫勤于耘耔而黍稷茂盛思以助之而暫憇田間進農夫之秀者而用之明其有功者屬其地治者若遂大夫之興甿也嚴緝范傳二章言祭社方御田祖之事齊明即明粢也社后土也毛傳勾龍官后土死以配社故舉其官言之非與皇天對言之后土也方謂四方之神曲禮注勾芒在東祝融在南蓐收在西𤣥冥在北是也非疈辜祭四方之方我田既臧農夫之慶方社之祝詞也古義田祖先嗇也毛傳作樂以迎而祀之即以祈甘雨焉介黍稷穀士女御田祖之祝詞也古義方社舉牲田祖舉樂互文也舊以上五句為去年秋祭下五句為今歲春祈其説迂曲三章言省耕之事前既適南畝矣此又曰來止者適為自彼之詞來則據此言之也婦子饁而曰曽孫以者曽孫來行補助俾得備酒食以餉于南畝即篇首取陳食農之義故曰以也古義曽孫來則田畯至喜者喜其有饁得以飽而治田也却其從者而親嘗饁之㫖否詩緝喜之甚而致其愛也禾易長畝者目前所見終善且有則將來之詞也前言黍稷薿薿乃得于一望之餘此言禾之易治者竟畝如一則詳省之也曽孫不怒農夫克敏者嚴緝謂王無所譴怒而農夫自敏于農事不待督趣之也不曰喜而曰不怒者若不敏則怒矣盖喜怒專在于農也吕記四章承上言農夫克敏如是行見秋成在望大有可期萬姓胥悦歸恩於上而欲報以介福古義曽孫之稼以下所謂介福也吕記説文禾之秀實為稼莖節為禾稼在田由髙處視之則見其宻故如屋茅由平處視之則見其髙故如橋梁庾在野隨處堆積有平而髙者如水中之坻有卓絶而髙者如髙丘之京詩緝始言稼未刈也繼言庾已刈而未入倉也於是求倉以貯之求車以載之先治倉而後車載以輸之故先言倉後言箱也詩緝至于千斯萬斯則黍稷稻粱無所不有其為農夫之慶者無非曽孫之來致之故欲報之使福祿壽考也二章言農夫之慶曽孫期望其民之詞末章言農夫之慶農夫喜慰其君之詞也季本言福必曰介者若有以隂助而黙相之也鄭箋義長甫田是言春夏之祈其時王者在上耕者在下田畯往來其間勸勞撫摩交相祝願故善有曰終倉箱曰求皆未竟其事之詞其方社田祖之祭詩中明曰以祈自不得以秋報屬之大田則自播種至于收穫皆實陳其事而中間備言神貺天庥末乃結言禋祀其為秋省祭方無可疑者舊説顧以前篇之田臧農慶為已然之事此篇之田祖秉畀為祝禱之詞今但順文讀之其失自見一章言始事南畝而百穀暢生春時也惟田大故多稼首句乃全篇之冐既擇種飭具周備如此俟春而後從事焉以我覃耜承既戒言播厥百穀承既種言所謂乃事也耕之勤種之時故所生者皆直而大而曽孫之心順焉盖曾孫所重者穡事而農夫能順其意也二章言房生而漸實實堅而齊好無復草竊蟲孽之害盖夏時也擇種善而耨草勤則稂莠之去皆人力可為惟蟲之為孽有非人力所及防者而食心之螟食葉之螣食根之蟊食節之賊爾雅最足為我晚禾之害者盡屏無遺豈非田祖有神執而付之炎火使消滅哉盖歸功神助以為末章報祭之本也三章言害既除而穀漸熟得雨以滋之而收穫豐饒盖秋時也凡穀將穫時得細雨沃根則其實圓綻飽足江南人謂之養稻雨故雨後即言穫斂之事渰雲興貎祁祁徐也雲欲盛盛則多雨雨欲徐徐則入土王氏先公後私民之心也惟助為有公田則詩之不可為豳雅益明矣穫刈也斂收也穉即晚禾之低小而未及刈者穧則刈而未及把束者遺秉則束而輦載不盡者滯穗滯留之禾穗也伊寡婦之利聽其取以為利也四章言曽孫省斂而行報祭之事農民因以致其祝也甫田之饁饁耕者此饁穫者也方禋祀者倒文謂報成而祭四方之神也牲用騂又用黑者牧人職云凡望祀各以其方之色牲毛如之盖祭南北二方也錢氏與其黍稷告黍稷之成也享祀介福則祝願之辭馮䟽月令仲夏大雩帝乃命百縣雩祀百辟卿士有益於民者以祈穀實若勾芒蓐收勾龍后稷之等已該于百辟卿士内矣正應經文祈甘雨之事于義為允不必有秋報春祈紛紛之説按螟螣蟊賊爾雅分注甚明而邢昺則謂舊説一種蟲故犍為文學曰此四種蟲皆蝗也何𤣥子謂經傳中未有單名賊為蟲者桑柔之詩曰降此蟊賊瞻卬之詩曰蟊賊蟊疾是蟊賊止是一蟲或分四種或云一種皆非瞻彼洛矣維水泱泱君子至止福祿如茨韎韐有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦首二句無韻合三章為韻猶東山之首二句也裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黄或白我覯之子乗其四駱乗其四駱六轡沃若左之左之君子宜之右之右之君子有之維其有之是以似之裳古本作常宜音俄左宜平上通右有俱音以二詩述古明王武備修而爵賞當欲王振厲成業不忘舊勲也郝仲輿曰昔周公營洛邑朝㑹廵狩以明賞罰故立政曰文子文孫其克詰汝戎兵以陟禹之迹方行天下至於海表罔有不服成康既沒周道寖衰宣王中興復古詩人有車攻之頌幽王荒于酒色武備不修㑹同遂廢故詩人睹洛水而思先烈也各章首二句悽然有河山今昔之感洛水名謂洛陽也君子指天子也集傳一章言天子至東都而㑹諸侯大行慶賞福祿之及于人者其厚如覆屋之茨焉厚義勝多于時或行獮狩或事征伐則將士之在戎行者皆服奭然之韎韐以振起六軍焉作之訓起盖指麾鼓舞之意二章言不惟將士韎韐自天子而下皆佩容刀其刀之􅔖則上琫下珌各盛其飾以此威令天下賞信罰必人心翕然相服自可長享太平保家室于萬年也三章言㑹同講武之事既舉内外逺近蒙被福祿徧且均焉故始曰如茨終曰既同也先家室後家邦由内及外之義全詩以奮揚武衛為主而始終以福祿言之不以武震而以德綏斯久安長治之道也乃以女寵戲􅇏諸侯離叛宣王之烈隳焉顧洛水之泱泱能不重為之感乎一篇之中所為三致意焉裳華序言棄賢者之後絶功臣之世而詩中極言勲賢子孫之美似其先人以見不可廢絶之義首章以華葉之上下相承興賢者之前後相繼陳氏之子勲賢後也見之而心寫則君臣相得益彰是以有美名可安處也二章言其文章可以華國故以華色之盛起興芸黄盛也毛傳何𤣥子曰如芸之黄也有慶謂君寵錫之予之祿位俾世居其職也三章言其才猷可以經逺故以華之或黄或白起興言華之色不獨芸黄猶之子之美不獨有章也乗其四駱疑有出使從戎之事六轡沃若言其從容優裕也四章盛推其先世之才全徳備以著之子象賢之美箋以君子為斥其先人者是也稱左右者言能左右天子不必如傳分吉凶之説施各當曰宜用不竭曰有似即似續妣祖之似昔君子有是才德故能左右天子而垂裕後之澤今之子亦有是才徳故能繼美前人而成似續之慶有章乗駱亦左右宜有之事此乃結其義也辭與蓼蕭相似而義各有歸矣毛以兩篇皆為興今從集傳以瞻洛為賦裳華為興讀詩記云職方氏雍州其浸渭洛故毛傳以洛為宗周之浸按洛水雖出京兆上洛西山然其流尚微此詩所為洛盖指東都也初學記云周官豫州其川滎雒與伊瀍二水為三水秦于河南置三川郡又雍州其川洛汭此洛一名漆沮出馮翊乃闗輔之水非河南洛也又水經注洛水出漳水東經洛縣及新都與湔水合漢志注章山洛水所出南至新都谷入湔是也此又在蜀土周官司服凡兵事韋弁服注以韎韋為弁又以為衣裳春秋傳韎韋之跗注是也集傳韐合韋為之即韠也馮疏云鞞琫珌之義爾雅無文毛傳曰鞞容刀也琫上飾珌下飾而公劉篇傳則云下曰鞞上曰琫孔氏釋之謂鞞者刀鞘之名琫者鞘之上飾下不言其飾指鞞之體故曰下曰鞞是毛説本矛盾孔亦不得已而為之辭也按説文鞞刀室也劉熈云室口之飾曰琫下末之飾曰珌是當以此傳為正天子玉琫而珧音摇蜃也珌諸侯􅀢音蕩琫而璆珌大夫鐐琫而璆珌士珕力計反蜃屬琫而珕珌亦毛傳文也董氏曰此本出于三朝禮故許慎以此證書裳説文作常董氏曰謂常棣也而毛傳以裳裳為堂堂集傳兩用之則義無所歸矣諸家皆以常棣言之宜從許義重言裳裳者何𤣥子謂相繼非一之辭似于興義為近桑扈之什交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰百辟為憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪敖萬福來求屏音迸憲音軒難音儺范寗序穀梁云君臣之禮廢則桑扈之刺興盖幽王荒於酒色曠廢朝典至舉烽以戱諸侯而赤芾㑹同之盛不可復睹矣所謂動無禮文也詩人述古㤗交之美而歸於戢難匪敖之所致盖洞見幽王之癥結而投以對症之良劑所謂王庶幾改諸予日望之者而後人猶謂詩無刺王之文豈復識瞍矇諷誦之義哉末章有兕觥㫖酒語雖言燕享要非燕享所用之詩也前二章以桑扈之有文興君子之循禮能循禮故上下相和樂可以受天祜而屏萬邦也樂胥猶言胥樂楊慎氏謂倒句者是也毛傳胥皆也屏蔽也曹氏粹中云魯秉周禮而齊不敢圖何屏如之後二章推言所以致此之由在於斂東戒懼而不以憮傲自恣也承上章不獨為萬邦之蔽且為萬邦之幹而諸侯有不取以為法者乎使其不自戢不知難則受福必不多矣惟其戢且難也故雖燕享之際兕觥設而不用但見其角觩然上曲而已㫖酒思柔猶言飲酒温克也古之王者接下思恭交際之間無所傲慢則上下相安於禮我不求福而福自來求矣按詩義君子當如箋訓指王不當指諸侯嚴緝謂通指上下者亦非桑扈詳見小宛此之竊脂盖取淺白為義翰之訓幹釋詁文當墻兩邊障土者即築墻所立木也兕觥鄭氏以為罰爵讀詩記曰如卷耳罍觥並陳則不必指為罰爵若此詩則罰爵也觩釋文作觓集傳云角上曲貌鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乗馬在廐摧之秣之君子萬年福祿艾之乗馬在廐秣之摧之君子萬年福祿綏之秣艾去入通詩貫云秣去聲音昧讀詩記謂楚茨至鴛鴦八篇皆陳古以刺今今按此序下言思古明王交於萬物有道自奉養有節則其義迂曲難信陸堂詩學云以馬之食芻粟興天子福祿之養於義安乎何𤣥子錢飲光及近日蔡宮聞皆以為為申后作何氏之言曰此追美初昏時人效萬年之祝正如唐髙宗欲廢王皇后長孫無忌述太宗佳兒佳婦之語耳錢氏之言曰申后失寵將有廢黜之憂詩人託興諷王鴛鴦二章喻昔時伉儷之相得乗馬二章望王之念舊恩也福禄宜之宜其遐福言王與后相得福祿固其宜也福祿艾之福祿綏之言如此而後福祿久長安享四章言君子萬年皆祝其存心久長勿中道而改也蔡氏曰鴛鴦在梁戢其左翼二語重見白華則此詩明為后作愚按詩語重出不足据以為證惟循諷詩文推索其義則何錢之説自屬可存羅願曰雄名為鴛雌名為鴦大如鶩其質杏黄色頭戴白長毛垂之至尾翅皆黒今閨房所飾鴛鴦乃鸂􅈑耳鴛鴦不再匹故取以為興説文畢田網也月令注云網小而柄長爾雅翼右掩左雄左掩右雌張子曰禽鳥並棲一正一側戢其左翼以相依於内舒其右翼以防患於外毛傳摧莝也説文莝斬芻也秣説文作䬴食馬穀也何黄如曰漢廣言之子于歸言秣其馬事亦同此有頍者弁實維伊何爾酒既旨爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松栢未見君子憂心奕奕既見君子庶幾説懌有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧有頍者弁實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死䘮無日無幾相見樂酒今夕君子維宴上下分韻蘿字連上韻又用韻之變格怲古補往反序云諸公刺幽王而衍者以為不能宴樂同姓誤矣嚴華谷云驪山之禍方作人情懍懍不保朝夕幽王方且飲酒無度詩人豈復勸其宴樂哉郝仲輿云幽王日與羣小酗於酒無由得效其忠危亡已至而深宫之飲不休詩人借飲酒以致願見之情非為酒也集傳以為燕兄弟似非情事陳大士言頍弁猶常棣之志不知常棣言死䘮急難之事皆懲其已往此言死䘮無日無㡬相見則危在漏刻義不能以相合也自來説詩家皆以五六二句緊連上説故誤㑹詩義耳愚意首四句一截言王為天下共主如首之有弁疏義闗係如何而日以㫖酒嘉殽與羣小沈􅊺也下八句一截言今之休戚相闗者豈有異人惟是骨肉至親猶女蘿之託命松栢不可相離故未得一見以效其忠告則憂心奕奕而無薄怲怲而盛滿傳義倘得見之而開悟王心怡然悦懌改圖為善是所望爾乃雪將下而霰已集禍亂廹近即朝夕相見能有㡬時而君子方為長夜之飲惟宴樂為事而终不我見憂何能解哉後世有敵兵四合而帳中夜飲者杜甫所謂東方漸髙奈樂何也長歌可以代哭其頍弁之謂乎郝敬何氏古義錢氏詩學並用嚴氏説而猶泥於王不宴樂同姓之文今刪之而著其義如此詩從毛作興傳云頍弁貎説文舉首貎詩緝曰頍然舉首則弁益髙所以况王也蔦傳訓寄生圖經云鳥食物子落節間感氣而生爾雅唐蒙女蘿女蘿兎絲郭云别四名則是一物也然廣雅言女蘿即松蘿與兎絲殊異陸璣亦云兔絲非女蘿博物志又有女蘿寄生兎絲兎絲寄生木上則女蘿亦有寄生兔絲上者釋草所云或以是歟説文霰稷雪也陸農師謂之米雪閒闗車之牽兮思孌季女逝兮匪饑匪渇德音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令德來教式燕且譽好爾無射雖無㫖酒式飲庶幾雖無嘉殽式食庶㡬雖無徳與女式歌且舞陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮髙山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心一章上四句去入通逝石列反二章射讀本音轉音豫三章酒殽平上通二㡬字自為韻四章二薪字自為韻寫音湑五章仰行平上通此篇衍序謂褒姒嫉妬周人思得淑女以配君子取義迂曲而説家竟不一開疑竇即集傳宴樂新昏亦從此立解盖据昭二十五年傳叔孫昭子如宋聘且逆女為季平子逆宋元公女宋公享之昭子賦車牽之文然古未聞宫闈失徳而臣下欲為易妻者且申后無罪見黜何不諷王復后而别圖淑女耶若如集傳云云則娶婦之家三日不舉樂此詩將安用之今按詩文未嘗不言宴未嘗不言婚閒闗車牽四牡六轡未嘗不言娶而作詩之指要不在此竊意雅之車牽猶風之碩人碩人為莊姜賦車牽為申后賦也前二章言申后少好而有德故往迎則致其慕匪饑匪渇有寢寐思服之義焉既來則安其居平林集鷮有鳩居鵲巢之美焉季女言其年碩女言其徳也徳音美其名令徳著其實也來括謂初相㑹合來教謂進其箴規箋義好友謂妾媵之良者今雖無之猶可相安而喜樂盖隱諷褒姒也式燕且譽好爾無射者碩女以令德來教則不獨相安且可成其美譽故願王好之不厭也王與褒姒沉􅊺無度酒必㫖殽必嘉故三章反而言之見后之能甘淡泊也田間徳即乾餱失徳之徳女即所謂好友者言雖不能以㫖酒嘉殽見徳于女而中無妬忌則亦可以懽樂和同式歌且舞矣盖前願王之好之此願褒姒之無嫉而讒也後二章又述其族姓之貴容儀之盛秉德之賢猶碩人前二章所云彼明言之此隱喻之也陟彼髙岡喻其貴也析柞薪而葉湑喻娶妻而賢其容儀美盛也古人多以析薪喻娶妻盖亦取材之義鮮我覯爾謂我目中所見鮮有如爾者傳訓鮮為善今不用是以心為之寫也髙山仰止景行行止喻其髙貴而正大可為師法也占義與令徳來教相應四牡騑騑六轡如琴即百兩將迎之事覯爾新昏以慰我心遡其初昏之相得而今不然所以為諷也此詩疑在將黜未黜之際大夫作此以感動王心欲其白首而如故也然曰無好友無徳與女則不容於褒姒者見矣曰無㫖酒無嘉殽則不答於幽王者亦見矣昔漢成帝欲立趙飛燕為后諌大夫劉輔言腐木不可以為柱卑人不可以為主此曰髙岡柞薪則可為柱矣奈何舍之而用腐木也曰髙山景行則可為主矣奈何舎之而用卑人也何黄如曰舉在此則斥在彼此末二章之意也毛為興今從集傳作賦牽見泉水閒闗車行而牽有聲也尊卜陸疏鷮㣲小於翟走而且鳴音鷮鷮然尾如雉尾而長語曰四足之美有麃兩足之美有鷮柞郭璞以為栩即櫟也見鴇羽營營青蠅止于樊豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國營營青蠅止于榛讒人罔極構我二人此序下無衍文錢飲光曰國語史伯曰夫虢石父讒謟巧佞之人也而立以為卿士與剸同也周法不昭而婦言是從用讒慝也此詩刺王當為太子宜臼被讒而作按易林云青蠅集藩君信讒言害賢傷忠患生婦人又云馬蹄躓車婦怨破家青蠅汚白恭子離居則焦氏早有是説矣營營往來貎毛傳程子曰讒人欲汚白為黑而其言不可直達故營營往來也本義謂往來之飛聲亦通止于樊者疏謂當止于樊籬毋令在宫室之内棘榛皆所以為樊也愚謂止樊云者將有决籬而入之勢甚可畏也讀詩記曰行且至於几席盤杅之間矣陳鵬飛曰讒言多由持心傾險而後入故願君子持心樂易不聽讒言也田間謂豈弟有優柔不斷之意猶齊子豈弟之稱今按左傳成豈弟也之文則陳氏説長罔極謂機械叵測交亂四國如虢石父構王伐申以至吕繒西戎蠢然俱動所謂交亂也田間二人舊謂聽讒與被讒者以情事按之當即后與太子也陸堂此又交亂四國之本故詩窮本以刺焉集傳以首章為比今並作興陸佃云蒼蠅善亂聲青蠅善亂色漢書昌邑王傳王夢青蠅之矢積西階東可五六石以問郎中令遂遂曰詩不云乎營營青蠅止于樊豈弟君子毋信讒言陛下左側讒人衆多如是青蠅惡矣顔師古注惡即矢也賓之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕鐘鼓既設舉醻逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵籥舞笙鼓樂既和奏烝衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賓載手仇室人入又酌彼康爵以奏爾時賓之初筵温温其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賓既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐徳飲酒孔嘉維其令儀凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾太怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又一章首二句不入韻楚旅一韻旨偕一韻偕音凡設逸上入通抗張平去通的古都畧反二章鼓奏祖一韻奏則故反禮至一韻能又時平去通能音來又音肄仇作􅆽不入韻三章首二句不入韻四章呶古音奴豆田故反上去通郵古羽其反與僛為韻五章否史恥怠上去通張記怠養里反序曰衛武公刺時而集傳從韓序悔過之説果爾則宜與淇奥同編何以入雅田間或疑幽王時武公未嘗入仕今考史記武公四十二年平戎於周則自此以前豈無入朝之事朝則有大射與祭之禮殆目覩王之飲酒無度而作此諷之豈必入為卿士而後可作雅耶或又以為東遷後詩者不知武公於平王時受命為公耳非卿士也今祗据舊説解之盖將祭必先射將射必先燕而祭之後又有燕故始终以飲酒言之前二章總為一事毛謂燕射之禮鄭謂將祭而射謂之大射下章言烝衎烈祖其非祭與鄭義為確本詩兩舉賓之初筵歐陽謂前二章陳古後三章刺時是也首章言將射而燕既燕而射述古威儀節度之美也射義云已射於澤而後射於射宫澤無明文朱子云説者以雝為澤盖即旋丘之水而其學即所謂澤宫與射宫則小學之在西郊者此詩所言盖西郊之射也上八句言燕下六句言射張記鋪陳曰筵藉之曰席左右謂賓與主人為禮隨左右之宜而折旋揖讓孔疏秩秩有序也集傳籩豆列而殽核實之殽豆實核籩實楚列貌旅陳也毛傳酒既調美飲酒之人又齊一孔疏鐘鼓謂笙鐘頌鐘建鼓之屬既設者大射儀樂人宿縣是也按大射儀公升即席奏肆夏又主人酌膳獻公公受爵奏肆夏周禮鐘師以鐘鼓奏九夏則此詩鐘鼓既設事也康成以為將射改縣誤矣按大射無改縣事即云天子宫縣異於軒縣勢須改避射位亦當如鄉射張侯之後乃遷樂於下不當於舉醻逸逸之先也舉醻者舉所奠之醻爵集傳賓告於擯者請旅諸臣公許乃舉旅行醻也逸逸者往來安閒之貎古義此言射前初燕之盡禮如此既旅之後止旅行射司馬命張侯乃脱束繫左下綱鄉射儀盖前期三日既張三侯大射儀不繫左下綱中掩束之至將射而後張也弓矢斯張者司射適次袒决遂執弓挾乗矢於弓外見鏃於弣右巨指鈎絃自阼階前曰為政請射非射夫之弓矢也大射儀射夫諸侯也同合也大司馬職云若大射則合諸侯之六耦獻奏也發功發矢之功發彼有的以祈爾爵射義云求中以辭爵也注謂求不飲爾爵後儒乃謂求勝以爵其不勝非其爭君子之義二章言既射而祭祭畢復燕述古情文禮樂之盛也上八句言祭下六句言燕張記籥舞文舞籥師職云祭祀則舉羽籥之舞也籥舞而笙鼓應之則其奏和矣由是進而衎樂烈祖洽合百禮而百禮至焉楚茨所謂式禮莫愆也箋以百禮為諸侯所獻之禮有壬謂規模之廣大有林謂儀節之繁多蔡氏所謂至也於是尸傳神意錫以純常之嘏俾爾子孫皆湛樂焉又曰其湛曰樂者為復燕起文也各奏爾能即中庸旅酬逮賤之事陸堂賓載手仇即儀禮賔酌東方尊飲長兄弟之事毛以奏能手仇為復射今從鄭仇讀曰􅆽挹取酒也然鄭以獻尸加爵為言似不若直指旅酬於上下節次相協室人有室中之事者入又即樂具入奏之事謂燕於寢也詩所康安也謂無事而安飲也奏奏陔夏也賓出而奏陔維其時也説本田間似與四章醉而不出意針射此言祭後再燕之盡禮又如此三章復舉賓之初筵者明今飲之不然始乎治而卒乎亂也反反顧禮也幡幡輕數也蘓氏僊僊軒舉也集傳抑抑慎密也怭怭媟嫚也毛傳威儀輕數離坐屢舞非所謂左右秩秩者矣未醉而顧禮慎密既醉而至於媟嫚非所謂飲酒孔偕者矣是温恭之初意盡失而昏亂無次不知其序四章承上既醉言之遂極形其狀以為鑒也僛僛不正也傞傞不止也毛傳俄側弁之貎鄭箋始猶威儀輕數而已今且載號載呶亂我籩豆豈復能秩秩而有楚維旅乎始猶起舞軒舉而已今且僛僛不正是不知其序者又不知其過也至於傾側其弁猶屢舞不止豈復能受純嘏之錫而子孫其湛乎盖醉而即出則賓主皆以徳將而並受其福醉而不出則自害其徳而禍且隨之古所謂酌康爵而奏爾時者豈不孔嘉而有令儀乎奈何沉􅊺而不知止也五章承上令儀言之而重致其戒也大凡飲酒之人醉不醉有異而必設之監史者所以察其儀度也既醉者失禮而不臧使不醉者反為之羞愧豈非由於太怠之故乎式發語聲式勿從謂無俾太怠言曷勿從而告之無使至於太怠乎非言勿言以下皆設為告者之詞非所當言者勿言非所當從者勿語若醉而妄言則是以羖羊為童人誰信之即抑詩俾童而角實虹小子義也飲酒之禮未有過於三爵者三爵者獻酬酢也鄭箋三爵之後漸醉而不能記憶况敢多飲乎此正從而謂之無使太怠者也卒章之義毛鄭及諸儒俱失解今從集傳俾出童羖則依范逸齋説按本詩專刺飲酒義不主於射祭故後三章不復及之舊説牽連殊可不必魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居三章皆隔句韻此詩衍序以為思古集傳以為美詩愚謂飲酒所以行禮未有無故飲酒行樂而以為美者也魚以潛躍泳游為樂今首尾不蔽僅依蒲以自存豈非魚在於沼亦匪克樂者耶傳箋乃以為得其性誤矣范逸齋駁之謂在藻依蒲人皆以為魚之樂然此乃窘廹之狀非魚之性也嚴華谷言魚在淺水之處故首尾皆見蒲生近岸水又淺矣愈更窘廹二家之釋興義如此今按一章言豈樂飲酒二章言飲酒樂豈見飲酒之外更無别事王之在鎬所樂惟此耳三章言有那其居是安危利菑樂所以亡也衍者歸之武王而盛推其美反覆思之未覩厥指昔煬帝覽薛道衡詩斥為魚藻之義劉知㡬作史通亦言覩魚藻之刺而知宗周將隕古義相仍非無自也集傳作興毛缺注采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乗馬又何予之𤣥衮及黼觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福祿膍之優哉游哉亦是戾矣馬音米旂音芹命彌吝反邦卜工反右音以子右隔韻五章平去通陳古之詩都不明言刺意但針對時事之失而義已見矣獨此篇極陳古明王待諸侯之有禮而末章結語特反言以見義訓詁自誤耳全詩義重彼交匪紓句桑扈之詩曰彼交匪傲上所以感也此詩曰彼交匪紓下所以應也上以傲感而下以紓應所謂侮慢諸侯諸侯因以不至者此當時莫大之憂故二詩並陳之而結之曰優哉游哉亦是戾矣則是傲以致紓紓以取戾若重為諸侯戒者實隱隱告王以不可知之變序言見㣲而思古意在此也一章以采菽之備筐筥興待諸侯之有車馬衮黼舊説采菽以芼大牢為享賓之用者非此諸侯未至而豫其事也二章以檻泉之有芹可采興諸侯之有儀可覩而檻泉之自下上出則自下國而來之喻此諸侯來朝而至王都也三章言諸侯服此芾幅見於天子恭敬齋遫不敢紓緩則為天子所予錫之命而申以福祿也集傳此章為全詩之主匪紓所以受福祿則優游之受戾宜矣四章以柞之枝葉茂盛有以庇其本根興諸侯之蒙被恩禮有以衛天子萬福攸同君臣並受其福王氏平平左右亦是率從諸侯之臣亦相率以從王命也詩緝上章言其謹於事天子此遂言其力足以奠邦家見諸侯所繫甚重而不可侮慢也五章以楊舟之汎汎無定必以紼而纚維之興諸侯之離合不常必以恩禮維持之詩緝惟天子能揆度其功徳而命賜之孔疏又厚之以福祿庶乎如舟之纚維有定也不然彼交而紓戾且不免豈能殿天子之邦哉結語寄思深逺毛訓戾為至鄭訓戾為止似皆失之惟蘇氏訓戾為罪而以優㳺刺幽王愚意優㳺乃匪紓之反宜屬諸侯菀柳正其事也詩次於桑扈之後菀柳之前其義明矣周禮五路惟玉路不以賜其餘金路以封同姓象路以封異姓革路以封四衛木路以封蕃國𤣥衮箋云𤣥衣而畫以衮龍也疏云凡冕服皆𤣥衣纁裳又云龍首卷然謂之衮衮是龍之狀也衮則畫之黼則刺之古義云公衣五章裳四章而衣以衮為首子男衣三章裳二章而裳以黼為首此言𤣥衮及黼舉公及子男以該侯伯也呂記謂專指上公之服非爾雅濫泉正出正出涌出也李廵云從下上出曰涌濫檻音義同爾雅芹楚葵本草注云芹有兩種荻芹取根白色赤芹取莖葉並堪作菹説文嘒小聲也王氏云聲細而無敢馳驅王肅云夏駕兩謂之麗殷益一騑謂之驂周又益一騑謂之駟赤芾見前幅即左傳帶裳幅舄之幅傳云偪也所以自偪束也箋云如今行縢説文紼亂絲也爾雅繂也孫炎云大索也盖以亂絲為大索也葵揆也膍厚也皆當如傳説騂騂角弓翩其反矣兄弟昏姻無胥逺矣爾之逺矣民胥然矣爾之教矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至於已斯亡老馬反為駒不顧其後如食宜饇如酌孔取毋教猱升木如塗塗附君子有徽猷小人與屬雨雪瀌瀌見晛曰消莫肯下遺式居婁驕雨雪浮浮見晛曰流如蠻如髦我是用憂反分邅反遠於圓反瘉詩緝音愈讓平聲後音户取音楚别見楚辭天問龍為霖云本即模之入附即符之去去入本通屬釋文音樹髦釋文莫侯反此刺幽王不親九族使骨肉相怨而衍者及其好讒佞疏謂於文無當是也當時兄弟中疑有貪位嗜利為病於親族而相與搆怨者詩人推本於王之疎慢骨肉為之倡導故二六兩章重斥王之教也嚴華谷謂詩書所稱先民皆訓人今曰民猶人也指族人也是説得之諸家泛言庶民於詩義濶逺何黄如又因昏姻字遂指讒佞之人為褒姒親黨不知褒姒本無親黨詩亦無親昏姻意此昏姻乃與兄弟同為王所逺者應屬申吕一輩然詩意專重兄弟故後章不復言之亦無容喧客奪主也一章言弓體往來張則内嚮而來弛則外反而往歐義興兄弟昏姻親之則合疎之則離是以告之使相親也蘓説二章言王逺族人則族人亦自相逺是王教之偷薄使相傚也三四五章皆言胥傚之事兄弟之善者雖被疎逺亦綽綽寛裕而不以介意其不善者則相與讐怨而交相病矣盖善者少而不善者多孔疏彼無良之人所謂不令也各執其一隅之見錢氏但知怨人不知反已所以然者皆由貪爭不已歐義不以爵祿相讓故怨禍及之比周而黨愈多鄙爭而名愈辱求安而身愈危毛傳至於已斯亡詩貫謂倒句是也老馬為駒不量力也宜饇孔取不知足也詩貫此受爵不讓之實也六章囘合二章言此不讓之人貪位嗜利如此既如猱之跳踉塗之汚人矣王猶以薄導之是教猱升木而以塗附塗也其取怨惡不亦甚哉人性本善君子苟有善道無不囘心相嚮聫屬如一體奈何教以不善乎詩貫劉氏彛曰先王有至德要道民用和睦正其五品示之孝友是之謂徽猷七八兩章言王能親厚九族如日晅之則怨毒氷釋矣詩緝故以雨雪之見晛興之今恩澤莫肯下遺歐義自居驕驁數數如此視其族人如蠻髦然宜彼不讓之人傚法上之所為棄禮義而相殘賊亦如蠻髦之蝟起言必叛亂也我是用憂詩人之意深矣幽王卒死犬戎之難可畏哉此章義觧紛錯有以受爵之爵為爵斚者嚴緝與下章義不貫有以老馬為駒為侮慢其老者傳箋與本文語不合有以見晛曰消為誅滅小人者箋義呂嚴朱皆謂讒言消釋按此二章收結全詩宜歸親九族意今參用諸家説酌定之考工記弓有六材焉榦角筋膠絲漆維榦强之張如流水維榦䟫讀牚之欲宛而無負弦引之如環弓體不辟戾謂之無負絃饇飽也毛傳孔甚也集傳言惟以得爵祿為快如食者但知飽餐飲者但多酌取曾不少加斟量此申言不顧其後之義以足上不讓也爾雅猱蝯善援蝯亦作猨毛傳猱猨屬疏云猨之輩屬非猨也陸璣云猱獼猴也楚人謂之沐猴老者為玃長臂者為猨猨之白腰為獑胡何楷曰母猴亦謂沐猴母沐音通非以牝為母也其名曰為非猱也猱亦作蝚顔師古曰今絨皮可為鞍褥者非獼猴也陸佃云狨長尾尾作金色俗謂之金線絨説文晛日見也毛云日氣也師古云無雲日氣始出也箋云髦西夷别名武王伐紂其等有八國從焉疏引牧誓庸蜀羌髳微盧彭濮彼髳此髦音義同也有菀者柳不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉有菀者柳不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜暱古音匿矜古居銀反此篇衍序者謂暴虐無親刑罰不中諸侯皆不欲朝夫王既暴虐諸侯安敢不朝末章之義尤難推衍集傳用箋説其解未融三百篇中亦無以彼人斥王者徧閲前人講義惟錢澄之謂王徵諸侯伐申以求太子而諸侯不應之於詩義為近按鄭語王欲殺太子必求之申則其説可據矣前二章言菀柳下垂尚可息愒喻太子之在申也上帝指王也鄭箋蹈如發揚蹈厲之蹈謂頓足而怒厲也王怒而欲殺太子此豈可暱就而取病無者同列相戒之辭且使予伐之而靖其禍後將益肆其暴極予之力以事征伐而勤兵逺邁禍寧有已乎三章乃斥褒姒之言言以下國之賤女奪嫡為后如鳥之飛而傅天亦可已矣猶欲殺太子以安伯服其心於何底極前言俾予靖之王使之也此言曷予靖之自審其不可也矜通作兢毛云危也言曷為從王之使而自居凶惡之名以取危亡也澄之之義如此為述而論之何黄如謂詩作於舉烽無寇時則諸侯悉至矣詩無徵諸侯而無信意且所謂俾予靖之者不反觸乎陸奎勲以為東遷後詩尤臆説矣集傳為比當從毛作興都人士之什彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望彼都人士臺笠緇撮彼君子女綢直如髮我不見兮我心不説彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結彼都人士垂帶而厲彼君子女卷髮如蠆我不見兮言從之邁匪伊垂之帶則有餘匪伊卷之髮則有旟我不見兮云何盱矣序言周人刺衣服無常不著何王之世集傳則謂亂離之後人不見昔日都邑之盛人物儀容之美今按詩無亂後情景故仍從舊説一章述古之長民者序所謂衣服不貳從容有常以齊其民也詩緝彼者彼時也士者貴賤之通稱詩緝此章則指長民者而言言彼時王都人士其長民者衣黄黄然之狐裘容有常度言有文章其行又歸於忠信行去聲周從毛作忠信故為民所仰望而法則左傳襄十四年楚子囊卒君子謂子囊忠忠民之望也詩曰行歸於周萬民所望呂記二章以下則述王都之俗貴賤皆有禮法序所謂民徳歸壹者也詩緝二章舉賤者言之則以臺草為笠緇布為冠撮持其髻其女之有士行者田間髻密而直如其本髮解頥言儉素也三章舉貴者言之則以美石為瑱塞實其耳王肅其女子皆有大家規範謂之尹吉猶晉稱王謝唐稱崔盧也李解今則士多衺服女尚危妝如大東所云西人之子粲粲衣服舟人之子熊羆是裘則其室家可知矣往時風俗之美今不可見是以我心不説而苑結也苑結者盤屈如繩索之結孔疏言不可解也四章五章則合貴賤言之男子之帶垂而厲然女之鬢旁短髮不可斂者則曲以為飾如蠆尾然其垂也乃有餘而垂其卷也乃自然而揚如旟之揚皆非矯强裝飾言樸質也使得見之當從之以行今不得見徒使我張目望之而喚奈何也何黄如以為共和時詩殆不可信終朝采綠不盈一匊予髮曲局薄言歸沐終朝采藍不盈一襜五日為期六日不詹之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及旟維魴及旟薄言觀者弓音肱者音渚後漢書劉瑜疏天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹怨曠作歌仲尼所錄盖用此序康成解序乃不言刺王而以怨曠為非禮非詩意也集傳得之一二章言綠藍皆易得之物鄭箋采之終朝而不盈一匊一襜者怨曠之深不專其事也鄭箋髮久不櫛則曲局而不舒詩緝夫不在則不容飾也毛傳舍采而歸沐者盖已及期而待其至不謂期過而瞻之不得也五日六日設言以見逾期之意猶云期逝不至耳李解三四章乃預言歸後之事之子若歸而往狩乎我則為之納弓於韔往釣乎我則為之繫繩於竿欲無往不與之俱也集傳然繩則綸之而弓獨言韔者豈因其以武自累故欲其藏弓不用耶何黄如錢澄之皆有此説觀下章但以釣言或其然歟又虛擬其獲之多而已得往觀田間不至如今之逺出而相見無期盖極婦人之思致不言怨而怨甚矣郝仲輿曰古者用民之力歲不過三日新昏三月不從政恤其私也今使其室家睽離匹婦銜怨故聖人錄是詩以明王道本乎人情耳集傳賦也今從毛作興綠王逸作菉爾雅王芻也郭云即菉蓐草今呼鴟脚莎唐本草注葉似竹而細薄莖亦圓小生溪澗之側荆襄人煮以染黄色陸疏其草澀礪可以洗攪笏及盤枕利於刀錯俗呼為木賊説文藍染青草也爾雅葴馬藍注云即今大葉冬藍為澱者通志藍三種蓼藍如蓼染綠大藍如芥染淺碧槐藍如槐葉染青爾雅衣蔽前謂之襜郭云今之蔽膝何黄如曰今按襜蔽前正當蔽膝之處非蔽膝也韔見秦風芃芃黍苖隂雨膏之悠悠南行召伯勞之我任我輦我車我牛我行既集盖云歸哉我徒我御我師我旅我行既集盖云歸處肅肅謝功召伯營之烈烈征師召伯成之原隰既平泉流既清召伯有成王心則寧牛古音疑後同錢飲光曰幽王之時申后被黜申伯與王室相怨詩人追敘召伯營謝之烈見宣王尊禮元舅之隆一以感悟王心一以息申伯召戎之念也按衍序言幽王不能膏潤天下卿士不能行召伯之職迂逺不應詩義諸儒遷就其説初無卓見宜朱子不信而以為宣王時詩也田間特發此論深中情事崧髙美宣王故詳序勲績此述故事而已故從略焉一章以隂雨之膏黍苖興召伯之勞工役二三章皆勞之之事也任輦車牛以載工役之器言徒御師旅以受工役之人言古義我行既集盖云歸哉盖云歸處先示歸期安其心也詩緝四章言其持事嚴敬趨功勇往五章總其事之成也土治曰平水治曰清毛傳此即崧髙徹土田土疆之事盖宣王恩遇申伯而召伯能成其功以安王心如此幽王當體先王之心始終以恩遇申伯申伯亦當感念先王無以后故而懐怨望此詩人之志也夫猶是申國也宣王寵遇之所謂維周之翰者繼世而叛亂弑逆夫誰致之哉詩可以觀斯之謂也隰桑有阿其葉有難既見君子其樂如何隰桑有阿其葉有沃既見君子云何不樂隰桑有阿其葉有幽既見君子德音孔膠心乎愛矣遐不謂矣中心藏之何日忘之難乃多反膠居侯反何黄如曰集傳謂詞意與菁莪相類然細味實有不同者菁莪取興自中阿而中沚而中陵有離潛上升之象此三章皆曰隰桑隰乃下卑之地桑乃農圃之業其為隱君子而不在髙明之位可見故知序解自確一二章以桑之在隰阿娜沃潤興君子處窮約而英華發外詩緝既見則樂而言如何云何者盖不得見而虛擬之辭三章則所樂之實也有幽者葉密而隂濃深黑色也毛傳言出于德謂之德音言君子懐此德音膠結於中而不解也四章申言德音孔膠之義盖君子心乎愛君所欲言者何不傾吐特無由上達惟中心服念不置耳此我所以樂得見之而以不見為憾也按孝經子曰君子之事上也進思盡忠退思補過將順其美匡救具惡故上下能相親也詩云心乎愛矣遐不謂矣中心藏之何日忘之表記引此亦同此君子豈以言見棄者乎舊解似未盡詩義白華菅兮白茅束兮之子之逺俾我獨兮英英白雲露彼菅茅天歩艱難之子不猶滮池北流浸彼稻田嘯歌傷懐念彼碩人樵彼桑薪卬烘于煁維彼碩人實勞我心鼓鐘于宫聲聞于外念子懆懆視我邁邁有鶖在梁有鶴在林維彼碩人實勞我心鴛鴦在梁戢其左翼之子無良二三其德有扁斯石履之卑兮之子之逺俾我疷兮序曰刺幽后康成遂以褒姒當之獨程子謂幽后當作幽王質疑曰今据漢書班偼伃傳顔師古注云白華小雅篇周人刺幽王黜申后也是后字上有闕文其曰刺幽后非也按此詩為周人所作猶碩人為衛人所作謂申后自作恐非衍序謂下國化之以妾為妻以孽代宗詩無此義歐陽据此駁毛鄭亦非也一章言白華漚治而為菅則以白茅東之即雖有絲麻無棄菅蒯之義何之子逺棄我而使我煢獨耶此代為申后之言菅茅皆喻申后舊以分喻嫡妾者非之子斥幽王二章言輕明之白雲下露菅茅興后不䝉覆露天歩天行也艱難即日月告凶之事田間天行如此而王不圖維集傳猶圖也使后長被放廢也三章言滮水㣲流猶浸稻田興后不承膏澤嘯歌傷懐所謂長歌當哭碩人謂申后詩人憐而念之也四章言桑薪宜以供㸑乃燎我於無釡之竈以然火照物而已興后失職是以念之而勞心也婦主中饋故以桑薪烘煁為失職之喻五章言擊鐘于宮則聲聞于外興宮庭之事不可掩我念王則懆懆而愁王視我則邁邁而逺何哉詩緝此亦代申后之言六章言鶖鶴清濁逈别而皆以魚為養興后與褒姒邪正逈别而皆以王為賴今鶖據魚梁而飽鶴放在林而饑詩緝能不念碩人而勞心乎七章承上言此魚梁也在昔鴛鴦集之而戢翼相向興王與后之相得而今不然也彼褒姒何足責獨王之無良而二三其德耳此二章乃重斥王嬖妾廢后之事八章言有額書戸上之扁石而踐履之則卑莫甚焉今王之逺棄我而使我傷病何以異此詩所毛以扁為乗石貎蘇以扁為卑貎今不用此亦代為申后之言按衛詩以莊姜為碩人則此碩人宜指申后質疑謂集傳既斥王為之子又斥王為碩人於屬文亦無是體也至詩中我字皆代為辭者不得泥此遂謂申后自作集傳比也今從毛作興爾雅白華野菅邢疏漚之柔韌異其名謂之菅因謂在野未漚者為野菅水經注鄗水又北流西北注與滮池合水出鄗地西而北流入於鄗滮流浪也而世傳以為水名矣九域志京兆府冰池名滮池亦名聖母泉爾雅卬我郭曰猶姎也女人稱我曰姎爾雅煁烓郭曰今之三隅竈也孔疏無釡之竈止以然火照物今之火爐也説文鶖秃鶖陸佃云鶖性貪惡一名扶老狀如鶴而大長頸赤目其毛辟火毒頭高八尺善與人鬭好唱蛇説文扁署也從戸册户冊者署門戸之文也何晏景福殿賦爰有禁扁詩所曰以石為之比舊説為長緜蠻黃鳥止于丘阿道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之緜蠻黄鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之緜蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之序謂微臣刺亂而衍者言大臣遺忘微賤不肯飲食教載之朱子謂詩無刺大臣意程子亦以飲食教載為不成語是皆衍序之失然本詩言道之云逺又言豈敢憚行則有征行之事可知言後車載之詩人自是登仕版者非徒役之庶人可知而車直言後則為臣之㣲者亦可知集傳特託鳥言為異耳大致亦從舊説也後之為説者乃别生枝節總不可据愚按古者王人出使下國凡導迎郊勞致飱獻餼陳芻展車一切儀物視列國加隆焉詳見國語周衰禮廢侯國不循舊典以禮王人觀單襄公過陳之事可見此于役之微臣所由困乏歟三章皆以黄鳥之得所止興微臣之困於行曰飲食則所謂致飱獻餼者無有矣曰教誨則所謂導迎郊勞者無有矣曰命彼後車謂之載之則所謂陳芻展車者無有矣如此而行逺道何能趨而極於所之之境乎詩所謂刺亂者如此刺大臣託鳥言皆衍説也集傳比也今從毛作興疏丘阿丘之曲中後車箋謂倅車按孟子後車數十乗豈必君之倅車乎極至也鄭箋國語云齊朝駕則夕極于魯李觧幡幡瓠葉采之亨之君子有酒酌言嘗之有兔斯首炮之燔之君子有酒酌言獻之有兔斯首燔之炙之君子有酒酌言酢之有兔斯首燔之炮之君子有酒酌言醻之下三章皆隔句韻二章平去通三章炙古張畧反詩緝曰幽王君臣沈􅊺故此詩極陳簡儉之意以刺盖欲收斂之非欲開廣之也後序謂王有牲牢饔餼而不肯用失之矣愚按詩以獻酢醻分章即賓之初筵三爵不又之意不獨昭簡儉亦示止節也一章言不必嘉蔬即甘瓠之葉可采而烹之以為菹三章言不必異饌即有兔一頭集傳有兔斯首一兎也猶數魚以尾也其新殺而鮮者可爓去其毛而炮之其脯腊而乾者可加于火而燔之具割截而柔者可炕于火而炙之箋義酌酒而嘗王氏謂嘗其㫖否然後行獻醻之禮也獻者主人酌以獻賓也蘇氏酢者賓既卒爵洗而酌主人也鄭箋醻者主人既卒酢爵又酌自飲卒爵復酌以進賓也鄭箋飲酒之禮止於此豈得放飯流醊為長夜之飲乎此詩人言外意也漸漸之石維其髙矣山川悠逺維其勞矣武人東征不皇朝矣漸漸之石維其卒矣山川悠逺曷其没矣武人東征不皇出矣有豕白蹢烝涉波矣月離于畢俾滂沱矣武人東征不皇他矣皇誤作遑今依石經改正卒音萃没轉音昧出音翠他音拖幽王東征雖不見于史詩即史也周時戎狄之患無世無之衍序謂荆舒不至而征之或其然歟然謂將帥乆病於外而作此詩與本序下國刺幽王不合今按詩意皆旁人指斥之詞與怨久役者殊别漸漸釋文作嶃嶃山石亷利之狀卒崔嵬也謂山巔之末鄭箋山窮者川斷之川盡者山間之劉氏故曰悠逺勞謂極其跋履之苦不當如鄭訓勞謂遼沒謂盡其登歴之境孔疏言其失地利也豕渉波而蹢蹄也白久雨渟澇之故月離畢則又將雨矣不當如毛以豕渉波為將雨之騐言其失天時也朝謂朝旦當從集傳不當如鄭以為朝王出謂出險他謂苦雨而不能治他事詩緝曰愁苦極而智慮廢尚能講求制敵之事乎長樂劉氏曰深入蠻夷之地為山川所困雨水所淫戰敵未㨗病疫相仍救其生死之不暇何遑及其他事哉朱公遷曰一章兵起在道而無休息之期二章懸軍深入而無出險之計三章以持戈執㦸之勞而有霑體塗足之苦是以智慮廢而憂患專也朱康流曰為將之畧在於能暇不皇朝是不能暇也又在於知險不皇出是不知險也又在於應變不皇他是不能應變也將畧不嫻一卒之力耳故斥之曰武人入非其地戰非其時而又用非其人此詩所以刺也下國謂所經之國疏曰易姤初六羸豕孚蹢躅毛亨孫炎皆訓蹢為蹄箋曰豕之性能水又唐突難禁制白蹢其尤躁疾者漢志西方為雨雨少隂之位月失中道移而西入畢則多雨苕之華芸其黃矣心之憂矣維其傷矣苕之華其葉青青知我如此不如無生牂羊墳首三星在罶人可以食鮮可以飽飽補苟反兵荒相屬民不聊生大夫憫時而作是詩序説一二章言陵苕附木而生其華葉猶繁盛若此傷人之憔悴不如苕也按陵苕華黄葉青乃其本質芸者繁盛之貎毛以為將落則黄鄭以為華衰葉見失之初言心之憂傷次言不如無生盖不忍及見其亡也當此師旅繁興因以饑饉物産凋耗氣象蕭條觀諸物産則牝羊無字見墳然之大首而已集傳羊瘠則首大觀諸水族澤禁無魚罶中水静見三星之影而已饑人苟且得食可矣安望飽乎郝氏陳氏曰其辭簡其情哀周室將亡不可復救詩人傷之而已李氏詩測曰當是時戚里之第權豪之門旨酒嘉肴以娛賓燕客者自若也舟子商人曳熊羆之裘者自若也皇父作都車馬屬路金帛𤣥黄自若也邪人得志剝削蒸黎則氣運因之衰矣譚大夫徒知西人之子粲粲衣服豈知其中不得飽者大有人在哉此雖無闗本義而指論當日情事甚得集傳比也今從毛作興爾雅苕陵苕黄華蔈白華茇舍人謂别華色之名也圖經云凌霄華也多生山中蔓引大木歲久至巔而有華其華黄赤羅願云是物雖名紫葳而華不紫芸其黄者花開之色耳陸璣乃謂一名䑕尾生下濕水中華紫葉可染皂今考陸所説乃爾雅葝也爾雅葝䑕尾注云可以染皂陸盖誤也何草不黃何日不行何人不將經營四方何草不𤣥何人不矜哀我征夫獨為匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐率彼幽草有棧之車行彼周道矜韓詩作鰥龍為霖云古鰥矜通用野神與反暇音豫詩刺征役不息未必為戰伐之事集傳得之草衰則黄集傅腐則𤣥興征夫之惟悴非紀時也箋説非一章何日何人二語便已愁慘滿目將相將而行也經營四方則于役非一處矣二章言何人不矜則役久不得歸失其室家之樂也集傳征夫獨匪民乎奈何不以民視之也三四章承上匪民而言兕也虎也長尾之狐也集傳芃尾長貎或率曠野或率幽草乃其宜耳今征夫既朝夕不暇於曠野之中而乗棧車之士亦草行露宿於周道豈非犬馬使人者歟錢澄之曰此士即征夫所從者或其然歟詩説云苕華言國家衰微時物凋耗民不聊生天運窮矣何草不黄言役使煩数征行勞苦上之視民如禽獸衍序人事極矣周室至此其不可為矣尊卜云是什居小雅之終彼都人士篇有匪風思周道之意黍苖篇有下泉思郇伯之意其皆窮而反本之謂歟又竊意是什之詩體裁與國風相似二雅音響至是絶矣集傳興也毛失注周禮巾車職士乗棧車注棧車謂不革鞔而漆之虞東學詩卷八
