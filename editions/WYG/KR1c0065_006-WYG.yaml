body:
  text: 虞東學詩卷六宗人府主事顧鎮撰小雅雅正也朱子謂燕饗朝會之正樂也其分小大則周公制作時所定或謂周初之雅無大小之分者非也顧正之為義非一説所能盡故有主政序説主理潁濵象説主體華谷魯齋主聲夾漈泰之不一之説往往執此非彼以今疑昔其實四者之説悉備於孔氏之説其言曰王者政教有小大詩人述之亦有小大此主乎政者也又曰體有小大故分為二此主乎體者也又曰詩體既異樂音亦殊此主乎聲者也又曰大雅宏遠而疏濶宏大體以明責小雅躁急而局促多憂傷而怨誹此論其辭而亦毘於理者也朱子固已採而兼用之矣今按集傳懽忻和悦以盡羣下之情恭敬齋莊以發先王之徳政在是理在是矣辭氣不同音節亦異則體與聲之説具焉疏義詳盡集傳條貫餘説可盡刪也東萊經傳之説亦無取至於小雅之次序時世朱子以為不可考然自鹿鳴至菁菁者莪二十二篇皆常用樂歌經周公手定六月以下為宣王詩節南山以下為幽王詩時世畧可攷見獨楚茨以下諸篇或敘田功或陳朝㑹後人既不信序復疑集傳之難据而説者紛紛矣李文貞作詩所遂斷為東都之詩再從盛時敘到周衰未免臆為之説近日漳浦蔡氏欲分小雅為二篇自鹿鳴至無羊為始正而漸變自節南山至末為已變而思正其説近理陳氏曰周家之治至於文武其禮文浸以繁縟故周公因一事以作一詩太史録之其後或舉是事則復歌是詩焉鹿鳴之什集傳雅頌無諸國别故以十篇為一卷而謂之什猶軍法以十人為什也呦呦鹿鳴食野之苹我有嘉賔鼔瑟吹笙吹笙鼔簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔徳音孔昭視民不恌君子是則是傚我有㫖酒嘉賔式燕以敖呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼔琴鼓瑟鼓琴和樂且湛我有㫖酒以燕樂嘉賔之心首章上下兩韻次章平去通鹿鳴言燕彤弓言饗饗在廟而主敬燕在寢而主懽其所用之樂則饗或上取燕或下就鄭譜雖孔疏援据二傳謂饗燕同歌鹿鳴而本經所陳則燕禮也儀禮注鹿鳴者君與臣下及四方之賔燕講道修徳之樂歌得其義矣大射之歌鹿鳴先行燕禮故也鄉飲之歌鹿鳴禮盛者將進取也惟為鄉飲所用故士之入學得而肄之未有無故而可以通用者也鹿鳴以仁求其羣新語而得食相呼興君以恩禮逮其下而與之懽燕鼓瑟者工歌鹿鳴之三也吹笙者笙奏南陔以下也承筐是將者飲之而有酬幣食之而有侑幣也鄭箋燕禮無用幣之文而周語稱先王之燕有折俎加豆酬幣容貨以示容合好是燕有幣也禮不具其文耳孔疏人之好我示我周行古者於旅也語蓋厚意既將驩欣交通庶乎人之好愛我而示以大道所謂忠臣嘉賔得盡其心者此也序説王褒頌云上下俱欲懽然交欣千載一㑹論説無疑其義蓋本於此徳音者懿徳之著為令聞也鄒氏鄭注鄉飲酒燕禮皆言嘉賔示我以善道又有明徳可則傚而箋詩作别解顯自矛盾故集傳用其注禮之意以釋之上章乞其言次章憲其徳也嘉賔式燕以敖者因燕而射以樂賔也二三章叠言我有㫖酒者徹俎之後脱履就席君曰無不醉也末章復言作樂變笙言琴者堂下之樂不作獨鼓琴瑟以盡賔主之歡詩所蓋至此則爵行無算樂亦無算也和樂且湛者言樂之長久宵則執燭於東西階也既乞言憲徳尤欲其中心安樂好我於無窮也詩所全篇結到心字乃知君臣相與一以至誠而非其外之文也詩所曰此篇必文王之詩以四詩皆首文王也文王既立辟雝作靈臺與賢臣燕飲於其中俯有麀鹿仰有白鳥作者因物起興此及振鷺是也后妃寤寐求賢於内文王尊賢於外琴瑟鐘鼓之音朝寢相應後聖以為樂而不淫其可謂至徳也已矣釋草苹有二種一水苹見前一藾蕭則此苹也陸疏始生香可食陸苹也又釋草蒿菣去刃反陸疏青蒿也荆豫間曰菣又疏芩生澤中下地鹹處莖如釵股牛馬亦喜食之按燕禮小臣納工工四人二瑟小臣左何瑟面鼓執越瑟下孔内弦右手相入升自西階北面東上坐小臣坐授瑟乃降工歌鹿鳴四牡皇皇者華笙入立於縣中奏南陔白華華黍乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀遂歌鄉樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋此正歌也至以射樂賔後則有無算樂焉注曰取懽而已宵則庶子執燭於阼階上司宫執燭於西階上甸人為大燭於庭閽人為大燭於門外賔醉坐取薦脯以降奏陔燕樂之事乃畢四牡騑騑周道倭遲豈不懐歸王事靡盬我心傷悲四牡騑騑嘽嘽駱馬豈不懐歸王事靡盬不遑啟處翩翩者鵻載飛載下集于苞栩王事靡盬不遑將父翩翩者鵻載飛載止集于苞杞王事靡盬不遑將母駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗次章馬處韻騑歸隔韻三章下栩父韻栩况甫反四章止杞母韻五章駸諗韻平上通四牡勞來皇華策遣先勞後遣者蘇氏以為聲有先後非也蓋作詩之時各縁本事迨後編為樂章鹿鳴三詩同歌堂上則先恤其情後勸以義燕示慈惠故也序曰勞使臣之來則己國使臣之歸或諸侯使臣之來皆用此勞之矣童子問全篇皆君代使臣之言集傳謂敘其情而憫其勞詩之情也序説謂有功而見知則悦詩之用也首二章言使臣不已於行而周道囘逺雖以耐勞之駱馬陸氏而喘息如此毛傳則勞可知矣豈不思歸而王事不可以不堅固不敢以私而廢公是以傷悲而不暇居處也傷悲者即下將父母之私情不遑者即上靡盬之公義也三四章見夫不之飛而終集因念使事未畢而不獲歸養父母所以申其悲傷之故陳其不遑之苦也末章言將母來諗者探其情意所不能已而未敢言者於其燕勞而歌之朱子初説所謂有功而見知也儀禮注采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賔也錢飲光曰其詩沉鬱曲折一如使臣自道其情而實上人代之言則使臣無可復言矣所以感之深而益盡心於王事也先王之善用人心如此爾雅白馬黒鬛駱廣雅駱馬耐勞今呼黄馬尾鬛一道通黒如界者為駱蓋馬無分於黄白若今衣脊絡縫故曰駱也通志凡鳥之短尾者皆謂佳惟夫不音丕專名焉郭曰今鵓鳩也箋曰鳥之慤謹者鵻一鳥而十四名鵻也鵻其也鵓鳩也祝鳩也鳺鴀也䳕鳩也鵾鳩也楚鳩也鳻鳩也荆鳩也乳鳩也鵴鳩也􅝣鳩也䳫鳩也嚴緝詩有三杞此詩苞杞爾雅謂之枸檵詳見鄭風將仲子篇皇皇者華于彼原隰駪駪征夫每懷靡及我馬維駒六轡如濡載馳載驅周爰咨諏我馬維騏六轡如絲載馳載驅周爰咨謀我馬維駱六轡沃若載馳載驅周爰咨度我馬維駰六轡既均載馳載驅周爰咨詢首章隔韻華音敷誅音媒本詩為君遣其臣春秋内外傳皆曰君教使臣此其教之之辭也人君出使臣於千里之外苟無以發其懽欣則意氣衰落程子故以華之皇皇于原隰興使臣能將君命為國光華於逺近也嚴緝駪説文為馬衆多下四章駒騏駱駰正言多也馬之衆多由於征夫衆多故毛即以征夫言之使必有介故衆也集傳加訓疾行因下靡及而言亦註家因文解義之法每懷靡及者每事思之而於心常若不及歐蘇不必泥國語懷和之義或曰諸使臣皆同此懷故曰每懷外傳所謂懷和為每懷也首章述其懷以為綱下乃條舉其目皆恐其不及而勤於訪問也忠信為周國語文左傳必咨於周則謂周徧之周於義得也訪問於善曰咨咨親為詢咨禮為度咨事為諏咨難曰謀詁訓鑿鑿未便以變文叶韻例之按周禮小行人之職萬民之利害為一書禮俗政事教治刑禁之順逆為一書悖逆暴亂作慝猶犯令者為一書札喪凶荒厄貧為一書康樂和親安貧為一書凡此五物者每國辨異之以反命於王以周知天下之故與此詩正相表裏穆叔之言豈無據乎補傳謂燕而歌此詩即是送之以禮樂亦通毛不言興今從集傳為興爾雅隂白雜毛駰郭注隂淺黒或云目下白或云白隂俱非常棣之華鄂不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒矣兄弟求矣脊令在原兄弟急難每有良朋况也永歎兄弟鬩於牆外禦其務毎有良朋烝也無戎喪亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻帑是究是圖亶其然乎不鄭作拊拊亦作跗裒古蒲牟反務左傳作侮戎音汝熊明來五經説常武以修我戎並當音汝龍為霖曰公孤通也豆古田故反家音姑詩為燕兄弟之樂歌作於管蔡既誅之後故其辭悱惻凄婉其實非為管蔡作也既作於後而先儒又謂文武治内之詩者朱子云燕兄弟者文武之政閔管蔡者周公之心得其義矣首章言兄弟同氣連枝如華鄂相附非他人所得如即陳思豆萁之譬而正言之下四章反覆申明其義也鄂説文作蕚承華者曰鄂不音桴鄂足也鄂足得華之光明則韡韡然盛鄭箋二三四章連言死喪急難外侮者人之真情恒於此驗而周公遭人倫之變故志切情哀為涕泣之道也裒謂積尸裒聚集傳則求字當為収卹之義乃與死喪相應且不待死喪也凡有患難惟兄弟急之而相救何楷况與怳通悲歎貌詩所又非獨兄弟之式好者也即不令之兄弟亦必共禦外侮此豈可望之朋友乎烝衆也戎汝也雖衆而不能助汝言兄弟之不令者猶勝於朋友之良者也詩緝人之不如兄弟有斷然矣乃至喪亂平而猜嫌起反謂朋友賢於兄弟豈非失其本心者乎歐蘇第五章為全詩轉捩得此一折義理更極分明情辭更極悚切六章以下則正言燕事飫私飲也傳箋周語王公立飫則有房烝是也孺者親慕之義程子言其和樂如孺子時此堂上之燕也合者如琴瑟之聲相應和蓋王與族人燕則后亦燕其宗婦箋説湛者樂之久此房中之燕也妻子和諧則兄弟翕聚而不散蓋兄弟之愛往往間於妻子故末章又以宜室家樂妻帑言之而使之究圖其義也吕氏曰告人以兄弟之當親未有不以為然者苟非是究是圖實從事於此則亦未有誠知其然者也諸家皆以妻子不如兄弟立説失其㫖矣集傳以宜室家承第六章樂妻帑承第七章亦似强説集解召南唐棣之華與論語所舉唐棣則爾雅所謂栘也此常棣與采薇維常之華則爾雅所謂棣也郭璞云今山中有棣樹子如櫻桃可食程子曰今所謂郁李花蕚相承甚力焦氏筆乘云不風無切本作柎即今花蒂左傳華不注山人讀作逋骨切誤也古不字讀作缶今讀如卜乃俗音耳据此則鄭非改字徐元扈云常棣一華輒生二蕚兩兩相麗故稱韡韡興兄弟同生之意爾雅脊令雝渠郭曰雀屬詩緝云雪姑也鄭以為水鳥者非禽經曰脊令友悌故以取興帑子也左傳歸其帑爾雅飫私也毛云不脱屨而升堂謂之飫疏曰燕由坐而脱屨明飫立則不脱屨矣又曰王與族人燕則宗婦内宗之屬亦從后於房中而燕故有妻子按諸儒説後三章義精矣但本詩為燕而作則舉燕中所有之人宜也故舊説不可廢其義則仍如諸儒所言爾伐木丁丁鳥鳴嚶嚶出自幽谷遷於喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平伐木許許釃酒有藇既有肥羜以速諸父寧適不來維我弗顧於粲洒掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失徳乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我迨我暇矣飲此湑矣簋音九上去通暇古音豫平上平去通詩為燕朋友故舊而以父舅兄弟為文疏引覲禮天子呼諸侯之義蓋天子之友不越同姓異姓張記或謂燕朋友而及親戚者詩所衍説也因伐木而感鳴鳥如葛覃取興之例吕記謂詩人多相因之辭是也伐木非一人能獨為程子故借以取興或疑詩主鳥鳴求友為喻反謂下二章之不類歐義則失矣以伐木興鳥鳴集傳亦非蘇氏轍曰事之甚小而須友者伐木也物之無知而不忘其羣者鳥也語曰良禽擇木良臣擇主故必出谷遷喬而後可求友神之聽之終和且平言尊賢尚徳之心可以質諸鬼神無復乖戾參差有初而鮮終也非鬼神佑之以和平頴濵亦非求友以治天下而有和平之效之謂迂仲首章畧君臣而言交誼所謂樂道忘勢也真氏二三章乃言設燕之事極品物之豐酒食之盛隆禮備樂而常恐恩意不至以取咎致愆故乘暇而飲以相樂所以永終此和平也伐木許許蓋既伐而舉之淮南子舉大木者呼邪許蓋舉重勸力之歌集傳伐木于阪則自山而陸矣張記雖興義而言之有序如此微我弗顧微我有咎鄧元錫云寧其適有他故而不來將無我弗顧我有咎而不來也實勝舊説按禮饗用太牢詩言肥羜肥牡則同於饗羅氏願曰肥牡大牛今按詩中言牡者多主牛疏謂即肥羜者非食主黍稷詩言陳饋八簋則同於食燕主飲酒而樂無算詩之言酒者或筐􅜷之而名釃或茅縮之而名湑或一宿成之而名酤毛傳酤一宿之酒釋文音户鄭改訓為沽則豈有天子而買酒飲賔者而又有坎坎之鼔蹲蹲之舞則同於燕何𤣥子謂兼是三者禮之盛也愚謂三禮無一時並用之事詩特備言之或當饗或當食或當燕通用以為樂歌耳丘氏曰燕或因祭或因勞或因閒暇中庸燕毛是因祭也四牡皇華是因勞也伐木之亂所謂迨我暇矣是因閒暇而時會也舊作六章集傳從劉氏作三章今仍之毛傳藇美貌未詳所出爾雅未成羊羜周禮注進食於尊曰饋明堂位周之八簋八簋乃祭品今燕用之尊敬之也王制乾豆注謂腊之以為豆實疏云豆實非脯而云乾者謂作醢及臡先乾其肉徐鍇云飯乾為餱顔師古曰乾餱二物皆食之薄者張記曰乾餱餅餌之類以為一物非是天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶天保定爾俾爾戩穀罄無不宜受天百禄降爾遐福維日不足天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增吉蠲為饎是用孝享禴祠烝嘗于公先王君曰卜爾萬壽無疆神之弔矣詒爾多福民之質矣日用飲食羣黎百姓徧為爾徳如月之恒如日之升如南山之壽不騫不崩如松栢之茂無不爾或承厚古音户除庶平上通享音鄉福古方墨反恒一作􅀈故毛鄭皆以弦訓之嚴華谷疑恒縆異音縆音亘然平去亦自通也茂音耄序言下報上疏謂聖人示法義取相成非故答上篇也按燕禮無臣下答報之歌豈無算之節所用歟疑不敢質也前三章主天之福君而取喻於山阜岡陵川至蓋承維日不足言之有高大盛長之義焉後三章主神之福君而取喻於日月南山松栢蓋承萬壽無疆言之有永久綿延之義焉單厚者徳信厚也毛傳徳信厚則何福不消除程子除有消去之義多益者多受益也多受益則何福不蕃庶戩榖者所行盡善也所行盡善則事無不宜宜室家宜兄弟宜子孫宜民人也説約曰厚曰益曰榖以俾爾為言祝君之徳也曰除曰庶曰宜曰興曰増以無不莫不為言祝君之福也嚴緝有是徳斯有是福頌不忘規也既已受天百禄矣又降以遐久之福方且維日不足焉下章所謂興且増者即維日不足之義而天之保定爾者所由孔固也非獨天之保定孔固也神又錫之福焉諏日擇士之善曰吉齋戒滌濯之潔曰蠲王氏炊黍稷曰饎儀禮註言當四時之祭潔粢豐盛以孝享於先公先王於是尸傳神意以嘏主人而願其壽之無窮少牢所謂皇尸命工祝承致多福無疆於女孝孫也神之詒福甚多其大者尤在民之質實無偽淳氣之積薰為風俗民之質即民之徳也而曰徧為爾徳者蓋有起信險膚之俗則高后崇降弗祥有譸張為幻之民則嗣王罔克或壽日知録故民安其樸即主道之隆猶曰莫非爾極云爾末章乃備舉物之永久者以申致無疆之祝承繼也集傳蓋用康成青青相承之義李迂仲曰百姓有謂百官族姓者尚書平章百姓也有謂庶民者論語修已以安百姓也此言羣黎百姓則當為庶民集傳從李解采薇采薇薇亦作止曰歸曰歸歲亦莫止靡室靡家玁狁之故不遑啟居玁狁之故采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載饑載渴我戍未定靡使歸聘采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啟處憂心孔疚我行不來彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三㨗駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘昔我往矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫知我哀作音詛疚古音儿來古音釐平上通服蒲北反質疑首章皆隔韻二三四章上四句隔韻我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾憂心悄悄僕夫况瘁王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啟居豈不懷歸畏此簡書喓喓草蟲趯趯阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春目遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言旋歸赫赫南仲玁狁于夷詩本音牧古音墨轉音枚載轉音烖棘轉為紀其反郊旐旄平上通彭音旁降音洪有杕之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其杞王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫爾止杜盬隔韻母满以反疚音几近古音記本崧高箋恤質韻質為支微齊佳之入聲平上去入通韻采薇遣戍役出車勞還率杕杜勞還役序説三詩本因一事而作孔疏其後遂為遣勞通用之樂也文王之時玁狁蠢動故奉天子之命遣戍築城以禦之其時復有昆夷之警移師西伐比其返而勞之故采薇序下并述勞還勤歸之事三詩往返歲月不同者中更事變故爾詩中明具其事不得疑漢儒之鑿空也詩緝云采薇方遣行之始而道其將來之勞苦見深體之心也出車杕杜當還歸之後而追述其已往之勞苦示不忘之意也薇之始作而柔而剛紀時也程蘇蓋二三月之間自始行及中途所采楊柳依依時也曰歸曰歸歲亦莫止雖托為軍士自計之辭亦因示歸期以安其心也詩緝陽止即莫止古者以十月為陽月雨雪霏霏時也所以違棄室家不暇居處者非上之毒我也由玁狁之不靖不得已而用兵耳一章特今戍事未定無由使人歸問其家是以憂勞不能釋也二章雖則憂心甚痛而王事不可以不堅故此行誓當滅賊義不可以歸來三章蓋憂心者私情不來者公義故遂以一月三㨗期之而重其事於君子者將率時亦在焉故托戍役之言以勉之也四章四章既言車馬之盛五章復侈陳之者君子之所乘小人即倚以為芘陳祥道曰車之於戰動則足以衝突止則足以營衛將卒有所芘兵械衣裝有所齎按詩言依腓可想見先偏後伍伍承彌縫之意若從程作隨解便都無此義四牡翼翼行列整肅也象弭魚服弓矢精良也雖無事之時懔如大敵將至者誠以玁狁之難甚急不可不預防之也蔡汝楠曰豈敢定居由君子有不測之畧豈不日戒由君子有不懈之心雖傳戍役之情而將道見於此矣末章申訂歸期備言行道之苦心之傷悲而莫知所以深知之也詩緝全詩皆為戍役之言既敘其勤苦悲傷因以著敵愾之義昭戒懼之心所以責成將帥者甚備故下章特歌其功也以為風戍役勉戍役其義狹矣本詩專言遣戍即下章城朔方之事而四章兼言克敵者蓋亦預防蠢動故廟謨及之非即命之伐西戎也蘇氏轍曰兵之出也有遣役而無遣率蓋為軍中之禮軍中上下同事故遣役而遂遣率及其還也率役分勞蓋為國中之禮國中貴賤異數故勞率而後勞役按此即康成遣則同歌同日勞則異歌異日之説而義更完備出車美功杕杜恤情范祖禹即采薇一詩已隱約見其義故知三詩為一事作也當師旋而勞將率也首二章先言奉王命而出車之故我文王自我也古義曰首二章言我者文王之辭中二章言我者代為南仲之辭第五章言我者代為南仲室家之辭言我出車於牧者乃自天子之所奉命而來召僕夫而言載良由王事多難趨之不可不急也一章師行有序故前軍至牧而後軍猶在郊集傳龜蛇曰旐鳥隼曰旟置旄牛尾於干首而設之旐以建於車上故旄旐互言之旟者至牧之車所建因此車建旐遂舉前後言之所謂前朱雀後𤣥武也集傳斾斾旒垂貌毛傳旟旐之旒斾斾而飛揚者所謂武車綏旌表軍容之盛也廣川出車之事已竣而醜虜憑陵未知蕩平何日所以思之而憂心至於悄悄古義僕夫况瘁亦文王憂國之誠所結恐其如此耳所謂臨事而懼也二章首言王命出車為玁狁耳未言所命之將為誰及所授之方畧云何故三章遂承王命呼大將南仲之名告以往城於方之事也再言出車旗旐者南仲奉天子命為大將居中軍得建交龍之旗如諸侯故采薇言其所乘之車為路也疏云斾蓋南仲所建於是南仲遂稱王命以令於衆而赫赫然往城朔方以除玁狁之患焉此敘其禦北狄之功也四章乃言承命西伐之事蓋自春月采薇以行至於仲夏始抵朔方經畧城工故曰昔往而黍稷方華也城工既畢正可歲暮還家適當西陲告急簡書相促奔命不遑是以延緩歸期至於春初凍釋之時猶在道也詩緝五章言南仲往伐西戎正在深秋之際其室家感時物之變而念之意其防秋事竣當即旋歸故為反覆盼望之辭而不知赫赫顯盛之南仲又奉簡書而西伐也從集傳末二句畧異箋謂西方諸侯嚮望王師者非六章言春日暄妍草木暢茂好鳥時鳴采蘩交錯南仲於此獻俘奏凱而歸蓋西戎翦而玁狁無與助惡遂由此平定也故結之曰赫赫南仲玁狁于夷箋曰玁狁大故以此始以此終此敘其伐西戎之功以終禦北狄之事也錢飲光曰訊醜皆伐西戎所執獲者漢通西域以斷匈奴右臂用此法也及異日而勞戍役也則托言其未歸之時室家思望之切而不言來歸之事蓋未歸而憂則既歸而樂可知故深體其情以慰勞之也嚴緝言杕然特生之杜有睆然可見之實睆明也與華而睆之睆同則秋冬之交矣吕與叔征夫以王事之故日以繼日不遑休息至陽止之期而未歸女心為之傷悲念征夫當此而應可閒暇也蓋遣時本以歲暮為期因有昆夷之擾復事西征其室人不知故於此時望之出車之室家思君子亦此時也一章至杜實落而新葉生則春二月矣出車言卉木萋萋倉庚喈喈按之夏小正則二月也此詩亦言卉木萋止不得為春莫猶復劬勞於王事我心安得不悲乎不惟杕杜也凡為卉木無不萋萋而盛觸目傷懷念征夫當此應可來歸蓋征夫已歸在道而室人不知故悲思也二章於是陟北山而望之杞已可采而食陸疏春生作羹茹微苦蓋即卉木萋止之時征夫猶羈王事以貽父母之憂不當早歸以慰其心乎今檀車之堅者幝幝而敝矣四牡之壯者痯痯而疲矣征夫之在外亦勞且久矣意此時應已就道而歸不逺也三章望之又望猶未見裝載而來是以憂之至於甚病也歲暮之期已逝而不至則可疑慮者多矣疾病死傷皆疑中事即皆憂中事故曰多為恤也錢氏於是且卜且筮相襲俱作其占言㑹合皆曰近矣則其載而來者當在指顧間也四章曰遑曰歸曰不逺曰邇止言之序也凡曰我者室家自言之凡曰女者上言之也范逸齋曰始終言室家思望待小人之道尤貴切近其情也采薇杕杜皆以紀時毛既以杕杜為興則采薇亦當為興箋云玁狁今匈奴也史記匈奴其先祖夏后氏之苖裔也曰淳維晉灼曰堯時曰葷粥彼爾維何爾雅注説文皆作薾華盛貌戎車周禮注兵車設五戎謂戎路廣車闕車屏車輕車也腓箋曰當作芘疏曰謂依廕也爾雅弓無縁者謂之弭毛謂弓反末也蓋弓梢之名魚服陸璣謂魚獸之皮以為弓鞬矢服羅氏願謂即鮫魚之皮非也爾雅楊蒲柳即本草之水楊也陸疏楊有兩種皮正青者曰小楊皮紅者曰大楊皆可為箭笴所謂董澤之蒲也亦名楊柳説文柳小楊朱子云楊柳之下垂者楊柳之揚起者陸奎勲疑出車為宣王詩引博古圖風俗通為證按博古圖有南宫中非南仲也風俗通言詩美南仲闞如哮虎今常武詩非美南仲渠自誤耳方即侵鎬及方之方郡縣志在夏州朔方縣治北什蕡故城即漢朔方也西戎昆夷也即犬夷馮復京云在今鞏昌秦州之地魚麗于􅀢鱨鯊君子有酒㫖且多魚麗于􅀢魴鱧君子有酒多且㫖魚麗于􅀢鰋鯉君子有酒㫖且有物其多矣維其嘉矣物其㫖矣維其偕矣物其有矣維其時矣前三章皆隔句韻有音以偕音几此詩義解新舊不一惟李迂仲之説為善釋文以君子有酒㫖為句以就箋訓其實康成未嘗作此句讀也箋云酒美而此魚又多明以下三字為句矣以多屬魚者渠意下章物字當為魚也頴濵則以㫖多皆屬酒而朱子從之吕記嚴緝范傳皆用其説者以下三字承酒為文也然如鄭説則此詩但言魚酒非美萬物盛多能備禮之意而説亦破碎如蘇説則接入下三章又多費周折李氏謂君子為酒醴以宴賔而其物㫖且多不必言酒與魚也家織簾謂詩意之妙正在離合有無間不當泥滯文字詩言魚之麗於罶者有鱨鯊焉有魴鱧焉有鰋鯉焉則他物之盛多稱是矣范傳君子有酒以宴賔而其物㫖且多多且㫖㫖且有焉則能備禮矣吕記云陸産不如水産之盛澤物不如山物之蕃猶未可以言偕也下三章反覆歎詠而歸之於時禮以時為大也集傳云按儀禮鄉飲酒及燕禮前樂既畢皆間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀然則此六者蓋一時之詩而皆為燕饗賔客通用之樂又云魚麗諸篇通主人意以譽賔如今燕飲致語之類按朱子據儀禮以為燕饗無可易者王氏以季冬薦魚春薦鮪當之非也集傳興也毛無文爾雅嫠婦之笱謂之罶又云凡曲者謂罶故毛傳曰曲梁也集傳謂以薄為笱而承梁之空其説乃明陸疏鱨一名黄頰魚大而有力解飛徐州人謂之揚釋文謂黄鱨魚大者長七八寸許未知孰是爾雅鱧鯇馮疏今鯶魚也傳謂之鮦羅氏謂鮦别一種本草謂之蠡今黒鯉魚道家以為厭者也爾雅鰋鮎注云今偃額白魚鮎别名鯤江東呼鮎為鮧毛以鮎釋鰋非南陔之什按毛公以南有嘉魚為什首蘇氏以為非古復為南陔之什蓋依六月序也朱子凖儀禮節次進南陔以終鹿鳴之什退魚麗於華黍之後而以白華為首此奏樂之序非編詩之序也必凖儀禮為先後何以解於周召六詩乎故當以蘇氏所定為正特由庚崇丘尚仍毛舊今依吕氏讀詩記悉釐正之南陔孝子相戒以養也升歌三終乃笙南陔白華華黍三詩按毛氏謂有其義而亡其辭蓋言有辭而亡之自漢以來無有易其説者賈公彦謂堂上歌者不亡堂下笙者即亡笙歌之詩各自一處故存者并存亡者并亡張子曰所以亡者良由施之於笙非若歌之可習其辨甚晳劉原父始主本無其辭之説援據儀禮之文以有辭者為歌無辭者曰笙曰樂曰奏朱子因之然考儀禮鄉射奏騶虞周禮籥章吹豳詩禮記祭統下管象皆有辭而管籥與笙類也安得謂笙樂奏無辭乎郝敬即鄉飲酒燕禮合樂之節鵲巢采蘩采蘋皆入笙詩則笙之有辭明矣黄氏日抄乃謂亡即無字亡辭之説本出毛公按亡無相通原自因文取義今曰有其義亡其辭義從辭生苟無辭安有義詩緝集傳改義曰笙有聲無辭此夾漈舉商份之説不得誣毛公也白華孝子之絜白也華黍時和歲豐宜黍稷也由庚萬物得由其道也歌魚麗笙由庚説見南陔南有嘉魚烝然罩罩君子有酒嘉賔式燕以樂南有嘉魚烝然汕汕君子有酒嘉賔式燕以衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之翩翩者鵻烝然來思君子有酒嘉賔式燕又思罩張教反樂五教反又字林罩竹卓反樂音洛纍力追反來音釐又古音肄來又平去通此序曰樂與賢下序曰樂得賢猶射義言騶虞者樂官備采蘩者樂循法采蘋者樂不失職皆以播之樂歌為樂之也嚴緝南指周南也魚之嘉者瓠之甘者鵻之一宿者喻賢者也補傳罩則自上籠之使入汕則自下撩之使出陸佃而罩不一罩汕不一汕喻立賢之無方也李解纍之瓠之自纍來思鵻之自來喻賢者樂仕王朝也嚴緝君子為酒醴與之燕而樂之衎之以至於綏之燕禮所謂以我安也安賔之後再行坐燕之禮故末云式燕又思所謂司正升受命皆命君曰無不醉也又即室人入又之義嘉魚善魚也鄭箋不必以為魚名烝衆也釋文思皆為辭孔疏以為思念者非疏云三章一云興明此上下魚鵻皆興也按毛取興皆在篇端而此於三章言者明上二章為所薦之物與釋魚麗同意今魚麗既取興義故從疏説上下章皆興爾雅篧助角反謂之罩罺側交反謂之汕李廵曰篧編細竹以為罩捕魚者也郭璞曰汕今之撩罟陸佃謂即罾也崇丘萬物得極其高大也歌南有嘉魚笙崇丘説見南陔南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆南山有杞北山有李樂只君子民之父母樂只君子徳音不已南山有栲北山有杻樂只君子遐不眉壽樂只君子徳音是茂南山有枸北山有楰樂只君子遐不黄耉樂只君子保艾爾後茂音髦耉古音矩後音户此間歌之三也魚麗能備禮則可以與賢故嘉魚曰樂與賢能與賢則賢為所得故此詩曰樂得賢君子斥時在位者與魚麗嘉魚同例詩辭稱頌稠叠義當屬君序言得賢則能為國家立太平之基明得賢者立之不言賢者立之也似不當如疏説以君子指賢者詩所曰此詩當為下頌上之辭蓋若答魚麗嘉魚者如天保次于鹿鳴五篇之義愚按詩為間歌之終當有歸美君上之辭而其所以歸美者亦美其樂得賢而立太平之基傳之無窮也每章多舉山之草木為言者興國多賢才前二章皆美其徳而祝其壽三章似專言徳而曰徳音不已則令聞無窮壽亦可知矣四五章似重言壽而曰徳音是茂曰保艾爾後又美其徳之劭以安養其後人解頤則亦重在徳也沈氏守正曰雖通是贊美之辭未嘗不諷以惠廸感召之理是之謂盛世之雅也爾雅臺夫須陸云沙草也可為蓑笠本草香附子即莎草根據羅氏説則本草所稱又是别草夫須乃沙草非莎草也萊爾雅無文陸璣云草名其葉可食今兗州人烝以為茹謂之萊烝楊見采薇杞有三種詳見鄭風將仲子此詩之杞則陸疏所云其樹如樗一名狗骨者也栲杻見魏風山有樞毛傳枸枳枸陸疏高大似白楊子大如指長數寸噉之甘美謂之木蜜爾雅楰䑕梓郭曰楸屬陸疏其樹葉木理如楸亦名苦楸由儀萬物之生各得其宜也説見南陔蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍為光其徳不爽壽考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令徳壽豈蓼彼蕭斯零露濃濃既見君子鞗革沖沖和鸞雝雝萬福攸同寫古音湑後同此詩疑為諸侯來朝受賜而頌美天子之歌故本序不言燕諸侯而曰澤及四海也既見君子者諸侯朝見於天子鄭箋非天子謂諸侯也諸侯以蕭草自喻以零露喻王澤因言既見天子其心輸寫無留憾鄭箋而天子與之相接安和笑語懽情無間是以有美名而可安處范傳此諸侯自幸其遭逢而感上徳意也下三章則皆頌祝天子之辭次言被天子之寵光而四海諸侯逺近大小並蒙恩厚無有偏私是其徳不爽也故皆願其壽而不忘於心焉吕記三言天子甚安而樂易務以徳綏諸侯是宜其兄弟也周之宗盟同姓為先故舉宜兄弟言之而願其壽且豈樂也四章遂言天子有車馬之賜鞗革沖沖而垂和鸞雝雝而鳴上下相遇以徳而成以禮則萬福所同也吕記嚴緝范傳李解考覲禮三享畢王賜侯氏以車服此其事也章内燕字舊作燕饗按序本不言燕而注家以孔燕為甚燕義亦支離嚴華谷改甚為盛又非孔字正訓竊意兩燕字只作安字解文義差為明直又康成以譽處屬之天子竊意本章末句用是以承接乃蒙上為義明是諸侯承思厚而得譽處也若天子之譽處豈縁燕笑語而致然耶蘇氏張氏皆不用箋説陸疏蕭今人所謂荻蒿釋草蕭荻莖麤科生有香氣故祭祀以脂􅅡之為香嚴緝云凡諸蒿曰蘩者白蒿也曰苹者藾蒿也曰菣者青蒿也曰蔚者牡蒿也曰莪者蘿也又有邪蒿蔞蒿蒿之類不一爾雅轡首謂之革郭曰轡靶也以馬轡所把之外有餘而垂者謂之革故曰沖沖垂飾貌和鸞皆鈴也毛以和在軾鸞在鑣按駟驖箋戎車鸞在鑣乘車鸞在衡則此當在衡湛湛露斯匪陽不晞厭厭夜飲不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考湛湛露斯在彼杞棘顯允君子莫不令徳其桐其椅其實離離豈弟君子莫不令儀椅古於戈反離音羅儀音俄前篇來朝此篇錫燕左傳諸侯朝正於王王宴樂之於是乎賦湛露是也吕記在宗載考毛謂夜飲必於宗室按儀禮疏受聘於祖廟饗食在禰今行燕禮宜在寢此蓋禰廟之寢也古未有以路寢為宗室者豈饗畢而燕既行禮於廟復加恩厚留以夜飲故在此歟古義再按燕禮宵則庶子執燭云云以則字為文疑非燕禮之常故康成箋此詩謂夜飲之禮在宗室同姓則成之庶姓則讓之而止也伏氏書傳云燕私者何與族人飲也飲而不醉是不親醉而不出是不敬與此詩之義正合陳氏禮書載族燕之禮引此詩及書傳為証不為無稽但序止言燕諸侯或中有同姓者為之加厚而夜飲亦宜有之特不當以三章為庶姓四章為二王後耳鄭箋露必至曙而後乾飲必至醉而後已本義厭厭安也君曰以吾安也不醉無歸君曰無不醉賔及卿大夫皆曰諾敢不醉也次言在豐草者興在宗也補傳考成也成其禮也三言在杞棘興令徳也蘇氏草偃而木挺不為酒困所謂徳將無醉也四章言桐椅之實離離而垂興令儀也蘇氏有令徳則有令儀矣言醉而不亂也黄實夫曰上之繩下者愈寛而下之自繩者愈嚴君有餘恩臣有餘敬也杞棘桐椅俱見前彤弓之什彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼔既設一朝饗之彤弓弨兮受言載之我有嘉賔中心喜之鐘鼓既設一朝右之彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼓既設一朝醻之首章平上去通次章上去通右音以末章平去通序曰天子錫有功諸侯左傳諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報燕是也吕記范氏祖禹曰先王知天下諸侯之不可無長故為之方伯連帥以維之其有功則賜之弓矢使專征伐以正諸夏王室所以尊也不然則强凌弱大并小而莫之制天子之政令有所不行故曰彤弓廢則諸夏衰矣吕記曰所謂專征者如四夷入邊臣子簒弑不容待報者其他則九伐之法大司馬所職非諸侯所專也彤丹飾也弨弓反也説文謂弛之而體反賜弓不張也詩緝受謂諸侯受之箋義集傳從王氏説今不用言者語辭李解貺賜也説文中心實欲貺之非由外也賞賜非出於利誘則廹於事勢至有朝賜鐵劵而暮屠戮者則與中心貺之者異矣集傳鐘鼓盛樂也周禮樂師饗食諸侯令奏鐘鼓是也一朝言早也燕或至夜饗則禮成而罷故以朝言之孔疏周禮大行人上公饗禮九獻侯伯七獻子男五獻如其命數而止故一朝可以成禮亦見王者勤於禮賔賞不踰時如是屯膏吝賞至有印刓弊而不忍予者則與一朝饗之者異矣集傳載抗之也王氏載之於檠抗弓體使正劉瑾櫜弓衣也釋文韜之於囊使其色常新徐鳯彩藏之謹也喜之好之貺之誠也詩緝曰右宥通左傳王饗醴命之宥注以幣物助歡也按聘禮若不親食使大夫朝服致之以侑幣張爾岐云食禮有侑食之幣又曰致饗以酬幣亦如之注云禮器曰琥璜爵蓋天子酬諸侯嚴既以右為侑幣則醻亦當為酬幣饗主飲賔而詩兼言宥醻者疑饗亦兼食也右毛訓勸侑亦是勸所謂侑賔勸飽也集傳從王氏訓尊以解字義則得矣似不若嚴説之有据又與傳合也醻毛訓報報亦宜主幣所謂報之以瓊瑶即琥璜之屬也若如箋意以酬酢厚勸為言是以燕禮説饗禮恐非爵盈不飲之義周禮司弓矢掌六弓之法王弓弧弓以授射甲革椹質者夾弓庾弓以授射豻侯鳥獸者唐弓大弓以授學射者疏云周禮無彤弓之名此彤弓必當唐大二者之中有之耳唐大者其體强弱之名彤玈者弓色之異為弓者皆漆之以禦霜露漆之為色赤黒而已周尚赤故賜弓赤一而黒十以赤為重耳僖二十八年左傳晉文公敗楚於城濮獻功於王王饗醴命晉侯宥下乃言䇿命晉侯賜之弓矢似先饗後賜者彼别行饗禮非賜日之饗也其賜之日即行饗禮則此經所云也菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪左彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋汎汎楊舟載沉載浮既見君子我心則休南有嘉魚樂與賢南山有臺樂得賢此詩樂育材則又與賢得賢之本也菁菁者莪在彼中阿言君子長育人材若大陵之長育微草能使之菁菁然盛也昌黎樂且有儀者言賢材既見君子中心喜樂而又蒙被恩意接遇以禮也鄭箋我心則喜言聲音色笑之洽徐氏承上樂而言也錫我百朋言獲益於王之多范氏承上有儀而言也末章言未見君子之先無所依歸或成或壞俱未可知如楊舟之汎汎水中浮沉無定今得見君子而長育之人材皆可成就故我心休休然安樂也嚴緝陳氏鵬飛曰詩宜何歌其天子行禮於學校燕飲而歌之歟毛朱俱作興莪見前馮疏曰陸璣以為生澤田陳藏器以為生高岡以詩証之阿則高地也沚則水中也然則澤田高岡俱有莪按漢志貝有五種二枚為一朋鄭以百朋喻得禄多毛以沉浮喻君之用人俱屬衍説按鹿鳴以下皆朝廷禮樂之典而歸於樂育人才見周家制治之隆在於得人而得人之本在於養士編詩之義深矣先儒以此二十二篇為正小雅六月以下為變小雅厲王時小雅盡廢則四夷交侵中國微矣中國微而復興故下言宣王北伐南征之事六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國比物四驪閑之維則維此六月既成我服我服既成于三十里王于出征以佐天子四牡脩廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乘以先啟行戎車既安如輊如軒四牡既佶既佶且閑薄伐玁狁至于太原文武吉甫萬邦為憲吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炰鼈膾鯉侯誰在矣張仲孝友急鹽鐵論引詩作戒戒有棘音與國為韻再見常武一章上四句二章下四句皆隔句韻四章茹穫上去通五章平去通六章祉音恥久音几友音以六月主兵者吉甫采芑主兵者方叔而皆為宣王中興之美故歸其事於宣王毛以為宣王親征者非也王基謂宣王之師惟常武為親征耳一章言出兵之故由此玁狁擾我王國是以盛夏之月棲棲不遑承王命而急正之也常服韋弁服也鄭箋于曰也鄭箋本爾雅二章言行師之善馬齊服備不疾不徐好以整暇也比物四驪齊力而又齊色閑之維則馬皆中度也于三十里師行之度三章言紀律之明將帥皆嚴敬以供事也顒大頭也説文身修廣而頭大見馬之大而有力也膚公大功也毛傳初言匡王國次言佐天子三言定王國王國將從此而永奠見成功之可必也四章言玁狁盤踞近邑侵逼畿甸蹂躪所至都被擾害所謂孔熾也於是選鋒鋭進而致討焉先人有奪人之心也五章言大軍繼之車安馬健逐北追奔至於太原而返時大將在焉故舉其名而美之也六章言吉甫凱旋飲至多受福祉於天子來歸以下則又自私室肆筵輔氏而孝友之張仲在焉所以極言其燕喜也張仲豈從征僚屬如後世記室參軍之類歟焦穫爾雅十藪之一也在西安府涇陽縣北郭璞謂之瓠中亦名瓠口去鎬京甚近故犬戎弑幽王於驪山下遂取周之焦穫而居於涇渭之間也史記鎬鎬京也王肅方朔方也今陜西寧夏地涇陽通典云今原州也方輿紀要平凉縣有涇陽城六月詩所謂至于涇陽者謂此地也非西安府之涇陽太原即原州今屬平凉府非山西陽曲縣之太原日知録謂先求涇陽所在而後太原可得而明也蓋玁狁自太原邊境入寇越朔方而東住牧焦穫縱兵四掠近自鎬京逺及涇朔皆其蹂躪之地猶明世俺答越三受降城而住牧河套也吉甫用兵當自焦穫始及其奔竄乃出鳯翔歴寧夏至平凉府之原州然後班師明人搜套之舉亦類此注家皆以太原為今之陽曲顧亭林謂豈有寇從西來兵向東出者乎其不然必矣至毛傳以鎬為北方地名集傳又引劉向千里之鎬及顔師古注似有所据今考所謂千里之鎬屬何處所無文可證亦難据為定説而鎬京為根本重地焦穫之寇近在肘腋未有不被其侵軼者故於方曰及於涇陽曰至而於鎬直曰侵也其曰來歸自鎬者蓋自太原歸鎬蒙上燕賚其事已畢故用既字為文以著之下乃言其歸在私邑與諸友敘濶懽燕又自京師至家之事本詩分界甚明故本輔慶源之説而申其義焉薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟笰魚服鉤膺鞗革薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩鴪彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威説約首二章凡四韵三句為一連六句為一截芑止田千又隔句韻翼奭服革衡瑲皇珩又自為韻衡珩古户郎反三章隼止止試韻隼古之水反後六句鼓旅淵闐各為韻四章上六句兩句一韻後六句三句一韻嘽焞又自為韻南征北伐二詩皆班師時作嚴華谷曰六月之辭迫采薇之辭緩六月似討而定采芑似威而服王半山曰前三章詳序其治兵末章美其成功出戰之事畧而不言蓋以宿將董大衆荆人自服也蘇氏同一章言采芑必於耕治之田興選兵必於練習之衆故六軍並陳凡出車一乘當有兩車輕車七十五人重車二十五人輕車一千五百乘計十一萬二千五百人重車一千五百乘計三萬七千五百人合之為十五萬人此六鄉六遂之衆也詩合重車言之未必盡起倅卒方叔涖而試之以捍禦却敵之法因統領其衆為之將焉方叔所乘者四騏之馬翼翼而壯所駕者金路之車奭然而赤孔疏巾車五路惟金路有鈎下云鈎膺故知為金路所以飾車者有方文之竹簟魚獸皮之矢服焉所以飾馬者則在頷有金飾之鈎在膺有樊有纓而下垂者有鞗革焉周禮巾車金路鈎樊纓注云鈎婁頷之飾樊大帶纓馬鞅在膺之飾此言其簡閲師徒而車馬美盛也二章承上采芑而以中鄉為言者民居在焉其田尤治蘇氏興士卒之練而益精也上章既閲其師徒此章遂辨其旗物而又皮束其轂金錯其衡八鸞和鳴命服尊顯黄朱之芾蒼玉之佩以為章美此言其顔行備飾而好整以暇也諸葛亮不親戎服羊叔子輕裘緩帶此其類歟曹氏三章乃言治兵之事故以隼之疾飛戾天興士卒之猛疾奮厲以隼之亦集爰止興士卒之服聽號令也李解再言師干之試前方叔以簡閲來涖此則大陳師旅以練習其事也於是擊鉦鼓以為之節鉦人伐鼓互言之陳師旅而誓告之布號令示賞罰也此明號令信賞罰之方叔則親自伐鼓以作士氣焉練習既畢整衆而退則又伐鼓闐闐然整而不亂也我軍之衆且練如此足以制敵有餘矣而無知之蠻荆乃乘國家之釁敢與大邦為讐猶言玁狁匪茹也方叔以大老受命貴謀賤戰非少年輕鋭以勇力爭勝者率兵往征無亡矢遺鏃之費而當訊者已執有罪者已獲遂奏㨗獻囚而歸戎車以下則旋車之聲也所以克敵如此之易者由此明信之方叔向同吉甫立功於北伐威名素著故蠻荆望風畏服如郭子儀之於回鶻薛仁貴之於突厥聞名先已膽破矣李解按詩無舉征伐事而言試者此詩前三章兩言師干之試明是先期練治以習號令信賞罰故三章以後遂以明信稱方叔也左傳楚子將圍宋使子文治兵於聧子玉治兵於蒍蓋古人用兵原有此法而箋釋第三章以將戰罷戰言之則舛矣末章方言威蠻荆事豈有未至其地而先戰者乎又豈有已經罷戰而反言方叔率止執訊獲醜者乎蓋以宿望之將率練治之兵往而擒治其黨耳未嘗戰也若何黄如謂宣王命方叔行三年大閲之禮事畢而忽有蠻荆蠢動即命征之此殊不然詩意是因南征而治兵非因治兵而南征也治兵亦不必言大閲大閲是特行典禮無容牽混詩從集傳為興詩言芑者三毛以豐水有芑為草維糜維芑為榖此詩采芑為菜補傳詩緝並以新田菑畝中鄉不應指菜其説然也李迂仲疑榖不宜謂之采何𤣥子曰桑中采麥亦榖也何言芑不可采乎戴東源車説云軧即考工記幬革朱其革以幬於幹也惟長轂盡飾大車短轂則無飾故毛曰長轂之軧朱而約之疏以軧為長轂名非也按考工注幬負幹者蓋取革轂相應故説文軧或作䩚餘俱見前我車既攻我馬既同四牡龐龐駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苗選徒囂囂建旐設旄搏獸于敖駕彼四牡四牡奕奕赤芾金舄㑹同有繹决拾既佽弓矢既調射夫既同助我舉柴四黄既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈之子子征有聞無聲允矣君子展也大成五六兩章皆首尾為韻而五章中二句又自為韻説文柴作㧘音恣猗於戈反馳古音陀吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所膽彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴戊古音耄有友右俱音以北伐南征之後因而整飭兩都申明軍政蓋積弛之後武功久廢朝㑹不行宣王奮然圖治蠱事終而鼎事始氣象為之一新所謂今日復見司𨽻威儀故曰復古也車攻雖言田獵而意主於㑹諸侯前三章皆預備田役之事其實先㑹同而後田獵也詩緝一章言車堅治而馬齊力駕四牡而往東猶未言往東之何為也二章言堅治之車皆繫田車既完好矣四牡之龐龐充實者又孔阜而肥壯蓋以東有大草之處將駕之以行狩猶未言行狩之何地也質疑曰薛君章句云甫博也有博大之茂草説與毛同下言搏獸於敖不應又言行狩於圃故從毛傳傳曰田者大芟草以為防或舍其中褐纒旃以為門裘纒質以為􅈏左者之左右者之右然後焚而射焉三章言將往苖田而有司選徒建旐以待搏獸於敖山之下蓋猶未㑹諸侯故田事少稽也疏義囂囂選徒聲周禮所謂羣吏撰車徒也設旄於旐首而建之周禮所謂郊野建旐各書其事與號也按建旐雖秋獮之事而夏秋之田皆曰如蒐之法四章遂言㑹同之事諸侯駕是奕奕肥大之四牡服赤芾金舄以來㑹同絡繹不絶則六服盡朝也五六二章言既㑹諸侯遂率之以田獵而見射御之美也鉤絃之决遂絃之拾既比次而順利弓之强弱矢之輕重又和調而適均射夫自諸侯以下皆同力而射以助天子獲禽如積而相與舉之焉維時天子駕四黄之乘而兩驂不猗倚同則御之良而得舒疾之中也鄭箋御者不失其馳而矢發則中如椎破物則射之工而見巧力之全也言天子之威武如此彼諸侯之從獵者不過助我舉㧘云爾此詩人之志也按詩中多稱四牡又别舉齊色者表尊者之所乘也前二篇四驪四騏皆當為大將之車此四黄則乘輿也上章言射夫助我舉㧘則此當為天子獲禽之事矣七章言田事畢而軍行靜治禽雖多天子取三十焉榖梁故曰大庖不盈也八章言大禮成而徳業並建有號令而無諠譁蔣氏蠡測則始終靜治也既於東都㑹諸侯以行狩復於西都行大蒐之禮以祭始而以饗終所謂慎微接下也一章言以戊辰剛日集傳祭馬祖天駟而禱之田車好而四牡阜可以升大阜而從禽獸之羣衆此其禱辭歟嚴緝二章言越三日庚午既差擇其馬乃視獸所同聚麀鹿最多之處莫如漆沮之旁遂驅獸而至天子之所焉毛傳即前傳所言芟草為防之處也三章既至其所則廣平之原獸之祁大者甚多或疾趨而儦儦或緩行而俟俟詩緝或三為羣或二為友毛傳復驅獸順左右之宜以安待王射鄭箋所謂虞人翼五豝以待發即前傳所謂左者之左右者之右也既已驅之順左右之宜王乃張弓挾矢而射之孔疏豝之小者難中則發而中之兕之大者難制則發而斃之孔疏所得既多則以為俎實鄭箋進於賔客而酌醴行饗禮樂之事亦行乎其間矣吕記車攻吉日皆以蒐狩為言何也蓋蒐狩之禮所以見王賦之復焉所以見軍實之盛焉所以見師律之嚴焉所以見上下之情焉所以見綜理之周焉欲明文武之功業者此足以觀矣蔣氏蠡測曰車攻㑹諸侯其禮大吉日專言田獵故二詩之辭其氣象大小詳畧亦自不同一統志敖山在開封府鄭州河隂縣西北二十里書傳漆沮二水名亦名洛師古曰即馮翌之洛水也馮疏漆水即洛水與扶風杜陽之漆不同但不當與沮并為洛耳今按方輿紀要洛水南經洛州南中部縣東而沮水入焉又南流入西安府耀州境過州西又南合於漆水則書傳固無誤也特緜詩自土沮漆則又其上流非合流於洛之水耳決見衛風芃蘭毛傳拾遂也集傳云以皮為之著於左臂以遂弦榖梁疏宗廟賔客君庖皆十故云天子取三十也曲禮外事以剛日内事以柔日爾雅鹿牡麚牝麀羅願云兕重千斤或曰兕似牛犀似豕兕青而犀黒兕一角而犀二角以此為異鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞維彼愚人謂我宣驕寡音古澤音鐸宅音托此篇義解當依本義之子使臣也言使臣奔走於外如鴻鴈之飛羽聲肅然而勞其體也本義首章是勞來之使臣奉命撫綏爰及可矜之人鰥寡皆得所依吕記曰爰及者不遺之辭二章是還定安集之使臣既招徠流散因止其地為民營築宫室如鴻鴈集於澤也本義使臣雖劬勞而民終得寧居矣質疑三章哀鳴嗷嗷興已作歌也詩所韓詩云勞者歌其事哲人知我謂我以君命安集流民不憚勤苦愚人不知謂我好興役動衆為宣示驕奢也本義吕記曰此非以不知為慍蓋深嘆知心者之少也當時君臣於民惻怛深厚如此斯其所以中興歟三章皆興以末章為比者非傳云一丈為版五版為堵箋引春秋傳五堵為雉雉長三丈則版六尺韓詩説八尺為版夜如何其夜未央庭燎之光君子至止鸞聲將將夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有煇君子至止言觀其旂旂古音芹後同此宣王勤於視朝惟恐後時而左右之臣設言以述王之意也東陽詩人恐其勤始而怠終故曰因以箴之其實皆美辭也箋言不正雞人之職而問夜早晚此顛倒衣裳之義是刺而非箴矣補傳言視朝漸晚前可美而後可箴説尤破碎蓋前後皆極形不安於寢之意也未央未渠央也鄭箋疏云前限未到之辭陶潛詩壽考豈渠央毛以央為旦朱以央為中俱不如箋義未艾夜漏未盡也比未央為已迫矣左傳國未艾嚮晨辨色時也庭燎之光始然而有光也季本晣晣光漸小也嚴緝有煇天欲明而煙光相雜也集傳故於來朝之君子始則鸞聲將將然大而逺聞季本繼則噦噦然徐而有節毛傳至嚮晨而不但聞其鸞聲且見其旂焉則迫不容緩矣三章一節𦂳一節詩之妙於形容也厥後宣王宴起至煩賢后脱簪詩中豈已見其微歟周禮司烜氏凡邦之大事共蕡燭庭燎注蕡大也樹於門外曰大燭於門内曰庭燎禮書在手曰燭在地曰燎沔彼流水朝宗於海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不蹟載起載行心之憂矣不可弭忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興沔水規宣王規其聽讒而諸侯擕貳也嚴緝一章言沔然流滿之水必歸於海鴥然疾飛之隼必止於林集傳補傳興諸侯皆敬事天子則長享太平而亂萌不作矣乃今同異姓之諸侯傳箋無有恐其亂而念之者縱不為天下計獨不貽父母憂乎莫念亂即不敬也諸侯莫肯念則王當念矣二章言水之朝宗者今且湯湯而無所歸隼之載止者今且飛揚而不知止彼不循其蹟者亦有湯湯飛揚之意而載起載行焉下經所謂讒言興也我故念之而憂不能止而忘也我心憂則王更當憂矣三章言所以致亂者匪他讒言而已今之諸侯誠如飛隼之率中陵焉彼造為詐偽之言者寧不少為懲止乎補傳蓋讒言之興始於訛言訛言非即讒言故以民别之當時檿弧箕服之謡即訛言也而實由我友不敬致之誠能各謹侯度讒言何自興乎但朂我友之敬而所以規王者切矣按宣王承積衰之後赫然中興意其鋭於求治所以責諸侯者太峻黄講而宵小喜事之徒為之搆造釁端如魯嫡之廢杜伯之殺皆讒言興而諸侯擕貳之證也首章之兄弟邦人諸友末章之我友傳箋皆以諸侯言之當矣不斥王而責諸侯所謂規也鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉榖從木不從禾鶴鳴誨宣王序下不言所誨箋謂教宣王求賢人之未仕者也一章言鶴鳴於九折之澤而聲聞四野喻賢者雖隱居人咸知之也鄭箋魚性寒則逃於淵溫則見於渚喻賢者世亂則隱治平則出也鄭箋園有檀而下維蘀言所以樂彼之園者以所樹皆良材其委而下之則維敗蘀而已喻録有用而去無用也石雖粗質可藉為磨礪之用言他山者疏逺之謂疏義喻疎逺之粗材亦無可棄也次章申言上章而義更進鹤鳴臯而至於聞天則聲徹朝宁天民大人之流也魚在渚而又潛在淵是已出復處難進易退之士也園檀之下不使惡木滋長所謂尚賢者而下小人也鄭箋他山之石不惟粗用之於器且可精用之於玉所謂物有以賤理貴以醜化好者王符不當以世族門第論人也按集傳以首二句為誠不可揜次二句為理無定在次三句為愛當知惡末二句為憎當知善説義甚精然毛鄭之説亦當有所承故從舊説全詩皆屬隱語當從集傳為此相鶴經鶴陽鳥也而遊於隂陸佃云鶴性警白露降流於草上㸃滴有聲即高鳴相警韓詩説九臯九折之臯楚詞注澤曲曰臯集傳榖闕虞東學詩卷六
