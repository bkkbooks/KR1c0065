body:
  text: 虞東學詩卷十宗人府主事顧鎮撰大雅二詩貫曰此厲宣幽三王之變雅也宣王詩尚為變而能正厲幽諸篇亦多稱天述祖陳善閉邪之義民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏寇虐憯不畏明柔逺能邇以定我王民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惛怓式遏寇虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏寇虐無俾作慝敬慎威儀以近有德民亦勞止汔可小愒惠此中國俾民憂泄無縱詭隨以謹醜厲式遏寇虐無俾正敗戎雖小子而式𢎞大民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏寇虐無俾正反王欲玉汝是用大諌怓尼猶反五章平上去通此召穆公刺厲王而托於戒同列之詩厲王監謗雖賢者不敢以身試不測故托其辭於戒同列序説與集傳融之乃得也顔師古云人勞已久至此可以小安逸之曰小者不敢過望之辭五章皆以息民勞遏寇虐為言而反覆致戒於縱詭隨之人縱者謹之反也既曰無縱又曰謹者蓋小人懷詐面從其始原無大惡居髙位者喜其順適已意而不察其姦始而容納繼且信任於是逞其不善之志恣其憒亂之為明辨録云據説文惛不憭也怓亂也呶從口者亂在口怓從心者亂在心心既昏憒復僨亂交作也舊解歡譁於義未盡肆其無窮之毒露其穢惡之態至於附著固結欲去之而不得而國運隨之矣無縱詭隨所以慎防此等也詩緝後漢書陳忠疏云書曰小不可不殺詩云無縱詭隨以謹無良蓋所以崇本絶末鉤深之慮也古義五謹字全詩關要按國語厲王説榮夷公芮良夫諌不聽周本紀亦言厲王好利近榮夷公當時如榮夷公者知復不少是詩所謂詭隨也又秦本紀言厲王無道諸侯叛之西戎反王室滅犬丘大駱之族後漢書西羌傳亦言厲王無道戎狄寇掠是詩所謂寇虐也歐陽公謂厲王無戰伐事未免失檢舊説謂即詭隨之人為寇虐果爾則無縱字當一直貫下不當另提式遏之文矣且柔逺句更何著落耶但寇虐之來亦詭隨者致之固當以無縱詭隨為第一義也蓋小人以利蠱君聚斂掊克無所不為以致戎狄寇掠征役煩興民不堪命所以民勞而中國受其弊也欲綏四方必先惠中國欲惠中國必先息民勞欲息民勞以惠中國必先無縱詭隨以謹防其害然後寇虐可遏使之畏明刑而不為民憂何敢作慝而使正道敗壞反背乎如此則可以定我王而為之休矣四方以四夷言中國以諸夏言李解中國為四方根本而京師尤中國根本故三章特提出言之為縱詭隨者警也舊以中國為京師似混次章曰無棄爾勞豈所戒者為世族舊勞之後乎陸堂三章曰敬慎威儀以近有德蓋親近有德則邪慝自逺而諄諄致戒於威儀者意其人少年驕倨不自檢束而好為闊逺者田間故四章言戎雖小子而式箋訓用𢎞大也五章言王欲玉汝是用大諫其人必王所親信用事者古義故托言王欲玉成於汝故不惜反覆詳委大用規諫也詩貫曰召虎中興賢佐而此詩與卷阿相次以著其祖孫世賢也上帝板板下民卒疸出話不然為猷不逺靡聖管管不實于亶猶之未逺是用大諌天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同僚我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曽莫惠我師天之牖民如塤如箎如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟價人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城無俾城壞無獨斯畏敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾遊衍憲讀如軒三章平去通四章蹻其略反熇許各反五章平去通六章易鄭音亦辟匹亦反下同七章屏與寧城韻翰與藩垣韻壞讀如愧八章平上去通序稱凡伯刺厲王集傳謂今考其意亦與前篇相類蓋切責其僚友用事之人而義歸於刺王也朱子舊説全詩以回天為主詩牖回天所以安民而其道在於一敬敬天之實在懷德而見於出話為猶故詩中反覆此意而力戒其靡聖管管之心曹氏粹中曰管小物也蔑視聖人而管管然用其私智下文憲憲泄泄囂囂蹻蹻皆是此意毛訓無所依繫於義無取民勞篇逗出京師此篇逗出宗子其後變起京師王流於彘太子幾不得免非城壞而獨居斯畏乎賢人之言皆有徵矣孔疏一章言所以大諫之故為全詩綱領下七章反覆申明此章也上帝天也集傳板本作版判也説文言天心判離古義如版之片片離散也舊訓為反未詳所據卒疸盡病也鄭箋話善言也毛傳人出善言而不以為然古義所謀者皆苟且旦夕之計惟其蔑棄聖人之法度鄭箋以淺見自用詩緝故矯誣詐偽不實於信而假為信也郝敬云亶信也當此天心已離民病已極汝秉國成而猶未逺謀乎是用作詩以大諫正於汝也上言出話為猷而章末獨云猶之未逺者蓋不知逺慮由於不受善言故舉此可以見彼古人文字往往如此二章承上為猶出話而申之田間又以起下章之文也古義上四句承為猶不逺來言天運方艱難無得氣驕志滿而不知恐懼毛傳憲憲猶欣欣依樂記注則當作軒軒蓋足髙氣揚之狀天心方震動無得神懈力弛而不加振作是其偷安目前無復逺謀可知下四句承出話不然來言議論之間不立異同而輯和不矜意氣而悅懌合謀并智以圖國事則民心皆合而無不靜定矣爾雅莫定也詩牖曰不過反其不然者即收其效非難事也三章主出話不然言古義言我與爾職事雖異居官則同我不忍國事之敗壞是以就爾而謀爾聽之而謷謷不肯受豈以我言為迂闊不可行而笑之乎我言乃實可見之行者服行也説命乃言維服爾勿以為笑也爾不聞先民有言詢于芻蕘乎蓋告以當然我話也四章主為猷不逺言古義而其病總由於管管不信善言故告以天方降虐將有覆亡之禍不止於方難方蹶矣古義而可以國事為戲謔乎老者出忠告之言期於灌溉乃心灌如書言沃朕心之義而後生驕倨不受毛傳蹻蹻蹻貌匪我年老智昏而妄言實爾安危利災以可憂者為謔也積惡愈多詩緝將如火之熾盛毛傳熇熇熾盛也不可救止而藥治詩緝蓋懼之以不可不然我話也五章正言不可救藥之實張記懠怒也天之所以方難方蹶方虐者由人之違天而致其怒也天方怒矣而猶以大言夸人諛言毗人乎集傳威儀卒迷者言其瞻視易常舉止失措如狂易也善人畏禍而不敢言如尸之象神更無聲響合下殿屎觀之監謗時之景象有如此者葵揆也鄭箋小民不敢訴其愁苦惟有呻吟而已傳言以目是民之剛者詩言殿屎是民之柔者民情如此將鬱而生變我不敢為之揆度言不可測也田間蔑無也毛傳資藉也田間惠順也集傳喪亂且至所藉者衆心耳今曽無一事順衆心其無可資藉明矣田間此其所以不可救藥也六七八章乃告以回天之事説通六章承上言值此民心叵測之時當有以開牖之使不為非故又本天言之明牖民之非難也天之開牖斯民如塤箎之相和言必應也如圭璋之相合言必同也如取物而以手攜之言必從也孔疏其攜之也攜字略讀無曰有所增益也開其本然之明而已牖民豈不甚易哉疏曰以韻當為變易之易故轉之為難易之易民既多辟而有亂心矣汝能以正道開牖之無不立見回革者奈何自立於邪辟以先之乎七章之義讀詩記曰前章告以為治之本此章告以為治之輔也價人大德之人也集傳大師大衆也大邦大諸侯也大宗強族也蘇氏如梓材所謂大家孟子所謂巨室也古義藩籬也集傳垣墻也毛傳屏樹也王氏翰幹也毛傳國家所恃在此四者惟能以德為懷論語君子懷德則得道多助而中外寧矣宗子鄭箋謂王之適子愚按西銘云大君者父母之宗子王之適子亦無宗子之稱上文懷德維寧已主王説故此句不與上四者同敘上四者特藩垣屏翰耳非城也城所以捍外而衛內宗子主之有德則城安無德則城壞藩垣屏翰皆不足恃而宗子獨居豈不可畏哉八章歸本於敬天也難也蹶也虐且懠也皆天之怒而渝變也也憲憲也泄泄也謔謔而夸毗也即所謂戲豫馳驅也天之光明照察日監在兹凡人出入遊息無適不與之俱詩所夫安可以不敬乎能敬則有以去其靡聖之心而永懷明德出話然為猶逺善人得職民辟旋消合藩垣屏翰以為固寧有城壞獨居之畏乎蔣氏蠡測曰詳味此詩蓋朝廷始昏亂之時典章法度非不存也老成才德非不有也但王心暴虐棄舊章而不顧斥老成而不用所任者乃少年不更事之人是以民勞於下而政亂於上其時若召穆公凡伯之徒皆世臣與國同休戚者言不行諫不聽義又不可去故其熱中之情發為懇惻切直之辭一語責之旋以一語勸之不厭煩復惟欲其有所警惕而改紀於其政所謂亂世之音怨以怒其政乖此類是也蕩之什蕩蕩上帝下民之辟疾威上帝其命多辟天生蒸民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曽是強禦曽是掊克曽是在位曽是在服天降滔德女興是力文王曰咨咨女殷商而秉義類強禦多懟流言以對寇攘式內侯作侯祝靡屆靡究文王曰咨咨女殷商女炮烋于中國斂怨以為德不明爾德時無背無側爾德不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螳如沸如羮小大近喪人尚乎由行內奰于中國覃及鬼方文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世終都深反與民諶為韻明古音芒卿古音羌酒字不入韻式止晦上去入通呼火故反夜音豫羮音岡舊音忌時忌平去通集傳揭紀竭反撥筆烈反世私列反召穆公見厲王無道知其必亡而傷之本義故序不曰刺王而曰傷周室大壞疏謂刺外有餘哀是也託於文王之言者黃實夫謂舉乃祖所以咨人者咨其子孫自然加倍悚切錢氏詩學謂言出於祖先雖不肖子孫不敢以為非過指夫前代雖至暴之主不得以為謗忠臣之用心如是非僅為監謗之故亦非直如萬氏借秦為喻之説也厲王失德全在貪暴故首章提出疾威二字後文強禦掊克寇攘炮烋皆是此意其病根在不明德其病症在用小人黜君子故篇內三致意焉二七兩章尤詳哉言之純是咨嘆殷商忽以殷鑒一語作結全詩血脈收注於此七章皆言文王獨首章不然明非殷商之事孔疏詩牖曰蕩蕩之上帝轉為疾威之上帝天亦有初鮮終矣蓋天生衆民其初皆有賢君撫綏之其終乃生僻王以肆其殘虐所謂天命匪諶者如此歐李黃范非始為怨天之辭而卒解之也二章以下乃條陳過惡言此等事皆殷紂所為而厲王踐而行之也本義二章先發其禍本在於任用宵小強禦是酷吏掊克是貪人皆天所降之慆慢凶德詩緝而使之居大位任衆職則是汝力為興起之所謂崇信姦回也四曽是見怪詫之意三章言小人在朝勢不能容君子爾有秉義之善類毛傳類善也強禦之人多怨懟之每於進對之時以蜚語中傷日知録云以斛律光之舊將而有百升明月之謡以裴度之元勳而有坦腹小兒之語所謂流言以對也獨言強禦者羅織善類乃酷吏所長故置貪人而言酷吏至於賢者被讒而去則在內用事皆寇劫攘奪之人其流毒於下以致怨謗寧有究極哉四章言女任此貪酷之人恣其威怒於中國使民怨沸騰是若輩為爾斂怨也乃反以為德而信用之此惟不明爾德故至此漢志引此章下四句顔師古注云言上不明不别善惡有逆背傾仄者有堪為陪二卿士者毛傳皆不知也四無字形其德之昏亂無所别識五六章言酗酒亂政召怒逺近由於自式不義也詩貫飲酒齊色曰湎孔疏因首章言帝命多辟故言實不由天天何嘗以酒湎爾乎尊卜由爾於不義之人是從是法故也不義與義類對看既愆爾止四句極言湎酒之事式號式呼比愆爾止尤甚俾晝作夜視靡明晦更深言其沉醉不醒白日昏昏如夜也古義由是虛言噂沓如蜩螳然顔師古虐政橫行如沸羮然皆亂意也集傳大綱小紀變蔑幾盡尚且由其所行恬不悔悟微子所謂卿士師師非度是也奰者怒而作氣之狀孔疏國語所謂道路以目者即是此意中國鬼方言自近及逺無不怨怒也七八章言大命傾而本根絶將為夏后之續也匪上帝不時正見天命之有初鮮終由爾棄舊人不用廢舊法不行所致舊兼人與法言更備而非天之為此厄運也雖無老成云云者不自居於老成人而以尚有典刑言之明王之不用老成也觀下曽是莫聽可知大命以傾預卜其將然之辭古義大命之傾如何如木之顛仆沛拔毛傳其根揭起雖枝葉尚在而本先斷絶寧有救哉此三句皆述昔人之言也殷鑒在夏明今宜鑒於殷蓋惓惓有餘望焉沈仲容曰史記厲王好利近榮夷公是強禦掊克在位也衛巫監謗道路以目是侯詛侯呪靡屆靡究也諸侯不享淮夷入寇是內奰于中國覃及鬼方也召公凡伯芮良夫之諫皆不聽是殷不用舊曽是莫聽也此見經史之相符楊用修曰貴州古之鬼方輿地記云貴陽本西南夷羅施鬼國按大戴禮帝繫篇陸終娶于鬼方氏是鬼方為楚與國髙宗伐荆楚其黨與即鬼方也後漢書以為西羌唐書以為突厥之先皆誤抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾無競維人四方其訓之有覺德行四國順之訏謨定命逺猶辰告敬慎威儀維民之則其在于今興迷亂于政顛覆厥德荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑肆皇天弗尚如彼泉流無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵用戒戎作用逖蠻方質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讎無德不報惠于朋友庶民小子子孫繩繩萬民靡不承視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思辟爾為德俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子荏染柔木言緡之絲溫溫恭人維德之基其維哲人告之話言順德之行其維愚人覆謂我僭民各有心於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其德俾民大棘一章疾去聲與戾韻二章告音谷與則韻三章政讀征刑胡光反政與今韻酒與紹韻刑與王韻四章兵必良反五章虞音娛儀音俄為音訛與度為韻平去通六章詩貫謂苟與讎報韻逝與友子韻九章説約謂下六句三句一連以行心為韻庚侵古韻通十一章樂五教反慘當作懆虐讀去聲平上去入通序言衛武公刺厲王亦以自警集傳據國語定為自警而去刺厲王之説但此詩繫於大雅又次於板蕩柔桑之間詩中所陳多涉時事序説似未可廢諸儒陳説不一要難依據其謂在後追刺者孔疏既經朱子駁斥其謂刺幽王者李解幽王之篇不得竄入厲世列於宣王諸詩之前其謂武公為世子時作者范傳嚴緝按年表武公立於宣王十六年卒於平王十三年在厲王時年尚幼稚不得作詩即作于共和之末亦不過二十餘嵗之人遽以亦聿既耄為言亦覺逺於事情其謂平王時作者何義張記陸學無論東遷以後無雅即詩中所指迷亂荒湛亦未便懸坐平王其謂宣王時作者詩深宣王中興令辟尤不得有迷亂荒湛之事其謂是詩本刺厲王國史軼其作詩之人武公取以自警序詩者即以為武公之作如左傳所云召穆公作常棣之類質疑此又不得其説而為之辭彌不可信矣竊意作詩時世孔疏李解専言則失參而會之亦有可得而論者蓋幽王沈湎於酒賔筵之詩屢陳威儀之失此詩正與之合特賔筵以自警者諷王此篇則借厲王為鑒故疏謂之追刺也不然末章所謂曰喪厥國取譬不遠者將何所指耶郝仲輿曰幽王距厲王逺矣武公追維往事以為明鑒故曰告爾舊止曰言示之事曰取譬不逺蓋指流彘之事也錢飲光曰蕩詩戒厲王取鑒于殷此詩戒幽王取鑒于厲以厲王為之祖而子孫不能諱其惡故編詩者列于厲王之世按二説根據孔李異於臆談今從之又此詩舊分十二章三章章八句九章章十句諸儒患其頭緒紛錯各以已意析之本義改為十四章古義張記又改為十章以為部署秩然矣而仍多牽綴徒亂聲調今依舊定按篇中陳義甚富説者每不得其要領呂記謂詩以威儀為主其實義主修德而威儀乃德之符也德不可見故以威儀著之蓋修德之事在於主敬主敬之學於威儀見端必密之於屋漏不愧而後純也出話又威儀中一大頭目故抽出與威儀作對實則章首抑抑二字便包得慎言在內持之以無競有覺發之為訏謨逺猶則爾室屋漏之精神有以貫徹內外而四方以訓四國以順民之承而則之有信然者然必能受善言無使敬日弛而傲日長此又自警之切而所以諷王者深矣詩貫分三截看每四章為一截今用其説而加訂焉前四章言修德之要在敬慎威儀抑抑敬慎之容也靡哲不愚猶云弄巧成拙詩貫愚謂此即中庸所謂豫知者第十章盈字是其病本彼愚人無知乃天性之疾哲人而愚則戾其常矣第三章迷亂顛覆是維戾之實也田間次章乃提出骨子自強者持敬之本有覺者謹幾之先詩貫此修德之事訏謨逺猶之所從出也訏謨定命以立制言逺猶辰告以行正言詩貫此播德之事自強有覺之致於用也而其要總在於敬威儀以立民則四方四國所由訓行順從者此也三章言今之不然以自警而諷王也今武公自言已今日之所為女武公使人誦詩而命已之辭也後凡言女言爾言小子者放此集傳按武公自警何至以迷亂顛覆荒湛為言其意自屬王朝而特令人命已而詔之則又似全為已設者商書微子篇曰我用沈酗于酒用亂敗厥德于下又曰我其發出狂皆不忍斥君而引之於已武公之用心若合符節固不當專以自警目之矣興尚也鄭箋以飲酒相尚而不治其國使國政迷亂不修其身使厥德顛覆也田間下四句告之以大業當紹明刑當共而責其惟從湛樂弗念罔求也四章承上而致其戒復申以勉也言惟女弗思紹先王盡棄明法故天不右之而喪亡將至如泉之下流相與淪陷而已曰無者戒之欲其不至如此也朱子欲其不至如此則必修潔自新以表示於民又必戒備戎兵以防患於外按夙興夜寐三句對上顛覆厥德以德之細者言修爾車馬三句對上迷亂于政以政之逺者言舉細以該大舉逺以該近也詩牖此勉之以救亡之道也按戒戎作逖蠻方亦指王朝事若惟武公自警安得及此次四章承敬慎威儀而詳言之質爾人民三句領起而雙提出話威儀以示修德下手之功五六兩章申慎爾出話之義七八兩章申敬爾威儀之義也詩貫質證也人謂羣臣民謂庶民即下章朋友庶民小子也章內四言小子疏獨以此為庶民之子義屬可疑然如古義于庶民作句小子連下讀亦無此拖沓句法姑從疏義質人民猶質諸鬼神之質俗訓為成未徹質人民以謹侯度所謂本諸身徵諸庶民也詩貫惟不虞之變不可不戒故必質之謹之然必慎出話敬威儀無不柔安嘉善鄭箋乃能質且謹也而言尤易失失即無可補救故切戒其玷以起下章六章遂告以言之不可自由也詩緝無或輕易無或苟且蓋發言之際無有為我持其舌者將一逝而不返所謂駟不及舌也田間言悖而出亦悖而入則言順而出亦順而入讎報之理皆如其所施德謂言之根於德者即下文所謂惠也古義有德之言自然順於人心凡厥朋友庶民小子皆有以順之則民之承奉至於子孫而不替所謂言而世為天下則此慎爾出話之效也七章言威儀之敬其顯者在交接士大夫時微之及於爾室屋漏之地今視爾友君子顔色之間固當輯和柔謙矣猶必惕然內省曰得無未逺於愆乎田間相爾獨居一室庶幾不愧于隱微無以莫豫見而稍弛也常若鬼神之陟降不可測識自然不敢厭斁而其敬密矣凡此皆為德之事也曰不遐曰尚曰無曰不可曰矧可皆使人飭已之辭亦所以告王也八章承上言為德之事又特呼而告之既曰辟又曰爾疊致其丁寧也言爾之為德當使盡善盡美誠淑慎爾容止不愆於禮儀自無僭差賊害之事則有以謹侯度而德可為則此敬爾威儀之效亦以收繳第二章敬慎維則二語也下四句又教以虛懷納善田間無為少年邪説所中蓋以起下四章之意若如舊説以為上感下應則當云投之以桃報我以李不當云投我報之也古義按賔筵言童羖此言童角毛亦以童羊釋之蓋童羊無角而今有角則必多所抵觸而國事潰亂矣故當納忠言以止其亂也末四章承上而反覆告以聽納之理也田間九章言荏染然柔順之木則可被之綸以為弓溫溫然謙恭之人則可告之言以畜德前以成德之驗言故曰隅此以進德之序言故曰基必謙恭而後可進德則知盈之不可成也虛能生明陸氏故又以恭人為哲人哲人愚人與首章相應人之真哲真愚惟聽言時驗之順德指話言説惟哲者知其順德而行之古義覆謂我僭則反疑其不順矣民各有心猶言度量相越所以重嘆其愚也十章又呼而告之言汝從前年少未有知乎亦嘗指事論説附耳丁寧矣今既抱子而猶曰未知乎總由盈滿為纍不受善言耳首章所謂靡哲不愚者於此著其由也若果不自盈滿則知之早者成自易詩貫何至傷其已晚乎十一章承上晚成而言天道虧盈益謙其理甚明人生豈可以逸樂為務曰我者設為誦詩者之言輔氏下倣此孔昭與弗尚相應靡樂與湛樂相反夢夢其心故藐藐其聽反以慘慘諄諄之教為虐苦之也此時猶未之知則年已耄矣尚何待耶亦終為維戾之愚人而已卒章情益急詞益痛雖呼小子以自警而所言皆王朝事田間刺厲之意於此較著也告爾舊止言告爾者皆據舊事之已然本義即第十章言示之事也我謀即所言修德之事大悔對下喪國説方者近今之辭古義曰喪厥國謂流彘也取譬不逺言其事甚近無多時也古義昊天不忒三句又申明孔昭之意言不能修德而至於回邪遹僻使民大困急焉則後車又將覆矣總是反覆望其聽言之意張冰璜曰武公三詩分𨽻三體淇澳國風是歌其成德賔筵小雅尚是據其一端惟此篇於修德之要作聖之功至詳至備雖以意兼警王故入大雅而實義理精深文武周召而後聖學淵源為能紹而述之也謂之睿聖不亦宜乎愚按淇澳言成德此篇言修德合而考之則淇澳所謂切磋琢磨瑟僩赫喧者具見於此而充耳會辨之容金錫圭璧之德一一可想大學引以釋至善而此篇即其義疏與菀彼柔桑其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國步斯頻國步蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺如彼遡風亦孔之僾民有肅心荓云不逮好是稼穡力民代食稼穡維寶代食維好天降喪亂滅我立王降此蟊賊稼穡卒癢哀恫中國具贅卒荒靡有旅力以念穹蒼維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂瞻彼中林甡甡其鹿朋友已譖不胥以穀人亦有言進退維谷維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒大風有隧有空大谷維此良人作為式穀維彼不順征以中垢大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲既之隂女反豫來赫民之罔極職涼善背為民不利如云不克民之回遹職競用力民之未戾職盜為寇涼曰不可覆背善詈雖曰匪豫既作爾歌一章填釋文音塵矜居銀反旬民填矜韻柔劉憂隔韻二章泯釋文名賔反翩泯燼頻平去通騤夷靡哀隔韻三章往讀平聲將往平去通競渠敬反梗古杏反去上通資疑維階隔韻四章殷辰痻隔韻五章通首一韻六章兩轉韻風孚音反風心隔韻僾徐鍇古作􅀢音器逮韻補徒帝反音遞七章賊國力隔韻八章瞊諸良反古義云漢較官碑以瞻為彰釋文相毛如字九章林譖隔韻平去通十二章垢古音古上入通十五章去入通十六章寇古苦反第一句與第四句韻第二句與第五句韻第三句與第六句韻又韻之變格集傳云舊説此為芮伯刺厲王而作春秋傳亦曰芮良夫之詩又云詩言滅我立王疑在共和之後劉氏瑾曰共和時厲王猶在詩人敘其事而刺之讀詩記曰此本厲王之亂在於用小人故於聽任之際屢致意焉詩貫曰此時厲王已失位故反覆沉痛既刺王復責相雖辭煩章雜實一脈引伸詩深曰告爾憂恤總承上四章之意誨爾序爵總挈下十一章之綱乃通詩樞紐蓋削亂必以賢而邪者不去賢者不升此序爵所以急也愚按後多責友之言明是共和時王已不能為政故警發僚友使懲於前而毖後也一章至四章皆極言其亂也吕記旬遍也説文言隂均也毛傳柔桑捋采病此下民者以桑無葉不能蔭人喻王無德不能庇民也本義填塞也舊訓久今用説文憂之不絶而愴恍塞胸乃呼天而望其矜也此章冒起大意下三章乃斥時事而言瘼下民之實也四牡旟旐征役煩興也亂不可平而征繕悉索財力殫耗所謂泯也非伐而滅之之謂黎黑髮也丁壯從軍死亡略盡其幸存者皆煨燼之餘耳國運頻蹙至此可不大哀乎將者扶持之意舊訓養今用古義疑定也集傳讀如儀禮疑立之疑靡所止疑云徂何往者止則不知所安行則不知所往陳氏所謂梗也毛傳病也君子實為國所維繫當持心無競誰為此興兵搆怨之事以階之厲而至今為病乎古義君子指厲王詩緝誰字乃暗斥用事者四章承上為梗而申之憂心而念土宇亦如召旻所謂日蹙國百里者舊謂在役而思故鄉今用古義無所歸怨乃言生不辰而逢天疾怒也僤疾也自西徂東靡所定處言京師及中原皆亂也古義我之見病多矣圉之告急甚矣豈非有階之厲者故至斯乎五章至八章言王不能憂國用賢而任此不順之人以致喪亂詩貫所謂階厲者也方今急著惟有序爵考相亂斯有豸耳兩爾字指當時執政者即後所謂朋友也承上言亂至於此可不思所以削除之乎果能深謀謹毖則亂狀自削矣謀毖之道在於憂念窮民而收恤之然必澄序官方以進賢退不肖然後可以恤民而已亂故特告而誨之也按王已流彘而禍亂未平故陳此謀毖之法若仍斥王則王已不能為政告誨不已晚乎鍾伯敬云執熱猶言熱不可解孫月峰云熱氣盈身如執之然非執持之謂逝往也以濯者浴可解熱非濯手之謂以濯解熱是賢者恤民救亂作用不以濯則熱終不解其何能善哉相與入於陷溺而已集傳六章承上憂恤序爵而言僾嗚唈短氣也郭注人當亂世如遡風而行氣悶不能喘息肅畏懼也舊訓進今用錢氏説荓釋文作迸衛巫監謗民有懼心矣又迸散之惟恐不及田間如上所謂自西徂東靡所定處者詩緝云奪民時使不得耕種也按此追論其昔時今當好是稼穡言重農也其有功力於民者使之代耕而食言任賢也稼穡當以為寶代食之人當擇其好者而不可濫也詩緝按重農任賢即憂恤序爵之實此章傳箋殊踈集傳以賢者退耕為説亦于詩意未合今用嚴緝歐吕同七章承上稼穡代食而言天降喪亂既蔑我所立之王矣又降此蟊賊之蟲使稼穡盡病維此中國君既出亡如贅旒而民田又盡荒蕪宣不可哀可恫又無出旅力以念天者是代食之人皆非好矣詩緝按力即力民之力力不及於民自力不及於天詩人所以諄諄於序爵也八章遂言不能序爵之害言惠君之所以為民瞻仰者內則秉持其心外則宣布其謀尤必考察慎擇其輔相今不能考慎而用彼不順之人衆所不與獨自以為善蓋其肺腸不與人同是以使民化之而終為狂悖蓋已逐王而亂猶未已也史稱流彘之後國人復圍太子靜于召公家則民心不靖可知九章以下遂呼朋友而責之蓋責當時之任事者不信已而用貪暴之人也愚人斥朋友不順忍人貪人則朋友所用者非即朋友也舊説牽混譖不信也鄭箋谷窮也毛傳言鹿並行相得朋友乃不信我言以相從於善已僭云者必前有言而不見信今追論之也既不信矣復言則遭其怒不言則歉於心是以進退皆窮也九章因思古之聖人察微見逺而愚人反以狂惑之見自喜吾非不能盡言匡之其如有所畏忌何哉十章惟其覆狂以喜是以用舍倒置良善之人不求進之乃重復眷念疏義於忍心之人焉民既好亂今復使忍心者虐之寧肯俯首為所荼毒乎古義十一章蓋小人壞國猶大風壞物隧穴之深逺者也説文有空大谷即隧也蓋隂賊之氣所出故以為中垢之興良人光明洞達所為取法於善道説文式法也和風之披拂也不順者幽昧險隘行其中藏之穢惡有隧之大風也忍心殘虐故曰荼毒不順鄙穢故曰中垢十二章不順之人與貪為類故復承大風有隧言貪人進則善類敗矣詩緝乃聽貪人之言則對答之田間誦詩書之言則冥卧如醉鄭箋彼所用者匪良友欲使人從已是使我悖也吕嚴十三章末三章皆自明作詩之意上言朋友已譖此仍呼朋友者冀其萬一之聽也田間言我作此詩豈不察事變而妄言乎蟲雖善飛時被繳射恐禍機猝發女不及知故隂往密告於女箋義乃反謂我來恐嚇也張子十四章豈知民之貪亂而無窮極者職此涼薄之人毛傳工為反覆集傳而於民所不利之事為之惟恐不勝謂不順也民之邪僻而不知止者職此凌競之人用力虐民詩緝競即秉心無競之競長民者當以無競為主乃専主於競謂忍心也十五章民之罔極回遹至今未有定者毛傳戾定也職此貪盜之人肆為寇攘謂貪人也今亦知涼薄之不可矣又反背善人而詈之雖欲自諉其責謂非我之所為然事已著明不可掩覆集傳我已作爾所行之歌爾當受之而改悔也鄭箋十六章全詩指斥在於委任小人前路責王只以不順包下二種後路責相又分出忍心貪人即蕩詩所謂強禦掊克也其實此種小人皆相為容納故第五章告爾誨爾已隱有所指第八章明斥階厲之人在彼不順而先借惠君逗出考慎其相句使前後責刺之辭皆有所歸不待第九章指呼朋友始知其刺相也後八章極言民之貪亂將更有不可知之變亦先逗出俾民卒狂句皆詩中草蛇灰線結搆精嚴處末二章以職涼職競職盜收裹三項小人以罔極回遹未戾收繳俾民卒狂章法最密詩從刺王起從責相收而相之不能憂恤序爵由於王之不能考慎則謂之刺王也固宜再按是詩周召行政史無一事紀載蓋流彘之變民心貪亂無已雖以召公之賢幾不能庇其太子至於以子相代而榮虢之黨亦未聞有所誅夷自然盤踞如故此詩之作疑在王方流彘洶洶未定之時時或别有柄政之人事權不歸周召故二公無所展其手足只得將就補苴以俟宣王之興而已不然以召虎之才宜乎戡亂有餘何以十四年中毫無表見故知詩人所刺非二公也田間或疑共和以後國事民情尚復如是宣王何以能興不知厲王被逐祇是一時憤激亂止國內而先王遺澤在人諸侯尚守法度但得庸相支吾已足延世逮宣王立而任用召虎憂恤斯民天下遂運之掌何莫非此詩厝火之憂為能啓牖王心以立中興之業哉集傳比也今從毛作興箋曰芮伯畿內諸侯王卿士也字良夫正義曰書序巢伯來朝芮伯作旅巢武王時也顧命同召六卿芮伯在焉成王時也桓九年王使虢仲芮伯伐曲沃桓王時也此又在厲王時蓋世為王朝卿士書序注云芮伯周之同姓在畿內杜預云芮國在馮翊臨晉縣倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍豫旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遁旱既大甚黽勉畏去胡寧癲我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒旱既大甚散無友紀鞫哉庶正疚哉冡宰趣馬師氏膳夫左右靡人不周無不能止瞻卬昊天云如何里瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷惠其寧二章韻補臨良中反七月卒章蕩首章皆束侵同韻四章上去通五章六章皆平去通小雅宣王之詩即繼文武之後明中興之嫓美創業也大雅以成王繼文武而宣王詩列厲王之後明中興之難於守成也田間讀詩記曰宣王之小雅始於六月言其功也大雅始於雲漢言其心也無是心安得有是功也愚按此詩與鴻雁相表裏鴻雁見撫輯之艱雲漢見憂憫之切序下言宣王內有撥亂之志遇災而懼側身修行欲銷去之得其旨矣惟首二句為仍叔語餘皆述王之辭述之所以美之也首章舉其略而後乃詳言之水氣在天為雲水象在天為漢今倬然昭明轉運於上則非雨候也陸佃此與末章有嘒其星皆同時所見古義王曰於乎何辜今之人乃反求諸已哀矜惻怛不能自已之誠與第六章憯不知其故同意古義薦重也毛傳飢饉薦臻疏謂連年不熟是也靡神不舉凡祀典所載無不臚而祭之即下經上下郊宫之類也靡愛斯牲所祭廣則用牲多也莊二十五年傳曰凡天災有幣無牲而此云牲者疏謂彼因日食大水而發至祭水旱不得不用牲祭法曰雩榮祭水旱也注云牲用少牢圭璧禮神之玉三牲用不可盡故無愛圭璧少而易竭故言既盡也孔疏二章承上靡神不舉而言旱久益甚其氣藴積隆盛熏炙不解為之祈禱而致禋祀於此於彼相續不絶蓋自郊祭至於宗廟無有神而不尊祀之而在宫之后稷既不足以勝旱在郊之上帝又不臨顧於我則下土必至耗敗矣與其耗敗下土寧使我躬當之無使人人被其患也蘇氏三四兩章承上郊宫言之反覆致其警醒之意以冀天祖之監也每章必以旱既大甚發端者王之憂旱念念不忘故言之不置也推去也毛傳旱不可去故戰栗危懼如雷霆之作於上可畏之甚也大亂之後周之黎民所餘無幾又繼之以旱將靡有半身之遺矣今上帝似不欲為我留遺此餘黎者非但不臨已也復承兢業言此何可不畏懼乎先祖之神亦似為之摧擠者非必其果不克也比上又推深一步于摧義傳箋迂曲集傳則明直矣然玩下章胡寧忍豫句義未交浹今用古義旱既不去今但求其沮止亦不可得赫炎之氣真覺宇宙雖廣無隂以憩應璩更何容身之所乎大命以國祚言盤庚篇懋建大命是也近止謂滅亡不逺傳箋以民命死亡言今用古義仰視曰瞻還視曰顧古義言天祖皆斥逺之而無所依倚也羣公先正即月令所謂百辟卿士之有益於民者皆坐視而不助於我固己獨先祖為民父母毛傳何安心忍豫而不加救援蓋憂懼之甚而自猜自疑亦疾痛呼父母之意也按父母加于先祖之上於言不順當從傳説但傳以先祖為文武今經中止言后稷不必牽引文武后稷有粒我蒸民之功謂之父母固宜五六兩章見旱之愈甚而輾轉哀怨計無所之也前言旱氣不推不沮今則山枯川竭如滌除者然蓋旱魃播虐如火焚燎故也我心憚此旱暑亦如火之熏炙而羣公先正竟置罔聞於是又呼天而告之苟吾之不善不當天心寧使我避位以去無以我故而苦此百姓也蘇氏既又念民力方艱當黽勉振救故欲去而不敢胡寧癲我以旱憯不知其故與首章何辜今之人相應而首章言人此章歸已父母之不我愛於我何哉即此意也惟求之不得其故乃追憶從前祈年方社之祭或有弛緩怠慢者乎而又孔夙不莫如是乃上帝終不度我之心似有所悔怒於我者我自反所以事明神者既敬且恭宜乎無所悔怒何其癲我如此也此與第四章遙對四章言先祖之忍豫而曰胡寧此章言明神之悔怒而曰宜無皆空中措想猜疑不定之辭自反已至困於昭格無路因念諸臣竭誠盡慮拮據民事或可仰邀憐察七章遂言諸臣為旱之故散而禱祈賑救不及條紀本職詩貫惟是奔走憂勞至於鞫窮疚病盡凡衆官之長自冢宰以下至於趣馬師氏膳夫左右疏曰庶正是總言冢宰以下按疏説甚是庶正原非官名故下章止舉庶正無有一人不周救百姓無有自言不能而止者疏申毛義勞困至此宜亦天所憫恤於是瞻天而嘆曰云如何之聊賴乎集傳與漢書無俚之俚同聊賴之意也八章言卬天而繁星備見則倬漢之昭回如故矣羣臣之竭精誠以格天者固已無餘集傳今國祚危殆當益加修省不可以無餘之故棄爾賙救之成勞凡若此者求以為民正求以為我又致其不安之意曰奈何以求為我之故而虐苦我庶正乎古義戾罪也詩貫猶虐苦也惠賜也古義天何不賜以安寧謂得雨而勞可息也田間臣勞息則百姓安而我憂釋矣此句又與寧莫我聽相應蓋終冀其必聽也舊説俱以安我為言後復有以安民言者細按全章俱説庶正之勞本句其字指畫分明蓋庶正安則安我安民俱在其中矣張子曰不斥言雨者畏懼之甚且不敢必云爾李迂仲曰春秋傳宋大水公子御説對魯數語耳臧孫達曰是宜為君有恤民之心宣王憂民如此寧有不中興乎史記漢者金之散氣其本曰水索隱曰案水生金散氣即水氣唐志建午之月一隂生而雲漢漸升建子之月一陽生而雲漢漸降周禮大司徒荒政十有二其十一曰索鬼神黨正春秋祭禜大祝掌六祈類造禬禜攻説小祝掌候禳禱祠之祝號以逆時雨寧風旱祭法埋少牢於泰昭祭時也相近相近當為禳祈於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗宗當作禜祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神疏曰此經所載謂四時乖序寒暑僭逆水旱失時須有祈禳非關正禮之事月令仲夏命有司為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士之有益於民者以祈穀實注曰古之上公若勾龍后稷之類穀梁傳古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉孔疏國語鯀為宗伯祭法有祀之之文社稷五祀雖為王朝卿士兼帶上公之官故左傳云封為上公祀為貴神周禮大宗伯以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方典瑞四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼圭有瓚以肆先王圭璧以祀日月星辰璋邸射以祀山川注曰邸者本也四圭有邸中央為璧圭末四出兩圭有邸僢兩足相向曰僢而同邸陳祥道曰璧琮禮天地四圭兩圭祀天地皆一祭兼用之四方有禮玉無祀玉日月星辰山川有祀玉無禮王祀之乃所以禮之羅泌曰祭天燔燎祀地瘞埋蓋牲幣耳惟韓嬰詩傳始有天子奉玉升柴加之於牲之説而崔靈恩引詩圭璧既卒以實之且謂肆師立大祀用玉帛牲牷為論燎玉之差等詳考肆師所用玉帛特禮神之用雲漢所言亦禮神之玉耳何自而有燔且瘞哉説文魃旱鬼也神異經南方有人長二三尺袒身目在頂上走行如風一名旱母所見之國赤地千里遇者得之投溷中即死山海經係昆之山有人衣青衣名曰黃帝女魃所居不雨叔均言之帝置之赤水之北文字指歸云女魃秃無髮嵩髙維嶽峻極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鈎膺濯濯王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲申伯之德柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯二章謝讀如序事謝式去入通四章釋文藐亡角反蹻渠略反伯字不入韻五章馬音姥七章番如字與嘽翰憲韻憲讀軒嵩髙蒸民皆尹吉甫送行之詩而序皆以為美宣王序下于嵩髙言建國親賢于蒸民言任賢使能其義彰矣此篇言重辭復而條理井列當與黍苗參看一章言降生申伯為周翰也山大而髙曰嵩爾雅嶽雍州之鎮山職方注所謂吳嶽也補傳曰方美申伯而兼言四嶽實為迂濶近世儒者援周禮職方之文謂吉甫占土風而發詠指吳嶽而為詩誠足破學者之疑古義曰嶽山與岐周相近乃肇基王迹之地推本二人之生於神降猶曰祖宗神靈之所孕育云爾甫仲山甫也康成禮注如是孔子間居注箋詩復為異義者徇毛傳耳吕記曰申甫意皆宣王時賢諸侯鄭氏乃取訓贖刑之甫侯非也後漢書劉陶疏曰周宣用申甫以濟夷厲之難章懷注訓甚明足為炳據補傳曰建國多矣莫重於申伯任賢多矣莫重于山甫二詩作於一時嵩髙以為嶽降蒸民以為天生其義既一所謂維周之翰其事亦同然則是詩甫申謂山甫及申伯也安得逺取甫侯哉詩緝曰申伯光輔中興而逺取周道始衰之甫侯以匹之非所以褒揚申伯也或疑甫為字申為國名稱不類不知舜典稷契或官或名漢書絳灌或封或姓皆不類也又按孔疏駁辨禮注謂樊國之君不得與申伯同為嶽神所生不知嶽降天生義本一揆非如二氏逆流下降之説家織簾謂孔説誣褻不足據者是也一章言申伯之生關乎國運故設為神異之辭以為嶽降神靈和氣以生也毛傳兼言山甫者借山甫以大申伯詩緝東坡富韓公銘詩先言篤生萊公繼以堂堂韓公詩人固有此義例補傳維周之翰乃通篇主句於四國則蕃蔽患難於四方則宣布德澤皆為翰之事也蕃宣二句統申甫言下乃專言申伯故下七章起句皆提明申伯以界别之二章言定申宅也將命申伯出牧先本其亹亹勒職而言明寵錫之有由也申本侯爵見史記王又任為方伯故曰纘之事即下式南國之事也邑申舊邑也箋義以邑為活字故上于訓往下于訓於一字兩解未安又林之竒謂前此申在王畿之內此無可考今按漢志定從疏義今為方伯建立國宅必擇衝要之地方足以鎮南國而表率之不知其宜於申乎宜於謝乎故使召伯往定之也登進也舊訓為成南邦久在化外觀江漢常武二詩可見今將進之王化之內厥惟申伯之功許其子孫世有此土以守其功也田間愚按南陽汝寧之間逼近荆徐荆徐久梗王化恐其煽動南國故命申伯出牧以控扼之義見王風揚之水篇觀於江漢之師順流直下知南國已就約束是皆申伯之功所謂王纘之事而欲其世執者也此章義解惟田間得之三章言營謝之事也前言南國是式是廟議如此此述王命故其文為式是南國也庸功也鄭箋民功曰庸周禮因謝人以興起謝功即下徹土田土疆之功也上四句皆王命申伯之辭在召伯還報定宅後也徹徹法也傅御申之傅相及治事之官也詩緝王命召伯再往謝地以徹法治其土田而賦稅之又命申伯之傅御部籍其私家之人而資遣之疏謂告令裝載耳其遷猶與申伯同行也解頤曰徹土田王者之大法故命大臣遷私人王者之私恩故命傅御四章言營謝既成而王錫申伯之事也申伯之功即上爾庸黍苗言肅肅謝功召伯營之蓋不以工役纍其心也俶始也王氏藐藐髙廣貌錢氏言創始築此謝城而又成其寢廟則藐藐然髙廣也此結王命定宅之事亦以為遣行發端也古義謝功既成就封有日而先賜以車馬則四牡蹻蹻然壯盛鉤膺濯濯然鮮明鉤膺樊纓也毛傳案巾車金路鉤樊纓九就同姓以封申伯異姓而得此賜者以其命為侯伯故得車如上公孔疏五章言于豐䇿遣而述其辭也古者賜爵必於大廟祭統以江漢之詩例之此當在豐京文廟故下有飲餞于郿之事也上章既有四牡鉤膺之錫矣此于廟䇿遣復有路車乘馬之贈與後篇贈韓侯同也詩緝謂即上四牡鉤膺今從箋義我圖爾居莫如南土有人地相宜之義我圖以下皆策遣之辭也介圭箋據爾雅謂長尺二寸是鎮圭也集傳則謂諸侯之封圭案周官無介圭惟尚書顧命有之則介非定名讀詩記謂美大而稱之是也竊意鎮圭不得錫諸侯而本分所得之圭亦無可美大考典瑞琬圭以治德康成謂諸侯有德王命賜之申本侯國當得七寸之信圭今以作牧之故特錫琬圭九寸考工故美而大之以為寶瑞與韓奕章仿此近已也毛傳辭也聲如彼記之子之記鄭箋往已王舅南土是保猶言無使我有南顧憂耳古義謂近王舅指南國諸侯言田間謂此論圭之辭皆曲説六章言于郿餞送而厚其行也王既䇿申伯于豐遂行餞禮于郿復自郿而至鎬是為南也謝為所封之國故以往為歸言信邁誠歸者申伯志存王室宣王恩隆元舅人疑其未必遽往而今果成行也詩緝是時召伯留謝徹土疆之命蓋已在前非此時命之也前言徹土田者小司徒井牧其田野之事此言徹土疆者大司徒制其地域而溝封之乃分地職奠地守制地貢所以為峙粻之本也此結王命徹土田之事古義即黍苗謂原隰平泉流清者也以峙其粻者足其倉廪使常變有恃無所顧慮而後行可速也豈王將有南土之役故使預儲供億與舊謂具其糧食為申伯舍宿之須非也考周官委人遺人皆有聚積以待賔客羈旅而遺人復有道路之委積如疏家所引皆王國為之整備而謂取諸謝邑土疆之所出可乎王國建侯而征其本國之稅以供資用殊可發粲輒以鄙見辨正之如此七章入謝而周人喜其能為周翰因以表其尊賢也番番老貌尚書蔡傳如世稱皤然葉氏而毛言勇武者亦是翁矍鑠之意既入于謝言自此入彼非已到其地也黃佐徒徒行者御御車者毛傳即傅御所遷之私人也古義嘽嘽安舒貌鄭箋此指其去時之儀以結王命遷私人之事古義周邦咸喜京師之人聚觀而喜也戎猶女也戎有良翰周人相慶之言鄭箋與首章維周之翰相應不顯丕顯也尊則王之元舅才則有文有武毛傳足為南國所法此暗結式南邦之意所以能為周翰也蓋吉甫推咸喜之意而誇美之亦見荆徐之衝非文武全備不克為之保障也古義八章歸本申伯之德而以贈詩之意終之也承上言申伯有文武之才者由有柔惠且直之德耳柔惠故能文且直故能武揉者矯而正之漢書顔注謂強者制之以直弱者撫之以柔聞于四國謂懷其柔惠者頌仁憚其直者頌義也古義萬邦四國廣言之見其德所涵覆如此則南土之保裕如矣亦與首章四國四方相應舊指申伯為卿士時衍説也詩者工師所誦故謂之誦碩大也詩中指陳甚大有繫於天下國家也聲之足以感人者為風意無不盡辭無不美足以感動申伯故曰肆好也古義贈增也毛傳疏謂贈之言使行增於義也美所已至所以勉其將來此吉甫作詩贈行之意也愚按周畿千里藩于西者為秦藩于東者為申吕自東遷委戎于秦而西藩撤自申吕見滅于楚而東藩破得以延世者惟恃中土之齊晉耳宣王之世秦仲方盡忠於周其子莊公以七千人大破戎師為西垂保障故中興之績不及西方而荆舒淮徐其害最劇故方叔既伐蠻荆召穆復平江漢而常武之師復親征徐國當其衝者惟申為要汝寧信陽之間尤逼楚氛故改建申國於此以為控制實東南一大關鍵也命申伯者因其先世本封習知山川之險易而其人之才德又足辦此非後世寵任外戚之比也王氏不察遂以召戎禍責之而引王莽何進賈謐為説過已然秦風美襄公而首及寺人嵩髙美宣王而一稱王舅再稱元舅聖人録之或亦有微意與此亦考古者所當論也周禮職方氏正西曰雍州其山鎮曰嶽山注曰吳嶽也地志扶風汧縣西吳山古文以為岍山今隴州吳山縣吳嶽山也馮疏吳嶽山在今陕西鳯翔府隴州南八十里古義天下諸山之專以嶽名者惟此山耳漢志申國在南陽宛縣案今河南南陽府南陽縣後漢志謝城在南陽棘陽縣東北百里案今河南汝寧府信陽州歐陽修謝絳銘云黃帝後昔周滅之以封申伯説文母之兄弟為舅妻之父為外舅漢書外戚恩澤侯表云其餘后父據春秋褒紀之義帝舅緣大雅申伯之意應劭曰春秋將納后于紀故先褒為侯是以紀為妻父也其注申伯則曰宣王元舅劭既以紀為妻父則申為母之兄弟矣后父帝舅漢表原自分明何黃如却是倒説了不可誤讀漢書并誤詩也一統志郿縣在陜西鳯翔府城東南百四十里郿城在郿縣北十五里渭水之北詩緝云即董卓所築郿塢天生蒸民有物有則民之秉彝好是懿德天監有周昭假于下保兹天子生仲山甫仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏強禦人亦有言德輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心二章詩所若轉如遇反若賦去入通三章約舌音實發弗力反反與辟為韻五章寡音古六章平上去通八章風孚音反與心為韻嵩髙功勝於德蒸民德勝於功陸堂嵩髙首以維周之翰言論功也蒸民首以保兹天子言論德也朱子謂蒸民詩大較細膩蓋進於嵩髙之義矣按山甫城齊之故傳謂去薄姑而遷臨災疏述史記獻公徙臨災在夷王時與傳不合集傳通其説謂徙于先而城于後理或然也顧何以至是始城則竊有説焉考史記齊國本封營丘至胡公始徙薄姑獻公殺胡公而徙臨災則夷王時也再世而厲公暴虐胡公子入齊與齊人攻殺厲公胡公子亦死齊人乃立厲公子赤是為文公而誅殺厲公者七十人事在宣王之世築城之命疑在斯時蓋出定齊亂也置君戮叛之事疑出山甫方略史失紀耳吉甫之意則謂山甫以盛德輔天子宜令朝夕在側今以齊亂之故奉命東行故以邦國若否明哲保身為言而繼以不侮矜寡不畏強禦若逆知其措置之必出於此可以坐定反側但得畢事早歸以左右天子則山甫之心而吉甫所歌以慰之者也不然則詩所云云義何歸著耶輒就鄙見論之如此一章言天生山甫以保天子也美山甫而以好德發端明山甫有懿德協於蒸民所同好也天之生民有物必有則是民所執之常性也故發之為情無不好是懿德者集傳蓋秉彞蒸民所同懿德山甫所獨故後言民鮮克舉惟仲山甫舉之也田間今天監顧有周其光明實至於下將保安宣王而生此仲山甫舊以昭格為周之明德上格保為天之保佑今用古義則所以鍾其秀氣而全其美德者集傳豈偶然哉二章言仲山甫之德而章末遂及其職以起下章為使齊張本也嘉即懿也則即物之則臣道主柔古義柔而則則嘉矣令儀令色小心翼翼表裏柔嘉也集傳古訓是式威儀是力學問進修也集傳既口令儀令色矣猶曰威儀是力者有德固威儀所自形而謹其威儀又所以養其德也詩緝山甫之德如此故有當於天子之心而使布其明命也張記按賦命事濶使齊在其中蓋為下章作引且不必遂指使齊至末二章始露本事詩人措筆之妙便開無限法門三章言仲山甫之職而章末重申賦政明作詩之主於使齊又以引起下章也式百辟疏申毛義以為冢宰是也纘祖考保王躬集傳謂以冢宰兼太保而太保其世官是也出納王命便是喉舌之司曹氏此即龍作納言之任所謂出納朕命惟允是也疏家不知龍職甚重反謂與此有異誤矣發如發蒙之發四方承厲王昏亂之餘忽見新政之頒積錮為之頓開也箋以爰發連上喉舌取義非也今從田間王命二字直貫全章補傳畫出末二句非也讀詩記曰外則總領諸侯內則輔養君德入則典司政本出則經營四方五經蠡測曰山甫為城齊而行而詩舉其職至於式百辟保王躬為喉舌可見大臣之職以朝夕匡弼為本而出使特一時之用耳前言命此言政前言賦此言發則言之序也四章承上章賦政于外而言也詩緝王命即賦政之命肅肅嚴也將奉也奉而行之所謂賦政也邦國侯國也李解與治同道曰若與亂同事曰否尊卜山甫明其若否之理而不奪於毁譽不蔽於愛憎也張記哲者明之用既明其若否矣而又知微知彰知柔知剛使事定而人不驚功成而衆不忌則奉身無過而禍患不及矣蓋山甫之身為一人倚賴之身必自保其身然後可以保王之身夙夜匪懈以事一人所謂王躬是保也按章內雖不主齊事竊以史記所載與詩比而觀之則此及下章所言皆非無所為者特山甫德量汪洋而吉甫舉義髙濶不欲切指以隘之耳意則實有所歸也讀詩記謂保身非全身逺害之謂不知身體髮膚受之父母不敢毁傷本非末節惟偷生徇私則君子賤之耳周公遜碩膚孔子微服過宋皆明哲保身事若謂順理即是保身恐非此詩義解五章再申賦政之事以終其説也古義此與下章皆以人言發端見恆情如此而山甫不然明其異於蒸民也古義茹柔吐剛本飲食之事喻陵弱而畏強也疏義矜寡強禦即是柔剛蓋以所遇之人言説者以剛柔得中言之吕嚴非其義矣疏曰不侮不畏即是不茹不吐既言其喻又言其實以充之古義曰不侮二句亦是借言即扶弱除暴影子愚謂此正四方爰發之實置君戮叛事在後來而詩言若燭照龜卜者惟其夙秉明哲有以裕之也非吉甫相契之深何能及此六章歸賦政之本於德以收應首章也於德言輶又比之以毛正是懿德入微處鄧元錫謂入微難故蒸民具有之而鮮克舉之舊謂輕而易舉費解儀宜也圖度也度於事物之宜山甫所為無弗合者故知德之精微惟彼能舉也舉字雖是借説亦可從德之運用處想見愛莫助之以收應秉彝之好此句本與上二句一連而意已拖起下二句言我心愛山甫之德而逺不能逮何能代當其任以效萬一之助故下接云衮職有闕維仲山甫補之也此間著不得轉集傳用至於字作轉語恐非尤不得將助字粘住舉德説黃實夫謂助生於不足終覺入癡補闕妙用正在人莫能舉處便是我莫能助處二句收應保兹天子亦以起下欲其遄歸之意七八兩章方明説使齊送行之事七章言使齊之故在築城八章言送行之意在望歸也出行而後祖祭故曰出祖曽氏業業髙大也毛傳捷捷疾也集傳每懷靡及不獨山甫懷不及事之慮雖征夫皆然此臨行祖道時光景也彭彭馬盛也説文鏘鏘鸞鳴聲鄭箋則行而在道矣王命二句始言所以行之故也騤騤馬行威儀也説文喈喈聲衆且和也字義皆有層次分别要皆紀其在道所見耳式遄其歸欲王敦趣山甫使疾歸也古義吉甫作誦穆如清風非自譽其詩蓋清微之風可以解人懷抱山甫馬首東瞻而心懸北闕故作此以慰安之也錢氏詩學曰王命山甫本非出之於外山甫亦非重內輕外者惟吉甫以王躬為國本望其在朝朝夕納誨不欲其久違王之左右所以慰山甫即所以諷王也疏曰周語稱樊仲山甫諌宣王是山甫為樊國之君韋昭云食采於樊僖二十五年左傳晉文納定襄王王賜之樊邑則樊在東都畿內古義云晉語倉葛呼曰陽有夏商之嗣典有周室之師旅樊仲之官守焉樊仲即仲山甫也諡穆周語稱樊穆仲困學紀聞云魯獻公仲子曰山甫入輔於周食采于樊見唐相權德輿集又羅泌路史云虞仲支孫卿于周封樊為樊氏樊仲氏二説未知孰是要為周之同姓可知若漢書杜欽傳云仲山甫異姓之臣無親於宣就封于齊事既違異其不可信明矣杜預云樊一名陽樊野王縣西南有陽城季本云野王本河內今屬懷慶府通志謂陽樊在濟源東南三十八里與河內相鄰即其地也黃氏日鈔曰方博士解王制三公一命衮若有加則賜也云衮雖三公可服非有加則不賜詩言衮職有闕惟仲山甫補之是也此言衮者人臣之極常闕之而不服惟仲山甫加賜而得之是常時所闕而今補之説雖創而有據附録於此奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解虔共爾位朕命不易幹不庭方以佐戎辟四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡玄衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炮鱉鮮魚其䔩維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黃羆一章命彌吝反與甸為韻道與考韻解與位韻易與辟韻二章衡户郎反與張王章錫為韻四章彭音旁與鏘光為韻五章樂力告反與到為韻武士訏甫噳羆虎居譽平上通羆音波皮音婆黃氏日抄曰厲王之世諸侯不朝入覲錫命之典視為贅物宣王政舉清明一洗衰頽之迹故封申伯以懷南方之諸侯命樊侯城齊以懷東方之諸侯錫命韓侯以懷北方之諸侯至淮夷不服則命召虎平之徐方不庭則自將征之規模宏大雖文武之世不是過也錢氏詩學曰命韓侯為北國伯所以備玁狁也重其事權使百蠻追貊悉受統轄蓋欲聨絡北方之戎蠻皆為我用耳宣王制北狄之大計在此按序稱嵩髙蒸民韓奕皆吉甫所作論者謂皆王命為之然前兩篇主美得人故盛道兩人功德謂之為誦而自署其名此篇専美懷逺故以受命親命為文反覆揚厲國恩而申以誥誡義既不同體亦逈别再按此詩前後都似不依本事次第向來循文解義未嘗推論及此張記何義則以首章為追述初封次章為既封入覲通解六帖則以取妻為出祖以前事陸氏詩學又以先取妻後擇壻為倒敘錢氏詩學又以末章當敘次章之後種種繚戾皆由不得本詩主意所在因不知其用筆先後之妙而以辭害志也蓋自周衰失馭北道梗塞宣王奮勵中興韓侯首先效命故特加寵異命為北伯自當首敘王命以見鄭重諈諉之義然後述其始終恩禮自入覲以至出祖異數優渥以侈其遇而動其感不得鑿空以首章為追述初封也入覲受命是何等大事豈有事未畢而取妻之理自當在祖餞出國門後蹶父孔武章是借韓姞令居以見封土之美引起下章溥彼韓城二句非為擇壻而言何嘗倒敘耶末章收應首章又申廣王意而誥誡之此吉甫送行諄屬之辭非王於此再加錫命也安得敘於次章之後乎先後之間關於全詩大義不得不為辨正一章言王親命韓侯也奕奕梁山乃大禹所治著其國之在北也自王化不通朝廷詔令羈縻止於遙制今其道倬然著明無復阻塞韓侯循之以行繼世請命之禮王乃親加詔命焉詩稱王命未有言親者此特言之見中興振作宿習盡除而內外之氣始通也受命猶恭命也先言受命後言親命見惟韓侯恭順故能承藉寵靈也纘戎祖考以下皆王命之辭蓋韓之先世嘗為州牧矣無廢朕命即纘戎祖考之命也夙夜匪懈虔共爾位無廢之實也汝能匪懈虔共我不改易前命戒之也古義又言有不來庭之方國汝當為楨幹以正之以佐汝君教化所不及詩緝蓋指北國言之亦虔共爾位之事也二章述其始至之恩寵也修長張大也韓侯乘此長大之四牡而來入覲言在道時也以其介圭介圭義見前入覲于王覲禮所謂侯氏入門右坐奠圭是也據聘禮還王則此圭亦還此正覲時事箋以享禮當之誤矣王錫韓侯以下覲禮所謂天子賜侯氏以車服是也淑旗旗之善者交龍之旗也鄭箋建旗之竿有大綏以為表章王制所謂天子殺則下大綏是也孔疏旗載於車故車服之賜及之茀車蔽也簟漆席也孔疏錯金塗也説文衡車軛也塗金於軛所以為文古義覲禮路先設故先以車言玄衮赤舄冕服之上者覲禮諸公奉篋服加命書於其上是以服言也鉤膺義見前馬眉上曰錫刻金飾之毛傳覲禮路下四亞之故次以馬言也鞃軾中也襪覆軾也毛傳以去毛之鞹施於軾中以固車以淺毛之虎皮覆於軾上以文軾此又於車别其軾言之鞗革轡首也金厄以金為環纒扼轡首鄭箋此又於馬别其轡言之三章述其將歸之恩寵也既覲而返國必祖者尊其所往去則如始行焉鄭箋屠地未詳豈其地與蹶里相近故出宿於此與顯父餞之承王命也箋義王親餞申伯而使顯父餞韓侯禮有等差也謝氏聘禮釋軷祭脯乃飲酒於其側注謂卿大夫處者於是餞之是祭畢而餞餞乃出宿詩先記所宿為下親迎張本其實餞在國門外也古義陳酒既多而殽䔩各舉其二槩其餘也六月稱炮鱉膾鯉此亦言炮鱉鮮魚豈古者卿大夫之燕以魚鱉為常品與筍蒲皆豆實也前既有車服之賜矣今復贈之車馬以寵其行蓋殊典也所重在餞故以籩豆終之嶽記燕胥言韓侯與顯父相燕樂也覲禮稱來朝者為侯氏此與上章皆極言禮遇之優以動其感也四章言覲禮既畢遂就王國親迎以歸也輔氏蹶里未詳當在王都郊遂之內先言韓姞家世之貴次言韓侯親迎之禮百兩八鸞往迎之車馬光顯也諸娣如雲來嫁之娣姪衆多也昏禮親迎御輪三周下車曲顧故韓侯回顧之而嫁從之盛爛然盈滿於蹶父之門也詩緝按汾王厲王也鄭箋韓侯新承寵命而聨帝姻戚詩人序之以見光榮眷厚極一時之盛讀詩記曰古者任遇方面之臣既盡其禮復恤其私使之內外光顯體安志平然後能展布自竭為王室之屏翰得其義矣五章因韓姞于歸而盛稱韓侯封域之美也詩牖蹶父有甚武之材嘗為王使而涉歷諸國因為女相視可居之所莫如韓國為樂蓋欲鋪揚韓土之富庶而借蹶父之相攸以形容之亦必蹶父曽至其地故詩人得而及之也韓國多山而近河田間水陸所産無不備有訏訏甫甫皆大也噳噳衆也毛傳魴鱮麀鹿可以供食熊羆貓虎可以供裘季本言饒富也慶喜也燕安也鄭箋譽樂也集傳蹶父喜得此善居而韓姞亦安而樂之上章言韓侯之迎妻稱心此章言韓姞之歸韓得所蓋道其室家之宜明韓土之孔樂如此也六章承上言此孔樂之韓土蓋自初封之時召康公以燕衆完築其城致為美大孔疏韓之先祖受命為伯因是百蠻而長之此舊事也以者推原之辭今王推原舊事故錫韓侯兼轄追貊之戎奄受北方之國因以先祖州牧之任豫之鄭箋使復為之伯所謂纘戎祖考也蓋視昔受之命加廣矣凡其州內所統之國應城者城之應池者池之為之井牧其田征斂其賦孔疏須是打起精神實實經理故四者皆以實字冠之又當責令諸侯各修嵗事貢其方物如貔豹羆等獸之皮罔或缺供此正虔恭爾位幹不庭方之實在政績能如是則有以報塞主恩綏輯蠻服纘祖考以佐戎辟而王命因之不易矣此吉甫贈言之義也蓋韓侯少年英俊席先祖富庶之遺為百蠻所服故先王委重焉而厚為之禮吉甫宣揚德意周備欵曲而卒告以經理北國之宜想見古大臣奉詔宣論之體不可以前兩篇例視也錢氏曰宣王得韓以為北方之障然後専事東南無復北顧之憂故此章後即繼以江漢常武爾雅梁山晉望也注云在夏陽西北臨河上玉海同州韓城縣南十九里有梁山漢左馮翊夏陽縣西北詩所謂奕奕梁山也馮疏同州韓城縣今屬陜西西安府古之韓國晉為少梁秦漢之夏陽縣也梁山在其境非太王所踰之梁山也太王所踰之梁山在乾州西北五里按古義引何景明説謂太王所踰即禹貢治梁及岐之梁據地理今釋禹貢治梁即韓城縣之梁山曽旻云因壺口梁岐一時施功故并言於冀州其實梁岐皆在雍州孔傳甚明蔡傳指山西汾州府永寧州東北之吕梁山則去河甚逺河水不得經此蔡傳誤也又按玉海據括地志稱在韓城縣南十九里今釋則謂韓城縣西北九十里當以今釋為正王制天子殺則下大綏諸侯殺則下小綏疏云綏旌旗無斿者周謂之大麾孔疏幭禮記作幦周禮作􅍜玉藻言羔幦鹿幦巾車言犬􅍜犴􅍜皆以有毛之皮為覆此則以淺毛之皮為幭也解頤屠地未詳或以為同州屠谷李解則太逺或以為即鄠縣之杜陵集傳則地在鎬南不當至此説文貊北方豸種後漢傳有貊耳小水貊濊貊之屬追同堆若胸奴傳之白龍堆夷人爾雅虎竊毛謂之虦音潺貓注竊淺也又貔白狐注一名執夷虎豹之屬江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海王命召虎來旬來宣文武受命召公維翰無曰豫小子召公是似肇敏戎公用錫爾祉釐爾圭瓚秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文德洽此四國滔彵侯反定唐丁反平上通命彌郎反音泯瓚古義才田切平上去通卣首隔韻黃實夫曰此召公還師奏凱論功行封之所作也按宣王時南北冦患在北尤甚故用兵先於玁狁既平北方乃勤南駕首定荆蠻然後盡力淮之南北劉汝楨謂江漢常武二師一時並發此宜然也合觀二雅用師次第及措置三方之略宣王可謂英主矣至於功成治定不息兵端撓師辱國大業隳焉此詩略於戰功詳於疆理不侈英武而重旬宣一路精神全注文德早為宣王杜未萌之慝蓋穆公不伐不矜納君于德一時代王言者亦能將順其美故所述王命皆有可觀而非吉甫以大雅之材抒忠愛之悃必不能寓針規於揚厲得其體要如此也前三章述平淮之事一章言穆公會兵江漢呂記順流而下武夫用命匪敢偷安遊息惟淮夷是求焉箋謂據至其境故言來也於是出車設旟匪敢安處寬舒惟為淮夷之故而陳兵焉疏謂自營壘出陳箋謂據至戰地故又言來也逺道勤師上公出蒞僅曰來求來鋪而已宛然有征無戰氣象二章言順流之師其氣百倍蓋淮夷已望風欵服因經營其附近之四方而伐叛招攜古義使傳遽告成於王鄭箋以車曰傳以馬曰遽時穆公猶未歸也既經營之四方皆已平帖露布至京畿甸人心庶幾安定天下無復叛戾乖爭王心於是安焉蓋穆公以王心為心故告成時為之體貼至此箋謂述其志者得之三章言行徹法定疆理為平淮第一大功故於此特提王命召虎亦以歸美於王也言江漢之滸者師從江漢而下王命亦從江漢而來也豈王伐徐旋軫而下此命與蓋兩師固一時事也淮南久隔化外今重開闢之奬其功也古義所闢之疆土命虎以徹法行之非不惜民力更張太驟也張記蓋什一天下之中正乃我周之定制欲使天下皆於王國取中鄭箋所謂歸其有極也於是奉王命而疆之理之自淮至於南海焉蓋統徐方荆蠻皆就疆理矣可知平淮徐是一時事當時兩道並進王師既還獨留穆公以終其事故兩役之賞并及穆公也式辟四句王命之辭于疆二句乃紀其事箋義一二章敘得輕約三章敘得詳盡不待讀至末章已知其意在文德矣後三章述錫命之事四章則終上章經營疆理之事以起下章之錫命也劉氏再提王命者上命只飭所辦之事此命勉其繩祖武以承恩眷蓋猶在經營疆理時故據江漢之滸言之曰來旬來宣也朱子初説謂此下皆述王册命及作集傳移注下章最見精審後人轉用舊説非是旬遍也毛傳宣布也集傳言汝勤勞於遍服四方宣揚王命孔疏蓋指經營疆理而陳其功也又言其先祖康公當文武受命之時實為楨幹之臣鄭箋今汝無曰以豫小子之故也但自嗣汝召公之事耳能開敏汝功則我當錫汝祉福如下章所云也集傳五章述王策命及穆公受命之事也傳云九命錫圭瓚秬鬯蓋三公八命復加一命始得賜孔疏王制謂賜玉瓚然後為鬯是也卣中尊也爾雅文人先祖有文德者孔疏言賜汝圭瓚秬鬯告祭於汝有文德之先祖孔疏即召祖也文侯之命謂追孝於前文人義正同此集傳指文王義與尚書岐出今從箋疏又言錫之山與土田以廣其封使往而受命于豐廟從先王命其祖康公之處以命之明虎之功同於康公也孔疏虎於是拜受策命無可報謝惟祝天子以萬年而已六章述穆公歸祭其祖而致勉君之辭也上四句是祭祖下四句是勉君舊以上三句下五句分截非是今從集傳上拜稽首于豐廟此拜稽首于家廟對答也鄭箋揚稱也集傳考成也毛傳言穆公受賜歸而答稱天子之美命作康公之廟器以考其成集傳所謂告于文人者也復稱天子萬壽者本祖德而大君恩也詩所既又美其君之令聞而進之以不已勸其君以文德而不欲其極意於武功集傳蓋言武功之不可恃亦所以戒之也朱子舊説詩緝曰宣王方以武功褒虎而虎乃以文德勉王蓋不矜己功而納君于德意度逺矣古義曰江出岷山漢出嶓冢漢流至大别與江合流杜預云大别在江夏界讀詩記云江漢合流去淮夷絶逺或者會江漢之師以伐之與林之竒云古者畿兵不出調兵諸侯各從其方之便劉汝楨云二師一時並發王親帥六師穆公則徵兵江漢以行者也馮疏曰後漢書東夷傳殷武乙衰敝東夷浸盛遂分遷淮岱漸居中土陳少南云江漢之滸者淮南之夷也若在淮北則江漢非所入之路率彼淮浦淮北之夷也若在淮南則徐土非聨接之地愚按秬鬯之説鄭與毛異毛以秬黍必和鬱乃名鬯故即以鬯為香草鄭則以黑黍之酒自名為鬯不待和鬱疏引周禮鬱人鬯人兩條以申鄭義今考鬱人和鬱謂之鬱鬯經有明文鬯人掌供秬鬯不言和鬱是不和鬱亦名鬯也當以鄭説為正詩故曰古者論撰其先祖之德功勒之祭器以祀其先祖是之謂考薛尚功鐘鼎彞器欵識有􅌏音辨敦銘銘文一百七字歐陽集古目録云􅌏周大夫也有功錫命為其考作祭器也集傳引此為據赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所王旅嘽嘽如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸一章士師平上通戎音汝與祖父為韻戒國去入通三章子音祖與遊騷為韻霆驚自為韻五章上三句平去通六章上二句平入通王肅主毛以為王不親行王基主鄭以為王自親行鄭説是也王雖親行仍命大將統之非宣王自將也淮南北皆有夷初無主名徐則淮北之大國而諸夷所服屬者陳氏詩明言征徐國淮濆特所經歷及駐師之地鄒氏不必言伐淮北之夷也愚按江漢不侈戰功而常武發揚蹈厲者蓋淮南諸夷恃徐為固今徐方自救不暇二師並出義已見前諸夷失恃莫敢鴟張穆公挾江漢之師往壓其境便已俯首帖服徐國介荆淮之間地大力強負逺僭號不知夜郎與漢孰大由來舊矣非大振兵威不足以挫其鋒而奪之氣又穆公稟奉廟謨所用者不過江漢卒徒兹則六師齊出天子親在行間威靈聲焰自與遣將者不同詩之體製自當有别然曰惠此南國曰王猷允塞曰王曰還歸未嘗有究武窮兵之意非江漢尚文德此篇尚武功也又按常武名篇與下武同例二字當連屬取義衍序謂有常德以立武事割裂添贅立解迂曲而諸家泥於武不可常卒無確詁竊以禮樂征伐自是治天下之常道武王之樂可名大武宣王之詩何不可名常武乎若謂召公意在陳戒詩之美戒豈在篇名不當以髙叟為詩之法求之也一章述命元帥以統六師也天子親征威嚴光顯故先以赫赫明明冠其篇後乃言王于卿士之中擇大將而命之也所命之大將則周之世臣以南仲為大祖者其官則大師其人則皇父也整我六師以修我戎者比其什伍勒其部分以飭我用兵之事也張記既敬者居如守行如戰也既戒者臨事而懼不輕敵也古義惠此南國者徐戎挺亂南國皆被其害今將征之以除暴安民也詩緝二章述命司馬以定方略也王親命元帥而令內史命程伯休父為司馬以副之左右陳行戒我師旅者左右陳其行列而戒敕之鄭箋使循淮水之浦涯省察徐土之動靜毋得規便趨利致失機宜蓋師未行而廟算定也三事即所謂三事大夫者箋謂三農之事今用毛義王師之出六卿皆有職掌各行飭辦事事就緒田間可以馬到成功不致淹留久處此亦命休父之辭言軍需齊備無虞缺乏汝但稟承節度早致凱旋可耳田間謂命三事者非三章述王師啓行也首言赫赫明明者聲靈之逺加此言赫赫業業者威令之振肅故曰有嚴天子也詩貫舒徐也保安也毛傳作行也鄭箋紹糾緊也遊遨遊也集傳嚴則疑於紹而匪紹也舒則疑於遊而匪遊也徐方初聞王師之出便已絡繹騷動及王師漸次近淮先聲所播有以震動驚懼之如雷霆之發未加於物而徐方則已震驚矣詩貫所謂先人有奪人之心也四章述王師駐淮也王奮其威武而雷霆其聲勃怒其色鄭箋前其虎臣如怒虓然毛傳厚陳其兵於淮水之涯岸孔疏就執其衆而囚係之孫臨蓋於淮濆立營壘也淮北諸夷與徐鈎結必有為之細作以探軍情者抑或徐人伏匿於此欲為窺伺之計行兔脫之謀故就執之以破其姦非臨敵也箋以為臨敵又以為執降皆非也截斷也説文猶堵截也古義堵截淮浦而駐師其所者一以斷其聲援一以防其奔逸田間此即命將時預定之規猶漢書所謂斷胸奴右臂也萬時華曰淮者徐夷出沒之地王師來自西北若惟直搗順攻不為東南壅絶之計彼將歷淮浮海而王師亦有所難及今師之所至不曰鋪敦淮濆則曰截彼淮浦彼不得越淮南下其來同也固其所哉此所以為王猶允塞也五章述移師征徐也詩緝淮上之醜虜既執師遂北指錢氏詩學謂必江漢之師已壓淮境而後進兵逼徐張氏詩貫謂王駐行在未嘗親至徐方或當然也嘽嘽間暇有餘之貌鄭箋此言移師在道之軍容如飛如翰迅疾也集傳如江如漢盛大也鄭箋如山包裹靜不可撼也如川長流動不可禦也張記綿綿不可絶翼翼不可亂也不測不可知不克不可勝也集傳濯征謂舊染汚俗一征而盡洗濯之古義所謂惠此南國也六章推本王猶言徐服而天下定也猶謀也集傳用蘇説訓猶為道今從毛傳允信也鄭箋塞實也集傳王謀信實者王以仁義行師既敬戒以惠南國而又老謀深斷周匝完固如截淮浦不留處之類也來歸附也來者未必同同則無不來故言來又言同也大將之敬戒副將之陳行虎臣之致果王旅之用命皆天子精神所鼓舞故曰天子之功也張記先言四方既平後言徐方來庭者宣王征伐四方皆已平定獨徐方未服今始來庭是來庭在四方之後也田間又曰徐方不回者中心誠服不復回轉猶言南人不復反也田間王曰還歸收應不留處句作結張元岵曰自赫赫明明至此何等氣勢而以王曰還歸四字收之真如金聲一震萬馬齊斂言外有武不可黷之意愚按夷厲以來威靈不振宣王親總六師出臨淮浦真有復覩漢官威儀之象然或將驕師老安得時雨其蘇先之以敬戒申之以不留處而皆本於謀之允塞可謂王者之師矣朱公遷謂中興之功非威武不能致殷武之頌髙宗亦然此常武之義也楚語觀射父云重黎氏世敘天地而别其分主其在周程伯休父是也當宣王時失其官守而為司馬氏郡國志雒陽有上程聚古程伯休父之國一統志直𨽻鳯陽府泗州古徐子國徐城在州北五十里玉海徐嬴姓伯益佐禹有功封其子若木於徐黃才伯曰禹貢曽氏解云淮源出於豫境至揚徐之間始大其泛濫為患無在徐州則自豫至淮皆有淮浦而鎬京又在豫西欲至徐必取道於豫故率淮浦省徐土就所經之淮浦言鋪淮濆截淮浦就所至徐州之淮浦言瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷屆罪罟不收靡有夷瘳人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織天何以刺何神不富舍爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後一章瘵側例反二章有與收韻奪與説韻田人罪隔韻四章忒慝識織韻背倍事隔韻五章富方二反六章隔句韻七章後音戶鞏音古後鞏祖後韻旻天疾威天篤降喪癲我飢饉民卒流亡我居圉卒荒天降罪罟蟊賊內訌昏椓靡共潰潰回遹實靖夷我邦臯臯訿訿曽不知其玷兢兢業業孔填不寧我位孔貶如彼嵗旱草不潰茂如彼棲苴我相此邦無不潰止維昔之富不如時維今之疚不如兹彼疏斯稗胡不自替職兄斯引池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不災我躬昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊詩貫茂音每五章富方二反疚音几詩貫引轉音以六章頻轉音蓬七章舊音忌里哉舊平上去通二篇序皆謂凡伯刺幽王大壞集傳則以瞻卬刺王嬖褒姒任奄人召旻刺王任用小人今按首篇以刑罰之濫致人亡蟊賊罪罟未嘗不言小人而以褒姒為主次篇以飢荒之困至蹙國內訌自中未嘗不兼褒姒而以小人為主奄人居宫府之間相倚為姦亦時所必有特非詩意所重耳國語史伯曰虢石父讒諂巧從諛之人也而立以為卿士與剸同也棄聘后而立內妾好窮固也侏儒戚施實御在側近頑童也周法不昭而婦言是行用讒慝也不建立卿士而妖試幸措行暗昧也可與此二篇互證瞻卬一章言天降大厲以亂國也大厲指褒姒三章維厲之階承此説也填與塵同釋文塞也説文天不我愛人心抑塞不安又降此大惡之人以敗亂之使邦國騷擾而士民皆病如蟊賊之疾害禾稼無有止息者然鄭箋罪罟不收靡有夷瘳即蟊疾靡屆之實蓋此輩張設網羅不加收斂前痏新創繼續而起無復平愈之期故靡屆也鄭箋以四句排講蘇氏遂以蟊賊罪罟為兩義後儒至析下章語分承之何黃如又以蟊賊指小人蟊疾指褒氏穿鑿破碎益不可據二章申言罪罟不收之事酷由於貪故先言奪人所有後言出入人罪兩人字指諸侯卿大夫鄭箋此彼字則兼士民言也古義上四句是罰下四句是刑刑罰顛倒如此所謂蟊疾也三章推原禍本在褒姒也士多才智則能興國婦有才智則能傾國本義今王以哲婦為美而嬖之適使為妖亂如鴟梟而已工於語言為長舌褒姒之所以能為厲者以有長舌為之階田間易繫辭傳亂之所生也則言語以為階語意略同諸儒皆以厲為亂以階屬褒姒似與有長舌不蒙下句亂字亦復今從箋訓厲為惡向以天不惠我而降亂由今觀之亂匪天降也生自婦人耳蓋婦人與奄寺相倚其性隱鷙意之所極不可以情理諭止匪教匪誨者猶言不可教誨云爾舊説未融四章言婦寺鈎結外廷干預朝政借罪罟以罔利也鞫窮也鄭箋窮理罪人也説文忮害忒變也毛傳譖不信也鄭箋不信猶誣也竟終也鄭箋以忮害之心鞫人而出以變詐始誣以罪終又自反其辭即所謂收無罪説有罪者政以賄成故也此其為惡豈不已極而王且曰是胡足為慝也高鼎熺詩説方且張設罪罟奪人所有如賈收三倍之利焉君子斥幽王舊謂通指在位竊意在位之人詩方斥為蟊賊安得復以君子稱之是識者利析秋毫之謂即所謂有土田奪民人者史記言虢石父善諛好利王用之此其證也末二句結到婦人休蠶織而預公事則前文所稱咎有所歸洵乎亂之生自婦人矣此章與第二章相承又歸責於君子之識利以起下章也舊解未融五章乃専責幽王也刺責富福也毛傳介大也集傳天何以責王而見變異神何以不福王而有災害鄭箋王不反躬修省將有敵國之大患舍之不忌而惟豫忠言是忌乎不弔不祥不畏於天也威儀不類不敬其身也解頤善人又復廢退無人輔之則國之殄瘁宜矣集傳此章與第一章相承令王自思昊天不惠之故又特提介狄以致驚覺蓋驪山之禍詩人已逆覩之矣萬氏輔慶源曰女禍之烈也自古寵任婦人多致外患之起六章承上章而重人亡之痛也罔罟也毛傳即首章所謂罪罟上章所謂天刺也天降禍以為網羅詩緝多而且近惟賢人庶可救耳人之云亡其憂且悲也何可以言喻哉七章望其悔悟改圖法祖以自救也以湧出之泉所由者深喻憂所從來者久鄭箋蓋自褒姒初進已憂之矣徐光啓不自我先不自我後怪其何故正當之也鄭箋又言天雖髙逺無不可以固之之理王苟大改前轍不辱其祖宗則往不可諌來猶可追所謂式救爾後也詩緝愚按凡伯拳拳之忠尤在無忝皇祖一句蓋皇祖化始刑于故鐘鼓之奏叶於房中內助之功參於十亂幽王乃寵信邪媚之婦煽其妖椓豈不辱及皇祖詩人之意蓋在黜褒姒以絶禍本為皇祖一洗其辱與泛陳念祖者不同召旻一章言嵗飢民散中外皆困也天仁閔下覆而今迅疾其威怒即前篇天何以刺也天篤降喪以下皆疾威之實居國中圉邊境也鄭箋居圉卒荒雖據飢饉流亡言而日蹙之勢已成矣二章言天災由於用小人也天降罪罟即前篇天之降罔呂記訌潰也毛傳謂惑亂也昏椓奄人也昏其官名椓謂毁隂者也鄭箋蟊賊之人交通褒姒以相惑亂為奄寺者曽莫供其職事為之禁斷古義言其表裏串結潰潰然惟邪是行蘇氏而王乃使之治平我邦集傳所謂小人之使為國家也三章言用舍倒置也臯臯頑不知道也訿訿窳不供職也毛傳小人情狀如此王曽不知其玷缺而兢業供職之人甚久不寧且至貶斥其位十月之交云黽勉從事不敢告勞無罪無辜讒口囂囂正謂此也四章申首章之義詩所而重致嘆憫也潰遂也毛傳如彼嵗旱草不遂生而茂盛謂癲我飢饉也如水中浮苴逐水而棲毛傳謂民卒流亡也此邦即蟊賊靖夷之我邦相視之而無不潰亂謂居圉卒荒也詩緝邶谷風有洸有潰潰怒也小旻是用不潰于成召旻草不潰茂潰遂也潰潰回遹無不潰止潰亂也項氏云水之潰者其勢橫暴四出故怒之盛者為潰怒遂之盛者為潰遂亂之盛者為潰亂皆一理也五六兩章申二章三章之義詩所而歸責於王也昔富仁賢今富讒佞毛傳是維昔之富不如時也今則病賢毛傳亦未有如此之甚者詩緝是維今之疚不如茲也疏粗稗精猶君子小人之不同蘇氏彼小人也斯君子也小人曷自替廢以避君子乎集傳兄況同兹也毛傳小人之不替主於兹之引而用之謂王也詩所小人日用則內外耗竭頻崖也毛傳池水由外灌而溢今竭矣而以為不由於外泉水由中注而滿今竭矣而以為不由於中喻內外交訌而王不知也溥遍也鄭箋自內至外害無不遍而王益寵任而𢎞大之有不災禍及于我躬者乎為王言之而曰我躬者猶曰我居圉我邦云爾七章欲王用賢以救亂也先王謂文武召公召康公奭也鄭箋日辟日蹙以國勢言借百里以形容之耳古義文王化行南國武王遂有天下召公助流政教與有力焉今則犬戎內侵諸侯外叛所謂辟與蹙者蓋亦有其事矣又嘆息哀痛而言今世雖亂豈不猶有舊德可用之人乎集傳蓋猶望王之用之也誠用之則必去蟊賊易昏椓而專委任焉則天威霽而飢饉消居圉不至卒荒矣詩人所為垂涕泣而道也按前篇言人之云亡或以罷黜去國或以知幾逺遁非盡死亡也本篇所稱兢兢業業孔癲不寧者非其人與至於易世而罔或耆壽俊在厥服則此等舊人終於淪棄藁項巖穴久矣豈不惜哉蘇傳謂首章稱旻天卒章稱召公故謂之召旻序下言閔天下無如召公之臣衍説也劉安成曰此詩居變雅之終第七章又居此詩之終慨然有懷文武召公之盛以見亂極思治之理其亦猶下泉之終變風與王半山曰詩始二南故國風終於美周公二雅終於思召公潘笠江云瞻卬言內惑於嬖妾召旻言外嬖於小人蓋內有褒姒之寵則外無召公之臣低昂輕重之勢如持衡然故曰後宫色盛則賢者隱微羣婢倡言則善類喑啞邦國殄瘁恆必由之二詩非萬古永鑑哉愚按小雅刺幽諸篇危辭切指讀之悚然神驚大雅刺厲幽之詩立意正同而辭氣特加包涵非獨稱天述祖為能得其大也左傳稱曲而有直體一言為知其季札之謂矣虞東學詩卷十
