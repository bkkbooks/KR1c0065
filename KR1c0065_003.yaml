body:
  text: 虞東學詩卷三宗人府主事顧鎮撰王先儒以王風係平王猶以周南召南係二公其失同也周為周之南召為召之南王則澗水東瀍水西之王城皆以地言不應從人立説曲言黍離降風也通志云王為王城東周之地豳為豳風西周之地七月者西周之風黍離者東周之風論最直捷按洛誥周公曰我卜澗水東瀍水西惟洛食此召公所相宅名曰王城以會諸侯漢之河南是也我又卜瀍水東亦惟洛食此周公所營名曰成周以處殷頑漢之洛陽是也康成謂封域在禹貢豫州太華外方之間疏云外方即嵩髙金仁山謂河南府伊陽縣之西陸渾山乃嵩高之連峰據此則自河南伊陽直接陜西華隂縣皆東都之境虢國桃林之野在其內矣西虢康成又言北得河陽漸冀州之南疏引左傳襄王賜晉陽樊溫原之田晉於是始啓南陽是未賜晉時為周畿內也春秋大事表言申國在南陽府治南陽縣吕國在府治西三十里國語當成周者南有申吕自楚滅申因裕州方城山為固與王城逼近則申吕為王城南户而虞虢其北戶也漢志云初洛陽與宗周通此宗周以豐鎬言東遷後洛亦名宗周衛孔悝鼎銘即宫於宗周封畿東西長南北短短長相覆千里臣瓚案西周方八百里八八六十四為方百里者六十四東周方六百里六六三十六為方百里者三十六二都方百里者百方千里也宛溪顧氏曰周自平王東遷尚有太華外方之間方六百里之地其時西有虢據桃林之險通西京之道南有申吕扼天下之膂屏東南之固而南陽肩背澤潞富甲天下轘轅伊闕被山帶河地方雖小亦足王也故桓王之世猶能興師以號召諸侯虎牢屬鄭仍復收之至惠王始與鄭以武公之略張弛自如皇綱未盡絶於天下也而孱弱不振日朘月削楚滅申而東南之蔽失晉滅虢而西歸之路斷至襄王以溫原畀晉而東都之事去矣詩人所嘆息痛憾於日蹙國百里者其以此歟彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者為我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉苗搖韻離靡隔韻憂求轉韻天人又自為韻序曰閔宗周而下言大夫行役至宗周過故宗廟宫室盡為禾黍季本謂以事理推之未必盡然所見黍離當在野外錢天錫亦謂岐周故地盡以封秦不應鞠為禾黍此惑於鄭氏秦譜橫有西都八百里之説以為秦不應毁廢本朝宗廟宫室也案史記平王賜襄公岐以西之地曰戎侵奪我岐豐秦能逐戎即有其地是秦封在岐以西豐鎬在岐東為戎所據非秦有也終襄公世不能克戎至文公十六年逐戎始得至岐岐以東仍獻之周是豐鎬故都仍隸周境秦不得過而問焉特為戎殘破平王視同敝帚不復加葺銅駝荆棘固所不免史言殷墟城壞生麥則周墟黍稷理亦有之稷三易辭而黍文不變嚴華谷以為協韻者近之如桃夭摽有梅所咏豈必厯久更見耶此何人哉舊斥前人竊意作詩者詫歎平王之憖棄舊物而不顧也章首用兩彼字結語用一此字言彼固然已此何人而不加惜也補傳云序詩者道東周大夫過豐鎬故都不忍去之情狀簡短數言發明一篇終始之義至今讀之使人流涕誰謂序可無取哉毛不言興集傳謂賦而興恐亦是因所見以起興許氏鈔黍似粱而非粱稷今之穄也黍黃而稷黑黍小而稷大朱子解二物似差互今以傳文兩易之恐得其實蔡氏解黍榖也聲與暑同仲夏乃登故謂之黍而説文則謂大暑而種愚按月令登黍之文當從蔡説黍離降風辨見詩説君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣牛羊下括君子于役苟無飢渴哉音資來音釐序謂刺平王而衍者言大夫思其危難以風讀詩記曰考經文不見思其危難以風之意董􅓉詩故謂大夫妻賦此集傳所本也今按篇中以雞之棲牛羊之下為言似非貴家氣象質疑以大夫托為行役者室家思念之辭恐或然也曷至哉箋謂何時當來至與不知其期為一義集傳謂今亦何所至哉本李迂仲乃以地言以下章例之箋説是也各有作息之期而行役不休詩人所以刺也先羊後牛者埤雅言羊性畏露晚出早歸常先於牛也有佸之佸毛訓會下括之括毛訓至集傳皆用之陸奎勳曰牛羊有欄括其關扄太玄羡首四馬就括非其證耶康樂詩云朝遊牛羊下暮來括揭鳴亦是此義苟無飢渴者所謂萬里之外以身為本也後漢書爾雅鑿墻而棲曰塒又雞棲於弋為桀釋文弋亦作杙君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且末句不入韻黍離閔宗周西周也此言閔周則東周矣君子遭亂相招為祿仕許東陽謂仕於伶官如簡兮比是也詩緝曰當是之時貧且賤焉非恥也故不以閔君子而閔周執簧執翿備聲容之器由房由敖則歌舞之地也房當如傳言房中之樂敖則燕舞之位鄭箋在於房也疏曰簧笙管中金薄葉也鄭司農云笙十三簧劉熙云大笙十九簧疏又曰鄭譜言此路寢之樂謂路寢之下小寢之內作之也蓋路寢以聼政小寢以燕息下箋以燕言之明不在路寢按儀禮記燕朝服於寢又云有房中之樂注曰燕于路寢相親昵也與鄭譜合孔疏殊繆爾雅翿纛也注曰今之羽葆幢又翳也注曰舞者所以自蔽翳宛丘箋謂翳舞者所持以指麾陳祥道引春秋傳舞師題以旌夏言以纛與旌引二舞者其説信已而此箋又謂羽舞按羽舞析衆羽為之非纛也燕舞自用旄舞當以宛丘箋為正揚之水不流束薪彼其之子不與我戌申懷哉懷哉曷月豫還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉薪申楚甫蒲許為韻水子隔韻懷歸轉韻本通此詩之指當以歐陽本義為正彼其之子謂諸侯國人之當戍者王不能令而勤畿內之民故以揚水之不能流物為興非戍人指其室家也蔣氏蠡測云以國風事類考之彼其之子凡五未有目其室家者况征戍之人初無携室同行之理故集傳不如本義之得也毛以揚為激揚而箋以湍迅申之失其義矣張子解為悠揚亦似強從我解蘇氏曰水之能自流者物斯從之水不能自流而或揚之雖東薪之易流亦不流矣於義為得三國同戍而孔疏乃謂所戍惟申言甫許者以其同為薑姓重章變文借以為言其實不戍甫許先儒因之遂有忘親逆理知母不知父之論義雖正大恐未審於當日之形勢也按申甫之地皆在南陽許亦近隸開封唇齒相連同為洛邑東南門户而楚方橫行南服逼近申吕即甫時加侵擾以為北窺之計至於桓莊之世滅申滅吕許亦役服於楚南陽汝寧之境悉為所有遂平步以窺周疆矣故在宣王之世即有築城之役至於東遷尤不得不亟守門户以蔽東南縱非母家豈容憖置然彼時皇綱尚未盡絶平王果能奮勵自強以申司馬之法則晉之義和鄭之掘突皆綽有英略可號召以敵王愾楚氛雖惡安敢上抗威稜何藉於戍即不得已而遣戍亦當使方伯連帥供其役何至役畿內之民以衛侯邦詩人所以怨思於平王之微弱也近日宛溪顧氏作春秋大事表極論東周之可為余為本其義而著之詩閻百詩潛丘劄記云案潛夫論申在南陽宛北謝山之下故詩云亹亹申伯于邑于謝宛西三十里有吕甫即吕也又齊世家注司馬貞曰南陽宛縣申伯之國吕亦在宛縣西顧景范方輿紀要云許州府春秋時許國魏曰許都改曰許昌蒲有二義毛訓草鄭訓蒲栁孫育云蒲草之聲不與戍許相協箋義為長今二蒲之音無考姑從質疑作平去通中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣修嘯平去通淑轉殊留反黽勉有無夫婦之義飢饉相棄人道絶矣詩人以為風俗衰薄其來有自補傳故不暇責其人而但曰閔周也全篇以嵗旱草枯興飢年之憔悴蕭索無潤澤氣象詩緝首言蓷生中谷宜可耐旱今生於乾土者已燥興飢饉則貧者先悴也次言生而長茂者亦燥三言生於濕地者盡燥則貧富皆憔悴矣詩緝參補傳因此而致仳離則時之艱難不淑為之不淑猶云不幸詩緝詩故曰古傷死者之詞曰如何不淑是也啜其泣矣何嗟及矣言事已至此未如之何也吕記三言有女仳離似屬閔者之詞非必其女自作舊説以蓷草宜生髙陸生谷中則傷於水傳義非也韓詩及三蒼説悉云益母益母茺蔚也據本草茺蔚生海濵池澤其性宜濕詩緝參陸璣疏馮復京曰毛傳蓷隼又大車傳菼隼考諸書茺蔚子並無隼名豈毛以蓷為菼乎然則何以又謂之陸草有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰為古音訛罹古音羅罦爾雅釋文孚浮二音此音浮造覺上去通平集傳叶從造韻非是此與上篇俱為閔周而衍者綴以桓王失信云云朱子辨云君子不樂其生一句得之餘皆衍説其指桓王蓋據春秋傳鄭伯射王中肩之事然未有以見此詩之為是作也今從集傳蓋兔脫而雉罹以興小人致亂而幸免君子忠直而被禍詞義坦白而毛言政有緩急非其義矣鄭以逢百罹為遇軍役之事亦是附序立説疏謂免爰本在葛藟之下但簡劄失次耳因此序言桓王下序言平王也既不用衍序則篇次相從正得集傳為比今從毛作興爾雅繴音璧謂之罿音衝罿罬音輟也罬謂之罦罦覆車也郭注今之翻車有兩轅中施罥以捕鳥一物五名展轉相解綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧綿綿葛藟在河之涘終逺兄弟謂他人母謂他人母亦莫我有綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞滸父顧上去通涘音矣母音米有音以春秋文七年傳宋昭公欲去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶庇其本根故君子以為比况國君乎序謂王族刺平王此可證矣章首三用綿綿字便見屬系不可斷絶意箋以葛藟之托於河潤反興兄弟之不蒙恩澤似於庇本根義未徹而左傳亦不著在河之義吕記嚴緝以為生非其地失之矣李迂仲獨取王荆公説謂河滸水所蕩危地也潤澤葛藟而生之亦所以自固按陸農師亦有是説與左傳鄭箋義正相入終逺兄弟謂他人父蓋謂兄弟乃同父所出今王終逺兄弟則不以我為同父之人而使謂他人父將誰顧我乎他人不可謂父則兄弟不當終逺是亦煮豆然萁之痛下二章倣此箋疏未融集解引蘇王説謂平王以他人為父則指斥過甚矣葛藟見周南爾雅滸水崖又涘為崖又夷上灑下漘李巡曰平上峭下故名漘彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三嵗兮龍為霖本韻蕭古音修讒口傷人每乘其間故曰一日不朝其間容刀如上官桀等之謀譖霍光石顯等之謀譖蕭望之皆伺其出沐是也集解葛善攀附蕭艾則離騷所斥者蓋指讒言也采之者以興君之聼讒詩人以采葛采蕭采艾皆積少以成多如王聼讒皆積微而成惑歐義蓋人之譖人多因其不見李解一日不見如三月三秋三嵗之久見情疏而讒易入所以可懼不當如鄭箋以采葛為出使也集傳指為淫奔而列之賦不若懼讒之説之安故仍從毛傳為興史雪汀風雅遺音云蕭非荻也荻安得有香氣今爾雅並沿為荻惟釋文是荻字辨見許鈔大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔穀則異室死則同穴謂豫不信有如皎日此所謂道之以政齊之以刑者曰不敢曰不奔而猶以同穴申其誓所謂免而無恥也集傳得之序曰刺周大夫蓋刺其不能以德禮化民陳古刺今衍説無當按司服子男之服自毳冕而下此大夫四命出封加等為五命或子男入為大夫得服毳衣也毳衣三章宗彝也藻也粉米也裳二章黼也黻也書曰班宗彛孔注宗廟之彝也衣以彝為章虎蜼在焉故也康成則謂毳畫虎蜼因號宗彞其實虎蜼而已陳祥道曰康成之言非也書大傳宗彛白宗彞則白而虎蜼各象其色耳又曰大夫玄衣纁裳詩曰如菼菼之初生其色玄言其衣也詩又曰如璊璊之為玉其色赤言其裳也許鈔云蜼位柚壘三音丘中有麻彼留子嗟彼留子嗟將其來施施丘中有麥彼留子國彼留子國將其來食丘中有李彼留之子彼留之子貽我佩玖嗟音磋施音沱玖音几賢者隱居丘園之間植麻麥果實以為生民思之而望其來蘇氏猶白駒枤杜之義也施施毛以為難進據孟子文無難進義箋訓舒行為得來食疏繹箋義謂思賢之至欲飲食之也貽我佩玖詩人多以玉比德言有美德以及我也補傳傳曰留大夫氏子嗟字也子國子嗟父正義云毛時書籍猶多或有所據今考桓十一年公羊傳古者鄭國處於留及遷鄭而野留是留亦東都畿內地至祭仲省留途出於宋而被執則留又錯入宋境矣當時疑有食采於留而子孫以為氏者馮復京曰留古劉字今河南緱氏縣有劉聚周劉康公劉夏劉摯劉狄皆食采於此若襄元年楚子辛侵宋吕留則屬彭城非此留也路史訛鄭朱吕鄭風之説前人以為未了公案蓋朱子所執者論語鄭聲淫一語諸儒則謂聖人所放是聲非詩因博引禮記師乙之論及左傳韓宣叔向季札之言以證鄭詩之非淫論既章已抑猶有未盡者荀子曰詩者中聲之所止也聲音之道大不踰宫細不踰徵宫徵皆中聲也不踰之所謂止也此之謂雅音也淫者反是淫之為言溢也其聲流蕩而不能止也丹鉛録曰水溢於平曰淫水雨過於節曰淫雨聲濫於樂曰淫聲樂記所謂流辟邪散狄成滌濫之音是也狄成云者言樂之一終甚長若古之曼聲胡氏紹曽曰都曼之聲音調婉凄弄引煩雜所謂靡靡之音使人蕩溢流連不克自禁故謂之淫之二説者可謂明辨晳矣然則鄭聲之淫非盡男女邪僻之謂也昔紂使師延為淫樂流傳東土鄭人得之仿寫其聲而世皆悅焉蕭魚之會至以師悝師觸師蠲比雜歌鐘女樂以為上賂行於諸侯晉宋之君皆為惑溺夫子所以惡其亂雅而欲放之如以其詩則鹿鳴四牡之和雅文王大明之莊肅與夫東門溱洧之淫蕩黑白星淵開卷即得何以曰似是而非惡其相亂乎蔡氏尊卜云先儒皆云衛以男恱女鄭以女恱男鄭風之淫甚於衛然鄭風二十一篇惟東門之墠後序以為不待禮而相奔其實序但云刺亂野有蔓草後序以為男女失時思不期而會其實序但云思遇時溱洧後序以為兵革不息男女相棄淫風大行其實序亦但云刺亂所云女恱男者不知於何見之即有其事抑不過閭閻細婦禮教不及者之所為耳有若桑中之世族在位相竊妻妾乎有若匏有苦葉新臺之上蒸庶母下納子婦乎有若墻有茨君子偕老鶉之奔奔之母子為夫婦公然生子相繼為君乎不特衛也齊風之南山敝笱載驅兄妹宣淫至殺其夫矣鄭有之乎陳風之月出株林澤陂君臣聚淫見殺於其子矣鄭有之乎乃夫子曰鄭聲淫而子夏亦言鄭音好濫淫志反不及衛齊陳何也曰淫其聲也非淫其詩也其言暢達實補諸家所未備今考朱子集中亦謂舊説不可廢是朱子原無意必於其間也竊因前人訓釋淫字之義合之荀子中聲之説而并述蔡氏之論如此若以先儒未定之案而欲自今定之則我豈敢案鄭本西周畿內咸林之地宣王封其母弟友於此是為桓公幽王時為司徒用史伯計寄帑與賄於虢鄶東虢圖取其地及死犬戎之難其子武公掘突從平王東遷遂滅虢鄶而居之右雒左泲前華後河食溱洧焉謂之新鄭今開封府之祥符蘭陽中牟陽武鄢陵洧川尉氏鄭州河隂汜水滎陽滎澤禹州密縣新鄭兼涉杞縣與楚界陳留與陳界封丘與衛界又闌入衛輝府之延津河南府之登封陳州府之扶溝懷慶府之武涉歸德府之睢州其闌入直隸大名府之長垣者為祭仲邑周之東也鄭為重晉楚日相尋焉故次王漢書地理志云土狹而險山居谷汲男女亟聚會故其俗淫緇衣之宜兮敝豫又改為兮適子之館兮還豫授子之粲兮緇衣之好兮敝豫又改造兮適子之館兮還豫授子之粲兮緇衣之席兮敝豫又改作兮適子之館兮還豫授子之粲兮席古祥籥反此武公入仕於周而周人美之吕記宜稱也集傳緇衣卿士聼朝之正服毛傳孔疏朝王不服緇衣退適私朝乃服緇衣以聼政敝改為兮顧其常居此位常服此服也武公既定王室受封新鄭入為卿士服是緇衣而來善其德足稱之故言服之安美而尊大也館如覲禮賜舍之舍授粲如聘禮致饔餼米禾之類武公有大功於王王所倚賴蓋嘗親臨其館駕旋而授粲故詩人託為王言以寫綣慕無窮之意箋訓適還義迂曲集傳謂詩人自言恐適館授粲非民所得施於上者席訓大釋詁文程子改訓安舒未詳所據考工記三入為纁五入為緅七入為緇粲粟治之精者王氏説文稻重一䄷為米六斗大半斗曰粲將仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懷也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也母音米兄虛王反懷畏平去通仲子祭仲也毛傳嚴緝云國人知公與祭仲有殺段之謀乃反其意設為公拒仲之辭云云以天理感動之公論開悟之耳愚謂前三句似反其意後五句實誅其心吕記謂辭雖拒而意實與如寺人僚柤告昭公以去季氏之謀公執戈以懼之之類也畏我父母即薑氏欲之之義三言仲可懷二人之隂謀自見疊下三言字三畏字則所顧惜者此耳至聞襲鄭之期而伐之則父母兄弟國人皆不能言而公乃無畏矣衍序言小不忍者大謬陸疏杞栁屬生水旁樹如栁葉粗而白理微赤今人以為車幹集傳里之地域溝樹也王應麟曰杞有三無折我樹杞栁屬也南山有杞在彼杞棘梓杞也集于苞杞言采其杞隰有杞桋枸檵也古義桑亦木之韌者陸疏檀木皮青滑澤材強韌可為車按三木皆以比段於里言杞於牆言桑於園言檀不惟取韻義亦相屬詩之謹細如此叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩卷無飲酒豈無飲酒不如叔也泃美且好叔適野巷無服馬豈無服馬不如叔也泃美且武野音渚馬音姥叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉袒裼暴虎獻於公所將叔無狃戒其傷女叔于田乘乘黃兩服上襄兩驂鴈行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌田藪狃不入韻射音樹鴇從爾雅改作駂弓古音肱二三章後四句皆兩轉韻序皆刺莊公而衍者一云國人説而歸之一云不義而得衆非也段何能得衆國人亦何嘗説而歸之子封伐京而京叛大叔矣二篇皆其私黨相眤之詞前篇以于田為仁飲酒為好服馬為武後篇所矜者袒裼暴虎也所賢者射御足力也可知從臾誇耀不出少年徵逐服馬飲酒之儔而國人早已心非之矣然詩意刺莊公不在刺段公實欲厚其毒而先後説都以公不知禁為言恐見表不見裏也藪澤也鄭有圃田蓋在圃田也火烈具舉即爾雅所謂火田疏謂宵田者失之暴虎而獻於公傳謂從公田者是蓋叔有示勇於公之意而公亦隂縱之大夫種所謂廣侈吳王之心者詩人已微窺之將叔無狃戒其傷女蓋亦略示端倪矣騁馬曰磬止馬曰控言良御也發矢曰縱從禽曰送言善射也集傳改為舍拔覆彇拔為矢末猶發矢也彇即簫弓之梢末所謂弭也既發矢則弓隨勢倒直指於前以送矢嚴緝謂後手絶音蕝而前手攧也馬慢發罕而釋掤鬯弓言整暇也嚴緝云如庖丁解牛提刀而立為之四顧為之躊躇亦可想叔段洋洋之意矣後篇題加大字所以志别蘇讀如字許鈔音泰案古本首章原有大字吕嚴本俱仍舊爾雅驪白雜毛駂郭曰今之烏驄掤左傳作冰矢筒蓋鬯小戎作韔弓囊清人在彭駟介旁旁二矛重英河上乎翺翔清人在消駟介麃麃二矛重喬河上乎逍遙清人在軸駟介陶陶左旋右抽中軍作好彭古音旁英古音央後並同軸轉音儔龍氏本韻陶讀繇閔二年傳鄭人惡高克使帥師次於河上久而不召師潰而歸髙克奔陳鄭人為之賦清人衍序者本其説也謂公子素作是詩疑亦有本然不可考矣時衛方有狄難鄭與衛鄰恐其渡河侵軼故使克禦之河上狄退而克不召春秋書鄭棄其師孔疏詩極陳玩師不恤國事之狀以著棄師之本序曰刺文公春秋之志也清人克所將清邑之衆杜預春秋釋地中牟縣西有清陽亭水經注清陽亭南有故清人城彭消軸舊説以為河上地今無所考姑闕之陶陶之義宜屬乘駟介之人説旁旁麃麃合從一例箋云二矛酋矛夷矛也各有畫􅎖按考工記廬人職六建既備車不反覆注曰六建五兵與人也五兵者戈也殳也戟也酋矛也夷矛也酋短夷長短長重纍故曰重英喬爾雅釋為髙毛訓纍荷蓋二矛同髙其髙復有等級謂此二矛刃有髙下重纍相負揭孔疏箋謂喬矛矜近上及室題所以懸毛羽疏言經傳不言矛有毛羽集傳謂矛之上勾曰喬按考工矛乃刺兵非勾兵也又爾雅矛冒也刃下冒矜也亦不言勾惟許慎有矛象形之説當以爾雅為正左旋右抽疏謂此將所乘車耳將在鼓下故御在左若士卒兵車則左人持弓右人持矛中人御也羔裘如濡洵直且侯彼其之子舍命不渝羔裘豹飾孔武有力彼其之子邦之司直羔裘晏兮三英粲兮彼其之子邦之彥兮侯音胡每章次句毛鄭指人而以三英為三德集傳則指服説竊意文雖指服而意實指人洵直且侯從如濡取義言其毛理之順色澤之美正以見大夫之正直而有文也洵直即含下司直意且侯即含下邦彥意舍命不渝乃直美之實也孔武有力從豹飾取義言稱是服者之有是武力是以能主國是而不搖補傳所謂洵直也三英粲兮從羔裘之晏取義言稱是服者之有是文采是以為邦家之彥士所謂且侯也而能安處其命而不變亦從此見矣范逸齋曰五紽五緎五總皆所以英裘故謂之三英疑或然歟毛以晏為鮮盛貌詩緝直訓為安其義較確序曰刺朝而衍者稱古之君子則亦陳古刺今之作此詩疑當為興遵大路兮摻執子之袪兮無我惡兮不寁故也遵大路兮摻執子之手兮無我魗兮不寁好也首章平去通次章平上通路字不入韻魗本音讐疏云魗與醜古今字當即讀為醜與手好為韻莊公失道君子去國國人思而望之於其循大路而去也持其袪以留之曰無惡我而不留故舊不可以倉卒而遽絶也朱子舊説下倣此不言惡公醜公而言惡我醜我立言之體也寁毛訓速嚴申其意曰猶言倉卒也陸堂以為方音近是故故舊集傳好舊好蘇傳以先君之義諷之庶其或留也嚴緝離騷云惟黨人之偷樂兮路幽昧以險隘今云遵大路則君子坦蕩矣故應從序也吕記曰武公之朝蓋多君子矣至於莊公尚權謀専武力左右前後無非祭仲髙渠彌祝𣆀之徒君子安得不去之乎女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳧與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之宜魚何反贈韻未詳詩總聞云贈乃貽之誤此詩之義箋疏迂曲集傳得之王氏質曰此詩婦為主辭子興視夜以下皆婦人之辭蓋詩人刺時好色而不恱德乃陳古賢夫婦相警勵以勤生之語本義將翺將翔舊主人舊於義未融陸農師言鳧鴈常以晨飛則翺翔當指鳧鴈古義婦勉其夫謂此時當有鳧鴈翺翔何不起而弋之弋之以歸而我以中饋之職調和滋味以飲酒相樂集傳將白首相要如琴瑟之在御莫不安靜而和好矣又言知子之來相和好者當有以贈報之以勉其夫不獨厚於室家又當尊賢友善而因物以結之所謂恱德而不好色以刺時之不然也本義爾雅鸍音思沉鳬郭曰鳬似鴨而小鴨則爾雅以為舒鳬鶩也李巡曰野曰鳬家曰鶩又爾雅鳬鴈醜其足蹼其踵企郭曰腳指間有幕蹼屬相連飛則伸其腳跟宜集傳謂和其所宜內則云牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽問毛傳謂遺也左傳衛侯使人以弓問子貢雜佩毛謂珩璜琚瑀衝牙之類吕與叔謂鐫燧針管帉􅍤凡可佩之物范逸齋曰是詩為民俗而作當以後説為是有女同車顔如舜華將翺將翔佩玉瓊琚彼美孟薑洵美且都有女同行顔如舜英將翺將翔佩玉將將彼薑孟薑德音不忘車音姑華音敷英音央首章翔薑隔句韻山有扶蘇隰有荷華不見子都乃見狂且山有喬松隰有遊龍不見子充乃見狡童蘀兮蘀兮風其吹女叔兮伯兮倡豫和女蘀兮蘀兮風其漂女叔兮伯兮倡豫要女吹古昌戈反彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮四詩皆言刺忽集傳改為淫奔以其詞佻而意昵也然按左傳六卿餞韓宣子子旗賦有女同車子栁賦蘀兮皆有求助大國相與倡和之義若果淫詩豈有鄭人賦鄭詩而自彰其醜者如曰賦詩斷章則牀第之言不踰閾伯有之賦鶉奔何以見斥於趙孟耶田間同車刺忽不昏於齊故極陳齊女之美而忽不與同車同行為失大國之助也本義舊以同車同行為逆陳女者非扶蘇刺忽所美非美狂且狡童蓋指祭仲髙渠彌之流箋義秋風吹蘀其勢方危謂祭仲將倚宋逐忽而舉朝無倡義之人所謂君弱臣強不倡而和也故呼叔伯而告之言如有能倡者豫則為之和而要其成蓋憂之切而其詞迫也詩緝狡童刺忽朱子序辨極論之後人或援麥秀之歌為解則又不然本詩言彼狡童兮又言維子之故既以昭公為子又以昭公為狡童於文理亦欠順矣嚴緝曰為告忽言之故指狡童為彼而稱忽為子彼者薄之之詞子者親之之詞陳少南直以狡童目祭仲黃實夫善其説范補傳亦言彼祭仲者賤之子忽者親之蓋合扶蘇褰裳上下詩詞所指斥者總歸於一而當時擅權用事猖狂自恣者無過祭仲不當援麥秀之義以為斥昭公也或謂仲已老矣不應目為童華谷不知詩人之詞本難拘滯當時莊公諸子忽突亹儀生殺廢置惟仲欲為狂狡已甚老馬為駒不顧其後仲之謂矣謂之狡童固宜四章賦興毛傳集傳並同埤雅木槿一名舜爾雅紅蘢古其大者蘬圗經云葒草即水紅詩隰有遊龍是也陸璣云一名馬蓼補傳云山不惟有小木又有大材隰不惟有華又有草然則一國之大賢材無不有毛言髙下大小皆得其宜意正如此義屬反興箋説穿鑿説文凡草木皮葉落陊地為蘀箋謂木葉則説義未周不與我言食寫祭仲驕蹇自恣之狀而昭公専信任之不與賢者圗謀危難將及是以憂之不能餐息也詩人忠愛之至豈有目為狡童者乎子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且末句不入韻此篇詞意佻薄似屬可疑然六卿餞韓子太叔實賦此詩宣子曰起在此敢勤子至於他人乎義炳事白安能别為之説狂童恣行國人思大國之正已箋疏以突當之非也突非祭仲不得入君鄭數年復為仲所逐雖據櫟圗復重以四國之援繼之以魯終弗克納處櫟者十有八年卒以盟傅瑕復入而祭仲高渠彌傅瑕等生殺在手桓十七年髙弒忽莊十四年傅殺子儀置君如奕棋非所謂狂童恣行者乎此詩疑在忽被弒子亹初立之時故序不曰刺突忽而曰思見正明年齊人遂殺子亹而轘髙渠彌矣祭仲以智免是亦大國之正之也歐論云褰裳涉溱言非道逺而難至而鄭謂揭衣渡水往告以難豈無他人怨諸侯不相救恤耳而鄭謂先嚮齊晉宋衛後之荆楚衍説也亂臣賊子人人得而誅之縱爾不我思豈無聲大義以相正者李解惟狂童之狂已甚故望之切而怨之深也詩緝曰蘀兮望大夫相與扶持褰裳望大國之見正説文溱作潧水經潧水出鄭縣西北平地南入洧水洧水出密縣西南馬嶺山又東過鄭縣南潧水從西北來注之蓋古鄭城在今新鄭縣治西北潧水在北洧水在南亦鄭環衛國都之水也子之丰兮俟我乎巷兮悔豫不送兮子之昌兮俟我乎堂兮悔豫不將兮衣錦褧衣裳錦褧裳叔兮伯兮駕豫與行裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸巷古胡貢反東門之墠茹蘆在阪其室則邇其人甚逺東門之栗有踐家室豈不爾思子不我即即古子悉反二篇同為刺亂丰疏云鄭國衰亂婚姻禮廢有男親迎而女不從後乃追悔此陳其辭也坊記子云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者其即此詩之指與巷毛訓門外疏引叔于田傳謂之里塗蓋門外之里塗也堂即禮所謂主人升堂西面賔升堂北面者箋説非是後二章乃自言衣服之備欲變初志而從之詩緝士昏禮女純衣纁袇此言錦衣庶人妻也箋説或曰在塗之所服古義從衛風碩人箋禮又言婦乘車姆加景景即詩之褧也塗中所以禦塵婦人不殊裳此衣裳異文者疏云詩須韻句故别言之叔伯毛謂迎已者按叔伯非定稱禮舅姑皆有饗送者之文或此女自呼其送者駕而從之不待其迎歟東門之墠刺不待禮而相奔二篇皆女主其辭也東門之外有墠墠之旁有阪茹蘆生焉指其所欲奔男之處也詩緝東門之道有栗栗之下有成行列之家室繹箋意當為女子自述其處由下子不我即觀之箋意是也二篇俱從集傳為賦禮記注封土曰壇除地曰墠故傳云除地町町者爾雅茹蘆茅搜本草一名蒨其根可染絳阪邢氏謂陂陀不平而可種者踐毛訓淺集傳用伐柯傳改為行列其義乃當風雨凄凄雞鳴喈喈既見君子云胡不夷風雨瀟瀟雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜五公子之亂時事反覆士之隨勢變遷失其常度者多矣故詩人思見君子焉詩緝風雨雜至而如晦喻世之昏亂雞鳴在暗而思曙喻君子居亂而思治君子不改其度則世道可挽故見之而心悅如疾之去其體焉彚纂陸機演連珠云貞乎期者時纍不能行是以迅風陵雨不謬晨禽之察南史袁粲傳粲初名愍孫峻於儀範廢帝惡之迫之疾走愍孫雅步如常顧而言曰風雨如晦雞鳴不已所謂君子雖居亂世不改其度也集傳賦也今從毛作興青青子襟悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不來挑兮逹兮在城闕兮一日不見如三月兮佩讀如皮鄭國之人廢於學問由庠序之教不行後曰遂有欲毁鄉校者矣詩人之刺蓋在公子五爭之際朱子疑其詞意儇薄施之學校全不相似及作白鹿洞賦云廣青襟之疑問則仍從序説襟與襟同青襟青領也父母在衣純以青鄭箋士佩瓀玖玉而緼組綬赤黃色玉藻文也毛言青組綬猶大夫純組綬而鄭言緇組綬孔謂所讀本異者或其然歟子寧不嗣音毛以嗣為習韓以嗣為詒詒寄也謂不寄聲來問鄭用韓説挑達城闕間日遨遊無度本義云生徒分散朋友不復羣居不相見而思之之辭爾雅觀謂之闕指宫闕言此則城上髙闕揚之水不流束楚終鮮兄弟維豫與女無信人之言人實廷女揚之水不流束薪終鮮兄弟維豫二人無信人之言人實不信信音伸揚之水三章篇皆言水不能自流之意詳見王風讀詩記曰無信人之言非教之以不信人言也忽既微弱強公子復多其臣大抵懷二心而外市僅一二人實心向之者乃暗於情事不知所倚故提其耳而告之朱子舊説云所親者惟二人亦不能自保於讒間忽之所以亡歟序曰閔無臣者得之古義曰突以少奪長尚有會兵而謀納之者忽實伯兄當立乃自失位以至復國訖於被弒外不聞有鄰國之援內不聞有臣民之戴意其人必多猜忌於物無親者讀此可想見其大槩出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛此貞士閔亂而自申其志也前刺亂為刺淫亂則此閔亂亦閔淫亂衍者謬以亂為喪亂益以公子五爭兵革不息男女相棄云云質疑箋疏附之彌失其解吕記嚴緝並沿其誤當以集傳為正如雲如荼言冶容誨淫盡成習氣彚纂見風俗之敗惡也縞衣綦巾詩人自指其妻箋説猶曰荆叉布裙云爾詩緝説文巾佩巾也即禮記所謂帉恱闉曲城也闍城臺也毛傳荼乃茅草秀出之穗孔疏應劭所謂野菅白華者非苦菜及委葉二種按苦菜則邶風所謂荼苦委葉則周頌所謂荼蓼茹藘見前傳謂茅搜之染女服也鄭以衣既縞素不應復染改為染巾緣上縞衣綦巾言之此亦宜為巾故李迂仲引箋義曰染巾也野有蔓草零露溥兮有美一人清揚婉兮邂逅相遇適我願兮野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧首章平上去通序曰思遇時而衍者自出其東門以下三詩俱以兵革言之皆衍説也此序下云君之澤不下流民窮於兵革男女失時思不期而會焉吕記云澤不下流蓋講師見零露之意而附益之嚴緝云思遇時者厭亂而思治也不期而遇非詩意二説皆是至其解義仍沿箋疏則泥於有美一人之辭也記以邂逅為男女之會緝以邂逅為婚姻之成今以簡兮末篇例之則美人恐有别指清揚婉兮齊詩以美莊公則邂逅二字直作遇合解耳魏志崔琰傳注云大丈夫為有邂逅耳謝靈運詩邂逅賞人心與我傾懷抱古人用邂逅字多有屬君友者案左傳襄二十七年子太叔賦野有蔓草趙孟曰吾子之惠也昭十六年子齹亦賦此詩宣子曰孺子善哉吾有望矣韓詩外傳孔子遇程木子於郯歌此詩之首章似未可斥以為淫集傳賦而興也今從毛為與溱與洧方渙渙兮士與女方秉蕳兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以芍藥渙蕳平去通既且之且疏音徂與兩乎字為韻此即東門所謂如雲如荼者故彼序曰閔亂此序亦曰刺亂閔刺别者詩人語有含露朱子辨云鄭俗淫亂乃其風聲氣習流傳已久不為兵革不息男女相棄而然案韓詩薛君注鄭國之俗三月上已之溱洧兩水之上招魂續魄秉蘭草祓除不祥是其氣習流傳恬不為怪士不識間家之節女不守窺觀之貞乘時並出舉國若狂所謂亂也女曰士曰皆作詩者述其辭溱洧詳見褰裳通典周制女巫掌嵗時祓除釁浴韓詩傳謂三月桃花水下之時執蘭祓除續漢書三月上已官人並褉飲東流水上宋書魏已後不復用已但用三日毛傳蕳蘭也陸璣曰其莖葉似藥草澤蘭春秋傳曰刈蘭楚詞云紉蘭皆是也羅願曰蘭草一名都梁香一名水香其澤蘭葉尖微有毛不光潤方莖紫節八月花白人多種於庭池此蘭葉光潤生荆州都梁山下清水中因名都梁可殺毒蟲除不祥古義曰羅意以此蘭為水香而左傳楚詞之蘭乃澤蘭耳本草注勺藥亦名江離韓詩傳勺藥離草也古今注一名可離將别故贈之羅願曰其根可以和五臟制食毒古者有芍藥之醬服虔文頴伏儼輩解芍藥稱具美也毛氏以為香草今醫方但用其根故陸璣不識其花遂云無香氣耳孔疏云尚書之三風十愆疾病也詩人之四始六義救藥也疾病尚輕有可生之道則醫之治也用心鋭扁鵲之療太子是也疾病已重有將死之勢則醫之治也用心緩秦和之視平公是也詩人救藥亦猶是矣典刑未亡覬可改正則針規之意切鶴鳴沔水殷勤而責王也淫風大行莫之能救則匡諫之志微溱洧桑中咨嗟太息而已不敢望其存也案孔氏此條可謂讀書見大義者故備録之虞東學詩卷三
