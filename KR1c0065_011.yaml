body:
  text: 虞東學詩卷十一宗人府主事顧鎮撰周頌鄭康成曰周頌者周室成功致太平徳洽之詩其作在周公攝政成王即位之初頌之言容天子之徳光被四表格於上下無不覆燾無不持載此之謂容於是和樂興焉頌聲乃作按漢書髙堂生傳魯徐生善為頌師古注頌讀與容同蘇林曰漢舊儀有二郎為此頌貎威儀事據此則序言美盛徳之形容於義諦矣魯人作頌義兼禱祝非復西京之舊後世仿之益務恢張皆沿流而昧其源者也疏曰雅不言周頌言周者以别商魯蓋孔子所加又曰頌多為祭祀而作故序稱祀告及朝廟惟敬之小毖不言廟祀而承謀廟之下亦當於廟進戒於廟求助耳詩所曰頌者祭祀之樂歌自天地以及宗廟百神無非祭者然天地至大不可以形容也故郊祀明堂惟言配者之功徳而已餘則自宗廟類及之而助祭之詩附焉舊謂周頌多不叶韻今細求之亦自有韻特韻多轉注與風雅不同故疑其無韻耳古今固無無韻之詩也清廟之什此什所編為宗廟即政廵守明堂郊祀配天之樂歌皆周公制作時所定自不容有後王之詩錯雜其問詩所曰其篇先以文王者四始皆文王也於穆清廟肅雝顯相濟濟多士秉文之徳對越在天駿奔走在廟不顯不承無射於人斯相轉音澁杜甫詩恰似春風相欺得白居易詩為問長安月如何不相離自注相入聲下四句天承人韻清廟三篇序以首篇為祀文王次篇為太平告文王三篇為奏象舞是三詩皆祀文王之樂矣三詩當為一祭所用儀禮義疏謂升歌清廟舉清廟以包維天維清是也序下言周公既成洛邑朝諸侯率以祀文王諸儒皆引雒誥王在新邑烝祭歳以實之集傳李解補傳詩緝然書言文武並祭而此詩獨言秉文之徳不得謂統於所尊安成遂遺武也獨錢飲光引雒誥王肇稱殷禮祀於新邑為説此本周公告王之言原非實事然王氏謂殷禮疑即十二月之祭陳定宇駁云十二月之祭不過以周公留雒就烝以告文武耳此曰殷禮乃非常大祭豈十二月之祭足以當之蓋三月後以至十一月王必嘗至雒都行大祀禮受大朝賀今脱去矣其説甚讜愚按雒都新建周公首以祀新邑誨王豈有延至冬烝即以留公祭告抵塞故事觀下王答周公之辭曰惇宗將禮稱秩元祀咸秩無文又曰予小子其退即辟於周分明王已至雒舉行殷禮退而歸周非但如陳氏意之而已雒誥本多脱簡即以此詩補其殘闕可也穆深遠也集傳肅然清靜謂之清廟賈逵顯先也濟濟衆也鄭箋顯相助祭者多士執事者詩所二者皆肅敬雝和秉持文王之徳詩貫蓋肅雝本是文徳轉從與祭執事之人形出愈見其徳之入人深也越於也鄭箋駿大而疾也集傳心思冥會瞻對匪遥見文王之在天焉精神踴躍趨蹌恐後如文王之在廟焉兩在字指文王之在人心者而言田間即下無射於人也不顯不承猶周書言丕顯丕承古義非文王之徳光顯於無窮繼承於不替安能無射於人如此詩所即廟中以槩天下也徐鳯彩按樂記清廟之瑟朱絃而疏越一倡而三歎有遺音者矣注云遺餘也劉原父誤以遺棄釋之後儒遂疑是篇無韻故并論之古義以序及蔡邕獨斷之説考之我將是季秋大饗所用清廟乃洛邑初成特奉文王以配帝之樂歌觀詩中秉文之德對越在天可見其季秋配帝别有我將之篇而此詩移以他用有五處焉祭統云大嘗禘升歌清廟下而管象天子之樂也周祖文王故大嘗禘皆歌之也文王世子云養老之珍具遂發詠焉反登歌清廟既歌而語以成之也下管象舞大武陳祥道謂養老必歌清廟下管象者以文王善養老故也仲尼燕居云大饗兩君相見升歌清廟示徳也下而管象示事也以諸侯之長二王之後得與配帝之祭肅雝顯相之贊播之聲詩榮莫大焉故於盛禮用之也明堂位云以禘禮祀周公於太廟登歌清廟下管象以此禮始作於周公故報以重祭所以康周公非以賜魯也逹此五者而升歌清廟之義明矣維天之命於穆不已於乎不顯文王之徳之純假以溢我我其收之駿恵我文王曾孫篤之命與純韻收與篤韻命轉音民漢北海相景君銘命叶親篤從徒對切轉平此升歌之第二終也舉天命文徳並言不必言配言如分明文王一天矣詩牖易曰天行健此天命之不已也又曰君子以自強不息此文王之不已也於文徳言純中庸所謂純亦不已也補傳穆與顯對互言之其實天命之流行賦與者未嘗不顯文王之徳之藴未嘗不深逺也朱公遷假大也蘇氏溢盈溢也鄭箋文王之徳甚大其餘澤浸被於我也徐元扈不必依左氏作何以恤我收聚也毛傳駿惠大順也鄭箋純徳主於翕聚故曰收無斯須毫釐違戾故曰大順詩牖詩緝心法垂於不朽子孫世世相續便是篤厚猶言世徳作求也上篇以人心見祖徳此篇説孫子而歸重祖徳兩篇皆以徳言下篇言典方是治法耳詩牖陸堂以此為獻尸之樂詩所以為祭而受福之詩其説皆起於鄧元錫但升歌三終禮無分屬三時者故不敢信古義章首以文王與天對明是宗祀配帝之語維清緝熙文王之典肇禋迄用有成維周之禎典禋平上通成禎自為韻此升歌之第三終也序云奏象舞而列之升歌者劉原父謂將舞象則先歌維清是舞在下而居後歌在上而居先其得為升歌明矣按禮經言歌清廟者必與管象相連康成注禮皆以象為武王之舞不主此詩然武王之舞自名大武與象别文見文王世子明堂位等篇禮無名武王之舞為象者惟文王之舞名象見於左傳象箾南籥及此序則禮經之象即此詩之象又明矣顧序惟言舞不言管此詩既為升歌又入管吹其義未詳張次仲云歌闋堂下吹管則合樂而舞蓋一詩而兩奏之豈或然歟清者不淆緝者有常熙者光大集傳訓清為清明則與熙義相複王氏訓熙為廣則與他篇緝熙義不符今用張記皆言文典之美也典者文王造周之法郝敬前二篇以徳言仲尼燕居所謂示徳也此篇以典言所謂示事也肇禋即洛誥所謂肇稱殷禮洛誥云禋於文王武王則禋不必獨為祭天之名今据雒誥之言與清廟之序相終始也迄用有成維周之禎言迄今洛都告成開周家卜世之禎皆文典所貽亦曾孫篤之之意也諸家都以迄字連上肇字取義故不得真解今云所以肇稱殷禮者由今洛功迄已告成則迄字原非贅設讀詩記曰周公宗祀文王於明堂所謂肇禋以文王配帝始於此也古義因洛邑成而宗祀正所謂告成事之祭耳又箋云象舞象用兵時刺伐之法武王制焉疏謂文王時有擊刺之法武王象而為舞詩之作則於成王時也杜預注左云象箾舞所執南籥以籥舞也皆文王之樂正義云杜言皆文王之樂則象箾與南籥各是一舞南籥既是文舞象箾當是武舞也按陸徳明釋文箾音朔正義引上林賦捎鳯凰釋之而於韶箾之箾又音簫正義引虞書簫韶九成釋之一字兩音兩訓殊不可據愚謂象箾韶箾當作一音象箾南籥當作一舞禮記義疏言象吹以管而舞以籥則左傳所紀原非兩舞而象非象用兵時刺伐之法矣周舞之見於禮經者三曰象曰勺曰大武勺即酌師古酌之詩曰於鑠王師而康成以為文舞見内則注象之詩曰文王之典而康成以為武舞此皆不可曉者朱子以勺為武以象為文合依朱子説烈文辟公錫兹祉福惠我無疆子孫保之無封靡於爾邦維王其崇之念兹戎功繼緒其皇之無競維人四方其訓之不顯維徳百辟其刑之於乎前王不忘公疆邦崇功皇刑忘古東江陽通押福轉音甫保轉音補福保自為韻序曰成王即政諸侯助祭也疏曰周公居攝七年致政成王成王乃祭祖考戒諸侯蘇氏曰序言即正非即位也則周公未嘗攝位明矣集傳以此詩為獻助祭諸侯之樂歌申補序義最諦朱氏疏義曰儀禮賔三獻尸主人酌酒獻賔歌烈文其在此時歟烈言其功文言其徳補傳此功徳顯明之諸侯夾輔王室以興國祚錫是有天下之祉福以惠我無疆之休使子孫世世保之也詩緝無封靡於爾邦四句乃告戒之辭言爾無封殖以專利無侈靡以傷財則王當崇尚之又念汝有此開國之功戎當訓汝不當訓大當使後之以序相繼者益務恢張前烈而皇大之則爾之子孫與我之子孫共相保於無窮矣蓋誡勉之亦以致其祝願也無競維人四句特頌美前王以感發之與末句是一串語田問言莫强於人盡人道則四方其訓行之莫顯於徳顯其徳則百辟其刑法之解頥前王所以統四方定百辟者由此也不曰不忘前王而曰前王不忘又加之以歎辭黄實夫謂感發諸侯不盡之意得其㫖矣本義分兩章以下章為臣戒君之辭破碎非頌體自當以集傳為正天作髙山太王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之徂依集傳從沈括作岨岐字斷句末句不入韻麟趾騶虞文王有聲之結皆然陸圻云今樂府絲與尾聲多不用前韻者序曰祀先王先公也集傳則為祭大王之詩陸奎勲謂岐山有太王廟武成祀於周廟爾時應有樂章愚按周之祖廟自在鎬京而岐周肇基之地根本所在故疏家言有别廟如武成所敘則先王先公悉在不獨太王廟矣何以獨祭太王乎此詩之祀自在周公定禮後為成王祀周廟之詩與武成大祀無渉顧詩言太王文王而序兼及先公者蓋太王自豳遷岐文王自岐遷豐始終岐山之事者二王也述二王興岐之績以告先公所謂以成功告神明者歟先儒以祫祭當之則非也季氏解頣謂此祀岐山之樂歌引易王用享於岐山為證其説不為無據然享岐山安知非即祀周廟事無容創為别説張叔翹云周家王業實始於岐故大雅歌其帝省周頌謂之天作作起也歐陽髙山岐山也鄭箋以岐山為髙山又以為天作美大之也補傳荒治也集傳大王荒之緜詩前七章之義備矣詩貫兩彼字皆指岐山後王不得彼先王今從張記康安也謂奠安之彼作矣承首句言文王康之孟子述治岐之政備矣王氏彼岨矣岐從集傳有夷之行皇矣二三章之言備矣彼險僻之岐山人歸者衆而有平易之道路子孫當世世保守而弗失也集傳劉氏曰始作之固自乎天終保之亦繫乎人張叔翹謂太王以一岐山而基王迹後世子孫不能以天下守岐山然後知詩人之語所慮者深逺也昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熙單厥心肆其靖之詩貫密轉音繆與受為韻心靖平上通序曰郊祀天地也通典周制禋祀畢獻後天子舞六代之樂若感帝及迎氣舞當代之樂其樂章用昊天有成命也蘇氏轍曰此詩有成王不敢康執競有不顯成康世或以此為成王誦康王釗也然則周頌有康王後詩矣周公制禮禮之所及樂必從之樂之所及詩必從之頌之施於禮樂者備矣後世無容易之今集傳改為祀成王之詩其辨有四一謂古無合祭天地之禮按疏言為南郊祀所感之天神於北郊祀神州之地示謂二郊皆用此詩耳不言合祭也一謂此詩言天不及地若於方丘奏之於義何取按周禮以禋祀祀昊天上帝不言方澤義疏云以與禋祀昊天同也天地之徳同歸罔極王者稱受命於天不稱受命於地豈父天而不母地乎祀天之詩未嘗不可祀地也一謂以國語證之其為祀成王之詩無疑按國語道成王之徳句韋昭注云是詩道文武能成王徳又國語金奏肆夏樊遏渠吕叔玉注云肆夏時邁也樊遏執競也渠思文也朱子於時邁注既用吕説又以執競為昭王後詩是朱子亦不能定其説矣一謂周之後王獨不得褒顯其先王是固然已然郊禘為一朝大典周公不容不為手定今此詩之祀天地改為祀成王雝之禘太祖改為祭文王周頌樂章偏闕此二大祭所未安也故仍從序説范逸齋曰郊祀以后稷配此篇為天地之樂章思文為后稷之樂章成命定命也成王當依箋作成此王功基者積累於下以承藉乎上也宥宏深也宻靜宻也集傳肆故今也爾雅靖安也集傳言天祚周以天下既有定命矣文武受之成此王功不敢自安其夙夜積徳以承藉天命者宏深而靜密仲尼燕居謂無聲之樂其㫖深矣於是又歎美而言二后繼續光明者顧命謂昔君文王武王宣重光是也田間單厥心者於民物遐邇之祭無所不盡其心故今得承二后之功徳共享安靖而永受天命也按天地之祀二至異時方圜異位蒼黃異色器幣異物六變八變異樂周禮炳然無可疑者由漢以來始有夫婦共牢南郊合祭之説其事成於王莽而宋世儒者乃援据此序以傅會其説蘇子瞻且創為六議爭之殿廷元祐七年議莫能一至淳熙中朱子為先朝南北郊辨謂古者天地未必合祭日月山川百神亦無一時共享之禮古時天子躬親行事豈有祭天却将上下百神重叠累積併作一祭耶且郊壇陛級兩邊上下皆是神位中間恐不可行朱子之辨出而合祭之不可明矣近世又有張其説者故因説是詩而并論之我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右饗之我其夙夜畏天之威于時保之牛音疑右音以牛右方饗俱平上通夜音豫保讀補此宗祀文王於明堂以配上帝之樂歌序傳合程子曰萬物本乎天人本乎祖冬至祭天而以祖配氣之始也萬物成形於帝人成形於父季秋享帝而以父配成物之時也禮書郊曰天所以尊之故以稷配亦以尊稷也明堂曰帝所以親之故以文王配亦以親文王也語類為壇而祭故謂之天祭於屋而以神祗事之故謂之帝質疑明堂之祀上帝其為昊天上帝及五帝可知禮書説康成以上帝為五帝而不及天王肅以上帝為昊天上帝而不及五帝皆與禮經不合按周禮小宗伯兆五帝於四郊因吉土以饗於郊家語孔子曰天有五行分時化育以成萬物其神謂之五帝馬貴與為五帝者五行之主而在天猶五嶽為五方之主而在地也五帝不出天之外而謂五帝即昊天則不可五嶽不出地之外而謂五嶽即后土則不可後世乃立青赤黄白之祠後儒又加以威靈仰赤熛怒白招拒汁光紀含樞紐之號後又分為六天其説多出於緯書不足據也家織簾曰明堂之作武王時已有之樂記曰武王克殷祀于明堂而民知孝是也不獨武王時有之通典曰黄帝拜祀上帝於明堂則明堂為祭祀之所上古已然惟宗祀配帝之禮則昉於周公故孝經以此贊周公之孝後世誤執嚴父之説以啟紛紜惟東漢明帝時以光武配明堂迄章安而後不識變者以為近古朱子謂此是周公創立一法將文王配天永為定制後世將嚴父之説亂了斯言足破千古之惑將奉也鄭箋享獻也毛傳右尊也神坐東向在饌之右所以尊之也集傳臨之於右以享我祭猶云如在其上也古義季氏解頣曰祭法燔柴于泰壇用騂犢則明堂祭天當用特牛而有羊者周禮羊人積共羊牲謂積柴祭天則用羊實柴也先柴而後獻故維羊在維牛之上將者奉羊以供柴享者獻牛以供祀也安成劉氏曰不敢必天之享而以其字言之儀式刑皆法也集傳累言之謂法之不已詩緝惟天惠民惟文王之典足以安民我法文王之典日月施行之以安四方則天必錫福於文王而右饗我祭矣舊謂文王錫福祀天而謂文王錫福可乎其右既右語勢一呼一應則右饗亦應屬天蓋錫福文王即是錫福子孫處天既右饗則文王右饗不待言矣今用詩緝説我其夙夜為祭後言之也錢氏曰天之威即從右饗中見天人相去甚邇能饗我即能棄我不畏其威而能常保其右饗乎畏之如何只是常法文王之典以靖四方耳古義讀詩記曰法文王所以法天畏天所以畏文王天與文王一也清廟之祀明堂在雒都康成謂周公攝政乃立明堂於王城此雒都告成之特祀維清所謂肇禋也此明堂在鎬京乃每嵗季秋大饗之禮楊氏復曰明堂王者所居以出教令之所非王者之常居也疏家云在國之南丙巳之地三里之外七里之内雖未可據然必森嚴清靜周人祀上帝於明堂而以文王配者此也王叔晦曰明堂制度諸家皆以臆度月令失之誕大戴記桓氏新論失之侈蔡氏失之離晏子所傳陋而非禮公玉帶所圖詭而不經愚按明堂之制當以考工記為正考工記匠人職云周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵如是而已朱子言當有九室如井田之制亦與考工不合時邁其邦昊天其子之實右序有周薄言震之莫不震疊懐柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿徳肆于時夏允王保之子轉音走與后為韻見漢書敘傳位與矢韻夏與保韻夏音户保音補序曰廵守告祭柴望也疏曰宣十二年左傳云昔武王克商作頌曰載戢干戈明此篇武王事也國語稱周公之頌曰載戢干戈明此詩周公作也時邁其邦敘時巡之事也有天下曰天子子之者使有天下為人神主也時邁而首及昊天正柴望之事郊特牲云天子適四方先柴武成謂庚戌柴望大告武成是也黄氏右助也鄭箋序者帝王之傳序曹氏謂以周繼夏商也錢氏實字與其字相承若為問答者然昊天其子之乎曰天實右序有周矣詩緝何以徴之即今巡守所至薄言震動之諸侯已莫不悚懼武成謂華夏蠻貊罔不率俾是也黄氏祭告所及用以懐來柔和之毛傳百神河嶽已莫不效順武成謂告於皇天后土所過名山大川是也黄氏此皆右序之實騐信乎王之為人神主矣明昭者光明著見之義武成所謂昭我周王天休震動者是也古義又䝉上昊天其子言曰天實明昭有周矣詩緝曰右序有周明昭有周語意正同明昭不言實者承上省文也故兩節結語皆以允言之式用也鄭箋次序諸侯之在位者謂以慶讓黜陟之典差次之詩緝武成謂庶邦冡君暨百工受命於周是也黄氏諸侯既已式序無所復事武功干戈弓矢則戢之櫜之惟求美徳以布陳於中夏蓋勘亂以武致治以文求者講求之義懿徳所包者廣凡可以綏太平者皆是古義武成謂歸馬放牛以致垂拱而天下治是也黃氏此皆明昭之實事信乎王之能長保天命矣既右序之又昭明之是天之子之也詩緝愚按古人頌不忘規我將篇曰于時保之此篇曰允王保之可識古頌之體疏曰春官鐘師以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏陔夏驁夏彼注引吕叔玉云肆夏樊遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也按襄四年左傳穆叔如晉晉侯享之金奏肆夏之三不拜對曰三夏天子所以享元侯也魯語亦載穆叔之辭稱肆夏繁遏渠韋昭注肆夏一名樊韶夏即昭夏一名遏納夏一名渠與吕不合然如韋説則三夏並稱何獨於肆夏辭繁名叠乎其不然必矣又疏述康成之言謂九夏皆詩篇名頌之族類此歌之大者載在樂章樂崩亦從而亡是以頌不能具愚按六笙篇亡而義存九夏既亡其義安知其篇紛紜之論總不可據今袛舉古儒所及者著之以不没其説云爾執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼓喤喤磬筦將將降福穰穰降福簡簡威儀反反既醉既飽福禄來反次句不入韻末節轉韻序曰祀武王毛鄭皆訓康為安而歐陽氏謂成康者成王康王也當是昭王後詩集傳用其説李迂仲曰歐説簡直然亦有窒礙不通者其言成康之文如此其屢而言武王無幾豈古人祀先祖之意乎蘇頴濵曰奄有天下不自成康也朱孟章曰先生初説亦取古注後乃更之當以初説為正競彊也鄭箋皇大也補傳武王執自彊之心以成莫彊之烈補傳豈不顯乎其成王業而安天下也詩緝上帝是以益光大之由其能成王業而安天下遂奄四方而有之斤斤然明察無不至言其照臨四方詩緝明而能斷補傳無競者在此不顯者亦在此也今祀武王之時鐘鼔喤喤而和磬筦將將而集神之降福穰穰然衆簡簡然大言樂作而神福之也祭祀之威儀反反然重慎賔之初筵傳祭終而飲福醉飽卒無違禮箋疏福禄亦反復而未艾言禮行而神福之也詩緝樊繁通杜子春曰繁多也遏止也言福禄止於周之多也思文后稷克配彼天立我烝民莫非爾極貽我來牟帝命率育無此疆爾界陳常于時夏稷極韻天民韻牟育平入通陸奎動曰界宜讀駕古暮反與夏韻此后稷配天之樂歌史記言郊禮有二而皆配以稷家語孔子曰郊之祭也迎長至之日也故周之始郊其月以長至其日用上辛至於啟蟄之月則又祈穀於上帝錢氏曰此迎長至之郊也按昊天有成命已為南郊之樂而又有思文者郝仲輿曰獻祖之樂當與祀天異思文所以獻祖也生民述事故辭詳而文直思文頌徳故語簡而㫖深雅頌之體其不同如此張氏古義謂貽我來牟據冬至時所見之物言之此不必然按管子言麥熟穀之始段武昌言當正闕之時故養民者以此為善蓋舊穀既没新穀未升絶續之交民命所繫今西北方人俱以麥為大熟故特標以為民食之本臣工篇亦言來牟同此意也思語辭集傳文文徳也鄭箋詩緝曰后稷人臣周人推以配天疑於推崇之過於此詩發明之克如克明徳之克安成下乃言克配之實也立當作粒鄭箋虞書烝民乃粒是也極至也徳之至也集傳周語芮良夫曰王人者將導利而布之上下使神人百物無不得其極是也來牟麥也説文來牟本由天生洪荒以後襍於豐草后稷辨其種以授之民教以樹藝之法故曰貽也率育徧養也帝欲徧養斯民后稷奉而行之所以克配彼天也無此疆爾界正徧養之事常常道也集傳時夏中國也陳氏李迂仲曰后稷但養之而已未及教之也乃以陳常于時夏言者蓋民無常産因無常心倉廩實而知禮義府庫充而知榮辱惟其教民稼穡所以能陳常于時夏也按孟子曰使有菽粟如水火而民焉有不仁者乎聖人之功所以同於覆載也祭以配天宜矣此詩即韋吕所謂渠者杜子春曰渠大也以后稷配天王道之大也馮疏曰説文云來麰麥也劉向亦謂釐麰麥也韓詩作貽我嘉麰然則來牟一物惟廣雅以牟為大麥來為小麥不足據也臣工之什此什錯舉内外祭而助祭之詩居半焉雝為大禘與載見相次者亦以詩有相子肆祀之語而類編之歟詩所曰終以武者周樂之亂章也嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾茹畬帝艾四韻為長調工公求牟年人名為韻此諸侯春朝助祭事畢而遣於廟之樂歌也孟子述巡守之典其慶譲始於土地田野之治否知先王之於農事常首先天下之政張氏故成王遣戒諸侯注意於此舜咨十有二牧曰食哉惟時正此意也李氏愚按朱子釋保介謂保介見吕覽月令其説不同然皆為藉田而言是惟藉田得名保介詩呼保介而告之事當在耕藉後故後世學者皆以藉田為説張翥鄒忠𦙍何揩張次仲錢澄之陸奎勲疑諸侯助王春祠因預藉禮乃遣於廟而戒之歟不戒其身而咨嗟以戒其臣工者所以警切之也詩緝在公者公家之事朱子王既錫爾成法有所不知當來咨謀茹度之戒無自專也鄭箋此節是統飭之辭下乃専言農事詩緝重言嗟嗟者所以重其事於是又戒其保介曰爾今歸國春向莫矣他又何所求乎惟民事不可緩耳爾之新田畬田三嵗田曰畬何如哉蓋新墾之田用力尤難故舉新以該舊也輔氏春已向莫甚美之麥漸次告成是上帝有明賜而受之不逺矣夏麥者秋稼之占此明昭之上帝終必賜以有年所當命我衆人各具銚鋤之器以治其田奄忽之間已觀其用短鎌以艾禾矣可不歸而求之哉詩緝愚按如何新畬春省耕也庤乃錢鎛孟夏循行縣鄙命農勉作也奄觀銍艾秋省歛也皆戒之之意箋曰保介車右也月令孟春天子親載耒耜措之於參保介之御間集説曰車右及御人皆是參乗天子在左御者居中車右在右置此田器於保介及御者之間疏謂諸侯耕藉勸農則此人與之同車常見勸農之事故勅之也又髙誘吕覽注云保介副也載耒耜置於其間而施用之集傳本此箋曰周之季春於夏為孟夏諸侯朝周之春故晚春遣之据此則詩言莫春為周正建寅之月矣朝正之後於此遣之正其時也不應遲至夏之三月且夏三月而勅農事不已晚乎毛傳錢銚鎛鎒銍穫也馮疏銚七遥反削也爾雅作􅝁􅝁謂之疀音插方言江淮南楚謂之臿東齊謂之梩音駭鎒爾雅謂之定音頂郭云鋤屬吕覽鎒柄尺其鎒六寸注云耨芸苗也六寸所以入苖間説文銍穫禾短鎌管子云一農之事必有一耜一銚一鎌一鎒一椎一銍然後成其為農蓋銚鎒銍三器分耕耘刈三用故云然噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦穀音古耦音懝爾穀里耦上入通序謂春夏祈穀于上帝而詩中未見祈穀意故集傳改為戒農官後儒又以戒農官當次於雅不當次於頌何黃如據家語謂既得卜於禰因戒農官張次仲據竹書謂康王申戒農官告於廟皆欲以戒農官合於告神明之義未免附會詩所謂既祈穀於上帝因而祭農官於本詩既字之義為得矣然祈穀而祭農官於禮無稽詩緝補傳皆言親率農夫為藉田張本蓋知為藉田而又挂礙序説故為兩岐之論愚按月令祈穀藉田其禮相因詩言既昭假爾本承祈穀而言故序以為祈穀也豈前篇戒諸侯及後載芟篇祈社稷皆耕藉後事而此篇乃祈穀後耕藉之樂章歟咨嗟我周之以穡事成王業也啟蟄之祀既昭假於爾大神矣烝民言昭格于下商頌言昭格遲遲皆事天也曰既者已事之辭我今親率農夫以播種百穀詩緝補傳所謂躬耕帝藉也駿發爾私以下戒民使勸農業孔疏時有終畆之庶人在焉故戒之也駿疾也發伐也鄭箋匠人職云一耦之伐以耜擊伐此地使發起也孔疏私民田也不言公者上欲富其民而讓於下也毛傳終竟也終三十里者萬夫之地方三十三里少半里言三十者舉成數也鄭箋服事也謂之亦者顧上躬耕而言十千維耦者匠人職云耜廣五寸二耜為耦注曰古者耜一金兩人併發之今據萬夫言之故曰十千耦也或謂藉田承祈穀之後即以本文既昭假爾率時農夫為據已序又兼言夏祈何歟按先儒或以噫嘻之辭為吁嗟求雨曹氏或又以大雩與春郊不同疑序中夏字為衍何氏皆不可據詩有本為此事而作後復移之他用者其義不可究訖闕之可爾孔疏計萬夫之田一夫百畆方百歩積萬夫方之是廣長各百夫以百乗百是萬也既廣長皆百夫夫有百歩三夫為一里三百歩為一里則百夫為三十三里餘百歩即三分里之一為少半里是三十三里又少半里也陳祥道曰康成以匠人有􅍒遂溝洫澮之制而多寡與遂人異故言采地制井田鄉遂公邑制溝洫按小司徒九夫為井匠人亦九夫為井井間有溝自井地言之也遂人十夫有溝兼溝塗言之也若遂人百夫有洫而匠人十里為成成間有洫則九百夫之地遂人千夫有澮而匠人百里為同同間有澮則九萬夫之地其不同者成間有洫非一成之地包以一洫而已謂其間有洫也同間有澮非一同之地包以一澮而已謂其間有澮也成與同地之廣者也洫與澮溝之大者也於成舉洫於同舉澮亦其大略云爾薛季宣曰周世井田之法實公行於天下内外逺近之溝洫固無異制則遂人匠人之所掌其制一也據此則集傳謂溝洫用貢法者非矣又案匠人云凡溝逆地阞謂之不行水屬不理孫謂之不行又云凡行奠水磬折以參伍是溝洫之法雖縱横不得踰制亦必循順地阞有直行折行之處非如昔人所圖如棋盤様也至於環外之川亦謂其外有川非必四面環之也義疏謂環於百里外者即環於三十三里外之川最為得之集傳謂四旁有川亦似於水勢未審振鷺于飛于彼西雝我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽夜音豫此獻二王後助祭之樂歌振羣飛貎毛傳振其羽也錢氏辟雝在西郊故曰西雝朱子鷺好潔而白振羽羣飛來集西雝其容可愛杞宋之君於周為客今來助祭周廟至止於此亦如鷺之容也在彼不以我革其命而有惡於我知天命無常惟徳是與其心服也在我不以彼墜其命而有厭於彼崇徳象賢統承先王忠厚之至也陳氏欲其夙夜匪懈然後徳音不已所謂愛人以徳也李解成王告㣲子曰與國咸休永世無窮又曰俾我有周無斁亦此意也此篇序與集傳無異説而後人自取蜎擾總由泥滯西雝二字不知鷺集西雝只興客之在廟不當以興義為正義也或欲以白鳥同白馬例看尤渉纎巧非説經本色陸奎勲曰此詩不獨用之廟中兩君相見徹以振羽見仲尼燕居集傳賦也宜從毛為興陸疏鷺水鳥齊魯間謂之舂鉏遼東樂浪吳揚人謂之白鷺大小如鴟青脚髙尺七八寸尾如鷹尾喙長三寸陸佃云頂上有絲毿毿然長尺餘欲取魚則弭之羅願云鷺潔白而善為容其集必飛舞而下其翅背上皆有長毛一名帶絲禽海錄一名屬玉格物論豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔皆首句黍稌自為韻秭醴妣禮皆平上通序言秋冬報而不言所報何神則内外上下兼舉之矣箋義以為祭宗廟集傳以為祭田祖先農方社之屬用蘇潁濵説而王臨川鄭永嘉陳小南李迂仲俱以為報上帝陳用之以為享明堂惟曹純老謂天地百神無所不報而同歌是詩按詩以洽百禮所包廣濶曹説得之彙纂云考祀典秋冬大報上自天地以至方蜡靡祀不舉祀則有樂是詩槩為報祭之樂章故序不明斥所祭為何神也職方謂雍冀宜黍荆揚宜稌是黍利髙燥稌利下濕豐年時或髙或下無所不熟故黍稌皆多也李解廩人註曰藏米曰廩藏粟曰倉對文則别散即通也孔疏數萬至萬曰億數億至億曰秭毛傳藏榖數多故其廩髙大舉廩之多容以為豐年之狀也孔疏酒即周禮所謂三酒醴即周禮所謂五齊行禮以酒為主也詩緝烝進也界予也鄭箋即獻也進而獻之祖妣於以會合其事神之衆禮詩緝大典畢舉隨處得豐年之利用則隨處徴神惠之普存故曰降福孔皆也爾雅稌稻郭云今沛國呼稻為稌是也孔疏古義稌有黏有不黏黏者為糯不黏者為秔秔或作粳在古通得稻稌之名若詩書之文自依所用而解之如論語食夫稻則稻是粳月令秫稻必齊則稻是糯周禮牛宜稌則稌是粳此詩為酒醴則是糯也有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聽我客戾止永觀厥成瞽庭分韻起奏音祖虞羽鼔圉奏舉與瞽韻聲鳴聽成與庭韻此始作樂而合於祖之樂歌疏曰周公制禮作樂一代之樂功成而合諸樂器於太祖之廟奏之特告太祖不因祭祀集傳無異説獨范逸齋以為祫祭此由康成注大司樂之文誤之也按大司樂以六律六同五聲八音六舞大合樂縁上經教樂舞樂語是分而教之故於此合肄之也鄭注乃連下經天神地示人鬼併為一事逸齋因疑合樂為祭耳何黃如謂若無助祭之事我客何以來竊意諸侯述職嵗有恒典遇祭祀則助祭遇合樂則觀樂皆朝廷大事諸侯所當預者本詩明曰觀成並無一字渉祭何苦强生枝節與古人為難耶按禮經多合樂之文合樂必有詩而今無别見者或始作樂時歌此以合乎祖後亦移而他用歟又疏稱毛以為大武之樂陳暘樂書因謂備樂合祖不過主大武而已遂引樂記始而北出云云謂武樂之成終於崇天子戾止觀成即崇天子之意此無明文可考毛亦本無是説瞽言作樂之人也庭言作樂之地也輔氏重言有瞽見非一人朱氏兩句總敘其事集傳以發作樂之端也設業四句言樂器之備簫管四句言樂聲之和既備乃奏則聫絡上下之文也先祖三句言樂作而神人胥格猶虞書言祖考來格虞賔在位也成如簫韶九成之成集傳又按樂有八音詩中所舉者四或舉重以該輕或舉小以包大故云既備也大司樂陳六變八變九變之樂於音亦祗舉其三古人臨文之體如此何黃如乃以管為笙中之管以補匏音以乃奏為金奏以補金音以和鳴為琴瑟以補絲音至土音不能為説牽合左傳七音之文假令何氏作大司樂圖鐘節解又當如何補綴耶不知乃奏只是奏樂和鳴只是樂之和管只是下管之管毋容穿鑿取巧也詩牖云肅即皦如意雝即純如意合之即喤喤和鳴也斯為得之業虡崇牙見靈臺篇疏曰樹羽即明堂位所謂璧翣注云畫繒為翣載以璧垂五采羽其下樹翣於簨之角上是也應小鼔太射禮應鞞在建鼔東與西懸朔鞞相對注謂應和朔鞞經傳皆無田鼔之文毛傳以田鼓為大鼔而田與應連文皆在縣鼔之上則田亦應之類故鄭以為當作朄音引太師職云令奏鼔朄注云為大鼓先引箋謂聲轉字誤變而作田也陳祥道曰大射有朔鞞應鞞詩又以應配朄則朔鞞乃朄鼓也以其引鼓故曰朄以其始鼔故曰朔鄭氏以應與朄及朔為三鼓恐不然也疏曰明堂位云夏后氏之鼓足殷人楹鼓周人懸鼓是周法鼓始在縣陳暘曰縣鼔大鼔也應田縣鼓先小後大所以為備樂也疏曰小師注云鞉如鼓而小持其柄摇之旁耳還自擊是也陳暘曰鞉鼓二者以同聲相應故配天神以靁鼓靁鞉祀地示以靈鼓靈鞉享人鬼以路鼓路鞉樂記亦以鞉鼓合而為徳音也古義曰磬笙磬頌聲也應笙之磬謂之笙磬應頌之磬謂之頌磬疏曰傳云柷木椌圉楬者以樂記有椌楬之文二器皆用木也郭璞云柷如漆筩方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊敔如伏虎背上有七十二鉏鋙刻以木長尺櫟之圉敔古今字耳章俊卿曰柷之制中虚聲之所出以虚為本也圉之制中實聲之所止則歸實也疏曰釋樂大簫謂之言小者謂之筊郭云簫大者編二十三管長尺四寸小者十六管長尺二寸風俗通云簫參差如鳯翼釋樂大管謂之簥郭云管長尺圍寸併漆之有底箋云如笛併而吹之律吕精義云管即律管律吕各六有特有編前儒不識管者謂長尺圍寸併兩而吹此漢大予樂之雙管非古所謂管也後儒不識管者謂除嘂子外長六寸餘此教坊俗樂之頭管亦非所謂管也管無孔惟管端開豁口以便吹縱横皆廣一分七釐六毫乃黃鐘正律内徑之半也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福龍氏云福讀甫序曰季冬薦魚春獻鮪也月令季冬命漁師始漁天子親徃乃嘗魚先薦寝廟注云此時魚潔美故特薦之又季春薦鮪於寝廟周禮䱷人春獻王鮪夏小正傳云鮪之至有時美物也非時常有故取以為獻鄭鍔此篇與魚麗相表裏魚麗之序曰美萬物盛多可以告於神明此則告神之樂歌也猗與猶言美哉詩緝漆沮岐周之二水也毛傳二水自豳歴岐周以至豐鎬鎬京去岐不逺故繫而言之孔疏明非自土沮漆之漆沮也深潛之處有此多魚詩緝蓋魚性喜潛故藏之深也王氏朱氏鱣鱑也本草鮪鮥也鄭箋二魚皆非漆沮所有而謂之有者以其自他而至見漆沮之魚廣也且有纎長之鰷善飛之鱨形偃之鰋形俯之鯉舉其類之多亦形容萬物盛多之意補傳以是備物享祀而神明饗之助以大福也毛傳潛糝也疏引小爾雅魚之所息謂之橬橬作木旁橬槮也槮亦作木旁爾雅糝謂之涔郭璞改糝作槮李巡云以木投水中養魚曰涔孫炎云積柴養魚曰槮郭注謂魚得寒穴其裏隱藏因以薄圍取之按潛之訓深爾雅本有明文今以從水之潛作從木之橬輾轉改釋殊難信據今從詩緝羅願云鱣蓋鮪之類三月從河上來今鞏縣東雒渡北崖上山腹穴舊説謂此穴通江湖鱣鮪從此穴入河陸佃云鮪岫居至春始出而浮陽北入河西上龍門入漆沮餘見衛風小雅有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉既右烈考亦右文母通首隔句韻序曰禘大祖而箋以大祖為文王蓋本祭法祖文王之文也先君子曰禘説紛紛迄無定論康成混禘於郊及祫大禘小之説前人駁辨已詳無容置論所當論者有二趙匡謂禘祭不兼羣廟朱子從之然漢世儒者如許慎張純等俱以禘為禘審昭穆則毁廟未毁廟之主俱在矣惟合羣主而又追所自出之帝故大於祫也匡又謂禘非時祭之名不知禮之言禘原有二説大傳之所謂禘爾雅以為大祭商周之禘嚳是也王制之所謂禘其禮或行於春郊時牲或行於夏祭統鄭司農謂即司尊彝之追享所謂四時之間祀陸農師以春夏為審諦之時陳祥道以為時禘是也康成指為夏殷之禮此不可據按禮經言禘每及嘗中庸亦言禘嘗之義則周有時禘信矣周禮義疏云禘不於春則於夏因春夏之時祭而以大祭之禮行之則祠亦名禘禴亦名禘矣春秋書禘於莊公可見不必追所自出之帝而後為禘也左傳云寡人之未禘祀可見為時祭之通稱也合前後諸説按之則商頌之長發大傳之所謂禘也故序以大禘當之周􅀈之雝王制之所謂禘也故序以禘文王當之不言大也箋以太祖為文王則禘止及於文王而不追所自出即魯禘莊公之藍本也魯雖僭禮亦必有所規仿而然恐其祭時即歌此詩故三家得而竊之歟又按舊説以為成王詩而集傳改為武王祭文王何黃如引劉向封事以實之今考劉向之言曰武王周公繼政義不專主武王又曰祀其先祖仍與序説相合無以見其為武王祭文王也愚意成王禘文王而以武王配故有皇考烈考之别詩意或當然歟有者非一之辭田間來者自彼而來孔疏止者止於周廟古義言助祭之諸侯其來也雝雝而和其止也肅肅而敬天子則至和無迹至敬無文穆穆然深逺詩牖所以交神明者有道矣又嗟嗟而言於鄭讀如字今從集傳音烏天子進大牡之牲其時辟公助陳祭祀之饌孔疏此由我大哉皇考之武王王氏有以綏安我孝子故能得萬國之懽心以祀其先祖也劉向我先祖文王宣通哲智以盡人道乃文乃武以備君徳用是安人以及於天而克昌其後嗣舊以宣哲屬臣文武屬君今從集傳予以壽祉之多故今奉兹大祭既尊烈考文王為太祖王氏亦尊文母大姒與之同食也疏云文王雖不得為始祖可以為太祖又云考者成徳之名可以通其父祖祭法父曰考祖曰王考愚按康誥丕顯考文王亦即烈考之謂傳箋以皇考為文王則成王不當稱孝子以烈考為武王則子不當居母上集傳以皇考烈考皆屬文王則一詩不當有兩稱惟讀詩記用王氏説以皇考為武王烈考為文王今詳詩意應如是周禮樂師職及徹帥學士而歌徹論語三家者以雍徹康成謂徹歌雍詩是也陳暘曰大祭祀告利成之後徹必歌雍古之祭祀有樂以迎來必有樂以徹食黄佐曰此詩本為祭文王徹爼之詩後乃通用之於他廟耳蘇氏曰周人以諱事神而詩曰克昌厥後者蓋周所謂諱不以其名號之耳不遂廢其文也諱其名而廢其文者周禮之末失也愚按祭統大嘗禘升歌清廟下而管象是禘祭升歌用清廟此其徹詩也載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉壽永言保之思皇多祜烈文辟公綏以多福俾緝熙於純嘏王章陽央鶬光享平上通保讀補與考壽為韻福讀甫與考祜嘏為韻序曰諸侯始見乎武王廟也疏謂成王即政諸候來朝於是率之以祭武王之廟按烈文序言即政此序無之其曰始見者明在即政前鄒子靜曰蓋免喪始朝乎廟也諸侯本為朝來而是詩之作則為助祭是説近之載始也新王初御諸侯來朝求法度而遵守之猶今言請訓也其所建交龍之旂則陽陽而明其軾前之和旂上之鈴則央央而有聲李解其轡首之金厄則觸之而鶬然如玉之鳴古義鶬當依説文通作瑲玉聲也鞗革有玉聲者金厄所觸舊謂金飾貎非是休美也集傅車服之美如此有烈烈然之光輝也成王於是率之以見昭考武王以致其孝敬以行其獻享詩緝而諸侯助行其禮使得壽考之福孔疏當長言保此甚美之多祜也又言此有功有徳之辟公神亦安以多福是君臣並受神貺俾我繼續光明於純全之嘏猶尚書言毗予一人世世享徳也諸家皆以末二句從烈文首章義又或以為均福於諸侯之辭今按疏義是以多福為安諸侯純嘏句仍歸成王補傳用其説黃實夫曰成王得四海之懽心以祀先王則成王有得福之道四海諸侯各以其職來祭則諸侯亦有得福之道君臣並受其福而勸戒以保於無窮盛矣哉按箋云天子受福曰大嘏本禮運辭有福祚之言是鄭以此為嘏辭也豈此詩即受嘏之樂歌歟有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷馬音姥且釋文七序反馬且旅馬韻追綏威夷韻序曰㣲子來見祖廟也箋云成王既黜殷命殺武庚命㣲子代殷後既受命來朝而見也疏云㣲子先封於宋但未為殷後耳於此時命為宋公或召來命之或遣使就命史傳無文要是既受命乃來朝而見若未受命不得已乗白馬又云經之所陳皆説㣲子之美雖因見廟而歌其意不在廟故經無廟事古義曰辭雖頌客亦告於廟故為頌集傳分三節部分最清然以第三節追之為已去而復還之恐無是事故易注語留之為送之客指㣲子也宋於周為客左傳重言有客者獨賢而尊異之鄭箋亦仍也蘇氏殷尚白修其禮物仍殷之舊也集傳萋且敬慎貎毛傳言㣲子乘白馬而來其威儀敬慎萋萋且且也鄭箋乃其隨行之衆如敦琢之玉然猶杜詩言侍立小童清也詩緝此一節言其始至也集傳一宿曰宿再宿曰信言客至多日可以去矣我周人受之縶絆以絆其馬愛而留之不欲使去也授縶縶馬皆假設之辭孔疏此一節言其將去也集傳追之為言送也疏謂已發上道逐而送之箋謂餞送者是也綏安也追綏總是一事古義王遣左右之臣追而餞之以安樂其心厚之無已也箋義淫大威則也毛傳謂用殷正朔行其禮如天子也鄭箋張叔翹曰用天子禮樂浸淫於尋常等威之外故曰淫威與亦白其馬相照夷易也毛傳大也王氏降福孔夷即指天子寵命及左右追綏之事易者無所顧吝大者莫能相尚言王之降福易且大也舊説謂神與之福上文並無鬼神事故不從此一節言其送之也什方張氏以周公誅武庚禄父為刑威言昔者既有淫威矣今則降福孔夷蓋順逆之理如此范傳嚴緝皆主之東萊詩記亦分注其説愚謂㣲子新受寵命來周為客天子褒崇越於常制至於已去猶復追綏眷厚如此而忽渉前事以傷其心豈所謂綏之者耶今詳周書㣲子之命極陳商先王之齊聖廣淵及㣲子之恪慎克孝而終以毗予一人世世享徳此為勅命之辭並無一語及紂與武庚之事今作詩美之而結乃示以威福非愚所敢安也立説不慎轉成疻痏不得不為辨之於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功後音户劉轉音盧功轉音鼓序曰奏大武疏云周家象武王伐紂之事作大武之樂既成而於廟奏之樂記子曰夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子康成云每奏武曲一終為一成陳氏樂書云周官大司樂奏無射歌夾鐘舞大武以享先祖則歌是詩而舞之可知記又言八佾以舞大武語其數也朱干玉戚以舞大武語其器也冕而舞大武語其服也於嘆辭皇大也集傳無競維烈義與執競篇同允信也信哉有文徳之文王能開其子孫之基緒即下所謂爾功也武王嗣以武功受之嗣武字與允文字對勝殷而止其殘殺然後爾功得致定也毛傳耆致也明非武王之武無以成文王之文也維清歸功文王為奏象言之此詩歸功武王為奏大武言之言各有當也詩緝愚按樂雖象武而詩以遏劉耆定為頌則大武之意在於止戈故能受文之徳而定其功也宣十二年左傳於文止戈為武武王克商作頌曰載戢干戈載櫜弓矢又作武其卒章曰耆定爾功其二曰鋪時繹思我徂惟求定其六曰綏萬邦屢豐年集傳引此則作首章孔穎達曰頌皆一章言卒章者終章之句也按傳所稱其三者賚也所稱其六者桓也既以桓為六成則武詩不應居卒孔氏以為終章之句者是矣又按武始而北出此篇有勝殷遏劉之言而獨被武名豈即武之首章歟傳不言二四五其存與亡不可知何黃如欲以勺般時邁當之勺般或可附會若時邁為告祭柴望之詩安得牽合闕之可爾閔予小子之什閔予四篇皆有事於廟中所作故繫之頌而祈報繹祭之詩附焉酌桓賚般皆舞樂故居後説者謂即大武諸成未知然否閔予小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘疚音几子疚隔韻造考考上去通庭敬平去通集傳曰此成王免喪朝廟所作本箋説疑後世遂以為嗣王朝廟之樂本序説閔悼傷之言也造成也武王崩而家道未成也鄭箋嬛嬛孤獨也李解疚病也毛傳匡衡疏曰焭焭在疚成王喪畢思慕意氣未能平也集傳皇考武王也皇祖文王也皇王文王武王也鄭箋陟降庭止匡衡引此句顔注云若神明臨其朝廷也集傳言武王終身能孝思念文王常若陟降於庭蓋念念與之參合精神感召自然如此此皇考繼皇祖之實所謂克孝者也今子小子敢不夙夜敬承其意乎因又歎息而言繼文武之緒不可一日而忘孝敬也詩所蔡宫聞曰敬字與孝字應思字與念字應夙夜與永世應按此便是繼序處古義云首三句明在喪中之辭又有皇祖夙夜之語與士虞禮合應為武王既塟卒哭祔廟之祭檀弓云卒哭曰成事是日也以吉祭易喪祭明日祔於祖殷練而祔周卒哭而祔愚按卒哭用樂於禮無考匡衡時未行毛説朱子已以喪畢為言相承應自有本今詳疏言小子在疚為喪中辭者以其服雖除去喪日近又敘其在喪之事故仍同喪稱陸堂謂三年喪畢祔祭升王此為近之訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙維予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身落轉力到反艾韻學集成與皚連聲落考艾韻渙難韻下家平上通末句不入韻集傳曰成王既朝於廟本疏因作此詩以道延訪羣臣之意本序前篇言不忘繼序此乃謀所以繼之也蘇説李迂仲曰成王朝廟之時羣臣在焉故因而訪之訪謀落始率循悠逺也毛傳艾盡也將扶將也紹繼也鄭箋紹庭二句與陟降庭止義同集傳似作别解今用古義昭考皇考皆武王也箋疏言我謀之於始以循我昭考之道而其道甚逺予不能盡也集傳賴爾諸臣扶將以進詩緝以為能就之矣而所以繼之者猶覺其分散而不合詩所蓋歎眇躬之凉薄苦前哲之髙逺也李解多難謂管蔡之事庭以外言家以内言言予幼冲小子未堪家之多難惟冀昭考之靈繼續而上下於庭陟降於家則自外至内皆有以保䕶而開明之顧命謂誕保文武大訓無敢昏渝詩所則王真能保明其身而有以承休於皇考矣詩則其自期之辭也胡一桂曰自繼猶判渙而上猶皇皇如有求而弗獲之意自維予小子而下則焄蒿悽愴若或見之愚按全篇皆繼序思不忘之意可見四詩總為一事而何氏分為兩事者誤矣敬之敬之天維顯思命不易哉無曰髙髙在上陟降厥士日監在兹維予小子不聰敬止日就月将學有緝熙于光明佛時仔肩示我顯徳行第一節平上通韻第二節子止韻将明行韻序曰羣臣進戒嗣王也箋云羣臣見王謀即政之事故因時戒之舊作兩節臣戒君答皆作頌者設為之辭詩緝第一節羣臣進戒也重言敬之者以祈其聽西山天道甚明其命不易保也無謂其髙而不我察當知其聰明明畏常若陟降於我所為之事毛傳士事也而無日不監臨於此者不可以不敬也集傳許白雲曰陟降厥士天無事而不在也日監在兹天無時而不在也君子所以無不敬也第二節成王答臣也不聰猶言不敏敬止者因羣臣之戒而從事於敬猶論語回雖不敏請事斯語之意下文所謂仔肩也舊解未融今用古義言我從事於敬惟有自勉於學使日有所就前篇将予就之是也月有所将将進也續而明之以至於光明則庶乎其可及耳集傳張文潛曰徳行固道之顯者也而成王尚欲使示之以顯徳行者蓋謂徳行之幽者未足以知之故曰示我顯徳行伊尹告太甲明言烈祖之成徳亦然予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼懲蜂蟲韻鳥蓼韻序曰嗣王求助也箋云天下之事當慎其小小時不慎後為禍大疏云於訪落言謀於廟則進戒求助亦在廟中與上一時之事沈萬鈳曰訪落謹始所以處常小毖謹後所以處變懲艾也鄭箋毖慎也毛傳懲以已然言毖以未然言古義蓋懲於管蔡之事而欲慎其後患也莫予荓蜂四句皆追咎徃日之失古義荓作迸見桑柔篇釋文驅也拚翻也鄭箋言無驅蜂螫我者乃我自求辛螫耳悔前之信管蔡也陸堂我今始信桃蟲之㣲能翻飛為鳥詩緝比武庚也説約此前事之當懲者也末二句乃示求助之意鄒氏言予既未堪家之多難矣可又集于蓼而重其苦乎所謂毖後患者也補傳詩所史記樂書云成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善守善終哉古義云此成王自怨自艾以歸誠於周公亦如太甲復辟而致辭伊尹者焉爾雅桃蟲鷦陸疏今鷦鷯也㣲小於黃雀其雛化而為鵰故俗語鷦鷯生鵰焦氏易林亦有桃蟲生鵰之語毛傳以為鳥之始小終大者本此爾雅薔􅀢蓼郭云澤蓼也陸佃云蓼生水澤者莖赤味辛羅願云越王苦思報吳卧則以蓼故毛傳以集蓼為辛苦載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百穀實函斯活驛驛其逹有厭其傑厭厭其苖緜緜其麃載穫濟濟有實其積萬億及秭為酒為醴烝畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹澤音鐸伯轉音補婦房以反畝滿以反穀音古與活逹傑為韻今與馨寧為韻蒸侵古韻本通邵長蘅以為古叶非也末句不入韻此春祈社稷之樂歌序以藉田言者李迂仲曰藉田之後因而祈社稷詩不言藉田也按月令藉田在孟春命民社在仲春此詩言藉田猶噫嘻言祈穀皆蒙上事而言之朱子疑兩篇無祈報意許伯政曰載穫以下皆祈年之正文愚謂操雞豚而祝篝車是其證也下篇殺時犉牡四句則報之事尤分明矣集傳分九節頗疑其碎詩貫分五節作四節看除草曰芟除木曰柞毛傳澤爾雅作釋釋釋土解散也孔疏耘去苖間草也集傳隰阪下隰也畛井間伯也説文載芟載柞四句為第一節詩貫云首二句提耕字次二句提耘字如七月首章之雙提衣食也主家長也伯長子也亞仲叔也旅子弟也毛傳强有餘力者周禮以强予任民鄭箋能左右之曰以所謂閒民轉移執事若今時傭力也孔疏嗿衆飲食聲媚順依愛也集傳夫耕婦饁驩然相愛見和樂之氣象焉詩緝略利也毛傳俶始載事也王氏侯主侯伯八句為第二節詩貫云第二節承言耕之事實種子也函含活生也鄭箋既種之其實含氣而生也集傳驛驛苖生貎蘇氏逹出地也鄭箋厭受氣足也傑先長者也集傳重言厭厭者見受氣皆足也説約緜緜詳密也孫炎麃是耘之别名孔疏播厥百穀六句為第三節詩貫云第三節承言耘之事濟濟人衆貎蘇氏實積之實也積露積也集傳説文云飶食之香有飶言食也楚辭言椒漿有椒言酒也於賔言食於老言酒互備也補傳振極也集傳烝畀祖妣内祭祀也以洽百禮則外祭統之矣先儒以百禮即指烝畀説恐未然由是以享賔客則邦家用以光焉以養耆老則胡考用以寧焉葢不獨此地此時有此豐年之慶也自極古以來有祈必應如此援已徃以信将來也尊卜蓋極其禱祝之辭載穫濟濟十三句為第四節皆侈言神貺以道其願望之忱古者祈田之辭往往如此孔疏社與耕藉異月而皆在春故以春總之祭法王為羣姓立社曰泰社王自為立社曰王社此為百姓祈祭當主於泰社質疑曰按陳氏禮書祭社必及稷王社侯社無預農事皆不置稷大社國社則民之祈報在焉故皆有稷也今云祈社稷則為泰社無疑矣按集傳引或説以思文臣工噫嘻豐年載芟良耜六篇為豳頌而云未知是否朱子固未嘗主張或説而何氏古義且以載芟為臘祭良耜為蜡祭而實之為豳頌以愚觀之有不然者何氏尊信季彭山古義中多用其説而季氏解頤則曰天子祭社稷用太牢諸侯則少牢而已良耜有殺時犉牡之言故當為王者之詩不可列於豳也其言確鑿可據何氏乃謂教民美報故隆其禮慿臆武㫁此豈足以折漢儒之角耶夫朋酒兕觥豳之民也用匏執豕豳之君也今則飶香椒馨椎牛以祭猶謂是公劉時詩誰能信之蓋豳雅豳頌疑與六笙九夏同亡矣豳雅説詳見楚茨十章辨畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人糾趙蓼朽茂上去通角音陸與續為韻末句不入韻此秋報社稷之樂歌疏曰經言百室盈止婦子寧止乃是場功畢入當十月之後而言秋報者先陳人事使畢然後言其報祭按疏剖晰甚明而其下又云報祭在秋寧止在冬則非也月令孟冬大割祠於公社此寧可移之秋者序意謂秋成故報社稷耳惟有秋乃有報祭故以秋言之不必膠柱鼓瑟也詩緝謂預言冬穫者亦非舊分四節體製如大雅文王篇自首節外節節相承陸堂今仍之集傳分六節畟畟嚴利也舍人曰耜入地之貎孔疏畟畟良耜四句為第一節言既耕而播種也瞻女謂婦子來饁者也鄭箋筐筥饟具也集傳笠所以禦暑雨毛傳糾繩三合也説文以繩結於頷下使不動也箋以為糾然者非趙刺也毛傳媷去也集傳或來瞻女六句為第二節言耘苖也家織簾曰前篇餉耕在播種前此餉耘在播種後也挃挃穫聲也毛傳栗栗堅實貌詩緝周禮五家為比五比為閭四閭為族是百室為一族於六鄉則一族於六遂則一酇遂人云百夫有洫故知百室共洫間而耕也孔疏開者謂百家開户納之鄭箋荼蓼朽止七句為第三節言收穫也殺草糞田而苖盛故納穀多也黃牛黑唇曰犉毛傳地官牧人云凡隂祀用􅉳牲注云祭地北郊及社稷也然則社稷用􅉳牛而用黃者蓋正禮用􅉳至於報功以社是土神故用黄色仍黑唇也孔疏捄曲貎集傳社稷之牛角尺毛傳以似以續者興來嵗續徃嵗也續古之人者不替其先也蘇氏二句乃祭畢祈神之辭周禮所謂社之日涖卜來嵗之稼是也百室盈止六句為第四節乃正言報祭之事李迂仲曰噫嘻豐年祈上帝所以尊之也故其辭略載芟良耜祭社稷所以親之也故其辭詳又曰祈之之詩則詳其耕種之事報之之詩則詳其收成之事載芟言以洽百禮者願其年豐而百神之祀無闕也良耜言殺時犉牡者則專主祭社稷而言二詩之意亦明矣古義曰經有三荼一曰苦荼爾雅所謂荼苦菜者也一曰英荼爾雅所謂蔈荂荼者也一曰委葉爾雅所謂蒤委葉者也据爾雅注引此詩以解委葉故疏亦引之然形狀無文但云穢草耳攷爾雅又有蒤虎杖之目疏引本草注云此物田間甚多狀如大馬蓼形斑而葉圓疑此即委葉其形當與蓼相近朱子亦云蒤陸草蓼水草一物而有水陸之異也蓼見小毖篇絲衣其紑載弁俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩㫖酒思柔不吳不敖胡考之休釋文紑孚浮反鼒音兹基鼒隔韻序曰繹賔尸也箋云繹又祭也天子諸侯曰繹以祭之明日大夫曰賔尸與祭同日疏云繹與賔尸事不同而此云繹賔尸者繹祭之禮主為賔事此尸繹是此祭之名賔尸是此祭之事按序下有髙子曰靈星之尸也鄭志答張逸云髙子之言非毛公後人著之是毛公前早有此文矣疏云髙子與孟子同時趙岐以為齊人愚謂髙叟為詩見於孟子其授受當有自來特無他經可證故康成不敢据以為説非如後儒所駁也説詳於後今就箋義釋之上五句是祭之初下四句是祭之末孔疏當分兩節看絲衣祭服也毛傳大夫以上祭服謂之冕士祭服謂之弁其首服弁則衣用絲也曹氏其實祭服皆用絲以弁為異耳載猶戴也弁爵弁士服也繹禮輕故使士鄭箋紑絜鮮貎俅俅恭順貎基門塾之基毛傳繹祭於廟門外西方謂廟門西夾之堂基也孔疏門之内外夾東西皆有塾一門凡四塾外兩塾南向内兩塾北向謂之堂則宜有基矣詩所指則内塾之基也安成士升門堂視壺濯及籩豆之屬降徃於基凡濯者告濯不濯者告具時王在門内故自堂往而告之也自羊徂牛者省牲之事先小後大以為行事之漸孔疏牲在鼎南既省之反至堂基而告充焉鼐鼎及鼒者舉冪之事先大後小以明輕重之等鼎在門外既舉其冪亦反至堂基而告絜焉此五句為第一節言反覆展視所以極盡其誠敬也兕觥罰爵也至旅酬而用兕觥變於正祭也孔疏觩然上曲徒設而不用者因此與祭之人飲美酒而容柔和無有讙譁倨慢無所用其罰爵也祭前整絜詳慎祭後復敬靜如此則當祭之謹於禮可知李講以是而得壽考宜矣胡考之休應歸主人説疏云卑者恭慎則當祭之尊者可知講家不詳疏義謂是獻宗祝之屬非也此四句為第二節言祭畢而獲福也此詩與鳬鷖相表裏鳬鷖主公尸説此主與祭者説禮書曰周禮有韋弁無爵弁尚書儀禮有爵弁無韋弁孔安國云雀韋弁也劉熙釋名亦云以爵韋為之謂之韋弁則爵弁即韋弁耳荀卿曰士韋弁鄭氏獨謂冕之次古弁象形其制上鋭若合掌然非如冕也愚謂冕之次者謂冕之下即爵弁耳陳氏自誤㑹鄭意古義曰鼐爾雅説文皆云鼎之絶大者鼎三足兩耳和五味之寶器也爾雅圜弇上謂之鼒孫炎云鼎歛上而小口者陳祥道云天子諸侯有牛鼎大夫有羊鼎士豕鼎魚鼎而已上得兼下下不得兼上則鼐特王有之也李迂仲引孟子固哉髙叟之言謂後人不當以其言列之於此按髙叟之固在説詩之義非必其得之見聞者皆妄也孟子稱之曰叟實之曰為詩其人當是長年前軰習於詩學者不當以孟子所摘蔽其生平之言也康成説經迂曲處時類髙子将謂康成可廢耶黃實夫謂靈星之尸未之前聞按漢初詔立靈星祠髙帝亦無前聞而以意創為之耶髙子周人非若漢儒之引漢禮釋經也先儒以靈星為農祥禮書見於周語虢文公農祥晨正土乃發脉伶州鳩辰馬農祥也晉語董因辰以成善后稷是相之言祥於韋昭注周語以為房星注晉語以為心星皆大辰也應卲賈逵龍第三星為天田星辰星為靈星之注漢舊儀謂古時歳再祭靈星春秋用太牢論衡云今靈星秋雩也通典云周制仲秋之月祭靈星於國之東南皆前説之可徴者嚴氏質疑又謂宗廟之祭有尸靈星不應有尸尸亦不應有繹考夏官節服氏郊祀送逆尸注引晉語晉祀夏郊董伯為尸又秋官士師職云祀五帝則沃尸是郊祀有尸也曲禮疏云凡社稷山川四方百物及七祀之屬皆有尸則靈星亦應有尸矣有尸何必無繹特古禮無文聖人所以有不足徴之嘆也古説之存於今者罕矣謂遂當削之者過也存其説而不論庶幾闕疑慎言之意耳於鑠王師遵養時晦時純熙矣是用大介我龍受之矯矯王之造載用有嗣實維爾公允師師熙韻晦呼外反晦介隔韻受造韻嗣師平去通序曰告成大武而詩名酌者衍序云言能酌先祖之道以養天下鄭箋專釋首句疑鄭意不取衍序也愚謂序下之言乃從末二句取義非無當也漢志周公作勺勺言能勺先祖之道也師古謂勺讀酌則酌之取義相傳久矣故仍其説而推之鑠盛也集傳王師武王之師也箋指文王非也武王有甚盛之師退自循養蘇氏不耀其威本義所謂時晦也熙光也介甲也集傳龍寵也鄭箋造為也毛傳猶作也田間王之造武王之造也天運無久晦不明之理王者無坐視塗炭之心詩牖既純光矣不得已而一著戎衣以定其亂集傳遂受此天寵以成矯矯然王者之造易所謂大人造者是也詩牖曰時何以晦遵養而晦非與時俱晦也時何以純熙用大介而純熙非與時俱顯也武王卷舒乎時而非因時為卷舒一造字最有意按此真説得聖人樂天氣象出於本詩造字亦洗刷到骨也嗣繼續也即嗣武受之之嗣公公心也言武王矯矯之造非富天下也信能師法文王大公之心而繼續之故曰載用有嗣實維爾公允師也古義曰詩與武篇文義相屬所謂酌先祖之道者如此詩作於成王時而曰先祖者主成王言耳李迂仲曰王氏以我為成王歐陽亦以為成王寵受而承之但此詩言武王之事則知我是武王也集傳酌即勺也内則十三舞勺即以此詩為節而舞之也儀禮燕禮記注勺頌篇告成大武之樂歌也既合鄉樂萬舞而奏之所以美王侯勸有功也獨敖繼公儀禮説謂勺舞名但不詳為何代之樂詩緝亦言此酌是武舞之樂章非舞勺之樂章今按内則成童舞象既是維清則十三舞勺何以非於鑠之詩自當以舊説為安特以象為武舞勺為文舞則非耳辨見維清篇郝仲輿云酌亦武樂但未定第幾章耳何黃如謂是武之再成似與樂記再成而滅商相合至謂是詩亦名武夙夜則不敢知綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之邦年分韻起王方與邦為韻間讀平聲天間與年為韻序曰桓講武類禡也序下言武志乃再書桓字似别建一義者其實因序語與經語不類恐啟學者之疑故續著之以明序説之有自來非兩義也蓋講武類禡志在克敵致果而已周公特本武王之志以為在於保士定家既制為武樂又於類禡時歌此詩所以告後世使法武王也衍者知其義為補序説所未備於孔子與賔牟賈論武樂之㫖及楚莊王武有七徳之説皆合集傳謂取其義而用之於其事者得之桓桓武貌錢氏厥士昔與武王定天下者康王之誥所謂有熊羆之士不二心之臣是也古義間代也毛傳多方云天降時喪有邦間之謂使有國聖人代之同此義也補傳言武王克商以安天下數有豐年左傳謂周饑克殷而年豐其實周之年豐不止於克殷之年故云屢也豐年之應即天命所在詩牖天命之於周久而不倦者由桓桓然威武之武王能保有其士詩緝使之經營四方以安定厥家所謂武志也變萬邦而言家者武王以天下為家定之所以綏之也於是嘆美其徳上昭于天遂君天下而代商也詩緝陸奎勲曰据左傳桓為大武六章賚為三章漢儒訛其先後杜注疑楚樂與周互異非也又曰据樂記六成復綴以崇天子與詩言克定厥家皇以間之甚合當屬大武六成之末其以桓名篇則篇中明言桓桓不與酌賚般同例何楷曰首章言於皇武王此曰皇以間之蓋相為首尾之辭馮疏小宗伯云凡天地之大烖類社稷宗廟則為位大祝六祈一曰類禮書云類皆有所祈其禮劣於正祭又爾雅類為師祭詳見大雅皇矣篇文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思定命韻兩繹字自為韻思字不入韻序曰大封於廟而序下復言賚予也言所以錫予善人蓋本論語周有大賚善人是富以釋大封名賚之義非專為賚字作訓詁也按武成祗言大賚於四海而孔子著之曰善人是富其必有所据矣所謂富善未必專指大封而大封尤富善之大者周禮云禄以馭其富洪範云凡厥正人既富方穀是富善為爵賞之明證也故朱子於此詩宗序説論語集註亦引此序言之敷布也繹尋繹也集傳止思皆語辭箋以思為思行集傳以思為思念今從蘇范説敷時之時時也時周之時是也詩言武王大封之事而述其意也文王既勤止無逸所謂自朝至於日中昃不遑暇食也我應受之武成所謂予小子其承厥志也舊謂受其位而有天下者非敷時以下勅勉諸侯之辭古義言今日大賚善人封建厥國與共天下王氏所布告於爾張記爾當時時尋繹者古義豈有他哉我惟欲循文王勤止之道行之天下以求安定耳孔疏繹字連下求定為義文徳自在其中不必謂尋繹文徳命即大封策廟之命舊謂受天命者非言是我周新命爾當敬承勿替故又咨嘆而申勅之令其徃復尋繹也舊説頗費解今集詩家言而參以鄙意釋之疏曰樂記武王克殷未及下車而封薊祝陳下車而封杞宋又言将率之士使為諸侯是大封也昭二十八年左傳昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人古文尚書武成篇武王克殷反祀於宗廟列爵惟五分土惟三大賚於四海而萬姓悦服皆是武王大封之事祭統曰古者明君必賜爵於太廟示不敢專也又引皇甫謐之言以為大封是伐紂之年事則春秋傳謂大武之三章信矣按樂記三成而南亦與反祀周廟相合於皇時周陟其髙山墮山喬嶽允猶翕河敷天之下裒時之對時周之命嶽轉音峩下音户嶽河下平上入通對轉音敦命轉音民對命去入通時邁序曰廵守祭告柴望也故開口即言昊天而河嶽則總言之此序曰巡守而祀四嶽河海也故詳言河嶽而不及昊天言各有歸樂亦各有用而説者以陟髙山為柴望陸聚緱所以疑其複出也又時邁言式序在位此篇言裒時之對詩中明有諸侯之事序以頌主告神故未及耳箋乃以式序為俊乂裒對為神明置解迂曲今從集傳首言於皇時周者提唱興朝以新天下之耳目也髙山即喬嶽古義墮則山之狹而長者集傳家仲恭曰謂其旁小山也天子巡守所至則登其髙山而祭之謂每至其方告祭其方之嶽也孔疏髙也墮也喬也指一處言允猶翕河則周四嶽矣詩牖猶與由同集傳翕合也毛傳翕而不為暴也集傳此皆秩祭之事山言陟河言由皆至其地而次第祭之箋連望秩為文者以序有四嶽及海之故若據經文祗是秩祭而非望也後人并連柴望言之於經義序説皆失矣敷徧也鄭箋徧天之下莫不有望於我故聚而朝之方嶽之下以答其意集傳時周之命者重加提唱使首尾相應所謂薄言震之莫不震叠也古義曰祭祀特巡守中首事諸侯各朝於方岳尚有考制度明黜陟等事則篇中後三句是也箋訓槃為樂曾氏引説文云槃旋也後人都用曾説愚謂巡守固非行樂亦豈徒取槃旋古人名篇都有不可曉者不必强為之解也范傳以為成王之頌鄒忠𦙍引史記武王三塗嶽鄙顧瞻河雒之語謂是武王欲定都河洛之詩皆不可據何黄如謂是武樂四成以酌桓賚般相次觀之或有然者虞東學詩卷十一
