body:
  text: 虞東學詩卷四宗人府主事顧鎮撰齊周既東遷鄭不能輔於是王道缺微霸功興矣齊為霸始故次王鄭先儒之論如此按齊俗以功利夸詐為事故其音敖辟驕志而季札聞歌獨歎為泱泱大風當美其聲調之鴻溶異於鄭之細已甚也樂記謂三代之遺聲齊人得之或其然歟堯峰汪氏疑季札别有見聞又以孔子不録齊國正風疑所見不逮季札陸奎勳氏且謂雞鳴作於丁公三世之內而子夏所云敖辟驕志者當屬齊景公時此揚子所謂羣言紛亂者也竊意齊風十一篇刺襄公者凡四猶鄭之刺忽邶鄘之刺莊宣其簡獨多蓋詩之近者存而逺者亡也南豳雅頌逺而不亡者以其為樂所常用耳其不常用者散失亦多今變雅所存皆厲宣幽平之作豈昭穆以降絶無風刺之篇耶其失之者久矣春秋左氏傳自昭定而後其文獨繁此其驗也按史記武王封師尚父於齊都營丘漢志為齊郡臨淄縣今𨽻青州府至成王平薄姑之亂因以其地益齊正義蓋初封時地方百里至成王斥大其封乃得上公之地五百里也鄭氏左傳晏子曰昔爽鳩氏始居此季萴因之有逢伯陵因之薄姑氏因之而後太公因之蓋太公本都營丘五世胡公始遷薄姑其弟獻公仍還故都也史記薄姑亦曰姑棼即今青州府之博興縣管仲稱先王賜履東至於海西至於河南至於穆陵北至於無棣蓋東盡登萊之境西界德州九河故道在焉方輿紀要云穆陵關在今青州府臨胊縣東南百有餘里大峴山上山髙七十丈周回二十里道徑危惡一名破車峴為齊南天險今直𨽻天津府之慶雲縣及山東武定府之海豐縣皆無棣地舊為鹽山縣見杜氏通典至元分其地置兩無棣縣明改今名其地皆有無棣溝亦名無棣河見水經注今淤索隱謂淮南有故穆陵關無棣在遼西孤竹非其實也雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢㑹且歸矣無庶豫子憎明古彌郎反音芒夢古莫滕反音盟後並同序曰思賢妃集傳因之衍者屬之哀公已是臆說後人或謂衛姬針桓公之作尤不可據嚴緝謂直刺荒淫更屬妄說黃氏日抄云古說皆謂賢妃欲其夫之早起誤以蠅聲為雞聲毛鄭朱皆同至曹氏始謂哀公以為蠅聲嚴氏宗之謂雞未鳴之前無蠅聲也愚按據曹說是蠅聲晚雞聲早哀公既不欲早起何反以聲之早者為晚其說顯自矛盾白雲許氏又以一章為賢妃之相警二章為國君之相拒安溪李氏復疑月出之光為日出之光不知詩人摹擬賢妃恐晚神情恍惚疑似蠅聲月光皆歸想像無容泥滯集傳作三告看次第宛合張次仲謂一章疑其已遲二章幸其尚早三章蟲飛同夢是反語殊勝前說子之還兮遭我乎峱之閒兮並驅從兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮茂古音耄後並同此與前篇集傳皆從序說特不質其為哀公耳然曰俗之不美其來必有所自則刺荒之意亦見矣還便捷之貌茂美昌盛也儇利也集傳好技藝好也善技藝善也黃氏還茂昌已譽人儇好臧人譽已也章潢詩緝解首章曰以子之能尚且見推此自矜於其黨以氣陵之之辭讀詩記曰齊以遊畋成俗詩人載其馳驅而闕屏之間曰闥此據卿大夫以下言皆不在大門以外而儀禮注門外謂壻家大門外則俟於門外非著也當時古禮盡廢既無壻往婦家之節而婦至壻家其禮亦復簡略曰俟著不復行俟於門外之禮矣曰俟庭不復行寢門揖入之禮矣曰俟堂不復行升自西階之禮矣節節與記傳所引者相反故詩人連下九乎而字言不過如是云云也逸齊有其說而於俟著俟門猶似混併為一今為剖别而著其義如此漢志述齊風俗引此詩曰俟我于著乎而亦其舒緩之體差得其意充耳以素青黃言其紞也瓊華瓊瑩瓊英乃紞下所懸之瑱疏言紞之色無正文以經言素青黃故箋曰臣三色人君位尊備物當具五色陳祥道曰辨師王五冕皆玉瑱而詩於衛夫人言玉瑱則不特施於男子也冕服用瑱而詩言充耳琇瑩㑹辨如星則不特施於冕也何𤣥子謂惟冕服用充耳一命以下不得用則士喪禮所謂瑱用白纊檀弓所謂練角瑱者何氏殆未之詳歟明瑱之不獨用於冕則異說可以息矣東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我發兮闥曷韻發月韻本通序曰刺衰而衍者以君臣失道男女淫奔贅之毛鄭因以日月喻君臣支離彌甚黃氏日抄載戴岷隱之言謂男女相奔不夙則莫故以東方日月為言蔡氏德晉言安有淫奔而日出始至月出即去者乎三復此詩未見淫奔之意而章首兩言尤難指論穢事集傳置之不解亦何緣得作者本指惟李文貞公詩所謂此詩似是與著相答差近情理近日許氏詩深復援昏禮以實之其言曰在我室媵既布席於奧夫入室即席其時婦在室中尊西南也履我即贊告具壻乃揖婦即對筵皆坐也闥房户也在我闥用卺之後壻出脫服於房婦亦脫服於室壻乃入親脫婦纓是在房户之間也脫寫曰發揚子方言青齊海岱謂之發是發即脫服也按此引禮視前吕記所引較切本義云日月擬女子顔色美盛蓋本薛君章句鄒忠𦙍引神女賦云其始來也耀乎若白日初出照屋梁其少進也皎若明月舒其光興意當如此所以謂刺衰者承上篇言婚姻正始之事疏於禮節惟昵情好故上篇徒陳其佩服之盛此篇極形其宴爾之私無復關睢好逑桃夭宜室之美以是為時之衰也如今說則當云刺淫刺亂矣安得微其詞而謂之衰也故録詩所詩深之說以存其義以質世之好學者若釋文云本或作刺襄公何黃如即意為為文姜作此不敢從東方未明顛倒衣裳顛之倒之自公召之東方未晞顛倒裳衣倒之顛之自公令之折栁樊圃狂夫瞿瞿不能辰夜不夙則莫明彌朗反令力珍反夜音豫莫上去通辰夜之辰集傳誤作晨序刺無節衍者云挈壺氏不能舉其職郝仲輿謂不敢斥君而求諸挈壺氏所謂敢告僕夫云爾毛鄭泥於其說乃以末章之狂夫瞿瞿為斥挈壺氏之失職謬矣愚意折柳樊圃是立限自防之意狂夫瞿瞿齊民要術所謂姦人慚失而返也不能辰夜不夙則莫正衍序所謂興居無節號令不時者是自毁其籓而招狂夫之窺伺也詩不言而取喻之義有屬則此詩之刺亦因以為戒也說文栁小楊也或以為水楊本草注云水楊葉圓濶而赤枝條短硬栁葉狹長青緑枝條長軟與水楊全不相似南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷止葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止藝麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止雙古書容反畝古滿以反告鞠轉韻前二章刺齊襄後二章刺魯桓集傳用吕大臨說吳易堂曰前兩言齊子是文姜後兩言取妻是刺魯桓要皆所以刺襄公也愚謂懷是相懷從是相從章首既以南山雄狐發端是意主於刺襄以及文桓耳屨必兩緌必雙物各有耦不可亂也集傳屨以五言者屨有纁黃白黑散五等也周禮屨人注箋說殊謬屨必兩隻相配故以一兩為一物孔疏結纓頷下以固冠結之餘者下垂謂之緌禮記注緌必雙方可對結衡從其畝毛謂橫獵之從獵之疏云既耕而東西踐躡概摩之也鞠養也謂養其奸下章乃言極其欲吕記集傳以前二章為比後二章為興今從毛通作興無田甫田維莠驕驕無思逺人勞心忉忉無田甫田維莠桀桀無思逺人勞心怛怛婉兮孌兮總角丱兮未幾見兮突而辨兮田人驕忉隔句韻孌丱見辨上去通此大夫刺襄公之詩味其語意實有老夫灌灌之忠蓋田甫田而力不給則莠盛思逺人而德不修則心勞蘇氏故積小然後成大由邇乃可達逺襄公不務修德而求大功求諸侯猶童子效成人之冠服殆可笑矣范補傳詩緝詩故皆同孟子曰以若所為求若所欲猶緣木而求魚也可作是詩義疏吕記以末章為由道循序則小者俄大微者俄著此本箋說恐非詩義集傳為比今從毛作興國語韋昭注莠草似稷無實今之狗尾也集傳丱兩角貌詩緝云兩角如丱字之形楊慎云周官有丱人丱金未成器也借作童丱之丱盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲令力珍反此與還序俱曰刺荒集傳謂大意與還略同是也而衍者謂陳古以風則疑於美仁之辭也不如叔也洵美且仁叔亦古人耶又豈有陳古而及其鬈偲者甚矣講師之固也按國語桓公語管仲曰昔我先君襄公田狩畢弋不聼國政卑聖侮士而惟女是崇則其荒可知矣盧駿犬也國䇿令令纓環聲毛傳重環子母環也毛傳謂大環貫一小環也孔疏重鋂一環貫二也毛傳謂一大環貫也小環也孔疏鬈髮好貌說文偲毛訓才集傳易為于思之思當以集傳為是敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水鰥雲删文通序曰刺文姜衍之者謂惡魯桓公微弱不能防間蓋從敝笱取義集傳改桓為莊謂文姜在桓公時猶未恣行至莊世乃往來無忌然考莊二年至七年經書姜氏㑹齊侯者三享齊侯及如齊師者各一皆於齊魯之境未嘗歸齊如下篇載驅所云是其事也此詩三言歸止惟桓十八年經書公與夫人姜氏遂如齊乃歸齊實事公羊𫝊何以不言及夫人夫人外也穀梁傳不言及夫人以夫人之伉趙氏曰如齊者文姜志也非公志故不書及李氏曰知春秋書與之意則知敝笱之刺文姜矣蓋桓以篡弒得國結婚於齊以自固姜知公之中怯也故挾齊以縱欲而公卒無如之何擬之於笱蓋亦敝矣觀於其從之多如雲如雨而終以如水則决流而下勢不可遏正公榖所謂外而伉者夫豈敝笱所能防哉衍序之說固無誤也魴鰥魴鱮宜從毛作大魚唯唯亦從毛為出入不制至毛鄭以歸止為文姜初嫁其從為姪娣則失矣今從集傳興則從毛孔叢子衛人釣於河得鰥魚其大盈車嚴緝駁之謂入笱中必非大魚愚按大魚以喻文姜之驕伉但承敝笱言之不必其大盈車者要非尋常小魚也載驅薄簿簟茀朱鞹魯道有蕩齊子發夕四驪濟濟垂轡濔濔魯道有蕩齊子豈弟汶水湯湯行人彭彭魯道有蕩齊子翺翔汶水滔滔行人儦儦魯道有蕩齊子遊敖夕古祥籥反載驅刺襄公毛鄭俱以上二句指襄下二句指姜集傳改為刺文姜嚴華谷言四句分作二人詞意斷續必並言文姜文方貫也今按春秋莊二年冬夫人姜氏㑹齊侯於禚音灼杜注齊地傳曰書姦也七年春㑹齊侯于防胡傳魯地傳曰齊志也杜氏以為至齊地則姦發夫人至魯地則齊侯之志詩中四舉魯道兩言汶水始終不及齊境正杜所謂至魯地為齊侯之志者况首言載驅薄薄明已在道疾行末言齊子發夕明是聞襄來而連夜啓行赴之若叙一人之事豈容先在道而後啓行傳箋無誤文亦無不貫也齊子豈弟集傳從毛作樂易解極穩吕記曰姜惡不嫌同辭按車蔽曰茀疏曰車後户也簟方文席編竹為之郭氏璞曰以簟衣後戶也陳氏祥道曰以簟衣軾所以禦前爾雅前謂之禦是也以簟衣後戶所以蔽後爾雅後謂之蔽是也衛夫人之車以翟茀齊襄方叔之車以簟茀此婦人男子車蔽之别嚴緝引衛風翟茀證此詩則疏矣革路之制以皮挽之而漆以朱所謂朱鞹也以革􅀈軾爾雅謂之鞎音痕以革􅀈後戶爾雅謂之茀蓋同為後戶之蔽故通謂之茀非此詩所謂茀也汶水有二一出萊蕪縣原山入濟桑欽一出朱虛縣東泰山入濰許慎曽氏彥和曰入濟者徐州之汶入濰者青州之汶按錐指原山今名嶽陽山魏收志馬耳山出汶水即此山也以今輿地計之汶水自萊蕪泰安肥城寧陽至東平入濟水經所謂北汶也又按春秋疆域表泰山之陽為魯其隂為齊魯之萊柞二山在今萊蕪寧陽境則兗州府北五十里皆魯境惟肥城為齊平隂地而錐指稱肥城縣有蛇丘故城本魯蛇淵囿汶水徑其南則汶水所經之肥城亦魯境也蓋原山之汶錦亘數百里或分或合出入皆在魯境馬之貞臨清新閘記凡東蒙徂徠之隂岱嶽之陽諸山溪澗之水皆潨於汶魯之大川也書詩春秋所謂汶者皆指此其出於東泰山者說文謂之東汶北流至淳于縣入濰在今臨朐安丘界經中所言無指此水者自淮南子言汶出弗其西流入濟遂以青州之汶混入徐州嚴緝謂汶水在齊境豈由淮南子而誤耶按弗其山在朱虛縣屬青州其水入濰不入濟猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮末章上去通猗嗟刺莊向無岐說集傳云齊人極道魯莊公威儀技藝之美所以刺其不能以禮防間其母若曰惜乎其獨少此耳最能道出詩人微文婉刺之義按詩中重美疊贊不啻口出而三章皆以猗嗟發端微妙可思孔疏猗是心內不平嗟是口之喑咀皆傷嘆之聲此詩疑莊公在齊齊侯與行賔射之事詩人即其事以為刺也凡禮射皆三故本詩三言射事每章皆先美容貌者公羊傳宋萬曰甚矣魯侯之淑魯侯之美也天下諸侯宜為君者惟魯侯耳則公之美當時蓋侈稱之矣古義古文而若通用抑而揚進退髙下不失其宜也詩緝揚者目之動集傳人心慧則目多采也論衡禮有徐趨疾趨為之有巧有拙孔疏故毛以蹌為巧趨貌此因其貌美而及其威儀之善也射則臧乃初射之事蓋因下二章詳言公射故於三耦初射之時預道其臧以引起下二章也目上為名爾雅文也宜從毛傳清目清明也宜從集傳儀既成謂終射之事無違禮也中離維綱揚觸捆復公則釋獲大射禮文此優君之意禮注今云終日射侯不出正兮則發矢皆在正之中非中離維綱揚觸捆復者比也此言正射釋獲之事所以著臧之實也展我甥兮昵之之辭諸儒皆謂微辭此因左傳桓公語遂承箋說為言恐詩人未必有是意也舞則選兮乃以樂節射之事射必有燕燕禮記謂若舞則勺是也毛訓選為齊即薛君章句謂樂應舞節也貫古亂反大射禮謂不貫不釋是也四矢反言復射皆得其故處鄭箋以禦亂如以金僕姑射南宫長萬可見集傳公之容貌威儀技藝備美如是而有大不概於人心者詩人所以嘆傷也按公在襄世無如齊事惟四年冬經書公及齊人狩于禚禚齊邑也豈因狩禚而如齊耶今固不敢質言然非公身在齊齊人何由歌之如此其詳今玩詩意皆屬目睹其事者非虛言也安溪詩所謂莊公始十餘嵗惡能以禮防間其母此殊不然按莊公嗣立年已十三二年冬十二月姜氏㑹齊侯於禚則已十五嵗矣豈得謂童稚無知耶趙氏匡曰哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行誠敬之不立耳此不易之正論也莊公於殺父之讐漠不動念方且為之主婚為之伐衛為之助逆抗王甚至與之同狩汲汲焉奔走不暇惟恐失其歡心猶曰怵其强也至於襄弒國亂反為興師納糾助幼奪長何又怯於復仇而勇于助亂耶比於唐之中宗宋之髙宗是其流亞爾考工記梓人為侯天子大射用皮侯而設鵠賔射用布侯而畫正燕射用布侯而畫獸詩言正則賔射也孔疏正大如鵠參分侯廣而正居一焉大侯侯身長一丈八尺正方六尺參侯侯身一丈四尺正方四尺六寸大半寸干音犴侯侯身一丈正方三尺三寸少半寸正之言正也射者內志正則能中正亦鳥名鳥之捷黠者射之難中以中為俊故取名焉魏魏檜皆國滅史亡無世次可考故序不著其君先儒以此證序說之妄謂凡指君指事者都是依托附㑹其無可托据者便不能措說可見是後人僞託愚以為惟其如此故序說尚可徵信若如豐坊輩僞書便慿臆杜撰矣既無史傳可稽何從摘其謬戾而慎不敢言哉知序非不知而作也鄭以上五篇刺儉下二篇刺貪其事相反分為二君愚以貪者必鄙非相反也潁濵以官名似晉欲以邶鄘例之朱公遷曰國小無政似非晉事愚按孟子齊亦有公行仲子鄭譜魏者舜禹所都之地在禹貢冀州雷首之北在蒲坂南析城之濵山名在濩澤西南其封域南枕河曲北涉汾水周初以封同姓後為晉獻所滅以其地賜大夫畢萬漢志河東有河北縣詩魏國也孔氏云舜都蒲坂禹都安邑皆逼近之謂境內有其地耳魏實居河北水經注云故魏國城南西並去大河二十餘里北去首山十餘里處河山之間其地迫隘馮疏山西解州平陸縣北五十里有魏侯城即古魏國漢於此置河北縣按春秋大事表今解州芮城縣北五里為春秋時魏國其在平陸者為虞國縣東北五十里者為虞顛軨坂僖二年晉假道於虞曰冀為不道入自顛軨伐鄍三門即此馮疏失之糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之好人提提宛然左辟佩其象揥維是𥚹心是以為刺次章平去通序曰刺𥚹蓋指貴家大族言之范逸齊謂今人呼尊貴者為好人是也詩故云冬服夏屨女執婦功在貧賤可耳貴者之家則固陋矣然葛屨只是縫裳之興詩即縫裳以見其餘非以葛屨為刺也傳箋非是傳以好人屬女箋以褊心屬君文義不貫今從集傳上章言夏屨用以履霜喻未廟見之婦使以縫裳傳言婦人三月廟見然後執婦功又使治其下裳之腰上衣之領而尊貴者服之以為利便則淺狹可知矣次章言服此要襋之人容止安徐而審諦孔疏又宛然毛云辟貌退讓以明禮其佩則以象骨為揥而飾之威儀嫻雅寬讓有度無可議者獨其中之褊急為可刺耳毛不言興今從集傳為興士冠禮屨夏用葛冬皮屨糾糾毛訓繚繚正義釋為稀疏集傳繚戾寒凉用其意也嚴緝謂葛屨既敝而以繩糾纒之其義亦通宛然左辟蘇氏謂謂讓而避者必左徐鳯彩曰古人以右為尊故讓者避右就左也彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路彼汾一方言采其桑彼其之子美如英美如英殊異乎公行彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族莫音慕藚音俗序曰刺儉衍之者言其君儉以能勤刺不得禮也疏引王肅孫育說皆以為大夫采菜崔靈恩集注序云君子儉以能勤疑今本脫子字康成泥於其君立說遂謂魏君於汾水漸洳之中采莫以為菜則傎矣許白雲謂大夫而為細民之事是急於利而用心褊也張七澤曰正與公儀休拔園葵相反蓋亦是舉一以見之其儉嗇處不止此也故集傳以為興山海經管涔之山汾水出焉春秋大事表汾水出太原府靜樂縣北百四十里之管涔山自臨汾徑絳縣故城至蒲州府滎河縣北折而入於大河王伯厚云入河之處即魏之舊國陸疏莫莖大如箸葉厚而長有毛刺其味酢而滑始生可為羮五方通謂之酸迷河汾之間謂之莫爾雅藚牛脣郭引此傳水舄也如續斷寸寸有節拔之復生陸疏以為澤㵼按爾雅蕍蕮郭謂今澤瀉則藚非澤㵼明矣英當如集傳訓華毛傳萬人為英則如字贅矣公行公路正義以為一官以其主君路車謂之公路又主兵車之行列謂之公行卿大夫之庶子為之公族主君之同姓卿大夫之適子為之宣二年傳趙盾請以括為公族盾自為軞音毛車之族注曰公行之官是也孔疏疏因周官無文故引左傳釋之非以是詩為晉詩也園有桃其實之殽心之憂矣我歌且謡不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有棘其實之食心之憂矣聊以行國不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思此篇格律聲調不異黍離特黍離作於已亡之後故只呼天而寄其怨此詩作於未亡之時故猶反覆而望其思言園雖小有桃可殽有棘可食以興國雖小亦有民力可用傳義而其君惟務儉嗇不能用民民亦不復肯出力以應公上殆無以為國矣補傳所以憂之至於歌謡行國也行國如屈原行吟澤畔之類彼人舊說指君集傳渾之最得詩牖言兼君相看者是也彼人是哉子曰何其蓋述不知我者之言箋義蓋亦勿思集傳言特未之思耳解義極當箋言魏君薄稅省用惟食園桃陸堂駁之是矣但以桃不可為殽饌謂訓詁之疏則其疏更甚按內則言君燕食有桃李梅杏言菹有桃諸玉藻言膳於君有桃葷茢馮疏棘即樲棘酸棗也陟彼岵兮瞻望父兮父曰嗟豫子行役夙夜無已上慎旃哉猶來無止陟彼屺兮瞻望母兮母曰嗟豫季行役夙夜無寐上慎旃哉猶來無棄陟彼岡兮瞻望兄兮兄曰嗟豫弟行役夙夜必偕上慎旃哉猶來無死兄虛王反以已之思親因念親之思已所謂以親之心為心者故序以孝子稱之叠咏慎旃恐其棄死則當時骨肉仳離不加體恤亦可想見三曰字康成謂臨行戒勉之語朱子謂去後念已之言朱子是也上猶尚也集傳用蘇說亦勝箋義無已無寐皆言其勞必偕者言離我同胞而與同儕為侣也詩牖止謂止而不來棄謂棄其故土末章乃說至死一層危恐一層集傳以棄為棄其尸似非言有序之義爾雅多草木岵無草木屺毛傳正反陸堂述王氏總聞謂嗟乃一字句質疑述李因篤言子季弟於句半為韻今皆不取十畝之閒兮桑者間間兮行與子還兮十畝之外兮桑者泄泄兮行與子逝兮其國削小民無所居序下之衍說也毛鄭泥之訓詁皆訛集傳用蘇氏說但言君子不樂仕於其朝而刺時之意已見十畝之閒言無須通廛廣陌耳不必從十畝索解橫渠謂周制場圃之地每家十畝姚承庵疑問謂人各受五畝之宅與子還是兩人也故稱十畝之間愈說愈拙矣集傳以外為鄰圃亦似不必曰閒曰還尚是歸隱曰外曰逝則往不知所之矣詩義只如此坎坎伐檀兮置之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮坎坎伐輻兮置之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡曕爾庭有縣特兮彼君子兮不素食兮坎坎伐輪兮置之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飱兮輻古方墨反後同此篇序義甚明箋疏亦無迂曲序辨謂無刺貪意則中四語轉費周折今從舊說首三句箋云是謂君子不得仕進也中四句箋云是謂在位貪鄙無功而受祿也末二句箋云君子斥伐檀之人仕有功乃肯受祿疏云先言君子不仕乃責在位之貪鄙故章卒二句皆言君子不素餐以責小人之貪是終始相結也黃氏櫄曰君子有其功而無其祿小人有其祿而無其功因取物理之倒置者言之坎坎伐檀反置之河干而不稼穡不狩獵反有禾貆特鶉之富文義詳復而易明不必以艱深求之也按伐檀以備輻輪之用故下二章以輻輪言之置不用也河水句正言水濵無所用此毛謂俟河水清且漣是屬衍說毛不言興按詩意當為興爾雅河水清且瀾漪大波為瀾小波為淪直波為徑邢疏瀾淪雖異而義同說文禾之秀實為稼榖可收為穡傳言萬萬為億箋言十萬曰億箋義是也箋又言三百億禾秉之數疏曰若為釡斛之數則太多不類爾雅貈乎各反子貆說文貉之類爾雅豕生三豵二師一特謂豕止生一豚者名為特也蒙狩獵言當作田豕毛言獸三嵗曰特未詳鶉見鄘風碩鼠碩鼠無食我黍三嵗貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所碩鼠碩鼠無食我麥三嵗貫女莫我肯德逝將去女適彼樂國樂國樂國爰得我直碩鼠碩鼠無食我苗三嵗貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號首章上去通序言刺重斂而衍者以為刺其君箋附其意遂以大鼠斥君朱子辨云此亦托於碩鼠以刺有司之辭未必直指其君也黃實夫謂即上序所言在位貪鄙者其論甚允貫習也顧顧眷也德施德也勞即勞來之勞鄭箋言女聚斂剝民今已三嵗習為常法矣安望其能顧我德我勞我乎所以逝將去女也謝枋得曰食黍不足而食麥食麥不足而食苗苗禾之未秀者食至於此其貪甚矣直猶伸也受抑於此而求伸於彼也詩緝號呼也毛傳言既往樂郊則無復害已者更為誰而永號乎集傳箋以歌號釋之非其義矣陸堂謂家國一理以儉成以奢敗未有儉約而反至亡國者讀伐檀而終以碩鼠魏直亡於貪殘其愚謂儉不中禮流為吝嗇則損上益下之道廢矣吝嗇不已流為心計則頭㑹箕斂之風熾矣明季之事其顯證也魏風七篇以葛屨始以碩鼠終聖人之垂戒深哉爾雅鼫鼠郭云形大如鼠頭似兔尾有毛青黃色好在田中食粟陸璣云今河東有大鼠食人禾苗或謂之雀鼠孔疏魏國今河北縣言其方物宜謂此鼠非鼫鼠也唐唐之封域在禹貢冀州太行恆山之西太原太嶽疏云太嶽在河東名霍太山之野成王封母弟叔虞於堯之故墟曰唐侯而言堯墟者不一詩之唐國說遂有三鄭譜謂堯始居太原晉陽後乃遷河東平陽是唐在晉陽也皇甫謐謂堯始封中山唐縣後徙晉陽及為天子都平陽於詩唐國為平陽漢書音義臣瓚曰堯居唐東於彘十里應邵謂順帝改彘為永安則瓚以唐國為永安也去晉陽四百里按漢志太原晉陽縣故詩唐國晉水所出晉之得名實由於此當以譜說為定春秋大事表云曰大夏曰太原曰太鹵曰夏墟曰唐曰晉曰鄂左傳所稱凡七名皆指晉陽一地今太原府之太原縣是也又考叔虞封唐子燮改晉後三世成侯徙曲沃今絳州之聞喜縣是也八世穆侯徙絳今平陽府之翼城縣是也十世昭侯以曲沃封桓叔十一世孝侯改絳為翼杜預云翼晉舊都在平陽絳邑縣東孔疏謂昭侯以下徙翼誤也至曲沃武公滅翼而都之仍名為絳其子獻公又城絳以深其宫即此翼也後景公遷於新田亦名為絳今平陽府之曲沃縣是也非春秋時曲沃而翼城之絳又為故絳此唐國都易地易名之大略也嚴華谷謂前都絳時無詩山樞至鴇羽皆都翼時詩是亦誤以絳翼為兩地也田間錢氏謂今清源縣有陶唐故城是堯之故都翼城縣之唐城則堯裔所封按春秋晉搜於清原杜注在聞喜縣北去太原甚逺今清源縣亦去太原將百里晉陽之地不當兼有二邑其為後人附托無疑方輿紀要平陽府翼城縣晉之故絳縣東南十五里有故翼城疑即所謂唐城也其為堯裔所封於史無聞漢志著唐風俗謂其民有先王遺教君子深思小人儉嗇是也鄭譜謂堯末殺禮以救艱危其流乃被於今未免傅㑹其詩不曰晉而曰唐猶商頌不稱殷而稱商集傳謂存其始封之號者是也然皆太史之舊題非夫子所更定觀魯工為季札歌唐風而正考父挍商名頌則唐與商之稱名舊矣漢儒謂有堯之遺風而稱之宋儒謂不與武公之并晉獻公之滅魏皆從而為之辭蟋蟀在堂嵗聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿蟋蟀在堂嵗聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休莫轉平聲堂康荒又自為韻此詩疑刺僖公耽於逸樂不恤國是而衍者謂儉不中禮是疑於唐俗儉陋之言而不知與詩適左也禮非虞樂之具而言欲其及時以禮自虞樂是又欲與儉不中禮相顧而不知其立說之舛也熟玩詩意當曰逸樂者人情之所喜然不可以太過也解頤即今蟋蟀在堂嵗云莫矣人將曰今我不樂日月其不我留矣為戒之曰今雖不可以不為樂然不已過於樂乎盍亦顧念其職之所居者使其雖好樂而無荒若彼良士之長慮而却顧則可不至危亡也集傳後二章仿此嚴緝曰職思其居啓其憂也好樂無荒作其勤也良士瞿瞿警其懼也三言而君國之道盡矣又曰既思內事又思外事無遺慮矣然憂患之來又有出於非常者不可不思慮也鄒氏泉曰首言居猶本分常事未及其餘也言外則及其餘矣未切於憂也言憂則操心危慮患深常在多凶多懼之地而其思益切矣愚謂全詩重在職思二字思居吾職也思外思憂亦吾職也不思則曠職矣曠職則不能保其位矣三言日月隱隱有刺其玩愒意惟瞿瞿而警懼蹶蹶而勤敏始得休休而安閒多少諷切却又以休休聳動之此篇之刺所謂君子思深者與孟子告梁王賢者樂此之意同毛朱皆不言興按詩首二句恐亦是覽物起興爾雅蟋蟀蛬音拱郭曰促織也亦名蜻􅖹陸疏蟋蟀似蝗而小正黑有光澤如漆有角翅楚人謂之王孫幽州人謂之趣織孔疏傳言九月在堂本豳風九月在户言也堂户蓋相連日知録据左傳晉用夏正今詩以九月為嵗莫則周正矣陸奎勳謂曲沃莊伯改用夏正其或然與山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愈山有栲隰有杻子有廷內弗灑弗掃子有鐘鼓弗鼓弗考宛其死矣他人是保山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室婁古音閭栲說文音糗序言刺昭公而序下言四鄰謀取其國家而不知略見作詩大指而未盡其義餘皆衍說也按昭公無大失德不過一庸懦無識之人而封桓叔以召禍及身被弒子孫夷滅遂傾國祚可流涕痛哭無有大於是者嘗論晉之曲沃為五世建都重地地近平陽逼在肘腋無故挈以授人比之平王迫於戎禍而棄岐豐者殆有甚焉當穆公之世桓叔始生命名成師師服即以兆亂為憂昭公懵不省事封以大邑譬若倒持太阿而授之以柄桓叔方內通潘父外連方國覲後邢鄭助之可見有滅此朝食之勢而昭公坦然若無事者宛其死矣他人是愈不其然乎山有樞隰有榆以興國家有土地民人而詩人不欲斥言但舉家之所具身之所需者為隱語諷之即孟子巨室璞玉云云也八弗字寫狀宛死光景末用何不轉調乃教他死中求活之法然則有衣裳而曵婁之有車馬而馳驅之有庭內而灑掃之有鐘鼓而擊考之有酒食而日鼓瑟以將之如此振動發揚自然生氣勃勃我之所有可長為我有而他人不得過而問矣衣婁馳驅等字其中大有作用如毛傳言有財貨而不能用則如檜君之好潔衣服陳幽之坎其擊鼓將謂能用其財貨乎如集傳言又似達觀放懷異於君子思深矣如謂其詞激切非臣子所得施於君父則師服之諫明有不能久之言而詩人且托隱語以諷豈復以指斥為嫌哉吕記曰詩人豈欲昭公馳驅飲樂哉其激發感切之者深矣吕祿棄軍其姑吕􅎐出珠玉寶器散堂下曰毋為他人守此詩人意也三他人陡然刺入要害令人魄動心悸且以喜樂且以永日集傳謂人多憂則覺日短嚴緝謂愁則覺日長不應反言之愚謂詩人直有不終日之懼冀其蹶然振起以延引之也此二句有鼓舞歆動意末仍以危語結之言他人入室則奄然就盡矣何能以喜樂而永日哉所謂垂涕泣而道之如此毛朱皆屬興爾雅藲荎音垤郭云今之刺榆釋文本或作蓲爾雅榆白枌邢疏榆之皮色白者名枌陸璣曰榆有十種葉皆相似皮及木理異耳爾雅栲山樗郭云似樗生山中亦類漆樹陸璣曰方俗無名山樗為栲者似誤也今所云栲者葉如櫟皮厚數寸許慎讀為糗今人失其聲按陸奎勛氏疑栲杻顛倒而誤其韻似未考說文爾雅杻檍陸璣曰葉似杏而尖為木多曲少直花如棟而細今官園種之正名萬嵗揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人風雅遺音鵠户毒反惟射中之鵠兼有古毒反質疑鵠轉平聲為侯命彌吝反平去通椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且椒聊之實蕃衍盈掬彼其之子實大且篤椒聊且逺條且二詩皆言曲沃之强將有奪宗之變而昭公之暗昧無知不言可見故皆曰刺昭公揚水序下言國人將叛而歸曲沃集傳主之李迂仲引陳氏召公子陽生於魯齊人知而不言以證不敢告人之義嚴華谷駁曰自桓叔至武公屢得志矣而晉人終不服相與攻而去之後更六世逾六七十年迫於王命而不敢不聼在昭公之初晉人豈從沃哉時曲沃謀奪宗國潘父將為內應此詩正泄潘父之事末章之云蓋反辭以見意其言不敢告人乃所以告昭公言我聞有命又以見其事已成禍至甚迫所以激發昭公者至切也按揚水喻昭公白石喻桓叔鑿鑿當從集傳訓巉巖皓皓粼粼皆水落石出之狀明其事已昭露故曰我聞有命也子指潘父之徒君子指桓叔謂潘父之徒相與為叛將携尊服以從沃而見桓叔也素衣朱襮其後世陳橋驛之黃𫀆歟嚴緝謂設為國人相語之辭欲昭公聞而為備其說是也椒聊亦告昭公之辭末二句寄意獨深蓋盈升盈掬猶是目前所見而新條逺揚日益茂盛其為患害不可究度故為沉吟反覆以啓昭公之悟殆即師服輩之所作歟碩大無朋即敬仲占辭莫之與京之意碩大且篤篤厚而力也即越十年生聚十年教誨之意顧鄰初曰言其盤根深厚不可拔也兩詩皆是與非比揚水解見前素衣以素絲為中衣也中衣以丹朱為緣以繡黼為領爾雅黼領謂之襮所謂朱襮也孔疏云郊特牲繡黼丹朱中衣大夫之僭禮也大夫服之為僭知諸侯當服之疏又言中衣朝服祭服之裏衣也按朝服以布祭服以絲玉藻言以帛裏布非禮也則中衣之用絲用布亦從其外服此中衣用絲不兼朝服言次章朱繡之繡即襮也康成破繡為綃按孫炎注爾雅繡刺黼文以褗領是從毛傳繡黼也為義鵠曲沃邑疏不言其所在今按水經注左邑故曲沃詩所謂從子于鵠者也宛溪顧氏曰晉亡曲沃入魏秦謂之左邑今左邑故城在聞喜縣治東爾雅檓音毁大椒郭氏云今椒樹叢生實大者名檓又椒摋醜救音求又音掬李巡云摋茱萸也椒茱萸皆有房故曰救馮復京曰樹種不一秦椒色黃黑似蜀椒而大即爾雅檓也蜀椒則陸疏所謂似茱萸有刺者皮紫赤色晉地近秦當指秦椒聊為語助集傳本陸疏然聊既語助且又語助恐難成句按爾雅朻者聊注未詳說文朻髙木也疑即椒之髙大者陸堂以木之糾曲者名朻似未考說文以意為之說耳綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅今夕何夕見比邂逅子兮子兮如此邂逅何綢謬束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何逅古胡故反者古音渚此篇刺晉亂序下言婚姻不得其時者蓋以三星之在天在隅在戶知之毛以三星為參鄭以三星為火參以十月見為婚姻之正火以三月見則非其時矣序云不得其時則宜從箋也集傳謂首章婦語夫卒章夫語婦二章夫婦相語皆喜而自慶之辭今按每章末二句乃是男女過時而思成配偶終不可得而怨曠之意張子橫渠曰今夕何夕見此良人言此時可以見也子兮子兮如此良人何言國亂不可得見也曽氏曰終不遂之詞也見此邂逅王氏安石曰失時故思不期而㑹焉吕記曰曰良人曰粲者蓋互為男女之辭以極其思望之情耳詳繹傳意如是今釋三星良人從箋餘從傳蘇氏轍曰綢繆固之而後合蓋取合比以為興國語女三為粲有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉質疑次章平去通尊卜云姓音生序曰刺時而不著其君則非昭公也序下言獨居而無兄弟將為沃所并者近之其言君不能親其宗族骨肉離散則詩無此意今參舊說與集傳循文解之而附鄙說於後杜雖孤特猶有葉湑湑然潤澤菁菁然茂盛補傳今之獨行者乃踽踽無所親睘睘無所依毛傳雖有異姓之人可與同者豈如同父同姓之親今兄弟死亡孝侯之弟郤哀侯之弟緍皆立于兄弒後者五世之間昭公之後死亡略盡孑然孤立誠可憐憫於是嗟嘆行道之人何不憫我之獨行而比輔憐我之無兄弟而佽助乎集傳謂求助於人者是也當時懷姓九宗强盛不與曲沃詩人所欲求助者意在斯乎按孝侯之被弒也晉人立其弟郤即隱五年莊伯以鄭人邢人伐翼翼侯奔隨者是也兄弒弟立被伐竄逃非所謂無兄弟而獨行者乎其後翼九宗頃父之子嘉父逆於隨而納諸鄂謂之鄂侯則他人比佽之事也此詩之作其在奔隨未入鄂之時耶詩主言兄弟其云同姓者因同父而及之衍者不識其意遂以不親宗族為言失之矣集傳不主沃事義固圓活然椒聊蕃衍杕杜孤特兩詩遙對命義顯然而鄂侯無兄奔竄九宗助順納君事具左傳又明有可證者乎若以曲沃實晉同姓服屬未逺為疑竊謂桓莊武三世弒逆律以春秋之義當絶不為親詩人所言同父同姓義别有屬不得執此謂非為沃事也鬱儀詩故謂刺哀侯哀侯侵陘庭之田致陘庭南鄙啓沃伐翼為不能修德親族彼以陘庭之田為哀侯弟所有此於經傳無文未知所据古義以為刺晉惠則游談無根矣毛取正興今從集傳取反興爾雅杜赤棠樊光曰赤者為杜白者為棠詳見甘棠羔裘豹袪自我人居居豈無他人維子之故羔裘豹褎自我人究究豈無他人維子之好一章平去通二章上去通在位不恤其民詩人刺之傳箋釋義簡直而集傳不從者蓋爾雅居居究究惡也之文朱子既以為疑而晉國之民指其大夫為故舊恩好亦難據以為說也今按范逸齊謂作是詩者蓋與在位之人有舊好其說近理可從詩意當云彼羔裘而豹袪豹褎者不能為國家出力禦冦但從我國之人播其威虐居居然而傲狠究究然而苛察嚴緝豈無他人可以往歸乎所以不去者以子為故舊恩好耳奈何不務修德徒為曲沃驅民也孔疏參李解蓋明告戒之民將去晉從沃當恤其民以自固也我人他人是詩人用意處自字含刺正深舊作用字解者失之陳氏禮書羔裘君純羔大夫以豹飾毛傳祛袂也孔疏袂是袖之大名袪是袖頭小名其通皆為袂也李巡曰居居不狎習之惡孫炎曰究究窮極人之惡肅肅鴇羽集于苞栩王事靡盬不能蓻稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能藝黍稷又母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能藝稻梁父母何嘗悠悠蒼天曷其有常鴇性不樹止而肅肅之羽乃集于叢生之栩興君子下從征役為危苦也王事不可以不堅固故盡瘁為之蓋哀侯與緡之立皆有王師故云王事也王師再起而沃晉之爭不解君子久從征役不得歸飬父母故呼天而訴之以稷黍稻粱為言者求為隴上之民而不得也或疑與君子不類何楷則以辭害志矣此與杕杜羔裘序皆言刺時而前二篇不著其世此序下言昭公之後大亂五世則皆非昭公詩矣康成數五世謂昭公孝侯鄂侯哀侯小子侯按序明言昭公之後不得再數昭公朱子叙自孝侯至緡為得其實集傳為比今從毛為興郭璞云鴇似雁無後趾說文鴇性羣居有行列故詩曰鴇行羅願曰鴇水鳥爾雅栩杼陸疏今柞櫟也馮復京曰鄭漁仲以栩杼為柞秦風苞櫟更是一物櫟乃今之橡斗樹朱子釋綿詩之柞亦與橡斗不同孔疏盬與蠱字異義同說文煮海為鹽煮池為盬盬苦而易敗故以不堅訓之今從許義炳燭齊隨筆云以不堅固訓盬字毛鄭已來皆然以不可以三字訓靡字則其解頗曲而未暢竊謂靡盬二字各自為義漢書為酒醪以靡穀注靡散也說文靡披靡也徐曰披靡分也蓋謂王事如草之披靡而不植如盬之細碎而不堅固正臣子勤勞奔走之時也義屬創見然較之舊訓則明直曉暢矣存之爾雅稌稻說文沛國謂稻為糯粳稻屬二者皆稻也本卓粱有青粱黃粱白粱皆粟類爾雅注虋今之赤梁粟是三種之外又有赤粱矣郝氏敬曰今髙粱之類豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮武公之無可美明矣朱子辨之義亦正矣序言美之者疏謂其臣之意美之耳二章皆請命之辭然則何所取而存之陸氏奎勳曰録之以著假王篡國之實也愚謂符命美新九錫美魏備登諸史而其罪益彰猶斯類也子之衣疏謂對天子之使請天子之衣嚴緝謂指使者言之是也恐未可以斥天子或又以子指武公謂詩當作於始得命之時於此美武公義為順矣然王命既至必有定服次章何復以衣六為言故知舊說之得也李迂仲引唐季强藩悍鎮代其主帥擅自封殖坐邀天子之旌節者為比嚴緝亦引劉仁恭旌節吾自有但要長安本色之語以愚觀之其情事亦不盡同何者東遷之始六七十年之間皇威雖替綱紀猶存即以曲沃之事論之桓莊武屢逞凶威覆宗弒主其目中豈復有王然而鄂侯奔隨莊可得國矣王命伐之而立哀侯莊無如何也小子被殺武可得國矣王命伐之而立緡武又無如何也以區區之翼孱弱不振曲沃視之不啻釡魚几肉而相沿數十年之久者王為之卵翼也虢芮梁荀諸國猶用王命而故絳之人喪君有君不憚征繕武公雖强戾鷙悍而上怵共主之威下畏國人之義不有王命勢難立國與唐世諸藩怙强迫脅者殊間使僖王能用舊典命師討罪復求孝鄂之後俾祀宗祏沃之為晉蓋未可必無如僖王貪其重餌又有使者為之先容故其計得行耳然猶僅命以一軍為晉侯而武公即已志得意滿無復不足此詩述其請命之意而序以為美者先儒謂其猶知有天子之命愚直謂美其善於營幹能委曲成事為久長計耳曰豈曰無若不急然者曰不如則又計較分明此其臣之辭而皆武公意也夫豈真知有天子之命哉既曰衣七又曰衣六若以或七或六惟上所命耳不必舉侯及天子之卿立說傳箋以為變文成章者嚴緝亦非許鈔春官司服注鷩冕七章一華蟲二火三宗彝盡於衣一藻二粉米三黼四黻繡於裳有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之末二句不入韻此刺武公不能求賢自輔耳諸儒解義各出謂教武公求賢之法何但飲食而已此疏申箋義也謂使武公誠有好賢之心惟恐無以飲食賢者此吕用陳說也謂好賢而恐不足以致之無自而飲食之此集𫝊說也謂君不能養賢國人自致其意曰何以飲食之此嚴緝說也餘說雖多要不出四者之域今按詩言君子適我而來遊若果中心好之何不飲食之病其不能飲食所謂恱賢不能舉又不能養也以杜之孤生道左興武公之不求自輔事非切類不得為比爾雅噬逮也逮及也曷盍也郭注盍何不諸家皆据說文以曷為何似不若從爾雅注之曉達至以噬訓食橫渠逸齊以噬通逝蘇氏滯且曲矣集傳作發語解未知所据葛生蒙楚蘝蔓于野豫美亡此誰與獨處葛生蒙棘蘝蔓于域豫美亡此誰與獨息角枕粲兮錦衾爛兮豫美亡此誰與獨旦夏之日冬之夜百嵗之後歸于其居冬之夜夏之日百嵗之後歸于其室野神與反夜音豫夜居平去通序言刺晉獻公講師申其義謂好攻戰則國人多喪獨程子謂思存者非悼亡者今按本詩三言亡此其二章言蘝蔓于域四章五章言百嵗之後歸于其居歸于其室恐不得謂其人尚在矣三章角枕錦衾正潘嶽所謂展轉盼枕席長簟竟空牀者男女之情一耳且發端以葛生蘝蔓為興分明陳荄被野落葉委埏之景蓋葛生蒙於楚蘝生蔓於野物各有所依託集傳今豫所美亡矣誰與哉獨處而已蘇傳先儒以為婦人專一者得之徐氏光啓曰自夏而冬見無時不思又自冬而夏見無嵗不思何氏古義引世說云袁羊嘗詣劉恢恢在內眠未起袁作詩調之曰角枕粲文茵錦衾爛長筵劉尚晉明帝女主見詩大不平劉孝標言袁以死嘲劉故主不平耳則其為悼亡詩舊矣毛傳興義未融今從集傳孔疏獻公以莊十八年立僖九年卒按左傳莊二十八年伐驪戎閔元年作二軍滅耿滅魏二年伐東山臯落氏僖二年滅下陽五年圍上陽滅虢又執虞公八年敗狄于采桑是其好攻戰也說文蘝白蘞也陸疏似栝樓葉盛而細其子正黑如燕薁幽州人謂之烏服其莖葉採以哺牛除熱采苓采苓首陽之巔人之為言苟亦無信舍旃舍旃苟亦無然人之為言胡得焉采苦采苦首陽之下人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉采葑采葑首陽之東人之為言苟亦無從舍旃合旃苟亦無然人之為言胡得焉苓力珍反信音伸苓苦葑不生于山而謂采之首陽喻讒言之無實也苟且也鄭箋與許也集傳因戎以聞人之言且勿聼信與從置之且勿以為然更考其言何從而得則虛實盡見矣本義舊說謂僞言無所得自然讒止按苓生于隰苦生于田葑生于圃皆非山産箋乃云首陽信有苓既違物性亦昧興義人之為言四句傳箋皆以稱薦謗訕分二義固屬支贅王荆公謂人之造言不可苟聼亦不可苟舍亦費周折此篇之義歐陽得之余友范蘅洲家相詩瀋云序以采苓為獻公信讒明為申生驪姬而作願公無信其欺且舍申生之罪而徐察之人之為言胡得焉者驪姬身處深宫何由得申生與人謀議之密言蓋優施教姬之語亦隱然言下矣按獻公信讒之事無大于此者序雖不言覺如此看舍旃二句更有著落逸齊亦主此而舍旃義則仍用舊說陸堂言六叠舍旃其諷申生之逺行與何得焉謂雖有讒言無傷也此與刺獻公之意轉離集傳謂比而興今只作興孔疏首陽山在河東蒲坂縣許白雲曰今按首山即雷首山首陽乃雷首山之南地理考異伯夷墓在永樂縣三十五里雷首山南永樂即蒲坂縣也虞東學詩卷四
