body:
  text: 虞東學詩卷十二宗人府主事顧鎮撰魯頌鄭康成曰魯者少昊摯之墟也昔周公歸政成王封其元子伯禽於魯其封域在禹貢徐州大野蒙羽之野十九世至僖公當周惠王襄王時遵伯禽之法養四種之馬牧於坰野尊賢祿士修泮宫守禮教十六年㑹諸侯於淮謀東略遂伐淮徐二十年新作南門修姜嫄之廟復魯舊制未遍而薨國人美其功季孫行父請命於周而作其頌初成王以周公有太平制典法之勳命魯郊祭天三望如天子之禮故孔子録其詩之頌同於王者之後又曰周尊魯巡守述職不陳其詩至於臣頌君功樂周室之聞是以行父請焉孔仲達曰雖名為頌而體實國風非告神之歌故有章句又曰魯頌主詠僖公功德才如變風之美者耳愚按鄭譜據序謂行父請命於周而作頌集傳則謂成王賜伯禽以天子之禮樂魯於是乎有頌以為廟樂其後又自作詩以美其君亦謂之頌夫所謂天子之禮樂者器則宫懸舞則八佾合樂則六代故魯備四代之樂而八佾歌雍季氏因而僭之其見於經傳者如此不聞魯自有頌以為廟樂也如魯有頌以為廟樂則聖如周公賢如伯禽其廟皆得有樂何無一篇存者則魯之有頌斷自僖公始也王跡雖息而大典大法猶必請命而行如唐風所詠左傳所記歷歷可考序稱行父之請其說不為無稽行父請之天子許之聖人安得刪之非如康成所謂録之同於王者之後也康成又謂成王命魯郊祭此誣妄之言不可信據辨詳閟宫篇次於商頌之前者頌雖繫魯實皆周代之詩以魯終周非以魯匹商也看得聖人有多小作意便非毛於卷首著駉之什字今按篇少不成什故去之商頌同駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂野音渚騢古音胡邪音徐此頌僖公牧事之有成也詩所言牧事而推本於思者人主一心乃萬物所托命萬事所待理思則心之經畫運量處上思字說得濶下思字即牧馬一節言之姚氏斯之云者言取效甚速如論語綏之斯來之意駉駉腹幹肥張貌坰逺野也邑外曰郊郊外曰野野外曰林林外曰坰毛傳言逺野者野為郊外通名也孔疏必牧于坰者避民居與良田鄭箋疏曰禮諸侯六間馬四種故每章各言其一首章言良馬朝祀所乘故云彭彭見有力有容也二章言戎馬戎馬齊力尚強故云伾伾見有力也三章言田馬田馬齊足尚疾故云繹繹見善走也四章言駑馬主給使貴肥壯故云祛祛見強健也馬有異種名色又多每章各舉四色以充之按四章皆以駕車為言明馬之駉者實致於用也於良馬言臧於戎馬言才於田馬言作於駑馬則言徂而已義各有歸也無疆思之廣無期思之長無斁思之勤無邪思之正詩牖衛詩稱秉心塞淵騋牝三千莊子稱百里奚爵祿不入於心飯牛而牛肥人之立心與牧事全不相干而古人屢言之者必實驗其然也詩測至歸本無邪不必僖公果能如是而詩之措意精矣此序言史克作是頌而王肅以四篇皆克所作推詩意當如肅言也王魯齊以駉駜泮三詩為頌伯禽此未有據譜言魯少昊之墟其封域在徐州大野蒙羽之野疏曰小昊之墟即曲阜也應邵云曲阜在魯城中委曲長七八里禹貢徐州云蒙羽其藝大野既瀦集傳曰今襲慶東平府沂密海等州即其地也按一統志襲慶路今兗州府東平府今東平州屬泰安府沂州今沂州府密州今諸城縣屬青州府海州今寧海州屬登州府王伯厚曰蒙山在沂州新泰縣今蒙隂縣東南八十里羽山在海州朐山縣今臨胊縣屬青州府西北一百里郡縣志坰澤俗名連泉澤在兗州曲阜縣東九里魯僖公牧馬之地疏曰校人六馬種戎齊道田駑本無良馬之名毛以齊馬為良馬也周禮注金路駕齊馬釋畜驪馬白跨驈孫炎云驪黑色也郭曰跨髀間也又黃白騜孫炎云有黃處有白處騜即皇也驪黃爾雅無文檀弓夏后氏尚黑戎事乘驪故知純黑曰驪黃而雜白者為皇則黃而赤色者直名黃矣故知黃騂曰黃此一毛色中自有淺深又蒼白雜毛騅郭曰今騅馬也又黃白雜毛駓郭曰今之桃花馬也此二者皆云雜毛是有二種之色相間雜騂騏爾雅無文周人尚赤牲用騂是騂為純赤毛言赤黃者謂赤而微黃疏曰騏者黑色之名蒼騏曰騏謂青而微黑今驄馬也又青驪驎驒郭曰色有深淺斑駮隱𥻘今之連錢驄也又白馬黑鬛駱駵雒爾雅無文毛云赤身黑鬛曰駵即今駵馬也黑身白鬛曰雒則未知所出古義曰雒乃鳥名即鴝鵒也疑馬之色似之詩牖曰驒駱駵雒皆以鬛言駰騢驔魚各帶白色疏曰釋畜隂白雜毛駰郭日隂淺黑今之泥驄或云目下白或云白隂皆非也又彤白雜毛騢郭曰彤赤也即今赭白馬是也又一目白瞷二目白魚其驔無文傳言豪骭白驔蓋言豪毛在骭而白長名為驔也馮疏郭璞云骭腳脛傳本作豪骭白集傳訛白作曰或朱子本不訛後人書寫繆耳有駜有駜駜彼乘黃夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乘駽夙夜在公在公載燕自今以始歲其有君子有穀詒孫子于胥樂兮明彌郎反下音户牡莫兒反有音以末句不入韻又合三章自為韻序曰頌僖公君臣之有道集傳謂燕飲而頌禱之辭序原其本集傳著其事即箋所云以禮義相與者是也愚按上篇言牧馬之盛則富庶徴矣因與其臣為燕飲之樂故三章皆以馬言歐陽以為寵錫其臣者非也駜馬肥強貌毛傳言來燕之臣乘是肥强之馬而來夙夜在於公所曹氏以修明其德業本義所謂精白一心以承休德也輔氏言燕飲而先以夙夜明明蓋勤勞治理以餘暇為樂耳朱氏僖公於是燕之以禮樂羣臣之修潔有威儀者如鷺之翔集而來下詩緝本箋義喻諸臣皆就席也咽咽鼓節也毛傳謂以鼓節舞其聲深長也箋謂鼓以節飲非是蓋舉旅之後君曰無不醉至無算爵則又舞燕樂以盡其歡鄭箋故以鼓節之君臣於是皆喜樂也首章言明明在未燕時二章言飲酒則既燕矣首章言鷺下則初集時二章言鷺飛則欲退矣鄭箋此不言舞而亦有鼓者奏陔之節故將歸而又聞鼓也古義既將歸矣三章復言載燕者綜其禮之成而言自今以下四句受燕者所致之辭豐年而繼其後則常有以足國用而贍民生善道而傳於後則常有以固人心而承天命黃氏其樂更為永久所謂善頌善禱也穀梁傳稱僖公閔雨以勤民故其臣之祝願如此說者皆以僖公本非賢君頌為導諛竊意春秋十二公彼善於此自屬之僖夏父弗忌至稱為聖賢季文子又為之請頌當時實有賢聲其臣如季友臧孫辰輩亦皆勤於國事不可謂非有道之時不得以春秋責備之義繩之也集傳興也愚以上四句論之義當為賦思樂泮水薄采其芹魯侯戾止言觀其旗其旗茷茷鸞聲噦噦無小無大從公于邁思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茒魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛梟集于泮林食我桑黮懷我好音憬彼淮夷來獻其琛元龜象齒大賂南金旗音芹二章平上去通茒音栁馘古音國陶讀繇序稱頌僖公修泮宫不言伐淮夷事蓋詩為修泮宫作故先言視學設教養老之事而後及於服淮夷皆在泮言泮故標修泮為題也古者受成獻馘莫不在學王制謂出征執有罪反釋奠於學以訊馘告是也魯兼四代之學而泮宫為周學其有之也舊矣興作為作修作亦為作故經云作而序直謂修明非僖公始作也惟是伐淮夷之事不見於春秋魯又弱國故諸儒皆以為疑歐陽魯問極斥鄭譜之謬至以詩為妄作嘻其過矣集傳通其說於頌禱庶幾酌事理之平後儒又以詩中所陳確鑿難以目為頌禱王魯齊引尚書費誓指為頌伯禽陸聚緱又以詩不稱魯公為疑移而屬之孝公其說益紛愚按僖十六年㑹淮之事左傳謂謀鄫且東略略略地也漢書顔注云凡言略地謂行而取之則鄭譜於東略之下添注遂伐淮徐句為有因矣僖公以十六年十二月㑹淮至明年九月歸魯東略之役如此其久而未聞有所虧敗師所過處豈無小小斬馘魯人遂誇之以為功耳說春秋者謂公以滅項之故為齊所止故至九月始歸此左氏一家言耳若公榖二傳皆以滅項為齊桓公事經不著者蒙上伐英為文春秋彚纂云此與襄十年春會柤夏滅逼陽同一書法是也僖公既已東行何人擅師滅國胡氏謂執政之臣為惡是時政未下逮季友方卒不得以莫須有之執政坐魯以滅項之罪也况下經云公至自㑹不云公至自齊較然明矣左氏又言聲姜以公故會齊侯於卞是謂夫人請釋公也乃不往齊請之而要之境上是劫之也其不然矣故愚以公之久於外者全是經略東方所謂桓桓于征狄彼東南者也今但就詩釋之或不盡誣爾一章言僖公至泮二章言教人三章言養老而因謀東略之事三詠思樂者菁莪之序曰君子能長育人材則天下喜樂之矣水在宫南以節觀者不言宫而言水芹藻苑叢生水中詩托興焉故有取於水也茷茷飛揚也噦噦和也集傳觀其旗聽其鸞聲所謂聞車馬之音見羽旄之美舉欣欣然有喜色也詩緝小小子大成人者古義無大小而從公以行言人心翕然樂從如漢明帝開辟雍冠帶縉紳之人圜橋門而觀聽者蓋億萬計也此言僖公視學而多士景從蓋學校久廢至此興復真有菁莪長育人材天下喜樂之意蹻蹻强盛也毛傳其音昭昭僖公之德音也鄭箋謂涖學時講道論德之音載色載笑所謂即之也溫匪怒伊教所謂敷教在寬也古義此言僖公教士有法弗抑弗牽也在泮飲酒者箋謂徴先生君子與之行飲酒之禮而因以謀事陳祥道曰此養老也古者視學必養老故飲之酒而祝其難老非祝僖公也長道謂道之可久者古義即下明德固猶之事羣醜斥淮夷箋義言能順此可久之道可以屈服此羣醜使不為患也此言僖公養老謀事於泮宫集傳謂古者出兵受成於學即其事也四章將為服淮夷獻頌而先著其本也魯頌雖夸而以明德為服逺之本猶有頌不忘規之義聖人之所取也穆穆美也孔疏敬明者省察之無間敬慎者動靜之必飭張記內外皆敬然後其德不忒而可為民法允文結上在泮之事允武起下征夷之事箋義惟烈祖周公魯公集傳有是文武之全德魯侯今能繼之則可以昭假烈祖而稱孝矣不直曰孝而曰靡有不孝蓋於頌中寓戒勉之意言此文武二事無一不能繼述則福祿自然歸之以內則順治以外則格心是之謂孝是之謂自求伊祜也五章之末遂因作泮宫而侈言服淮夷之事明明即穆穆之著見也季氏克明即敬明之發用也作之為言修也既作泮宫淮夷攸服言時事之相值也殺而獻其耳曰馘縶而問其罪曰囚疏義矯矯武貌淑問善聽獄也鄭箋此言伐淮夷而以訊馘告也多士將帥也廣者推而大之德心謂心德寬宏無褊躁也田間狄古逖通蘇氏逺也釋文東南謂淮夷集傳此指東略言言多士逺征淮夷其功烈之盛蒸蒸然興作郭氏皇皇然美大也不吳不喧譁也不揚不輕浮也詩緝訩訟也鄭氏無以爭訟其功告者苐濟濟然獻其功狀於泮宫而已此言戰士之獻功有禮也觩曲貌集傳弓弛而反見其觩然上曲也毛義五十矢為束毛傳搜矢疾聲博廣大也無斁無懈也說文此言凱旋在道弓弛而不張矢束而不用兵車甚博大徒御之屬無有懈其事者王肅彼淮夷於既克之後亦皆化為善而無逆也式固爾猶即順彼長道淮夷卒獲即屈此羣醜言所受成於泮者而今果然也未章終言淮夷卒獲之事翩彼飛梟集於泮林喻其服而來歸也食我桑黮沐泮林之化也懷我好音謂變其惡聲所謂孔淑不逆也淮夷憬悟從化獻其珍物謂抒誠也輔氏廣曰凡貢物龜為前列故先之大賂廣賂也賂君及卿大夫鄭箋南荆揚也毛傳荆揚之州貢金三品鄭箋詩人蓋因淮夷而廣言之亦夸張之辭也前言泮水以芹藻言中言泮宫以訊馘言末言泮林以集梟言始終不離在泮之事所謂賦詩不出其志美物必依其本也張次仲曰齊語云東南有淫亂者萊莒徐夷一戰帥服三十一國又謂桓公南伐以魯為主魯從霸主以征伐歸而䇿功飲至則各自以為功此亦人情之常非無據而盡屬誇大者此論得之興也毛闕注箋曰泮之言半也半水者蓋東西門以南通水北無也疏云行禮當南面而觀者北而畜水本以節觀宜先節其南方故知南有水而北無也白虎通云半者象璜也獨南面禮儀之方有水其餘壅之以垣按辟雍之制圓形如璧璧體圓而內有孔宫水亦圓而內有地諸侯半之則箋疏及白虎通之說然也水經注靈光殿東南即泮宫也一統志泮宫池在曲阜宣聖廟東南周禮醢人朝事之豆茆菹麇臡注云茒鳬葵釋文云茒音卯北人音栁鄭小同云江東人名蓴菜生陂澤中陸璣云茒與荇菜相似葉大如手赤圓有肥者著手中滑不得停可生食又可煮江南人謂之蓴成謂之水葵馮復京曰按本草鳬葵是荇菜蓴别一物合陸璣鄭小同之說茒是蓴耳茒與荇相似故古人即謂之鳬葵閟宫有侐實實枚枚赫赫姜嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之届于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炮胾羹籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾壽而臧保彼東方魯邦是常不虧不崩不震不騰三壽作朋如岡如陵公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾壽而富黃髮台背壽胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉壽無有害泰山巖巖魯邦所詹奄有龜䝉遂荒大東至于海邦淮夷來同莫不率從魯侯之功保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若天錫公純嘏眉壽保魯居常與許復周公之宇魯侯燕喜令妻壽母宜大夫庶士邦國是有既多受祉黃髮兒齒徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若禍方墨反野神與反功音古衡戶郎反弓音肱富方二反七章邦與從韻此篇辭義更夸蓋僖公始行郊祀春秋歷隱桓莊閔無書郊者書郊自僖三十一年始詩人創見而誇美之又以得行作頌之請遂因修閟宫而張大其辭也聖人存而不削者蓋亦春秋書禘郊之義又陳司敗問昭公知禮乎孔子曰知禮史克用王命以頌其君聖人安得刪之序標詩中復周公之宇為題諸儒皆謂人之願之實則未能朱康流曰國語齊桓公南伐以魯為主反其侵地堂潛管子作常潛是常復在僖公之世春秋桓元年鄭伯以璧假許田榖梁傳曰不言許不與許也范寧注云明止以許之田與鄭不與許邑是許邑猶在魯周公之别廟在焉或久廢之後僖公復飭理之故云復也家仲恭亦引管子小匡篇以復常許為實事先儒似檢核未到篇中所稱懲荆舒似附㑹四年公㑹齊侯伐楚事荒徐宅似影響十五年公孫敖救徐事荒大東似依約十六年㑹淮東略事南夷率從似誇耀二十一年楚使宜申來獻捷事淮夷之事則上篇言之特鋪張過情耳要非子虛亡是公之類也一章述姜嫄生后稷而陳其播種之功為郊配張本也閟宫毛傳以為姜嫄廟又引孟仲子之說曰禖宫疏謂姜嫄祈郊禖而生稷故名其廟為禖宫也閟閉也侐清靜也毛傳實實鞏固也蘇氏枚枚礱密也毛傳既言其廟遂推本姜嫄德無回邪為上帝所依眷集傳故無災害而誕生后稷也降百福即於降嘉種見之故約舉諸榖以著封邰之本即生民篇即有邰家室以前語也下復言其俾民稼穡之事與禹平水土相終始是遍下土而有其功故曰奄有下土也二章述大王文武及周公克咸之功與成王封建元子之語為禘嘗張本也翦斷也鄭箋大王居岐而有斷商之萌兆孔疏自後人推言之耳非大王有是志也文武繼之而致天命之至范傳于牧野而敦治商紂若林之旅范傳皆能成其大功咸者同心同德之謂不言周公而周公在其中矣箋義故成王先以封其元子為周輔告於公也三章言魯受封大國至僖公而遂郊天也上章既告周公以封伯禽之意遂策命之上四句述其辭也附庸謂顓臾須句及邾之屬觀此命辭即知成王無賜魯禘郊事如其有之必將光揚寵命流示無窮而顧喑默不言乎舉大禮行大祀而先著之曰周公之孫莊公之子明所自始也龍旗四句乃郊嘗二祀之總冒異義以郊祀言疏繹箋義以為宗廟之祭今用古義春以郊言秋以嘗言明堂位曰魯君孟春夏正祀帝於郊配以后稷季夏六月夏正以禘禮祀周公於大廟是春秋享祀不忒之事也皇皇大之至也李解后君也以天者尊神故謂之君孔疏祀天而配以稷其牲用赤牛純色與天子同也天亦饗之宜之多豫之福鄭箋詩人之意以為僖公能舉行盛禮克當天心則周公魯公亦樂之而福女矣此皇祖在周公下故鄭以為伯禽也二句結上郊天之事不當與載嘗連文故集傳分章於此斷句四章言以禘禮祀周公亦祀魯公也於嘗祭之時行禘祭之禮故以嘗言之祭統謂大嘗禘是也魯用禘禮在周正八月而僖八年之禘在秋七月孟獻子曰七月日至可以有事於祖是僖公改八月為七月非獻子為之也雜記誤載始也鄭箋楅逼也釋文楅衡設橫木於牛角以楅之不使抵觸周禮封人設其楅衡是也孔疏秋將嘗而夏楅衡夙戒也集傳白牡周公牲騂剛魯公牲毛傳公羊傳曰周公用白牡魯公用騂犅羣公不毛是也犧尊尊為犧形將將盛美也毛炮爓去其毛而炮之封人祭祀有毛炮之豚是也孔疏胾切肉也羮大羮鉶羮也毛傳大羮不和盛之於登鉶羮肉汁之有和者盛之於鉶器孔疏大房載牲體之爼毛謂半體之爼蓋本國語然於禘禮不合故易之辨見後萬舞者文武二舞之總名鄭謂干舞非是辨見簡兮篇自白牡騂剛而下皆用天子之禮樂也孝孫有慶即下俾爾之事熾以勢言昌以象言壽以歷年言臧以攸好德言古義不虧如月之常盈不崩如山之常固不震如地之常靜不騰如水之常平曹氏所以申言保彼東方魯邦是常之意三壽李善文選注三老也三壽作朋如岡如陵祝其君臣同慶詩緝此言祭則受福蓋頌其內安也五章言以戰則克蓋頌其外攘而福有加也公車千乘國賦之常數也詩貫以車言故下言弓矛皆建於車上者也朱英疏謂絲纒而朱染之以為矛之英飾張次仲曰以朱羽懸於矛上為飾張說是也緑縢二弓並以緑縢束之所謂竹閉緄縢也朱英緑縢二矛重弓兩句自相充配孔疏公徒三萬出軍之成數也詩貫以徒言故下曰蒸徒胄兜鍪也以貝為飾朱綅直謂赤線耳孔疏文在胄下是甲之用謂以赤線連綴甲也古義增增衆也毛傳因其來而遏之曰膺聲其罪而討之曰懲承當也言兵威所加非彼所敢當也此附會伐楚之役而言也昌從熾而見熾踵昌而來則不已矣富備也說文壽而能善諸福備焉則加盛矣此黃髮而背有鮐文之人既作朋矣又皆矍鑠强幹相與進為公用則內愈安外愈治熾之極而至於大壽之極而至於耆艾且不獨耆艾已也萬有千歲眉壽無有害則極其頌禱而無可復加矣六七兩章承上外攘之事而言山勢綿延東屬故遂荒大東而至於海邦言東略也淮夷逺而徐近故保鳬繹而荒徐宅然後及於海邦言救徐也楚來告捷而南夷從矣淮夷蠻貊之來同率從於經無徴豈當時有來與霸主㑹者春秋削而不書乎八章承上內安之事又䝉祀天獲福而言天錫公以純常之嘏見天饗其祭而宜之也居常與許復周公之宇此天已錫之嘏詩人据以稱頌者也燕燕飲也鄭箋魯侯燕於內寢則妻善而母壽燕於外寢則大夫庶士皆與相宜孔疏邦國是有即保彼東方魯邦是常之義魯侯之受祉如此既已多矣又願其永年以長享此祉也黃佐曰入春秋以來隱及於鍾巫桓乘於彭生般賊于圉犖閔戕于卜齮國人飲恨尚未舒也故此詩拳拳以壽考為言末章詳言修廟之事與章首二句相首尾也安成路寢廟中之正寢定宇新廟即閟宫姜嫄廟也鄭箋奚斯公子魚也集傳作者教護屬功課章程也鄭箋言取徂徠新甫二山之木而斷之度之使長短合於尋尺用為榱桷施之棟宇舄然而大集傳舄大貌所作之廟寢既大慶源則舉全廟而言其奕奕然盛大可知孔疏因著之曰此公子奚斯所作其制度甚長而大是順萬民之心而非强以勞之也或謂閟宫既實實枚枚何容更作不知此詩是廟成後所作故開章先提閟宫以明作詩宗㫖惟其廟是已成故先致其贊美末乃詳其作之事也古人文字前後一線决無所作之廟非是閟宫而開先言閟宫之理故毛傳以為閔廟鄭不從而易之也或又謂閟宫本非姜嫄廟益不知其所從矣此詩薈萃生民大明綿及江漢烈祖殷武等篇而自具結搆所謂㸃竄堯典舜典字塗改清廟生民詩者庶幾近之集傳謂第四章有脫句未知然否王魯齊移公車千乘九句於土田附庸之下於義似得終屬亂經不敢從也馬端臨曰祀周公以天子之禮樂者如樂用宫懸舞用八佾以天子所以祭其祖宗者用之於周公之廟謂之尊周公可也至於郊祀后稷以配天禘其祖之所自出而以始祖配則非諸侯所當僭且郊禘所祀未嘗及周公何名為報周公之勳勞而尊之乎以其祖宗之勳勞而許其子孫僭天子之禮樂以祭之已非矣况所祀者乃天子之大祖而非即有勳勞之臣乎不知成王何名而賜之伯禽何名而受之羅泌曰始魯惠公使宰讓請郊廟之禮於天子天子使史角往魯公止之是周不與之魯亦未嘗行也使成王已賜惠公何為請之而又不敢行乎按成王賜魯郊禘漢人據此詩而為之說今詩極意恢張而所述王命止於山川土田附庸則記禮者之言不足信矣古義曰房制有户閾又設下跗於兩端若房然周語云禘郊之事則有全蒸王公立飫則有房蒸親戚宴享則有殽蒸全蒸是全載牲體殽蒸謂體解節折則房蒸是半體可知故毛訓大房為半體之爼也然周語明言郊禘之事有全蒸矣此固禘祭之禮也何得僅用半體乎毛氏之義疏矣又曰周禮大司徒職云諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一鄭賈謂公受地廣稅物多但留半即足其國之用以半為餘貢入天子其侯伯受地差少則稅亦少故三分之二以自用以一分貢天子子男受地又少其稅轉少故留四分之三以一分貢天子今依此法以諸侯之地推算計方四百里為田當十六萬井除山林園囿城郭溝塗之類率三分去一實存十萬六千六百六十六井又三分之而貢其一於王尚餘二分當六萬六千一百零五井則留供本國之用者也以丘甸法合之四井為邑四邑為丘丘十六井也出戎馬一匹牛三頭四丘為甸甸六十四井也出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人由此積之則六百四十井出車十乘六千四百井出車百乘至六萬四千井即當出千乘矣此外所餘二千一百餘井尚當出車三十餘乘畸零不復成數故不言耳司馬法漢書求其說而不得於是增同十為封一條以求合其數而實無此法也包氏注論語直謂方里為井十井為乘百里之國適千乘也夫魯成公作丘甲而春秋譏之以十六井出一甸之賦然且不可乃使十井出一乘其虐又過於成公矣而謂古有是制乎至王制孟子皆言大國地方百里王制所言乃夏殷之制武王克商列爵惟五分土惟三皆用前朝制也孟子之言大都據周初制賈公彥謂周公斥大九州於是五等之爵以五等受地則後之論者自當以周禮為凖又曰公車千乘是全舉一國之賦而言至行軍之時所用不過五百乘則三軍之衆盡是矣大國三郊三遂計其衆可備六軍要以備更番迭休之用故軍制惟三軍而止萬二千五百人為軍大國三軍合甲士與步卒共三萬七千五百人此詩惟言公徒則除甲士不在數內每車一乘步卒七十二人五百乘當三萬六千人今舉成數而言故但云三萬也馮疏左傳文十一年羣舒叛楚宣八年楚滅舒蓼成十七年滅舒庸襄十五年滅舒鳩路史舒庸在廬州舒城縣地里考舒鳩今無為軍巢縣舒蓼在安豐縣今鳯陽府壽州境皆偃姓史記泰山之陽則魯其隂則齊一統志龜山在兖州府泗水縣東北五十里春秋龜隂之田在其北今屬泰安府䝉山在兗州府沂州費縣西北七十里居魯之東一名東山孟子所謂登東山而小魯者也地里志顓臾國在䝉山下鳬山在鄒縣西南五十里連魚臺縣界世傳伏羲畫卦於此土人呼為八卦山嶧山在鄒縣東南二十五里史記泰始皇上鄒嶧山刻石頌德鄒山記曰鄒山古之嶧山也山下是鄒縣本邾國魯穆公改鄒故謂鄒山其陽猶多桐樹括地志許田在許州許昌縣南四十里有魯城周公廟在其中按魯頌四篇編之亦有序立國之道富庶為先故駉先之國富然後禮行而君臣有道以燕樂故有駜次之君臣有道則可以揆文奮武而服逺故泮水次之郊天禘祖尤功德之極盛故以閟宫終焉孔氏謂左傳文十六年季孫行父始見於經十八年史克始見於傳然則此詩之作蓋在文公之世僖公薨後也嚴華谷疑為生前祝願之辭而以孔疏為非愚按詩人追頌前王往往敘其生平如聞如見即閟宫篇熾昌壽臧云云並是追述當年承祭獲福之事亦因僖公在位日久有壽考茀祿之慶也無容以文辭害志惟是樂必有所用駉詩疑用以考牧有駜疑用以燕泮水疑用以視學養老若閟宫則疑為廟成告祖歌此詩也昌黎言天子使其史臣克作為駉駜泮閟之詩使聲於廟以假魯靈豈因末篇而連及之歟然則魯頌非盡無預廟事也附此以質諸好學深思者商頌鄭康成曰商者契所封之域有娀氏之女名簡狄者吞鳦卵而生契堯之末年舜舉為司徒有五教之功賜姓而封之世有官守十四世至湯受命伐夏桀定天下後世有中宗髙宗此三王有受命中興之功時有作詩頌之者商德既壞武王伐紂乃以陶唐火正閼伯之墟封紂兄微子為宋公代武庚為商後其封域在禹貢徐州泗濵及豫州盟豬之野自後政衰散亡商之禮樂七世至戴公當宣王時大夫正考父校商之名頌十二篇於周太師以那為首歸以祀其先王孔子録詩之時得五篇而已范逸齊曰太史公謂宋襄公行仁義欲為盟主其大夫正考父美之故追道契湯髙宗之所以興作商頌其說本之韓詩今考五篇皆言湯孫及武丁孫子無一辭及宋則知太史公信韓氏之說妄矣况其辭奧古不類周世之文而國語閔馬父之言又與序合無可疑者或謂周成王始封熊繹於荆至惠王時始有楚號遂疑商時未有荆楚欲以實韓氏之說不知帝嚳九州已有荆州之名非始於周封熊繹奮伐荆楚明指殷武孰謂周惠王時始有楚哉信傳而不信經非所敢聞也集傳商都亳宋都商丘皆在今應天府亳州界皇輿表應天府今歸德府𨽻河南亳州今鳯陽府亳州隸江南尚書盤庚篇於今五邦蔡注漢孔氏謂湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚遷殷為五邦然以下文今不承於古文勢考之則盤庚之前當已有五遷放齊詩說曰契封於商今上雒商是也本皇甫謐在漢屬𢎞農郡十四世至湯凡八遷湯始居商丘此言南亳後徙亳從先王居蓋帝嚳嘗居亳也此言西亳自湯十九世至盤庚其間又復五遷盤庚始居河北後遷河南復居亳之殷地即湯故都也即南亳古義曰契初封商在太華之間史記鄭注即今陜西西安府之商州以地有商山故名契生昭明遷砥石事見世本其地不知所在昭明生相土遷商丘左傳云陶唐氏之火正閼伯居商丘相土因之是也在今河南歸德府商丘縣括地志云宋州穀熟縣西南三十五里南亳故城即湯所都之南亳也即商丘宋州北五十里大䝉城為景亳即北亳湯所盟地因景山為名河南偃師縣為西亳帝嚳及湯所都盤庚亦從都之史記正義云亳偃師城也商丘宋州也湯即位都南亳即榖熟縣所謂商丘也後徙西亳也向來之說如此惟皇甫謐引孟子湯居亳與葛為鄰之文謂葛今梁國寧陵之葛鄉寧陵去偃師八百里不得童子饋餉而為之耕所駁甚正然考書序從先王居孔安國謂契父帝嚳都亳湯從商丘遷焉是湯始居商丘原與葛鄰不得據此謂湯不都偃師也獨盤庚遷殷恐不在偃師耳按史記殷已都河北盤庚渡河南復居成湯之所居蓋殷自河亶甲遷相祖乙遷耿皆居河北而三亳並在河南書序言盤庚五遷將治亳殷孔安國謂殷者亳之别名鄭康成謂湯始居亳之殷地皆指商丘而言非偃師也考三亳惟商丘為亳本名而北亳去商丘甚近其地有景山寰宇記謂景山在應天府楚丘縣北三十里湯㑹諸侯於此左傳所謂景亳之命也雖有南北亳之名其實祗在百里之內與周豐鎬相似今以殷武卒章合之盤庚所遷當在其地是亦湯之所居也若以偃師當之與詩書所言皆不合何黃如錢飲光嚴思菴皆有論辨而徴引泛濫故不用其說猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作溫恭朝夕執事有恪顧豫蒸嘗湯孫之將猗那一句中自為韻序曰祀成湯也商以聲音事鬼神故篇中皆言樂禮記集注曰鬼神在天地間與隂陽合散同一理而聲音之道無間顯幽故以此樂之聲音號呼而詔告於兩間庶幾聞之而來格也集傳分五節今分四節猗歎辭那多也毛傳歎美其樂之多也王氏發端唱歎有神音響至今可聽詩貫置植也疏曰金縢注植古置字按毛傳殷人置鼓明堂位作楹鼓集注云楹貫之以柱也貫之以柱則宜植矣楹鼓是商人新制故首及之集傳從歐義改訓為陳似非本指鞉見周頌有瞽篇簡簡和大也集傳大而不煩為有節也齊維嶽衎樂也毛傳烈祖湯也鄭箋陳氏樂書曰鼓所以作樂者也鞉所以兆奏鼓者也播鞉而鼓從之中聲以發焉黃才伯曰樂記云聖人作為鞉鼓椌楬塤箎此六者德音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭於先王之廟也據此可證此詩首言鞉鼓之義鞉播而鼓從言奏鼓則鞉先之矣凡所以衎我烈祖者諸樂亦該焉此四句為第一節言將祭求神之事如周人取蕭祭脂時也郊特牲謂商人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲即此是也集傳湯孫太甲也歐陽駁鄭謂自太甲以下至紂皆可謂湯孫然祀湯未有不自太甲始者特後王皆用之耳以為太甲何嫌奏假者奏樂以假於祖考也集傳綏安也鄭箋思成者言齊時思其祖考至祭而神明來格如有形聲之可接則所思者於是乎成而心由以安是安我以所思而成之也箋義陳大士曰商人尊鬼而尚聲聲召風風召氣氣召神神懼其雜而集也則有湯孫之思矣思者氣之精者也鬼神非其類也不至心有精氣而借聲以召之神無不格綏我思成信哉其綏也歟淵淵深逺也集傳深以言其聞之逺也王氏嘒嘒和也毛傳言其聲之小而和也說文嘒小聲也磬玉磬也鄭箋堂上升歌之樂非石磬也集傳樂書曰堂上言依我磬聲則戞擊鳴球摶拊琴瑟之類舉矣堂下言鞉鼓管鏞則柷敔笙簫之類舉矣聲應相保曰和細大不踰曰平周語既和且平兼堂上堂下八音諸器言鄒忠𦙍曰磬聲非可以人力髙下故依之則為和平穆穆敬靜之意詩所於赫湯孫穆穆厥聲侈言其樂之美如周詩苾苾芬芬侈言其飲食之美凡以悅神非自誇也黃東發此八句為第二節言正祭之事自升歌而至下管時也詩貫庸鏞通集傳大鐘曰庸斁盛也毛傳奕有次序也集傳古義曰前言鼓至此始言鏞則鏞之奏似在鼓後然既言鏞即繼以鼓則鼓之奏又在鏞後一篇之樂以鼓始終倘所謂鼓為樂之君五聲不得不和者歟詩所曰虞書云笙鏞以間以虞周之樂推之庸鼓有斁當為間歌萬舞有奕當為合樂蓋未至間歌則笙鏞未舉未至合樂則萬舞未陳按集傳言九獻之後鐘鼓交作萬舞陳於庭而祀事畢矣安溪說為深合集傳意也嘉客先代之後來助祭者集傳夷悅也毛傳八獻之後又有諸臣為賓者之一獻安成故至此始言嘉客之夷懌嘉客既悅則鬼神之悅可知蓋與虞賓在位羣后德讓之意同補傳此四句為第三節言祭將畢時樂盛作而歡欣交通也對今謂古進古言昔則昔又在古前先民先輩之人謂聖人也古義作作為祭禮也陸化熙溫恭者溫溫而恭蓋安行有常非勉強也朝夕謂前祭之期慮事必豫具物必備自朝至夕安行其恭也執事謂及祭之時執事者各致其恪慎而不怠閔馬父所謂先聖王之傳恭猶不敢專也嘗秋祭蒸冬祭祭以秋冬為備故言祭者必舉蒸嘗以見其餘焉季本將奉也集傳湯其顧豫蒸嘗哉此湯孫之所奉者庶幾其顧之也蘇氏詩牖曰音樂雖盛傳恭雖逺先祖雖格而孝子之心猶有不敢必者至以祖孫一體望之商人之綏我思成即此可以想見此六句為第四節言事有終始敬無間斷疏義至祭末而猶有餘慕也全篇言樂不言禮末節乃包舉之見樂行而禮將無不備也沈萬鈳曰祭義禘有樂而嘗無樂然周禮四時之祭皆有樂殷蒸嘗之祭亦有樂當引是詩正之按魯語閔馬父曰昔正考父校商之名頌韋注名頌頌之美者十二篇於周之太師以那為首疏謂宋之禮樂雖則散亡猶有此詩之本考父恐其舛繆故就太師校之而此序云得者蓋既校定真僞是從太師得之也言得之太師以那為首則太師先以那為首矣殷之創業成湯為首序云祀成湯明知無先那者又按閔馬父引此詩末節稱為輯之亂韋注云輯成也凡作篇章義既成撮其大要以為亂何黃如据此分為三章田間詩學曰古樂府體一章之中亦有亂則何氏之分章誤矣疏曰世本云宋湣公生弗甫何弗甫何生宋父宋父生正考甫正考甫生孔嘉父孔嘉父為宋司馬華督殺之而絶其世其子木金父降為士木金父生祁父祁父生防叔為華氏所逼奔魯為防大夫故曰防叔防叔生伯夏伯夏生叔梁紇叔梁紇生仲尼則正考甫是孔子七世祖嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷格無言時靡有爭綏我眉壽黃耉無疆約軝錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧豫蒸嘗湯孫之將享饗讀平聲序言祀中宗而集傳謂祀成湯之樂蓋致疑於湯孫之稱也本義謂自太甲以下至紂皆可謂湯孫朱子於上篇既用歐義不指太甲何又於此篇而疑之說者又以及爾斯所不應斥所祭之主為爾按金縢維爾元孫若爾三王皆告神之辭而思文后稷配天之樂亦曰莫非爾極蓋古人簡質無所嫌也張次仲曰通鑑前編稱中宗之兄雍已在位三祀諸侯不朝故以諸侯助祭為中宗頌今觀那詩我有嘉客辭氣婉約而此篇約軝四語語意揚厲張說為近情事又本義吕記補傳皆以烈祖即指中宗恐烈祖之號未可通稱當仍箋說指湯至祀成湯專言作樂祀中宗但言酒食李迂仲謂詩人各隨其宜言之耳蓋大樂之奏所以發揚湯德故那專言之而烈祖不言也朱謀瑋言樂之盛者德之盛亦如此意詩本一章今從集傳分四節嗟嗟歎美之深鄭箋補傳云言烈祖而云嗟嗟簡朴故也周頌言於穆於皇則近文矣烈祖湯也爾指中宗也鄭箋秩常也毛傳斯所猶言此處也集傳言湯有秩秩之常祜申錫後人於無窮而及於中宗之所也詩緝此四句為第一節祀中宗而歸本於湯者明中宗能繼湯之功而承其祜亦將祭求神之辭也載載之於樽也酤一宿酒也說文酒用一宿而成者亦尚質也古義賚賜也毛傳思成義見前篇清酤載而神已格故曰賚我思成也和羮鉶羹也曹氏儀禮於祭祀燕享之始每云羹定蓋以羮熟為節然後行禮集傳其事既夙戒而不苟其味皆和平而適宜詩緝言羮定也鬷假當依中庸作奏假進而感格於神明謂進和羮也集傳無言靡爭廟中之人嚴恭祗肅一念不紛非止不喧譁不交侵也王志長靜敬如此所以神明綏我以眉壽黃耉之福而無有窮也壽以眉言黃以髮言耉以面言皆壽徴也此六句為第二節言主祭者以誠敬而得眉壽黃耉之福福之被於一身者也約軝二句義見采芑篇鶬鶬采芑作瑲瑲蒸民韓奕作鏘鏘字雖不同皆言其聲也安成以心曰假以物曰享唐氏言助祭之諸侯乘是車馬以假以享於祖宗之廟也集傳溥廣將大也蘇氏諸侯之助祭如此是我之受命得萬國之歡心以事先王也曹氏此四句為第三節言因助祭而見受命之廣大福之及於天下者也自天降康豐年穰穰猶言自古有年耳惟豐年得備物而祭故神靈歆饗而降之福而湯孫之心猶若歉然故復言顧豫蒸嘗湯孫之將義與上篇同也此六句為第四節言祭則受福而有餘戀也章內三言無疆第一節是以前日之福及於今者言二三兩節是以今日之福及於後者言朱氏而第二節就一身言第三節則廣言之鄒忠𦙍曰那以三聲字相叶烈祖以三無疆為節按自天降康與有秩斯祜相應蓋康之降於天者即有秩之祜之及於斯所者也不當為助祭獲福之效或又以助祭為得人降康為得天節解彌混家織簾斥為俗說之俑或不過也尚書無逸篇周公曰在昔殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年箋云中宗殷王太戊湯之𤣥孫也有桑穀之異懼而修德殷道復興故表顯之號為中宗天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旗十乘大糦是承邦畿千里惟民所止肇域彼四海四海來假來假祈祈景員維河殷受命咸宜百祿是何有音以海音喜見小雅沔水宜魚何反序言祀髙宗而箋云祀當為祫髙宗崩而始祭於契之廟歌是詩焉古者喪三年既畢祫於太祖明年禘於羣廟今本作禘於其廟而後祫於太祖明年春禘於羣廟疏云其文誤也釋文謂此序注舊有兩本前祫後禘是前本兩禘夾一祫是後本今按疏引大宗伯王制注及鄭魯禮禘祫志皆與前本合故後釋文用前本愚按經述契湯先后而武丁之下又加孫子之號與常祭殊異疏謂禮三年喪畢祫祭以新崩之主序於昭穆此蓋髙宗喪畢與羣廟之主合祭於契廟故對契湯先后而稱為孫子言祖宗締搆相傳之天下至今光復舊物者在此孫子也鄭從詩義紬繹得之其說可從伹不必改祀為祫耳祫亦祀也為髙宗而祫即謂之祀髙宗可也集傳分五節今從之𤣥鳥鳦也春分𤣥鳥降有娀氏女簡狄配髙辛氏帝帝率與之祈於郊禖而生契故本其為天所命以𤣥鳥至而生焉箋述史記吞卵事今録毛傳宅居也補傳殷土亳也箋謂自契至湯八遷始居亳之殷地即書序所稱盤庚將治亳殷者也芒芒大貌毛傳古猶昔也集傳書曰惟我商王布昭聖武故稱為武湯也曹氏正域彼四方言四方之封域自湯正之使不得割據而侵擾也陸燧此五句為第一節言契肇封湯受命而以宅殷正域為言者為髙宗肇域張本也方承上四方言田間方命厥后謂隨其所在之方而命羣后補傳即上正域之事春秋傳謂湯有景亳之命是也奄有九有覆有九州為之主也鄭箋先后謂繼湯者也詩所武丁孫子武丁之為人孫子也王肅受命不殆在武丁孫子措語最圓不訾其先以形武丁之美而商道中衰意自見蓋太戊之後雖有盤庚亦惟保其不殆耳而中興之業乃在武丁孫子也此五句為第二節由湯以及羣廟而以武丁承其後明當祫之主具在而此祀之為武丁設也武王湯也㑹氏言武丁以武德繼湯於湯所行之事無不勝任蓋指下肇域之事言之也惟其武無不勝所以諸侯服從來助殷祭有建龍旗者十乘為諸侯之領袖皆奉黍稷以進焉古義詩緝曰龍旗十乘舉諸侯之尊者也按覲禮載龍旗弧韣敖繼公曰此篇主言同姓大國之君是也此四句為第三節乃正言祭事而約舉武丁之功在於繼湯之武而服諸侯也下文又以其中興之績自內及外者言之邦畿千里維民所止言武丁之內治修而民志定也肇始也爾雅變四方言四海者必中興之後疆土更拓於湯時也田間於湯言正域於武丁言肇域者王肅云殷道衰四夷來侵至髙宗然後以四海為境域陳際泰謂若自彼手創之者所以極推武丁外攘之功也此三句為第四節乃詳敘其功疏謂先安畿內後正四海言其自內及外也四海來假來假祈祈承上言四海既已肇域則諸侯莫敢不至其數衆多孟子所謂朝諸侯有天下也景山名商所都也見殷武卒章員與下篇幅隕義同蓋言周也景山四周皆大河集傳言諸侯緣河而集也此追敘武丁肇域之功所謂嵗事來辟勿豫禍謫者也非復言前助祭之事諸家重復牽引似少倫序於是總美殷家前後相承受天之命無有不宜為能負荷天之百祿謂自湯至髙宗也詩緝愚按言受命而統之曰殷言受命之宜而統之曰咸是首尾皆綜殷世諸王而中間特表武丁可知為祀髙宗而及羣廟康成之說信有徴矣不知先儒何皆不用其說至如姜嫄履跡簡狄吞卵事屬不經則又或疑或信不可解也尚書無逸篇其在髙宗時舊勞於外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至於小大無時或怨肆髙宗之享國五十有九年箋曰髙宗武丁中宗𤣥孫之孫也有雉雊之異懼而修德殷道復興故亦表顯之號為髙宗喪服四制云當此之時殷衰而復興禮廢而復起髙而宗之故謂之髙宗傳曰九有九州也按爾雅兩河間曰冀州河南曰豫州河西曰雍州漢南曰荆州江南曰揚州濟河間曰兗州濟東曰徐州燕曰幽州齊曰營州郭璞曰此蓋殷制景山見商頌條下馮疏今歸德府城東南有亳城即景亳也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商𤣥王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式於九圍受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百祿是總武王截斾有䖍秉鉞如火烈烈則莫我敢曷苞有三蘗莫遂莫達九有有截韋顧既伐昆吾夏桀昔在中葉有震且業允也天子降豫卿士實維阿衡實左右商王五章厖古莫工反平上通六章去入通七章衡戶郎反降豫今誤作降于序曰大禘也集傳謂大禘不及羣廟之主此宜為祫祭之詩蓋据趙匡陸淳說也按孔安國許慎張純杜預皆以禘為審諦昭穆至宋程子胡致堂劉原父陳用之馬端臨考核最精訖無異議愚聞之師曰禘之所以大於祫者只是加一自出之帝耳安有追崇曠逺徒然一父一子如適士官師之薦享者乎趙陸之說未可信也愚於周頌雍篇略著其說矣但雍禘太祖時禘也不追所自出故詩止據文王言之長發大禘當追所自出而詩但述𤣥王以下故楊信齊疑非禘詩龜山楊氏曰以長發其祥開端明指嚳說愚謂不特此也有娀帝立之文不言嚳而自出之義顯矣篇末兼舉阿衡据盤庚兹子大享于先王爾祖其從與享之孔傳謂大享蒸嘗康成引以注周禮司勳有功祭於大蒸條因有疑此詩為大蒸者然何休又言禘之異於祫者功臣皆祭也先儒之說彼此違異要之殷禮已亡聖人且有不足徴之歎後人推論悉難依据吾從先進而已一章遡契生之由明追享所自起也濬深也毛傳哲知也集傳維商與生商相對皆指契也非世有澽哲之君之謂詩深云稷稱思文屯之經綸育物之仁也契稱濬哲䝉之時中成物之知也愚謂思文對下陳常言濬哲對下是達言非徒摘取二典字以為比德堯舜也長猶久也鄭箋其受命之祥已久為下有娀開端也芒芒義同前篇敷分也蔡注方方域也下土方從集傳絶句書序帝釐下上方楚辭禹降省下上方言分别土地以定其方域也諸夏為外毛傳對京師為內也孔疏疆界也說文言自京師之外凡可建為大國者禹為區畫其疆界古義洪水三句為下封商起案也非契繼禹績之謂幅猶言邊幅也集傳隕當作圓謂周也鄭箋有娀契之母家也集傳將大也毛傳帝上帝也孔疏立如天立厥配之立子如大邦有子之子生商義同前篇謂生契也契始封商生契所以生商也言當幅隕既廣之時有娀氏始大集傳天乃立其女為帝嚳配而生契焉舊說生商與前篇異故易之按生民歌稷而遡姜嫄長發歌契而遡有娀豈於所出之帝尊而神之不敢質言而祗及其母歟可見雅頌體裁殷周亦自相禪不得以其不及帝嚳而疑之也二章述契敷教之功而及相土之紹業而興也𤣥王契也毛傳國語曰𤣥王勤商十四世而興韋昭云是其為王之祖故呼為王非追號為王也孔疏桓武也蘇氏撥治也毛傳契主文教而言桓撥者詩牖曰是勵精之意即敬敷五教之敬也愚謂又從而振德之亦是此意達達其教令也鄭箋受小國是達受大國是達蓋司徒掌建國邑小國大國受其教令而各達之於其國也箋謂堯封為小國舜益為大國此緯書之言穿鑿不可用率履二句正達之之實率循也履禮也毛傳民皆循其禮教不踰越也集傳謂契能循禮不過越不如箋義直截不但身之循之省視其心亦既感發以應之詩所言化之速也相土契孫也毛傳左氏謂閼伯居商丘相土因之是最盛者也王質烈烈威也毛傳截整齊也必其當方伯之任掌征伐之權故諸侯畏之截然而整齊也箋謂入為王官之伯出長諸侯下四章皆述成湯之事而三章又冒起下二章未及為天子時事也天命不違言自契與相土而後商之先公皆能順承天命無有違失疏說猶前篇言商之先后受命不殆蓋兼美羣廟也至于湯齊謂湯與天心齊一毛傳而命亦與之㑹也蘇氏降猶生也不遲者適當其時也集傳聖者德造其極之名敬而曰聖言自然也躋升也毛傳日躋者猶言日新又新也湯之敬德昭明上格遲久不息一惟上帝是敬是以上帝鑒之命之法式九州焉所謂表正萬邦也孔安國曰湯為夏方伯得專征伐此其受命式九圍時也下遂言其式九圍之事四章言以文德式九圍也球玉也毛傳小國大國所贄之玉集傳蓋圭璋璧琮琥璜之屬所以為聘者也箋以鎮圭大圭言之非也綴猶結也旒旗之垂者也鄭箋言為諸侯所繫屬如旗之縿為旒所綴著集傳信乎能荷上天之休命矣競强絿急也毛傳杜注皆然集傳非惟湯本其聖敬無所偏倚輔氏故其處事不强而爭不急以迫其接物不剛而猛不柔而縱以此布政則優游寬裕所以無意於干祿而百祿於斯聚也太甲篇云先王子惠困窮民服厥命罔有不悅並其有邦厥鄰乃曰徯我后后來無罰此湯德綏諸侯而諸侯以玉帛交聘即百祿遒之事也五章言以武功式九圍也共供也如君謂許不共之共訓貢酬執皆非湯有征伐之事小國大國各具卒乘芻糧以從古義所謂移甲役財以相給也駿厖當如齊詩謂馬喻先驅也胡氏謂取負重致逺之義殊不醒切蓋綴旒為文德設喻當為繫屬駿厖為武功設喻當為先驅亦有騰驤之意龍寵也鄭箋所謂寵之四方也郝仲輿云人心所屬即是天休人心所奉即是天寵其說然也敷奏陳進也孔疏敷奏其勇所謂布昭聖武也爾雅疏面慙曰戁傳訓為恐則復叠矣言本聖敬為聖武不震驚而騷擾不搖動而錯愕不愧戁而疑沮不悚懼而畏却家仲恭曰苟非大受之人驟而當天下之重任鮮不恐懼而失其守者此不動心之所以難也湯真天錫之勇矣百祿總而歸之宜哉遒以積聚言總以總至言義一而各有當也仲虺之誥曰東征西夷怨南征北狄怨曰奚獨後豫攸徂之民室家相慶則當時友邦翕集壺漿載途概可想見即百祿總之事也六章述湯伐桀之事蓋至是始為天子也古義武王湯也斾見出車篇所謂續旐末為燕尾者即上章之旒也載載之車上鉞大斧也秉鉞所以將威云有䖍者所謂恭行天討也集傳亦本聖敬來曷誰何也集傳詰問譙訶之辭古義如火二句言以戒懼為奮揚理直氣壯莫敢訶問也詩牖苞本也蘖餘也毛傳一本生三蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也集傳遂肆其惡也達行其志也鄒泉古義曰遂達皆從蘖字生出翦去其蘖使不至四出為害故曰莫遂莫達也由是九州截然齊一以歸於湯詩緝既者已事之辭上章敷奏其勇當是伐韋顧之類此章則専為伐昆吾夏桀紀事古義蓋昆吾夏桀同時誅也鄭箋按湯十一征於昆吾夏桀最後可知湯無圖夏之意孟子謂非富天下者為得聖人之心也詩稱契曰受小國大國於湯亦曰受小球大球受小共大共稱相土曰烈烈有截於湯亦曰烈烈有截是湯能兼契與相土之功則與天心齊者即與祖德齊矣湯之光宅大物莫非祖德所貽追而享之豈能已乎此章以上皆正言大禘之事末章則又以功臣配享言也上述自契至湯而末云昔在中葉集傳謂湯之前代中衰時是也錢文子引仲虺之誥小大戰戰罔不懼於非辜及史記夏臺事以中葉為即指湯身細玩文義終不似疏云昔在中間之世成湯之前商國嘗震動而危悚矣至於成湯乃有聖德信也上天子愛之下大賢之人豫之使為卿士實維伊尹為阿衡之官佐助我成湯克桀而有天下也此疏明諦故全録之按商自相土後惟祭法稱冥勤其官而水死魯語稱上甲微能師契而皆不歌於詩上甲微後又六世而至湯皆無聞焉其為中衰震業事所應有不然以海外有截之規模何至湯而以七十里起耶張次仲曰功臣與享必非一臣獨言伊尹者以開國元勳故也錢氏曰伊尹為商宗臣非徒功臣也使湯之後無尹則商之為商不可知矣按篇中三提帝字明天命與商相終始末節功臣亦以降豫言之則天之眷商無所不至矣然眷商之始則自立子生商以來禘祭之所以不可已也湯是帝命歸結處所以得行禘禮者皆由於此故詳敘之而湯之敬德是承受帝命之本一生功業從此出詩中說敬處既精微亦廣大前後敘事精核嚴整大典禮須有此大著作表之皇矣生民開乳之源也馮疏淮南子云有娀在不周之北史記正義云當在蒲州國名記云蓋陜虢間鄭語祝融其後八姓彭姓豕韋己姓昆吾顧通典滑州韋城縣古豕韋國一統志直𨽻大名府滑縣廢韋城在縣東南五十里顧城在山東東昌府濮州范縣東南五十三里濮州古顓頊之墟曰帝丘夏為昆吾氏所居左傳昭十八年二月乙卯周毛得殺毛伯過萇𢎞曰是昆吾稔之日也寰宇記湯伐桀之時昆吾以兵助桀同時而滅書序注桀都安邑湯升道從陑陑在河曲之南戰於鳴條之野地在安邑西一統志山西平陽府解州安邑縣禹營安邑即此鳴條岡在縣北二十里境接夏縣尚書君奭篇孔注伊尹名摰湯以為阿衡太甲改曰保衡撻彼殷武奮伐荆楚冞入其阻裒荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常天命多辟設都于禹之績嵗事來辟勿豫禍適稼穡匪解天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈壽考且寧以保我後生陟彼景山松柏丸丸是斷是遷方斫是䖍松桷有梴旅楹有間寢成孔安二章平上通三章去入通四章平去通遑字不入韻福方墨反𤣥鳥祀髙宗箋謂祫髙宗於太祖此詩祀髙宗集傳謂特為百世不遷之廟皆按据經文無可疑者殷本紀云武丁修政行德天下咸歡子祖庚立祖已嘉武丁之以祥雉為德立其廟為髙宗是廟立於祖庚之世也或疑祖庚時武丁方為禰廟不當遽立廟號因指帝乙時武丁親盡當祧以其功髙而宗之陋且妄矣堯在舜時即稱神宗周公宗祀文王亦在成王之世何必親盡當祧而後為宗乎且帝乙巳遷河北朝歌之地而景亳在南何緣陟景山而取材舍明白可据之經史而造為臆說何其誣也史言祖庚時立廟而歸其事於祖已者蓋祖已商之賢臣身及武丁之盛欲嗣王循而法之猶宗文王者之歸周公也立廟既出祖已之意則詩疑祖已作之一章述髙宗伐荆楚之事也撻疾意也毛傳殷武殷王之武也集傳荆楚荆州之楚國也毛傳冞深也裒聚也毛傳旅衆也所猶處也鄭箋湯孫謂髙宗集傳中興之烈莫大於武功武功之盛莫大於服楚故周宣江漢之師殷武裒荆之役皆為中興盛事蓋荆楚剽勇輕悍史記世亂則先叛世治則後服迂仲殷道衰而楚人叛鄭箋髙宗用兵迅疾奮起伐之曰撻曰奮者人不及謀發不及距有英發果斷之意徐氏蓋積衰之後稍涉因循便凌夷不振古義殷之所以稱武也深入其阻謂奪其所恃裒聚荆旅謂安輯其衆王者之師也朱氏謂致其來而平之非也輔氏謂不縱殺者亦似未盡有截其所謂盡平其地截然齊一集傳猶常武言截彼淮浦王師之所也曹氏稱湯孫者謂髙宗能纘湯之緒無愧為湯之孫也湯孫之緒即湯緒也下文昔有成湯云云是湯緒也二章述荆楚平而戒飭之辭也維女荆楚呼而告之也商都景亳楚在國南是聲教所加之地非僻逺也昔成湯之世雖氐羌之逺莫敢不以時貢獻終世來王曰是商之故事則然况近在南鄉者乎蓋戒飭之使循其常典罔或越也遡成湯者告以祖制當然所謂臨之以先王也徐鳯彩曰上章以威克此以文告也三四兩章因剘楚服而遍飭諸侯之辭三章怵之以禍四章動之以福本詩明曰命于下國是兩章皆述其命辭也多辟諸侯也毛傳設都建國也以天命言者說命謂明王奉若天道建邦設都則諸侯雖受封於天子實亦天所命也績功也言建國於禹功所及之處箋謂禹平水土弼成五服而諸侯之國定也嵗事謂朝覲述職之事來辟來朝於王也適謫通集傳責讓也郝氏慶為福則讓為禍矣尊卜豫髙宗自謂也古義言各以嵗事來朝勿干我禍謫也惟能勤治民事不懈怠於稼穡則禍謫不及矣孟子言巡守而以土地田野為慶讓之本蓋有由也嚴畏也僭賞之差也濫刑之過也集傳封大也毛傳又言天命降監下民有嚴者臯陶謨云天聰明自我民聰明天明畏自我民明威達於上下敬哉有土即此意也上章既戒以民事此復以顧畏民礨惕之說命謂不惟逸豫惟以亂民是也不僭二句髙宗自表其待諸侯之法也古義言我刑賞所加不過寬而僭不過猛而濫惟是國有常典我不敢慢弛言法在必行也今以是命爾下國之諸侯庶克盡心於民無負設都之意則當大建其福豈苐免於禍謫已哉此戒而朂之也於荆楚言先王而訓以典常於諸侯言天命而示以禍福大誥誕敷無非本天本祖此赫聲濯靈所由來也五章極贊中興之烈以明崇報之不可已也商邑京師也毛傳𤣥鳥甫言生商即著殷土此篇名為殷武仍稱商邑可知殷商二字殷人原自通稱如周之鎬洛晉之翼絳隨地變稱而大名不易不當畫定鴻溝妄生穿鑿也翼翼整飭貌集傳四方之極言四方之政教取正於此詩緝洪範所謂㑹其有極歸其有極是也赫赫顯盛也濯濯光明也厥聲美聲也厥靈尊嚴若神靈也壽考書言享國五十有九年也寧安也言天下治安也季本保後生言子孫世世治安也朱氏末章専言作廟之事以結全篇也景山見𤣥鳥篇蓋自盤庚遷亳殷故得陟景山而取松柏也丸丸直也集傳錢文子曰圓直也是斷是遷言截之所生之地徙之造作之處也方正以繩墨也斫削以斧斤也古義䖍敬也毛傳工匠皆敬其事也孔疏桷椽也朱氏梴長貌毛傳旅陳也毛傳衆也集傳楹柱也間大也孔疏寢廟中之寢也集傳寢成則髙宗之神安天下之心亦安至於百世而無不安故曰孔安也古義謂考廟不宜虛主又不得設立二主意武丁雖自立廟當世數未足時必仍居七廟中而虛其新廟及親盡之日始遷其主於新廟耳愚以周人宗祀明堂之意推之每嵗當有特祭必無一直虛設之理此篇乃特祭之樂歌非祔而祭之也特不知周人明堂之主如何措設豈行禮時奉主於明堂祭畢而乃歸穆廟耶禮經既無明文先儒亦無言之者不敢強為之說也集傳引易髙宗伐鬼方以證伐荆楚事金仁山謂荆楚舊多淫祠故謂鬼方然考貴陽輿地記謂本西南夷羅施鬼國則鬼方乃今之貴州詳見蕩篇山海經云氐羌乞姓地理志隴西郡有氐道羌道按一統志以陜西臨洮府寧夏岷州靖虜衛四川龍州松潘叠溪皆為羌地端木子謂聞樂知德今觀商詩之駿厲嚴肅想見當時賢聖繼起其道主剛故發祥之始即以桓撥為言而湯之聖敬中宗之嚴恭髙宗之不敢荒寧一一於詩見之而其辭古質周之雅頌往往脫胎於此虞東學詩卷十二
