body:
  text: 虞東學詩卷五宗大府主事顧鎮撰秦嬴之得姓本於伯益秦之受封肇於非子其國在雍州鳥鼠山之東北漢志謂今隴西秦亭谷是也其先中潏居西戎以保西垂六世孫大雒生成及非子成主大雒後非子為周孝王養馬汧渭間錢氏詩學謂隴州南三里有秦城即其地也按禹貢導岍及岐釋文岍又作汧汧水出汧縣之蒲谷胡渭錐指謂今鳯翔府隴州南三里布汧縣故城又謂岍岐並在河西渭北則田間之說信矣本紀言非子居犬丘即漢槐里縣槐里去秦隴甚遠恐不可据非子既别封為附庸邑於秦谷其主大雒後者厲王時為西戎所滅宣王乃命非子曾孫秦仲為大夫以伐西戎不克而死其子莊公大破戎師盡恢大雒舊壤徙居之因為西垂大夫至犬戎弒幽王周室東徙莊公子襄公將兵救周王賜之岐山以西之地列為諸侯傳子文公遂收周餘民有之地至岐岐以東獻之周乃自西垂還居非子故封本紀是襄文之世秦地不出岐西而鄭譜謂襄公逐戎橫有西都八百里之地非也疏復引終南詩為襄公已得岐東之證不知終南西起秦隴東徹藍田綿亘八百里雍録錐指紀要並同則岐之東西皆有終南不得執以訾謷史公也按莊二十二年莊王與虢酒泉今為同州府澄城縣明在西周畿內倘其地已為秦有莊王豈能奪以與人此尤鑿鑿可考者自當以本紀之言為正其洊及岐東盡收虢鄭遺地乃在寧武德三世至穆公滅芮築壘為王城而秦境東至於河豐鎬故都從兹淪沒矣嘗論春秋大勢惟齊晉秦楚為强齊自桓公而後蹶不復振楚介南服居天下之下流雖其勢蹶張而俯仰之形懸矣所與爭天下者惟秦與晉昔人謂天下如常山之蛇秦為其首晉居其脊據其脊而扼其項則首亦不得不為之俯故可以制秦者獨有晉耳晉三分而脊已折矣其首有不昻然而起者耶封殽而後其勢已兆秦之次於晉也聖人有深慮焉不然舊第在魏唐之先何以退而居後哉先儒以為示貶後儒以為繼霸其然豈其然乎有車鄰鄰有馬白顛未見君子寺人之令阪有漆隰有栗既見君子並坐鼓瑟今者不樂逝者其耋阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡令力珍反附庸雖未爵命而自君其國則車馬禮樂侍御所宜有也而秦僻在西陲因仍舊俗至仲入仕王朝初備其制故序下言秦仲始大集傳言創見而誇美也吕記曰既見君子並坐鼓瑟簡易相親之俗也今者不樂逝者其耋悲壯感激之氣也此能得詩之情嚴緝曰秦興而帝王之影響盡矣車鄰其濫觴也此能得詩之骨劉瑾何楷錢天錫及近日陸奎勳俱以秦仲時未必得備寺人之官因謂此詩作於秦襄之世愚謂仲初溺於戎俗及為大夫得見周京聲物之盛效而為之亦情理所有諸家泥於襄公始為諸侯鑿空改序不可訓也安溪謂阪隰非興其意蓋例之定中所言樹植余友錢辛楣氏則謂詩以山隰起興者甚多雖據所見咏之究不得不謂之興山榛隰苓與此文辭相類辛楣是也毛俱以發興在篇端此獨於下二章取興又是一例易曰其於馬也為的顙爾雅馰顙白顛舍人曰的白也顙額也額有白毛今之戴星馬毛傳寺人內小臣也疏曰周官序官云內小臣奄上士四人寺人王之正內五人則內小臣與寺人别官此云寺人內小臣者言在內細小之臣非言內小臣之官也按賈公彥曰寺人不掌男子秦詩未見君子寺人之令蓋秦仲始大其官未備故寺人兼小臣得掌男子此說得之說文阪山脅也三秦記其阪九曲欲上者七日乃越高處東望秦川爾雅楊蒲柳左傳所謂董澤之蒲生澤中可為箭笴埤雅楊有黃白青赤四種毛傳八十曰耋疏云易注年踰七十左傳注七十曰耋此言八十無正文許白雲曰自七十至八十皆可言耋駟鐵孔阜六轡在手公之媚子從公于狩奉時辰牡辰牡孔碩公曰左之舍拔則獲遊于北園四馬既間輶車鸞鑣載獫歇驕首章上去通朱氏解頥曰一章言往而狩二章言狩而獲三章言獲而息王志長曰舊說鄭箋以末章追論未獵之前調習車馬之事不若今說集傳之順按秦初立國而詩所誇美多車馬戎兵射獵之事一反南豳之舊朱子所謂以猛驅之而果敢之氣足以成富强者固己可見然車鄰咏寺人駟鐵詠媚子其後受寺人媚子之禍開國承家小人勿用豈不可為永鑒哉毛傳鐵驪古義引說文云鐵深黑色驪赤黑色然按月令孟冬駕鐵驪鐵之為驪不可据耶周禮五御三曰逐禽左蓋射以中左者為中殺釋名矢末為柭拔即柭也矢以鏃為首柭為末鄭曰括也括亦矢末疏引家語括而羽之是謂矢末為括也輶車輕車也車僕掌輕車之倅此馳敵之車也詩之輶車乃田僕所設驅逆之車注云驅驅禽使前趨獲逆御還之使不出圍按此車亦主輕利爾雅長喙獫短喙猲獢或謂范傳嚴緝歇其驕逸殊鑿小戎俴收五楘梁輈游環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子溫其如玉在其板屋亂我心曲四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子溫其在邑方何為期胡然我念之俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交䩨二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩德音首章驅續馵平去入通續轉平徐邈音辭屢反次章驂合軜邑平去通驂轉仄中字不入韻三章錞釋文音敦弓古音肱羣錞苑膺弓縢興音平上通龍為霖謂侵韻屬應鍾變宫蒸韻屬黃鍾正宫變宫原以調和正宫古人通用向謂侵蒸不相通者非一章言車而帶及馬二章言馬而帶及兵三章言兵而接上馬蓋己開蟬聨一體序下言國人矜其車甲前六句是也言婦人閔其君子後四句是也疏義解頥曰西戎秦人不共戴天之讐也復讐之義雖行役者之婦無不知之而形於言者如此周之君臣亦可少愧已又曰溫言其德之和易厭厭言其德之安靜秩秩言其德之有常以如是之君子親如是之勞苦此其閔惜之辭也愚按首言在其板屋初至時也次言方何為期望其歸也三言秩秩德音謂將有好音貽我蓋祝其凱旋也舊以德音為善譽恐非詩所曰襄公承天子命以伐西戎君子從役而其室家思念之先誇其軍容之盛而後及於離别之情與列國之勞苦哀怨者異矣豈真有善人之教悅以先民哉亦能講武厲戎以自强於刑政其後卒兼六國用此道也小戎疏對元戎言之蓋附箋說羣臣之兵車補傳對乘車言之其說自妥然鄭駟楚廣各立名號秦亦宜然不必鑿也收謂之軫戴東原謂輿下四面材合而收輿者是考工注謂輿後橫木蓋據一面言之詩疏兼及前後則其旁可知陳祥道据注駁孔非也大車之隧八尺兵車之隧四尺四寸比大車之隧為淺也隧之為言深也謂從前軫至後軫其深之數如此也古人升車從後入故以淺深言之考工記國馬之輈深四尺七寸軹崇三尺三寸加軫與轐七寸又并此輈深則衡高八尺七寸也深謂轅曲中劉熙釋名輈轅上勾也轅從後軫至前軫稍曲而上以便服馬之進退至衡則駕於衡上而向下勾之其形穹窿上曲如屋之梁又五分其穹每處以皮束之游環者以韋為無定環游於服馬之背貫驂外轡當服馬外脅以止驂內入皆馭驂之制也嚴緝釋名隂䕃也橫側車前以䕃軨也楚辭注軫式下縱橫木即考工記之轛也以板掩軨在式之前即先鄭所謂式前之軓是掩軨即軓軓即隂也非軓為一物掩之者又一物也孔疏失之驂不當衡衡長六尺六寸其下只容兩服别為二靷以引車擊於隂板故曰隂靷續者靷端相接之環沃白金為飾暢轂者轂長三尺二寸戴東原謂大車短轂一尺五寸取其利兵車長轂取其安黃氏日抄云盾狹而車廣一盾不足為衛故以二盾比而合之非備破毁之義說文觼環有舌者軜驂內轡也按驂外轡既貫於游環而執之於手其內轡不執但納之觼而繫於式前也以淺薄之金為四馬之介孔疏使易於旋習集傳故曰孔羣孔羣甚和也韓詩云駟馬不著甲曰俴駟然戰馬無不被甲者終以毛義為正厹矛毛云三隅矛蓋相傳為然孔疏錞矛之下端平底者也見曲禮注伐舊謂中干蒙舊謂討羽按二章既言畫龍於盾而三章又言畫羽於盾何言盾之詳耶陸奎勳引考工熊旗六斿以象伐謂當是綴羽旗幟其說近之虎韔鏤膺三句皆言弓而毛以膺為馬帶言近錯雜范逸齊謂即弓室之胸於文為順竹閉緄縢者言此交於韔中之弓以竹為䪐以繩約之所謂弓檠者也陳祥道曰䪐既夕禮作柲以竹為之狀如弓然納於弓裏柲以閉之亦謂之閉緄以繫之亦謂之紲騏色青黑者孔疏馬後左足白馵爾雅駵赤色黑鬛郭注騧黃馬黑喙說文蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚右音以詩刺襄公而序下言未能用周禮其說疑有所受顧未得其實而說者多岐如毛以霜露喻禮鄭以蒹葭喻民范以順流而涉喻以禮治人歐嚴並以伊人斥襄公吕以伊人指此理獨集傳以為不知所指庶幾慎言之義竊意周道親親尚賢平易忠厚邠岐之民濡染禮樂之教者數百年秦襄起自西垂習於戎俗惟尚刑威喜攻戰盡棄周之舊典君子避地遠去焉故詩以為霜起興未晞未已蓋難望以陽和之煦也逆流而上曰遡洄順流而涉曰遡遊毛傳詩所謂於時猶有周之遺賢逆其道以求之不可得也順其道以求之未嘗不在焉依文解義斯為近矣至以蒹葭喻伊人有後凋之節却似不必集傳為賦今從毛為興爾雅蒹薕葭蘆郭云蒹萑之未秀者即今之荻荻之初生曰菼一曰薍一曰隼又云葭一名華至秋堅成謂之萑葦据此則蒹有七名菼薍隼蒹薕荻萑也葭有四名葭華蘆葦也其名易混故詳著之爾雅小渚曰沚小沚曰坻毛皆訓為小渚誤也終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂君子至止黻衣繡裳佩玉將將壽考不忘梅裘哉本通裘古渠之反襄公初受命服而歸其大夫美之而序以為戒者其君也哉壽考不忘頌禱之中有規勸焉條梅言氣象之鬱葱詩緝紀堂言形勢之壯濶補傳蓋以興其容貌佩服之盛兩曰至止蓋受服西歸時歐駁蒹葭箋秦處周之舊地据史記言終襄之世不能取岐豐李黃集解亦疑此詩序與史記相戾後人遂有改作美秦文公者何其勇而無所裁也按詩言錦衣狐裘黻衣繡裳又曰其君也哉明是始受命服為諸侯之辭而受命服為諸侯者非襄公乎終南西起秦隴東徹藍田相去且八百里程大昌豈必至岐而始有終南乎至止者箋謂受命服於天子而來豈必至止於終南之下乎况首二句毛朱皆以為興尤不容泥柳宗元曰終南據天之中在都之南西至於褒斜又西至於隴首以臨於戎東至於商顔又東至於太華以距於關方輿紀要云終南脉起崑崙尾銜嵩嶽為雍梁之巨障大事表終南在今西安府長安縣南五十里亘鳯翔岐山郿武功盩厔鄠長安咸寧藍田九縣之地毛傳條槄爾雅槄山檟郭曰今之山楸楸細葉者為檟爾雅梅柟陸疏云皮葉似豫章郭注似杏實酢誤集傳於召南具釋此不復云亦誤二物為一物也紀訓基謂山基也堂訓畢釋丘云畢堂墻注云今終南山道名畢其邊若堂之墻集傳以山之亷角訓紀山之寬平處訓堂則用程子說交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身交交黃鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身棘息特與穴栗各為韻詩雖主於哀三良而棄民之罪不可掩矣黃鳥止棘毛鄭以為得所龜山駁之謂與出谷遷喬者異其說然也夫枳棘之棲昔人所嘆以為得所可乎蓋以黃鳥之失所止興三良之不得其死也按史記繆公卒從死者百七十七人子輿氏三人亦在從死中應劭注繆公與羣臣飲酒酣公曰生共此樂死共此哀於是三人許諾及公薨皆從死匡衡言秦穆而士多從死即其事也其見於曹植詩者則曰秦穆先下世三臣皆自殘見於王粲詩者則云臨殁要之死焉得不相隨見於淵明詩者則云厚恩固難忘君命安可違据此則箋謂自殺以從死者信已生納諸壙古無是說今考三良墓與繆公墓相距遼遠則納壙之疑可釋即服虔謂殺人以葬旋環其左右曰殉者亦不盡然矣臨穴惴栗自屬旁人箋義明直序刺穆公而諸儒皆罪康公亦與左傳不合括地志秦穆公塜在岐州雍縣東南二里三良塜在雍縣故城內今鳯翔府天興縣二塜逈不相及蓋從死而不同葬鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多山有苞櫟隰有六駁未見君子憂心靡樂如何如何忘我實多山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多風方愔反二章覺藥錫古韻同部以鷙鳥之投林興賢人之投主乃久而不蒙召見故憂之不釋也因問之曰如何乎如何乎多是不復記憶我矣所謂豫日望之而莫豫追也後二章以櫟駁棣檖起興皆是山所應有者猶國當有賢人也舊說以君子指賢人今用詩緝說但玩鳥投林之義恐是四方來歸者未必為穆公舊臣耳集傳不從序說刺康公改為婦人詩今亦無可證者不如仍舊為安爾雅晨風鸇郭注鷂屬陸疏嚮風搖翅乃因風急疾擊燕雀食之故毛以鴥為疾飛貌爾雅櫟其實梂孫炎曰櫟實橡也陸璣云秦人謂柞櫟為櫟河內謂木蓼為櫟椒榝之屬也此秦詩也宜從其方土之言柞櫟是也駁毛謂如馬倨牙食虎豹陸疏駁梓榆也其樹皮青白駁犖遙視似駁馬故名按下章皆言山木不宜云獸爾雅常棣棣是棣名惟常棣專之毛以為唐棣非也唐棣自是栘又檖赤羅郭曰今楊檖也實似梨而小酢可食陸云一名山梨今人亦種之極有脆美者豈曰無衣與子同袍王于興師修我戈矛與子同仇豈曰無衣與子同澤王于興師修我矛㦸與子偕作豈曰無衣與子同裳王于興師修我甲兵與子偕行衣師𫀆矛隔句韻下章同無衣刺用兵而不言所刺何君觀王于興師之文恐屬穆公詩也叔帶之難王使告於秦晉秦伯師於河上將納王晉人辭秦師而下此其事也秦之用兵後此别無勤王者矣與晉共承王命而晉獨成功詩所以刺歟六與子皆指晉人同仇偕作偕行而不能與之同功言外當有此意鄭以次於黃鳥晨風之後故以為責康公而謂王于興師以王法興師其解迂曲竊意詩篇類多錯簡觀下渭陽决非即位後作則此篇無嫌倒出也許抄以為襄公詩則越世太遠李抑亭以為哀公詩不知三百篇無越東周百年後者安溪詩所陸堂詩學皆以為穆公詩安溪謂黃鳥作於君子此則軍中之言詩之次序往往如此疏曰玉藻纊為襺緼為袍純著新綿名襺雜用舊絮名袍澤說文作襗袴也又釋名云汗衣近身受汗垢之衣毛傳戈長六尺六寸此乃言其柄也其上刃不在內考工記云戈柲六尺有六寸又云戈廣二寸內倍之謂刃下接柄處胡三之謂橫刃鄭所謂勾孑者也援四之謂直刃是戈柲之上一尺八寸也說文云戈平頭㦸也徐鍇云小支上向則為㦸平之則為戈考工記云㦸廣寸有半內三之胡四之援五之其制長丈六尺周禮注古用皮謂之甲今用金謂之鎧我送舅氏曰至渭陽何以贈之路車乘黃我送舅氏悠悠我思何以贈之瓊瑰玉佩思佩平上通詩本送舅而序云康公念母今讀其辭意自得於不言之表故曰詩可以興也廣漢張氏譏其不能自克於令狐之役或亦晉有以致之歟質疑曰按詩意作於送之之時非即位後作也愚按三百篇無齊桓晉文之詩而於衛風録木瓜於秦風録渭陽其亦不沒二君之意夫孔疏雍在渭南水北曰陽晉在秦東行必渡渭曹氏粹中曰渡渭而送至渭北也漢志右扶風渭城縣故咸陽也在渭水之北水經渭水徑長安城北注即咸陽於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿於我乎每食四簋今也每食不飽于嗟乎不承權輿簋古音九龍為霖本韻飽古音補苟反末句不入韻此刺康公忘先君之舊臣與賢者有始而無終也觀李斯諫逐客書所言則穆公之能得士可知而康公不能承之也集傳雖不主康公而末引楚元王敬禮穆生及王戊即位忘設酒醴之事仍與序說相符夏大也毛傳屋具也渠渠猶勤勤也言始設禮食大具以食我其意勤勤然鄭箋丹鉛録曰夏屋大俎也周人房俎今按魯頌籩豆大房集傳謂半體之俎足下有跗如堂房則夏屋即大房之謂矣王肅以為大屋孔氏謂下皆言飲食之事不得言屋宅者是也首章言俎之大其繼至於無餘次章言簋之多其繼至於不飽語意次第各有照應若以大屋當之文義不相管攝矣以經文繹之以魯頌證之知箋說非無稽也考工記旊人為簋則簋是瓦器容斗二升簋盛黍稷簠盛稻粱詩惟言簋而傳兼稻粱言者疏云以公食禮有稻粱知此四簋之內亦有稻粱公食六簋此惟四簋者燕食差於禮食陳氏曰造衡自權始造車自輿始故爾雅訓權輿為始陳陳本太皥之墟在禹貢豫州之東其地廣平無名山大澤今陳州府治雎寧縣是也雎寧古之宛丘故漢志謂陳國今雎陽之地春秋大事表云今陳州府城南三里有宛丘高二丈城內東北隅有池即詩所謂東門之池也昔舜裔虞閼父為周陶正其子曰滿武王妻以元女大姬而封之陳是為胡公與薊黃帝後祝堯後並為三恪後二十三世為楚所滅漢志又言大姬好祭祀用史巫故其俗好巫鬼康成亦謂大姬好巫覡歌舞之樂愚按大姬為聖王之女沐浴大姒邑姜之化寧有習尚巫覡喜樂歌舞之事左傳史趙稱胡公不淫亦安肯狥其夫人所好舊說殆未可信徐警弦謂陳服於楚楚俗尚巫信鬼因之漸染其俗其或然歟任啓運曰陳與楚為近其聲楚聲也今讀陳詩十篇節短韻長實為楚詞開乳之源則其浸淫於楚者久矣先儒謂陳詩十而七為淫靈公之事世變已極詩訖於此下於秦夷之也愚謂陳亡楚興而東周不可為矣故詩訖於陳靈非沾沾於惡陳靈也子之湯兮宛丘之上兮洵有情兮而無望兮坎其擊鼓宛丘之下無冬無夏值其鷺羽坎其擊缶宛丘之道無冬無夏值其鷺翿缶方有反上去通東門之枌宛丘之栩子仲之子婆娑其下榖旦于差南方之原不績其麻市也婆娑榖旦于逝越以鬷邁視爾如荍貽我握椒栩况浦反差古音磋原字不入韻荍釋文祁饒反漢志稱陳俗巫鬼引此二詩為證則此二詩當為淫祀歌舞之事如後世清明上河之類宛丘刺幽自上倡也東門疾亂自下效也蓋陳之宛丘猶鄭之溱洧為國中勝地迎神聚樂恆於此焉幽公以國君之貴輕身往遊於時巫覡之流取鷺羽為翿立之而舞以事神復擊鼓缶以助其歡遍於宛丘上下且及道路之間無復冬夏之息所謂淫荒昏亂遊蕩無度者如此故刺之為有俗情而無威望也子斥幽公箋說也疏引公羊傳百姓安子諸侯說子公子翬謂隱公唐風山有樞子有衣裳子有車馬指昭公為證可以無疑矣毛以子為大夫與序不應集傳以子為此人此人亦何關輕重而刺之東門宛丘南方之原皆歌舞之場也君既遊蕩則世俗效尤棄其職業男女亟聚所謂巫風也特舉子仲子以見風行自上枌栩之下如漢社枌榆之類婆娑師古以為歌舞娛神也榖旦于差即九歌之吉日良辰也視爾如荍貽我握椒即美人目成芳椒成堂之語也陸堂任釣臺謂楚詞濫觴者得之愚按高平曰原歐義据水經注宛丘在陳城南道東則南方之原即宛丘也由東門至宛丘皆歌舞之地即上篇宛丘之道也一章是先期演習二三章乃娛神之正日故擇榖旦而往也子仲之子男巫也箋義男巫則著其氏明其為世族故刺之女巫不言其人疏謂庶人不足顯其名氏舊說以子為女原為原氏女說近穿鑿且與序說男女棄舊業而歌舞於市井者不應前二章既言男女歌舞娛神之事末章則言聚觀者也越于也鬷總也爾雅鬷邁者疏言總集而行是也荍芘芣也毛傳古義引濮氏云芘芣開華自根及幹而上相接甚密視爾如荍言聚觀者盛周禮巫掌祓除注謂以薰草藥椒實芬香故巫以相貽巫之所以結納人心者其術在是婦人女子所以樂觀之歟愚按兩詩皆刺巫風古義近理然男女混淆喧闐雜遝慕悅贈貽亦所不免特比之溱洧贈芍義各有歸耳爾雅宛中宛丘郭曰中央隆高毛傳則謂中央下李巡孫炎皆取毛傳為說孔疏亦是傳義但爾雅又云丘上有丘為宛丘非中高而何郭義為長爾雅盎謂之缶孔云易不鼓缶而歌史記藺相如使秦王鼓缶是樂器為缶也又云缶是瓦器可以節樂按國語缶絲尚宮陳晹曰缶中虛而善容外圓而善應中聲之所出也古樂用缶或有然歟爾雅鷺舂鉏郭曰白鷺也爾雅荍蚍􅗶毛作芘芣郭云今荆葵也紫色羅願曰荆葵比戎葵葉小花似五銖錢大粉紅色有紫文縷之一名錦葵翿見王風君子陽陽篇枌見唐風山有樞篇栩見鴇羽篇椒見椒聊篇衡門之下可以棲遲泌之洋洋可以樂饑豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子樂饑康成作􅕆饑非是詩緝曰僖公自謂國小不足以有為意氣消縮無奮然自立之志故詩人誘之范逸齊曰齊襄公志大心勞所謂過也詩人則抑之陳僖公願而無立志詩人則誘之李迂仲曰此詩當且從歐陽說一章言國雖小苟有志為治亦可有為二三章言不必大國而後可為政也泌泉水毛傳王氏總聞曰泌在南陽泌陽縣陸佃云鯉魚之貴者故爾雅釋魚以鯉冠篇許白雲云鯉有赤白黃三種魴見前是詩於六義屬比東門之池可以漚麻彼美淑姬可與晤歌東門之池可以漚紵彼美淑姬可與晤語東門之池可以漚菅彼美淑姬可與晤言池古音沱後並同東門之楊其葉牂牂昏以為期明星煌煌東門之楊其葉肺肺昏以為期明星晢晢晢從折日音制二序皆曰刺時皆興也東門之池集傳以為淫奔今讀其辭絶無謔浪之意張氏詩記謂淑女非妖麗之稱是也然序下言嫉其君之淫昏而思淑女配之義頗迂滯雖歐蘇嚴吕並從其說未敢信為必然也豈陳有賢妃不見答於君如衛莊姜之事者詩人作此以風其君猶衛碩人之義歟麻紵菅皆婦功習治之物必資池水漸漬使之柔韌乃可緝績箋疏興賢妃夙夜警戒使君入於善而不自知李解如晤歌晤語晤言亦漸漬之事也曰可與晤歌晤語晤言則疑有不與晤歌晤語晤言者矣三可字意味深長東門之楊序下言婚姻失時男女多違親迎而女猶不至按本詩明言昏以為期無庸再開疑竇楊葉牂牂肺肺三月中也鄭箋言男女失時不逮秋冬毛傳士昏禮執燭前馬是親迎以昏也孔疏坊記云昏禮壻親迎見於舅姑舅姑承子以授壻恐事之違也以此坊民婦猶有不至者此詩及鄭丰是也明星箋訓大星集傳以為啓明啓明見而不至則終不至矣於義尤顯水經注陳城東門內有池東西七十步南北八十許步水至清潔而不耗竭不生魚草水中有故臺處所謂東門之池也麻見王風丘中有麻篇說文紵檾屬細者為絟粗者為紵陸疏亦麻也科生數十莖宿根在地中至春自生今南越紵布皆用此爾雅白華野菅郭璞曰菅茅屬孔氏曰已漚為菅未漚但名為茅柔韌宜為索范氏曰菅以為屨墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣墓門有梅有梟萃止夫也不良歌以訊之訊豫不顧顛倒思豫釋文訊本又作誶徐音息悴反錢辛楣云訊乃誶之誤非訊有誶音也按廣韻楚辭章句引此詩誶豫不顧質疑顧豫上去通序以為刺陳他者得之誰昔然矣當是耆舊之賢者昔嘗有所陳諫如石碏之諫寵州吁者桓公不從而今為追咎之辭潁濱少南恭古義朱子舊說陳他文公子桓公弟桓公疾病他殺太子免桓公卒而自立明年為蔡人所殺此詩刺他而追咎先君也衍者謂無良師傅傳箋遂以棘為惡木喻他不善又以梅為美木喻他性本非不善由惡師傳教之又以斧斯為訓導有梟為惡師又以夫指惡師輾轉繆戾讀詩記僅易夫字之解為指陳他詩緝僅易斧斯之解為除惡木集傳一空障蔀大是快事然古說亦有不可廢者陳國數公之間元惡大憝非他誰屬竊意詩作於桓公卒後陳他既篡之時故托墓門起興墓門者桓公妥魄之地蘇義棘梅皆墓木也詩人覽以起興亦是感傷其事以為追咎之本耳斧以斯之喻他之戕殺太子有梟萃止喻他之竊據陳國此不良之實也國人早知其惡誰容之至今者蓋自昔而已然謂桓公也歌以訊之訊豫不顧指昔日言顛倒思豫指今日言古義蓋必有所以告桓公者而桓不顧也身死未寒而子弒國篡顛倒至此死而有知豈不思豫昔日之言乎皆追咎之辭此篇義解蘇陳為得而猶牽於師傅之說於興義尚未分曉今參鄙說以著明之末三句舊主告他愚謂他何足告范逸齊謂冀他之悔悟則詩人為黨逆矣今參用何氏說以足蘇陳追咎之義古義云梅解見摽有梅篇是仍用美木之解矣當言解見秦風終南篇爾雅梟鴟邢昺引說文云梟食母之鳥詩陳風有梟萃止一名鵩一名梟一名鴟陸璣云梟大如班鳩緑色惡聲之鳥入人家凶賈誼所賦鵩是也古義引羅願云鵩似梟小如雉體有文采行不出域是鵩非梟也又引荆州記云巫縣有鳥如雌雞其名為梟又引廣志云梟楚鳩所生其名梟者乃爾雅所云梟鴟耳亦謂之土梟與梟無涉防有鵲巢卬有旨苕誰侜豫美心焉忉忉中唐有甓卭有旨鷊誰侜豫美心焉惕惕鷊邢疏音逆釋文五歷反此詩之為憂讒賊即誰侜譸同豫美句可證豫美指宣公鄭箋防當如集傳作捍水之防毛謂邑名者非卭丘也毛傳苕當如陸疏為苕饒范以為凌苕非是蓋鵲性多懼每巢高樹而防有之則不免於畢弋矣苕鷊味美可食而卭有之則不免於戕賊矣瓴甋宜為垣墉而中唐有之則不免於踐踏矣四有字俱為侜字張本傳箋迂滯諸儒都從歐義而唐甓解義未融防卭亦無歸著補傳謂如采苓首陽之意善已而謂中唐無甓其理不行今本其意而易之或無大戾歟按史記宣公二十一年公有嬖姬生子欵欲立之乃殺其太子禦冦禦冦素愛厲公子完完懼禍及已乃奔齊此詩所指信讒其即謂此歟陸奎勳曰事與衛伋子晉申生同陳無文獻可徴賴此一詩猶存可指忠良為淫慝乎毛朱皆作興陳之防邑無考漢志陳縣注引博物記曰卭地在縣北防亭在焉此附毛為說陸疏苕饒幽州人謂之翹饒莖可生食爾雅虉綬注曰雜色似綬劉氏瑾曰案埤雅鷊本鳥名咽下有囊如小綬具五色此傳所釋鷊草之名豈因其似鷊鳥而取義乎董氏逌曰鷊舊作􅀢月出皎兮佼人僚兮舒窈糾兮勞心悄兮月出皓兮佼人懰兮舒懮受兮勞心慅兮月出照兮佼人燎兮舒夭紹兮勞心慘兮紏已小反慘五經文字作懆毛冕曰當作懆誤作慘陸堂詩學曰月出為株林之先聲序刺好色義無可更愚按毛以舒為行步舒緩窈糾懮受夭紹皆舒之姿是夜忩對月摹狀佼人之情態即以第三句申足第二句末乃言不見而勞心也集傳謂安得見之而舒窈糾之情似於語外添綴成文余友范蘅洲詩瀋曰僚好貌懰瀏離燎光明窈者深遠糾者繩三合若有所思而鬱結也懮與憂同受納也若有所苦而含忍也夭者屈也紹者糾緊也若有所抑而局促也如梁冀傳所云愁眉啼裝折腰齲齒以善為妖態也讀詩記曰此詩用字聱牙疑為方言今釋言無文後人難為置解尤當以古說為正舊以為宣公詩安溪李氏謂此與下篇恐皆靈公詩古義謂徴舒將弒靈公國人作此以諷詩中舒字即指徴舒窈糾云者徴舒意中憤恨絞急之狀据此則起當言靈公之淫蕩不合但言夏姬之佼好矣於詩意殊不相應胡為乎株林從夏南匪適株林從夏南駕我乘馬說于株野乘我乘駒朝食于株夏姬之事太褻詩人不欲斥言故託詞於其子謂君何為而往株林乎或者將從夏南乎又為之解曰非往株林而從夏南也恐有他往耳嚴緝然而駕我乘馬則舍於株野矣乘我乘駒則又朝食于株矣雖欲為之隱不可得也吕記毛傳大夫乘駒王肅述其意謂指孔寧儀行父李迂仲駁之謂大夫乘駒於經無明文惟何氏古義宗其說今不用楚語云陳公子夏為御叔娶鄭穆公女少妃姚子所生生子南徴舒字宣十年傳云陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似汝對曰亦似君徴舒病之公出自其廄射而殺之按靈公被弒之時姬年已四十餘後楚莊滅陳欲納之巫臣曰是不祥人也乃止以豫連尹襄老襄老死其子黑要蒸焉巫臣逐而自娶之至是六十餘年矣猶生女嫁叔向晉楚間諺曰夏姬得道雞皮三少宇文士及妝臺記序蓋亦國家之妖孽也叔向之母曰子靈巫臣之妻殺三夫一君一子而亡一國兩卿矣可無懲乎寰宇記陳州南頓縣西南三十里有夏亭城城北五里有株林郡縣志宋州柘城縣本陳之株邑故柘城在寧陵縣南七十里彼澤之陂有蒲與荷有美一人傷如之何寤寐無為涕泗滂沱彼澤之陂有蒲與蕑有美一人碩大且卷寤寐無為中心悁悁彼澤之陂有蒲菡蓞有美一人碩大且儼寤寐無為輾轉伏枕陂古音波澤陂刺時衍者以為男女相說而有美一人以下康成以為思美人而不得見宋世說經家皆從之許白雲獨别言之謂月出男子思婦人澤陂婦人思男子錢天錫亦謂是女思男之辭觀碩大且卷碩大且儼可見如涕泗滂沱輾轉伏枕宛是婦人光景陸奎勳疑為女子哀死之作且謂所懷者亦似正人此泥於碩大且儼之云也然則每章首二句作何取義耶愚按蒲荷蕑菡蓞皆柔弱無骨幹未必為正人貞女之况三章叠言寤寐無為則意有所結而百事具廢亦可見其荒於所思去葛生之義遠矣詩與月出株林相屬即如舊說亦非無因何𤣥子必求其人以實之殊不可据補傳曰澤水之鍾也陂水之障也爾雅莞苻離說文蒲似莞而褊有脊滑柔而溫詩緝謂莞精蒲粗是也爾雅荷芙蕖其莖茄其葉蕸音遐其本蔤其華菡蓞樊光引詩作有蒲與茄孔疏据以證鄭箋芙蕖之莖曰荷其實荷為大名非必莖為荷也蕑見溱洧篇澤蘭也漢諸池苑種之此疏言蘭為陸草誤矣鄭改為蓮尤誤檜檜為高辛氏火正祝融之墟在禹貢豫州外方之北滎陂之南居溱洧之間今河南許州府密縣東北五十里有檜城是也檜古作鄶鄶城見僖三十二年左傳注公子瑕葬鄶城之下田間錢氏曰鄭語史伯言主芣騩而食溱洧按芣騩具茨山也在密縣即溱洧之源大事表溱水出密縣馬嶺山鄶都於此集傳謂即鄭州非是杜注鄶在滎陽密縣東北新鄭在滎陽宛陵縣西南其君妘姓祝融之後韋昭言陸終第四子求言封於鄶史記言陸終生六子四曰會人古文鄶與會通舉其國耳非名也蓋其詳不可得聞矣平王時為鄭武公所滅集傳謂桓公滅鄶亦非也詳見鄭譜潁濵蘇氏曰邶鄘魏之詩作於既滅其所為作者衛晉也至於鄶風則檜之未亡而已作矣蘇未嘗以檜詩為為鄭作也集傳亦誤今經彚纂檢正鄭譜檜在鄭前今依原第在陳後羔裘逍遙狐裘以朝豈不爾思勞心忉忉羔裘翺翔狐裘在堂豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼此篇序下之言有功於序者甚大序稱大夫以道去其君而詩言其君服御之美而已非有大無道之事不能一朝居之勢也何以忉忉然憂傷是悼哉讀序下言國小而迫君不用道好潔其衣服逍遙遊燕而不能自强於政治乃知檜君直安樂公之流其後人恃險驕侈蓋其家法使然大夫有心能無去乎一二章先言逍遙翺翔後言以朝在堂是以遊宴為急務而怠於政治矣末章但誇羔裘之美不復言以朝在堂是直廢棄朝常而終日為逍遙翺翔之事矣古義曰詩人非以羔裘狐裘為大故而以逍遙翺翔為可憂可謂能見大意矣昔漢成帝善修容儀臨朝淵默而漢綱解紐卒墜炎基况區區檜國哉說者不於其大而齗齗於狐裘黃白之間抑末已鄭謂狐黃是蠟祭服蘇嚴謂狐白是朝于天子服首二句極形其宴安無為之意下二句乃去而不忘所謂庶幾改之豫日望之者大夫亦忠於所事矣家語君臣視朝上下同服羔裘玉藻注黃衣狐裘大蠟時臘先祖之服孔潁逹曰天子視朝服皮辨服皮辨之下有狐白錦衣諸侯於天子之朝亦然箋据玉藻狐裘注謂檜君以祭服為朝服蘇氏据孔疏以狐白為諸侯朝天子之服檜君用以視朝案詩但言狐裘不著其色總之諸侯視朝無服狐裘之禮則檜君之好潔衣服惟意所適可見不必問其黃與白也再按鄭注狐白止言天子其謂諸侯朝天子亦然者乃是孔推鄭意如此非鄭說也陳祥道方慤則皆以狐白為燕服經既不著所用而論語言狐貉之厚以居陳方說固未可廢庶見素冠兮棘人欒欒兮勞心慱慱兮庶見素衣兮我心傷悲兮聊與子同歸兮庶見素韠兮我心藴結兮聊與子如一兮毛以素冠為練冠鄭改為大祥之冠王肅孫育皆是箋說集傳從之蓋詩刺不能三年固當以三年立說也宰我以為期問而夫子斥之可見當時尚行古制作詩者更在宰我前二三百年何至練冠已不得見只教化衰而至性薄喪近猶有悲哀即遠漸忘飲酒食肉處內公行於三年之內而受服變除之節無復知而行之者詩人傷之以為刺也玉藻縞冠素紕既祥之冠也注云紕緣邊也其冠用縞以素為紕故謂之素冠也孔疏間傳大祥素縞麻衣注云麻衣十五升布深衣也謂之麻者純用布無采飾疏云有采飾則謂之深衣緣以素則曰長衣緣以布則曰麻衣又云二十五月大祥祭此月脫除則首服素冠以縞紕之身著朝服而祭祭後哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣愚按鄭不指麻衣為素衣者蓋謂素用白絹而麻衣之緣用布故改衣為裳陸農師辨之云檀弓練衣縓緣言其衣矣今言練冠縓緣著冠亦縓緣也玉藻縞冠素紕言其冠矣今言素縞麻衣著衣亦素紕也變素紕言素縞則其紕也以縞之素者為之也据此則次章素衣即間傳麻衣無容改訓為裳又按喪禮始終無韠孔疏而箋引喪服小記除成喪者其祭也朝服縞冠疏引士冠禮主人𤣥冠朝服緇帶素韠是朝服有素韠也祥祭既用朝服則素韠為祥祭之服至祭訖而後反服素衣也三章皆著大祥之冠服有可信者孔氏間傳疏釋縞冠與玉藻疏違異當以玉藻疏為正又引間傳注黑經白緯曰縞亦誤彼注是釋纖吕記駁鄭謂觀詩者不必委曲瑣細拘於禮文論固大矣愚謂瑣細者如上章狐裘黃白之類原無關於詩之大義若本詩正刺失禮安得嫌其瑣細而不加考訂乎棘言哀遽之狀欒欒言毁瘠之形慱慱言思慕之專舊以慱慱屬詩人愚謂三句文勢平埒直下正言素冠之人思慕專一有終身之痛也傷悲藴結乃詩人自言故以我字别之意詩人獨行古禮於舉世不為之時故以庶見為言而期於同歸如一也說文韠韍也所以蔽前以韋為之鄭云冕服謂之韍他服謂之韠孔云古者佃漁而食皆衣其皮先知蔽前後知蔽後後王易以布帛而猶存其蔽前者不忘本也玉藻韠君朱大夫素士爵韋天子直諸侯前後方下為前上為後大夫前方後挫角士前後正又云韠下廣一尺長三尺其頸五寸肩革帶博二寸隰有萇楚猗儺其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室萇楚疾恣謂貪恣也衍者以淫恣申之遂失其義集傳言政煩賦重人不堪其苦歎其不如草木之無知而無憂也其說不易季彭山曰詩以枝華實為次蓋自枝而華而實能遂其生之意夭如厥草惟夭之夭吕記夭之沃沃正說萇楚則末句不應别指質疑謂萇楚可言無知不可言無家室然則螽斯之爾子孫非乎子爾之呼子孫室家之目皆非可施於物類者而詩人滑稽往往有之毋容泥也王風兔爰小雅苕華沉痛正復相似集傳賦也按詩意似當為比然終是托物附情原非切類仍從毛作興爾雅萇楚銚音姚弋郭曰今羊桃也子如小麥亦似桃陸疏葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上匪風發兮匪車偈兮顧聸周道中心怛兮匪風飄兮匪車嘌兮顧聸周道中心弔兮誰能亨魚溉之釜鬵誰將西歸懷之好音魏伯子詩經原本偈乞戞反飄嘌弔平上去通匪風之思周道固已序下言國小政亂憂及禍難為得思周道之實吕記曰政出天子則强不凌弱各得其所政出諸侯則征發之煩供億之困侵伐之暴惟小國偏受其害所以惓懷宗周為獨切也發飄揚貌偈疾驅貌集傳飄風旋風也李巡嘌無節度也毛傳風則發今匪風也而發車則偈今匪車也而偈蓋言政之亂而人不安也蘇說黃講顧瞻周道而中心怛然蓋憂王者之政不及於天下而不能以庇廕我也次章倣此末乃望周道之復昌而以烹魚溉釜為興蓋欲周之興治而去其擾也補傳今東諸侯有西歸而恪共王命者乎我蓋懷思其好音矣嚴緝黃講曰誰能曰誰將蓋冀幸而或有然之辭詩緝曰匪風思周而宣王中興天下謳吟思漢而光武再造其祖宗德澤浹洽於人者深矣舊解未融愚按詩人所致望於周者如此其後鄭桓乃憑恃周衆東徙其民於鄶虢之十邑而王置不問則周道不可復興而檜亦自此亡矣讀此詩數過為之慨然疏曰爾雅䰝謂之鬵鬵鉹也孫炎云關東謂甑為鬵凉州謂甑為鉹然則鬵是甑非釜類毛曰釜屬烹魚用釜不用甑雙舉者以其俱食器故連言耳又說文鬵大釜也釋文鼎大上小下若甑曰鬵是鬵若甑耳非即甑也曹曹為武王弟振鐸所封國地在禹貢兗州陶丘之北雷夏荷澤之野夾於魯衛之間漢志濟隂定陶故曹國禹貢陶丘在西南孔頴達曰雷夏澤在濟隂成陽縣西北菏澤在濟隂定陶縣東濟隂曹都所在是曹之封在二澤又曰曹都雖在濟隂其地則踰濟北僖三十一年取濟西田左傳曰分曹地是曹地在濟北也春秋大事表陶丘今曹縣哀公八年滅於宋陳氏傅良曰檜亡東周之始也曹亡春秋之終也蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸說掘說文作堀釋文說如字蜉蝣朝生暮死而猶美其羽興曹君危亡將至而猶務於奢舉衣裳以例其餘也心之憂矣於我歸處見當時在位無一可倚仗者蓋慘然以亡國為憂也嚴緝愚謂詩人平日必忠言灌灌而不見聽者故冀其依倚於我俾得納約自牖庶幾不至於危亡爾非但如東萊所引楚芉尹申亥舍靈王於家之事也序下及箋說意亦是而語頗滯蜉蝣夏小正作浮游傳曰渠略也郭璞曰似蛣蜣身狹而長有角黃黑色掘閲毛謂容閲箋謂掘地解閲箋說近是蓋蛣蜣生土中掘地而出開解其穴如闢户然故云掘閲也小正續注引此詩閲猶門也詩故云讀管子掘閲得玉始知閲與穴通二說皆足申明箋義孔疏改解閲為鮮閲欲引鄭附毛兩失之矣彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮孌兮季女斯饑祋音汝釋文芾甫味反味古音注媾古音故釋文隮子兮反詩經原本薈蔚婉孌各自為韻詩刺近小人序下以共公實之蓋本僖二十八年傳晉文公入曹數之以不用僖負羈而乘軒者三百人也首二句宜從集傳作興言彼候人尚荷戈祋以盡其職彼之子之赤芾者何所為而有是三百之多哉蓋以引起下文不稱不遂意而以三百為言亦隱然有蔚薈之象矣因以水鳥比小人言維鵜當在泥水中沒水求魚以食則濡其翼濡其咮者宜也今乃高據漁梁之上而不濡其翼與咮歐義如小人無功而受祿不稱其章服之美待遇之禮也程子媾婚媾也本義毛訓厚集傳訓寵鄭易注訓會皆從婚媾取義而會義為近遂亦稱也集傳今人以遂意為稱意翼以文身故興服蒙上赤芾之文也咮以嘬食故興媾起下斯饑之意也詩所隮升氣也先鄭升氣為雲故毛曰升雲也說文薈草多貌蔚蓊蔚草木盛貌毛公借以况雲興之驟耳張彩郭景純曰蔓草藤蘿根枝交附雲氣因而襲人即此見勢焰炙手妖氛布濩何異于南山之薈蔚也案周禮視祲掌十輝之法九曰隮康成以為虹蓋亦祲祥之類輔慶源謂末章言小人之盛而賢者不得其所也三百蔚薈前後相應范逸齊曰漢時小人濫受官爵貂蟬盈座郎官填階都尉塞市是亦三百赤芾之意愚謂龔遂言昌邑王左右皆狗而冠亦與維鵜在梁相類周官序官云候人上士六人下士十有二人史六人徒百有二十人注云候人迎賓客之來者此詩所云特其徒耳若居候人之職則是官為上士不以身荷戈祋戈見秦風無衣篇祋殳也殳見衛風伯兮篇玉藻一命緼芾黝珩再命赤芾黝珩三命赤芾葱珩注云此𤣥冕爵辨之韠尊祭服異其名耳韠見檜風素冠篇詩緝芾當作韍古字通也蔽膝之韍從韋黼黻之黻從黹爾雅鵜汙澤郭曰今之鵜鶘也好羣飛入水食魚俗呼為淘河陸疏形如鶚而極大喙長尺餘頷下胡大如數升囊若小澤中有魚便共抒水滿其胡而棄之以竭水取魚一統志曹南山在兗州府曹州南一百里春秋盟於曹南即此大事表在今曹縣南八十里鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊然其帶伊絲其辨伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年鳲鳩刺不一序下言在位無君子則陳古之義已明自序辨以為未含刺意而後賢多生蜎擾或以為豳詩錯簡蔣氏蠡測或以為開國正風陸氏詩學至或鑿指其人詩故謂美公子臧古義謂美晉文公皆屬衍說歐陽駁毛鄭均一之義謂子之七及在梅在棘在榛皆以為鳲鳩用心之不一是又未知陳古之義而泥於刺之一言以為說也黃實夫曰鳲鳩之子有七至不一也或在梅或在棘或在榛又不一也而鳲鳩之在桑未嘗或異此正得其至一者蘇氏曰從其在梅則失其在棘從其在棘則失其在榛居一以俟之無不及者荀子謂目不兩視而明耳不兩聽而聰淮南子謂賈多端則貧工多技則窮皆足以發明儀一心結之義詩喻古人用心之一故能使民德歸一而正天下之不正思其人今不復見也則又嘆曰胡不使之壽考萬年乎愛之切思之至也胡不萬年已死之辭歐陽今從祝願說宜不見刺意也詩牖曰首章以心為主儀之一正是心之結處次章帶辨有常度就儀一中抽出一端言之三章正是四國又從其儀不忒廣言之末章胡不萬年見國家不可一日無表正之君子縱百年有盡而無盡之心法不朽也愚按先四國後國人者天下之本在國下三章俱本心結而二章以下言儀而不及心者蔣鳴玉圭約曰天下不見君子之心而見君子之儀即儀可以徴心也魏伯子原本曰每第五句復處體愈寬博毛傳興也集傳同爾雅鳲鳩鴶鵴郭云江東呼為穫榖陸疏一名桑鳩一名擊榖詩緝云即郯子所謂鳲鳩氏司空也鳲鳩平均故司空平水土許鈔云方言以為戴勝非戴勝穴生不巢生疏曰玉藻說大帶之制天子素帶朱裏終辟辟緣也竟此帶盡緣之諸侯素帶終辟無朱裏大夫素帶辟垂垂者緣之士練帶率下辟緣其末而已是大夫以上大帶用素故知其帶伊絲為大帶用素絲故言絲也毛傳騏騏文也顧命四人騏辨執戈注云青黑曰騏正義曰馬之青黑色者曰騏謂辨色如騏馬之文也此箋騏當作􅋒以玉為之按辨師職王之皮辨會五采玉􅋒先鄭注云會縫中也􅋒結也皮辨之縫中每貫結五采玉以為飾謂之􅋒孫育云皮辨之飾有玉􅋒而無綦文箋義為長疏謂顧命之騏辨乃是士服士之皮辨無􅋒飾此言諸侯故知騏當作􅋒冽彼下泉浸彼苞稂愾我寤嘆念彼周京冽彼下泉浸彼苞蕭愾我寤嘆念彼京周冽彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苗隂雨膏之四國有王郇伯勞之匪風傷天下之無王故序曰思周道下泉傷天下之無霸故序曰思治序下言共公侵刻下民不得其所憂而思明王賢伯毛公因以童粱得水而病喻昭公困病其民說經家前後相因由來舊矣愚按稂蕭蓍皆蕪穢之草與黍苗截然相反今但以下泉之浸與隂雨之膏反正相形而於稂蕭蓍黍苗之不同未著區别恐於詩意猶有未盡蓋寒泉隂雨均可澤物補傳而浸苞稂膏黍苗則亂與治之象也易曰井冽寒泉食則寒泉之澤物信矣然所浸者稂莠耳蕭艾耳蓍蒿耳惠在小人則良善困苦由王澤之竭故列國無政所以愾然而念宗周之盛時也詩所浸者漸漬苞者叢生毛訓苞為本今用王氏說由漸漬而得叢生南山薈蔚之象也稂莠除則黍苗植泰山之雲不崇朝而雨天下言溥博霑足無此疆爾界及於四國補傳非下泉偏浸比矣四國有王箋謂朝聘於天子疏引左傳諸侯有王以明之其說是也言明王在上則四國恪共王命於是方伯賦其政諸侯行其化詩所鳲鳩正四國之象也合上兩篇求之詩意或有當歟嚴緝曰曹共之時晉文伯業方盛下泉顧思明王賢伯何耶曹固可罪而文於曹虐矣執其君分其國以私憾故將甘心焉僅以貨免下泉愧木瓜矣爾雅稂童梁郭曰莠屬也羅氏曰詩言不稂不莠則稂亦惡草爾雅蕭荻郭曰即蒿也陸璣云荻蒿是許慎以為艾蒿非也又云蓍似藾蕭青色科生亦蒿屬服虔云郇國在解縣東郇瑕氏之墟也大事表今蒲州府臨晉縣東北十五里有郇城文王子所封國詩郇伯勞之是也按桓九年荀侯賈伯以王命伐曲沃後無所見為伯之事未知何時思之者曹必郇所轄如召南之思召伯云爾豳豳者戎狄之地名在禹貢雍州岐山之北原隰之野於漢屬右扶風郇邑釋文按禹貢原隰底績孔傳不言地名康成據篤公劉詩度其隰原以為即此原隰難以信据惟是秦中地多名原者俱在西安鳯翔之境是豳地亦在原隰中非以原隰專屬之豳也胡朏明錐指謂今西安府豳州及三水縣皆豳地而一統志稱乾州永壽縣為古豳國蓋永壽與豳界毗連古今割𨽻不同也周本紀舜封后稷於邰今乾州武功縣地在豳之南故譜言自邰而出太王遷岐則又自北而南故譜言入處岐陽也譜又言公劉以夏太康時失其官守竄於此地其說殊誤按國語我先王不窋用失其官而自竄於戎狄之間是自豳出者不窋非公劉也孔疏錢飲光曰今慶陽府有不窋城恐不窋所竄非即豳地至公劉又自不窋城遷入於豳也公劉亦不當夏太康時集傳云周公攝政乃述后稷公劉之化作詩一篇以戒成王謂之豳風後人又取周公所作及凡為周公而作之詩以附焉案周公既自托豳民之詠則作詩時已謂之豳風籥章氏迎寒暑而吹豳此其證也以為無可係而係之豳者非以為尊周公使專一國者尤非舊說又謂詩作於周公之遭變故謂之變風後人皆以為疑文中子曰終之以豳風言變之可正也其說得之嚴華谷曰變風迄豳反周之初世道不終窮也齊豳秦魏唐陳檜曹太師之舊第也降秦於唐而挈豳以終之一經聖人之手而義理深遠矣朱公遷曰豳不先二南尊文王也不繼二南豳先岐後也不與王風相屬興衰非其類文王致治周公反正十五國風以是始終之則循環而為治矣豳風豳雅豳頌疑當時本有三詩今所存止七月耳康成三分是詩以巧附周禮固為失之雪山王氏謂即一詩而吹之器有不同其說亦未可信辨見楚茨十篇說及載芟篇解義七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐遠揚猗彼女桑七月鳴鵙八月載績載𤣥載黃我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纘武功言私其豵獻豜於公五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐户嗟我婦子曰為改歲入此室處六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉壽七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上八執宫功晝爾于茅宵爾索綯亟其乘屋其始播百榖二之日鑿冰沖沖三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆一章二章皆三韻火古音毁火衣平上通集傳歲讀如雪發烈褐歲一韻耜趾子畝喜一韻三章四章皆四韻裘渠之反五章一韻野音渚子讀祖六章又三韻七章又四韻稼古音古穋讀盧圃稼穋夫平上入通八章又三韻隂韻補於容反韭讀矯霜場饗羊堂觥彊平上通七月陳王業先儒皆以為周公作惟黃實夫金仁山謂豳國舊有是詩而周公陳之今讀其詩以衣食為本農桑為經而祭祀昏姻田獵宫室之事日星霜露昆蟲草木之化錯緯其間衣則尊卑異等食則老壯異糧孝敬忠愛之意溢於言表洵非聖人不能為黃金所云無足論者至於部分節解則集傳精矣一章總舉衣食為全篇綱領而謀衣始於申月謀食始於寅月皆據隂陽之中豫之至也解頥衣之大計在蠶而布也裘也居室也皆禦寒所亟故二章至五章次第舉之食之大計在耕而果也蔬也酒肉也皆飲食所需故六章至八章分别舉之二章言蠶事之始詩緝故又原本於往歲之秋而致勤於今歲之春既求柔桑以飼已出之蠶復采皤蒿以沃未出之蠶而時值婚禮殺止之候適有于歸之事故連姻公室之女以逺父母為悲也公子舊作公女今從集傳與下章公子例看同歸者劉氏謂同親迎之公子而歸言似雜舉其實皆仲春時事也三章言蠶事之成詩緝故自暮春及於夏秋而遂連言績麻染繒之事至於為裳而後謀衣之計備上下章叠舉公子古者君民一體豳民愛公之至特於公子申其意也三舉流火以著丁寧次句變文為八月萑葦者承上章蠶事已殷而言故又推本往歲之豫儲其具也詩緝伐遠揚猗女桑次於求柔桑之後同為今歲之事非豫擬來歲之言也詩緝集傳云以上二章專言蠶績之事以終首章前段無衣之意是也布帛裕矣而皮革之用未光故四章自秀葽之時至于隕蘀之後建子之月而捕貉取皮以狐狸之貴者為公子之裘焉此豳民打牲捉捕之事專於為裘而設也因及其丑月合圍纘武私豵獻豜之愛猶三章主於治蠶而兼及婚姻皆一時之事而類舉之也集傳云此章專言狩獵以終首章前段無褐之意是也皮革充矣而牖户之謀未固故五章自一隂以至純隂感物之變而修理其在邑之室何楷曰室邑中之室自田廬而止之故曰入弭罅漏去鳥鼠塞向以禦觱發之風墐户以却栗烈之氣率婦子以入室處而自子至亥為隂陽之一周故以改歲言之集傳云此章亦以終首章前段禦寒之意詩所云亦以終卒歲之事也卒歲本指十二月時相近又禦寒之事自此畢詩文處處顧前詩所言自的衣裘既具宫室既安而飲食之需宜有以供之故六章言有六月可生食之車下李櫻薁焉馮氏戴氏有七月可熟食之承露許鈔大莖小葉大豆焉八月棗熟十月酒成而老者有養矣七八九月間瓜可食壺可斷麻子可拾荼苦可菹樗木可薪而壯者有資矣七章遂言秋冬之交百榖告成總計一歲中先後所登如黍稷重穋禾麻菽麥之類無不納之于場同之于倉而食用饒矣於是上入邑居執治公家之役范氏董氏公事畢而又急修其在野之廬補傳宵晝不遑焉蓋以明春將播百榖當出而止息于此也五章以前言衣先蠶績而後裘六章以後言食先果蔬而後榖時物之次序然也末章遂因飲食而及於朋尊燕饗且躋堂稱觥以效媚兹之義猶五章因衣褐而及於為裘獻豜七章言治室而及於上執宫功皆以著豳民忠愛之忱而此章兼言開氷納氷者所以結全篇寒暑之節也稱彼兕觥萬壽無疆朱氏善曰殺羊舉酒而祝其壽可謂上下相親之甚矣愚謂執豕用匏豳公所以飲食其下殺羊稱觥豳民所以親愛其上想見古初淳朴之治書曰欲王以小民受天永命此則周公陳七月之志也張子曰七月詩以夏正為斷王雪山曰一之日至四之日皆以陽長而言戴岷隱曰十二辰至亥而止復起于子故曰改歲毛氏以為兼舉二正呂氏以為通用三正並不可據蔡宫聞曰首章自七月推至四之日是二月也次章即承二月言之三章即繼三月言之四章以四月為始而推至十二月五章以五月為始而推至十月六章以六月為始而推至九月七章又承九月十月言之八章宜繼以一之日矣舍一言二者豈當觱發之時于貉之外無他事歟論雖無關大義而推索極細故録存之左傳張䢰曰火星中而寒暑退孔曰季冬十二月平旦正中在南方大寒退季夏六月黃昏火星中大暑退劉瑾曰堯時仲夏日在鶉火故昏而大火中周公時歲差當退十六七度故六月而後日在鶉火七月日在鶉首昏時大火西流于地之未位此詩上述豳俗而言七月流火者据周公所見而言三之日于耜夏小正正月農緯厥耒是也四之日舉趾夏小正二月往耰黍是也不必援引月令曲為之說爾雅畯農夫孫炎曰農夫田官今考周禮無田畯正職疑即鄉遂大夫及載師之屬為之故毛直云田大夫而已倉庚即黃鳥見葛覃篇夏小正二月有鳴倉庚又曰采蘩皆二月時也蘩以生蠶惟見此傳陸佃曰今洗蠶用蒿徐光啓曰蠶之未出者煮蘩沃之則易出集傳言以蘩啖之蓋以意解之耳疏曰隋銎音穹曰斧方銎曰斨說文銎孔也許鈔謂受柄處隋狹而長爾雅鵙伯勞夏小正作鴂鵙感五月一隂之氣而鳴至七月三隂而其鳴亟矣小正傳曰鳴者明命也其不辜之時也注謂命人不辜此時移注此詩甚合樊光云鵙以夏至來以冬至去故埤雅曰倉庚知分鳴鵙知至葽之為草毛未著為何物康成疑為王萯非也王萯舊說以為王瓜陳翥謂即夏小正之莠幽幽葽聲近也放齊以遠志當之蓋據爾雅葽繞及劉向苦葽之說郭璞云葽繞逺志也本草云遠志味苦廣雅云其上謂之小草毛竒齡云一名薳一名吳葵按內經注引月令作吳葵華則秀幽之為秀葽蓋有本矣蜩類最多見於爾雅者有蜋蜩螳蜩茅蜩馬蜩寒蜩之名各以時先後而鳴其鳴於五月者則蜋蜩螳蜩也夏小正五月良蜩鳴又曰唐蜩鳴蜋蜩五采具螳蜩則今蟟也馮疏曰貉狐狸三獸名埤雅云貛貉同穴而異處貛之出入以貉為導雅翼云狐口鋭而尾大貍口方而身文箋言摶貉自為裘狐狸以供尊者其辨甚明毛傳以于貉為取狐狸則混矣斯螽以股鳴者蝗屬莎雞以翼鳴者一名絡緯頭小羽大有青褐二色蟋蟀以注鳴者一名促織性善鬬逈然三物也崔豹古今注混莎雞蟋蟀為一物後人更混入斯螽誤之誤矣鬱棣屬然非爾雅所謂唐棣常棣也辨見召南毛傳薁櫻薁也戴侗云蔓生類蒲萄六月熟孔疏以為薁李非爾雅蔠葵繁露郭云承露也大莖小葉花紫色可茹公儀休拔者即此夏小正八月剝瓜蓋畜之以為菹農夫則採而食之而已故在七月毛傳壺瓠也斷疏謂就蔓斷之儀禮注苴麻之有蕡者疏云叔苴謂拾取麻實以供食也陸疏樗樹及皮皆似漆通志云似椿北人呼山椿朋酒兩尊也朋酒斯饗伏臘飲酒之事不當謂國君饗羣臣躋堂稱觥亦執豕酌匏之類毛鄭以學校黨正言之亦屬衍說鴟梟鴟梟既取我子無毁我室恩斯勤斯鬻子之閔斯逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫豫手拮据豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家豫羽譙譙豫尾翛翛豫室翹翹風雨所漂搖豫維音嘵嘵詩本音子室上入通勤閔平上通序言周公救亂事見金縢作詩貽王當從孔傳在誅管蔡以後鄭注尚書訓辟為避謂公聞流言而避居東都至成王悔而迎之然後奉命東征則此詩在未東征前毛從孔義箋則自行其說正義言周公避居東都史傳更無其事黃東發曰周公居東二年則罪人斯得未見有歸後再出東征之次第歐陽力破鄭說集傳用之既有定論矣後覆蔡沈書說復主鄭氏蓋以成王方疑周公周公不宜逞怒於成王遽誅流言之黨不知國家非常之變不當以常格相擬自古誅叛討逆機宜迅速間不容髮若引嫌遜避濡遲至二年之久俟王心悔悟然後致討必致坐失機宜釀成冦亂王室安危正未可定誤國之罪將誰與歸而謂周公為之乎况流言之起即叛亂張本何待二年之後始得罪人主名既已不近情理而本詩既取我子明指管蔡故下有恩勤鬻子之言安得曲言周公臣屬歐論其時洛邑未建又安得預言避居東都况叛者在東而周公往就虎口二年之中保毋别慮豈聖人别有神術以自護歟此必不可通之說也愚聞之師陳氏曰管蔡流言之事謂周公避位居東者譖言則退待罪私室敬俟明主之察大臣事君之常法也謂致辟東征者主幼國疑創業日淺安危存亡變係呼吸身受新陟王之托則宗社重而一己之名義猶輕利害更不足計是貴戚臣公忠體國之極致非聖人不能盡也以叔父托孤而僅守異姓大臣事君之常法急全一己之名義奉身而退不顧孺子孤立於上身去而後來事何所底止是豈聖人之行乎此吾以其人其地揆之而斷勿辟即致辟居東即東征為得其實也按吾師此段議論本於孟子之對齊宣義理極為正大參以愚論事勢之說孔傳無可議者是詩以鴟梟比武庚而於管蔡深致悲憫音調凄切詞旨危苦想見大聖人遭變匡扶心事後來惟武侯出師二表近之全詩義解毛勝於鄭然謂詩假鴟梟之意以為言不如集傳言鳥之愛巢者呼鴟梟而告之於義為順歐陽鴟梟論云周公既誅管蔡懼成王疑己誅其二叔乃序其意作鴟梟以貽王此金縢之說也其義簡直而易明范補傳云管蔡雖已伏辜而成王之疑未釋故序詩者以救亂為言又云流言中傷是欲成王疑周公而不終居攝之事所謂危王室也愚按流言之起由於攝政攝政當在武王初崩時不得言悔迎後始攝政也歐義成王既為流言所中管蔡誅而疑將益甚此詩所以反復開陳以冀王心之悟歐范之說不可易矣或疑逮天之未隂雨似在武庚未叛前不知首章明言既取我子尚得云天未隂雨耶鴟梟喻武庚子喻管蔡室喻王室彭氏恩勤二句訴言鬻子之勞痛為鴟梟所取也二章上三句乃言文武造周事下二句方入時事孔疏云先王致此大功甚艱難而其下民或敢侵侮不可不遏絶以全王室三章言惟其如是所以不能已於拮据捋荼卒瘏也上下皆著豫字以别之其義曉然此正言其汲汲東征實以王室未定之故曰豫未有室家特地申明此句以破其疑末章羽譙尾翛則破斧缺斨之象也如是而王不開悟則室猶可危風雨漂搖猶懼不免安得不為此嘵嘵之音乎嘵嘵毛云懼也集傳云急也蓋懼而急鳴也周公之言如此而金縢云王亦未敢誚公是王疑未遽釋也自非風雷之變八百之鼎庸得奠乎蓋公之精誠有以感之矣毛傳興也今從集傳為比爾雅鴟梟鸋鴂郭注鴟類賈誼謂鳯凰伏竄鴟梟翺翔是也荼毛訓萑苕當從出其東門箋為茅秀蓄租之租毛訓為韓訓積集傳訓聚義皆可疑古義曰租通作蒩茅藉也禮封諸侯以土蒩以白茅此亦用以藉巢說似可存我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其濛果裸之實亦施于宇伊威在室蠨蛸在户町畽鹿場熠耀宵行亦可畏也伊可懷也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室灑掃穹室我征聿至有敦瓜苦蒸在栗薪自我不見于今三年我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠耀其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何詩所每章首二句皆獨韻起說約謂古樂府及唐人詩餘長調皆有之一章三韻二章四韻三四章皆三韻魏伯子云一章蠋宿隔韻二章實室隔韻四章飛歸隔韻質疑云畏懷平去通垤室窒至去入通馬音姥縭音羅儀音俄周公既平三監歸而勞士序本其事故曰周公東征也全詩述敘勞苦猶采薇杕杜之意此更多作情語曲致形容故同是周公所作而風雅異體衍者言大夫美之失其義矣我徂東山慆慆不歸言久也我來自東零雨其濛行役之苦也此當日歸途真景故每章以為緣起一章追言其在東言歸之時心已西嚮而悲集傳杜詩所謂喜心翻倒極嗚咽淚沾巾也於時釋戎服而制裳衣自今無復行陳銜枚之事矣然猶獨宿車下見桑蠋而興感則離家尚遠也序曰一章言其完集傳謂全師而歸者是也二章言久役而室廬將廢全是途中結想而一種蒼凉蕭颯之狀如在目前嚴緝曰室廬將近則家事纖悉上心亦可畏伊可懷故作推宕而情思愈深序曰二章言其思集傳謂歸未至而思家之情是也舊以為室家之思者非三章言婦之在家聞鸛鳴而興嘆蓋行者尤苦隂雨鸛鳴則將雨故婦念之而嘆于室也於是剪刈其果裸去其伊威蠨蛸之屬修除町畽而野獸屏跡水螢不生又窮塞室中之罅漏以俟夫之歸亦行者之設想也行者既歸而見苦瓜繫於栗薪之上因言我之不見此已三年矣集傳蓋見土物而感征行之久不說人而說物風人之致也序曰三章言室家之望女其實我征聿至以下則既歸之辭也四章言至家之後春和景明時物鮮好歸士之未有室家者及時昏娶既甚美矣其舊有室家者欣慰更當何似耶集傳如之何有不能形容之意康成謂樂而戲之序曰四章言男女之得及時也真西山曰士之藴於心而不能言者周公盡發之於言所以上下交孚歡欣感激不能己也魏伯子曰篇中無限凄風苦雨之思讀之反如和風甘雨詩之移人情也至矣哉詩所曰舊說以為仲春婚姻時據金縢秋大熟未穫則歸非以春矣蓋事後追勞之作爾王氏應麟曰秦漢言山東山西皆指太行山東山即商地裳衣箋訓兵服集傳謂平居之服得之士事也說文枚如箸銜之有繣結項中以止語鄭箋蓋既歸而無事於此也蠋似蠶郭璞雅翼蠶類而不食桑羅願云葵中蠶也嚴緝曰蒸有三義衆也進也久也此詩三言蒸在皆言久役之意久義為勝說文敦厚重不移之貌爾雅果裸之實栝樓郭曰齊人謂之土瓜爾雅伊威委黍又蟠鼠負即一物本草云濕生蟲多足色如蚓背有橫文蹙起爾雅蠨蛸長踦郭曰小鼅蛛長腳者俗呼為喜子町畽說文作疃禽獸所踐處程子曰廬旁畦壠毛以熠耀為螢例以下章不協集傳以宵行為蟲又於書傳無据楊用修曰古人用字有虛有實熠耀之為螢實也為倉庚之羽虛也如小雅有鶯其領言桑扈之領如鶯之文非言鶯也埤雅螢非熠耀熠耀行蟲耳今卑濕處有之用修云唐李子卿有水螢賦此水螢也陸疏鸛似鴻而大長頸赤喙白身黑尾翅本草注似鶴頂無丹不善唳但以喙相擊而鳴有白烏二種說文垤蟻封也亦名蟻塜陸佃曰蟻將雨則出壅土成封易占所謂蟻封其垤大雨將至是也何楷曰瓜苦瓜之苦者栗薪栗樹之為薪者蓋取以制棚架之類濶别許久見故園風物依然如舊也皇爾雅作騜黃白曰騜駵白曰駁孫炎云駵赤色也爾雅婦人之褘謂之縭縭緌也孫炎曰帨巾也郭璞曰香纓也疏從孫義陳祥道駁之曰纓帶曰襟昏禮所謂施襟也帶結而垂曰縭爾雅所謂縭緌也考爾雅襟謂之袸郭曰衣小帶也然則襟者纓之帶縭者襟之緌而孫以結縭為結帨誤矣按曲禮女子許嫁纓蓋邪交絡帶示繫屬於人士昏禮主人入親脫婦之纓据此當從郭說為纓既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休錡古渠禾反東山所陳軍士之情也軍士不自言而周公言之破斧所咏周公之心也周公不自言而詩人言之詩測玩首二語當屬從軍者所作序下言周大夫惡四國非也今從集傳嚴緝曰斧斨錡銶皆非兵器蓋為除道樵蘇之用厯久致敝耳若以為殺戮之多至於破斧缺斨是與之血戰而僅勝亦疲敝甚矣與下吪嘉遒休之意殊不相類血流漂杵孟子不信揮刀紛紜韓氏之陋也愚按殷民陷溺既深流言煽動日廣猜疑莫釋內外交訌三年中不知費多少焦勞多少擘畫當時民獻十夫外邦君庶士罔不以為艱大原非雅歌投壺所克敉寧者然三數罪人之外未嘗有所誅夷而東土已自帖然蓋周公和恆四方務以德綏所謂豫惟不爾殺爾乃尚有爾土爾乃尚寧幹止者聖人之心天覆地載於此詩惝恍見之一章曰皇正之也二章曰吪化之也三章曰遒斂而固之也勞歸在先東征在後者前之詩皆公所作此篇以下詩人美之故編次如此易旅卦得其資斧注所以斫除荆棘七月篇取彼斧斨皆伐木之器司馬法輜輦載一斧一斤一鑿一梩一鋤二版二築軍中樵蘇築壘用之說文江淮間謂釜曰錡召南惟錡及釜是也蓋軍中所以㸑者毛云木屬曰銶疏云未見其文亦不審其狀然既曰木屬則亦非兵器矣嚴說為允伐柯如何匪斧不克取妻如何匪媒不得伐柯伐柯其則不遠我遘之子籩豆有踐九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有衮衣兮無以我公歸兮無使我心悲兮語類飛歸協句腰亦用韻詩中有此體二詩俱美周公伐柯是大夫諷迎周公傳箋九罭則大夫迎周公東人願留之而不得也箋義集傳君臣之交猶男女之合故托於婚姻為說言婚姻者每借喻斧柯故次章即以斧柯言之如何者發問之詞歐陽言欲迎周公當有人以作之合傳箋孟子所謂繆公之側子思之側之人也誠得人以往迎其為道也甚易蓋周公以肺腑至親忠誠貫日迎即當來無難作合故以柯則之不遠微諷之是亦所謂刺也周公既來而與之相見設其籩豆踐然成列君臣相與燕笑一見而往事釋然矣郝敬我者詩人代為成王籌度之辭何楷蓋諷之速迎周公必謂迎之當以饗燕之禮行則滯矣伐柯篇既諷王迎公九罭篇則王啓金縢後使大夫以冕服致迎之事三章皆大夫語末章則東人愛公之切而大夫為之述其情所以甚美周公也蓋鱒魴美魚宜入九囊之網興之子盛德宜服衮繡之衣箋義我覯云者大夫至東而見周公之辭言公當服此以歸輔朝廷也因謂東人曰女謂公將長留於此乎鴻雁必飛翔雲際其遵渚遵陸者暫也往者公特欲歸而未得其所耳今歸將不復來矣歐義其於女乎信處信宿猶鴻之於渚陸也信處以往日言承上無所意信宿以今將歸言承上不復意末章言今之有此衮衣之賜者是欲以公歸耳公之决歸而不能留明矣而東人不以朝廷之迎公為可喜徒以東國之失公為可悲愛之至而不暇計其他也無以我公歸無使我心悲寫出東人卧轍攀轅抵死不放之狀固見公之盛德所感亦以著東人之知愛夫公而王之悔迎為已晚故兩序皆曰美周公而衍者轉以為刺王不知也二詩次東山之後明於誅管蔡後迎公伐柯從朱作比九罭興義從毛周禮典命王之三公八命出封加一等服衮衮衣裳九章五章繪於衣四章繡於裳詩言衮衣繡裳是以三公而服出封之服爾雅竹豆謂之籩木豆謂之豆鄭云容實皆四升爾雅緵罟謂之九罭孫炎曰魚之所入有九囊也爾雅鱒鮅魴魾陸疏鱒似鯤而鱗細鯤亦作鯶郭云江東人呼魴魚為鯿大曰鴻小曰雁陶隱居或云雁多羣鴻寡侣狼跋其胡載疐其尾公孫碩膚赤舄几几狼疐其尾載跋其胡公孫碩膚德音不瑕胡膚尾几隔句韻瑕古音胡此篇美周公而序下言不失其聖深得詩人微指嚴緝曰老狼以貪欲之故欲進則跋躐其胡欲退則疐跲其尾喻人有貪欲則進退失措也周公遜其大美不以德盛自矜不以功大自伐無一毫私欲之纍故雖處流言之變其赤舄几几然步履安詳無異平日所謂不失其聖也凡人處利害之變則舉止不安其常懼者或至喪屨喜者或至折屐詩人以赤舄几几見周公之聖其善觀聖人矣程子曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功使周公有崇高得名之心其能得天下之與如此乎惟其處已也䕫䕫然存恭畏之心其存誠也蕩蕩然無顧慮之意德音所以不瑕也朱道行曰即武王顯名不失之謂愚按此詩結束豳風傳寫周公全相當如箋說作於成功致太平之時公孫碩膚亦當如箋說遜此成功之大美集傳謂此非四國之所為乃公自讓其大美而不居於義為反田間錢氏主避居東都之說即以公孫為避位失之矣跋躐也疐跲也李巡曰前行曰躐却頓曰疐疏曰進則躐胡而前倒退則却頓而倒於尾上也周禮注赤舄冕服之舄也王吉服有九舄有三等赤舄為上次有白舄黑舄李如圭曰天子諸侯冕服用舄他服用履王安石曰几人所慿以為安故几几安也虞東學詩卷五
