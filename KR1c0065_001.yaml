body:
  text: 虞東學詩卷一宗人府主事顧鎮撰國風案序風有二義上以風化下下以風刺上是也孔氏頴達曰詩以當國為别謂之國風周南周召之地鄭譜謂在雍州岐山之陽文王受命作豐乃分岐邦周召之地以為二公采邑施先公之教於己所職之國朱子集傳因之夾漈通志謂周為河洛召為岐雍河洛之南濱江岐雍之南濱漢江漢之間二南之地詩之所起在此故仲尼以二南之地為作詩之始黃實夫范逸齋皆從之按史記太史公留滯周南摯虞言古之周南今之洛陽洛陽為豫州其南為荆州漢廣采之荆汝墳采之豫則周南之地界畫然矣若召南自陜而西朱子嘗疑雍州地狹未免不均竊考周官職方氏雍州實兼梁地惟自雍及梁故得稱南類考謂江沱之間即梁山之界蓋據禹貢岷山𨗳江東别為沱而言其説可信至於為汜為渚則自蜀至楚江行數千里在在有之不必專屬夏口故二南之地當以通志為定論也至於南本樂名毛鄭皆云自北而南諸儒力詆其失愚謂樂之為南正以風化之被於南方而得名不獨漢廣汝墳江沱諸作義炳事白餘若南有樛木陟彼南山南澗之濱南山之陽南山之側南山之下所指方名無有及於他者不坦然衆著乎夫風雅之道莫盛於南周之季世屈騷宋賦猶為後代文章之祖則詩之始於南信也無容據彼駁此章氏如愚曰周南召南樂章之名也文王之化自北而南及於江漢故作樂者采自北以南土風而名之曰南用為鄉樂燕樂射樂房中之樂所以彰文王之化斯為達詁爾關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之顧炎武詩本音服古蒲北反友古音以陸德明音義樂五教反天下之本在國國之本在家孔子刪詩録關雎為風始所以表化原而彰周道之隆也通篇只窈窕二字而淑之意已盡蓋窈窕本言室宇深邃詩則借以形容女子之淑故傳曰幽間也幽則深潛不露間則安靜自如言幽間而貞靜可知首章已盡其義下二章反覆咏歎之淑女指所求者而言服事也鄭箋思服者思供內事之無人也曰求曰思曰友曰樂皆以致綢繆繾綣之意若曰我憂其未得耳得則我將友而樂之非本其未得而據今始得也序言后妃之德不言美后妃蓋序者櫽括全詩大旨以為是樂得淑女者乃后妃之德也周南首三詩皆后妃自作而此篇自敘其思在進賢出於至誠悱惻所謂德也所謂哀不傷樂不淫者也衍者語小滯耳或謂妾媵不足以當好逑愚謂此出自后妃口耳逑匹也妾媵不可謂匹然則公侯好仇臣乃可匹君耶蓋贊美之辭宜然也張氏綱云后妃求淑女説者止稱其無妒忌之行此未足盡關睢之義蓋治外者求人才治內者求淑女惟文王得多士而立政於外后妃得淑女而輔佐於內則由閨門而達之朝廷自無一事之不理所以協濟大業卜年卜世之永者其本實基於此集傳則用歐陽氏本義按毛於發端兩言下即注興也字最有意理所謂觸物起情也必逐章逐節求之則六義無定屬矣今斷以章首為定後倣此釋雎鳩者郭璞云雕類鶚也陸璣云似鴟深目目上骨露幽州謂之鷙陸佃謂鷙鳥不雙是也傳謂摰而有别蓋取其别不取其摰鄭釋之曰摰之言至其義差異集傳獨云狀類鳬鷖蓋得之淮上人語通志亦以為鳬類而又指為白鷢則非矣按爾雅睢鳩王睢揚鳥白鷢各為一物不得牽混荇爾雅作莕接余也陸疏雖云苦酒浸之脆美可案酒然考醢人職豆實無荇菹則傳言采之以事宗廟未可信也興意取其柔順芳潔而已葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汚我私薄浣我衣害浣害否歸寧父母萋喈韻補齊佳通首章三句一韻中間谷木隔韻次章下五句皆韻詩本音谷莫濩綌斁皆魚虞之人聲三章六句皆韻章黼韻學集成支微紙平上通詩所否房以反母古滿以反後同詩言治葛之事而於其事之前後撫景生情勤儉孝敬之義盎然流溢其為后妃自作無疑葛可為絺綌者精曰絺粗曰綌灌木叢木也集傳薄發語辭如楚辭言蹇言羌之類詩牖汚煩也毛傳煩撋之用功深鄭箋阮孝緒曰煩撋猶挼莏音那梭私燕服衣禮服集傳首章因時感物以動其勤職之思寫狀初夏時景物如繪蓋意念難忘處雖時過景銷如歷歷在目也次章正言其事而為之有序服之不厭蓋親執其勞知其成之不易故雖垢敝而不忍厭棄集傳惟勤乃儉也末章既成其事而浣濯之細皆有成法而不可紊歸寧之告必由師氏而不敢專既敬且孝也序謂后妃之本者得之吕氏讀詩記曰關雎后妃之德而所以成德者必有本葛覃所陳是也經師必欲推本在家釋歸為嫁釋告為教迂曲甚矣張氏栻曰周自后稷以農為務其君子則重稼穡之事其家室則重織紝之勤相與服習其艱難咏歌其勤苦此王業之本也按傳以發端三句為興乃興體之常箋則通下三句為興是以首章興起下二章實與毛義相成更密若以為賦則情味既短而黃鳥三言為贅矣今從毛鄭為興羅願云葛生山澤間其蔓延盛者牽其首以至根可二十步傳曰黃鳥搏黍也陸璣云黃鸝留或謂之黃栗留幽州人謂之黃鶯齊人謂之摶黍一名倉庚一名皇采采卷耳不盈頃筐嗟我懷人置彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼高岡我馬玄黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣嵬隤罍懷灰皆通觥古音光後同卷耳官人説本左氏歐陽著論謂求賢審官非后妃之職然序者但言其志原不以預外為疑自古創業之君類得賢后之助周家世有婦德后妃尤為卓冠故孔子論周才之難以為有婦人焉而馬融指數十臣以文母班旦望之列非無見也杜氏預云詩人嗟歎言我思得賢人置之遍于列位是后妃之志以官人為急劉氏敞云后妃於君子有警戒相成之道此詩言警戒人君之意不謂自已求賢審官也郝氏敬云不越酒食不及爵賞借中饋以效針故謂之志歐陽本義仍主序説朱子舊説亦從之至為集傳則斷以為文王不在而思念者蓋疑嗟我懷人之言不可施之臣下也愚謂古人設辭不如後世之拘忌過於泥滯轉恐害志夫推文王之不在而擬於征伐拘幽似已顧汝墳困役其婦人猶知以公義勉君子殷雷望歸其室家亦能以畢事朂其夫以后妃之聖而徒幽愁煩寃為後世閨情之倡雖曰不永傷而傷己甚矣周公定樂以關睢三詩為亂用之燕射鄉飲之間亦何取此幽愁煩寃者而奏之故愚以為當從序説也陶晚聞師曰性情正斯德業修葛覃所以次關睢也愚續之曰重本務而急親賢卷耳所以次葛覃也今集毛歐朱嚴諸説而衍之云后妃以采卷耳之不盈知求賢之難得本義而念此在列之賢人毛傳勤勞於外我馬虺隤而玄黃惟思酌酒以自解朱子舊説至於僕馬皆病而今云何乎長歎而已詩緝則勞苦之極諷君子當厚其恩意無窮已之辭也朱子舊説吕氏讀詩記曰夫婦一體也崇德報功后妃固無與此而體羣臣之意則不可不同也室有轑釜之聲則門無嘉客况后妃心志所形見者乎按采卷耳是興非賦毛以為憂者之興則猶泥於辭也孔疏爾雅釋山云石戴土謂之崔嵬土戴石為砠毛傳相反或傳寫訛也集傳未經改正觥罰爵也鄭箋容五升陸佃謂兕善抵觸故以其角為罰爵朱子曰周禮有觥罰之事謂以觥罰之耳非必觥專為罰爵也南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之后妃不妬忌而衆妾以禮義相與和箋説則和氣致祥而君子安受其福易曰視履考祥故稱福履毛傳訓履為祿則釋言文君子指文王而后妃逮下之美自見箋義為長木上竦曰喬下曲曰樛樛則與下相接故葛得而附之興后妃逮下而衆歸心全篇重一樛字纍綴得理也説文荒芘覆也吕與叔縈旋貌説文言纒之遍也綏安也毛傳將猶扶助也鄭箋成就也毛傳言其福無不成就用意一章深一章陳見復師曰王風之葛藟取其庇本根此詩取其上附興義各有屬爾雅諸慮山藟注云似葛而粗大陸疏一名巨瓜似燕薁亦蔓生螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮序言后妃子孫衆多衍之者曰言若螽斯不妬忌則子孫衆多也歐陽以為倒説螽斯微蟲何以知其心不妬忌據序宜言不妬忌則子孫衆多如螽斯也愚謂順文解義當如衍者之言不當如歐陽氏之言也按疏詵即甡字説文謂衆生並立之貌吕與叔曰螽斯始化其羽詵詵然比次而起故傳訓衆多薨薨羣飛聲博雅揖揖會聚也毛傳言其羣而立羣而飛羣而集所謂羣處和集也集傳以况不妬忌得其意而已非謂是物之性不妬忌也下兩字各對上兩字生義振振有奮動意繩繩有連行綴續意蟄蟄有靜伏相安意况子孫之多而賢也據蟄蟄言則爾字應如集傳指螽斯三宜字隱躍見不妬忌之所致傳箋不言興正義引鄭志之言以為興非也當從集傳為比爾雅蜤音斯螽蚣蝑音嵩須方言注曰江東呼為蚱蜢疏謂七月斯螽與此一也嚴氏詩緝以螽斯為蝗斯蟲為蝗屬誤矣蝗乃是阜螽桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人華古音敷家古音姑後同序言后妃所致則文王之化可知詩以桃興之子一章言其華二章言其實三章言其葉次第而形其盛也傳以蓁蓁興形體則鑿矣室家家室家人變文叶韻或屑屑求之皆贅説也孔氏釋傳謂於秋冬行嫁此據東門之楊傳男女失時不逮秋冬為言也集傳引周禮媒氏之文則據鄭箋中春隂陽交以成昏禮馮氏復京云媒氏中春令會男女奔者不禁蓋時至中春則農桑已起昏期過晚故不禁若正為昏姻之時而復不禁奔豈禮也哉按荀卿云霜降迎女氷泮殺止蓋九月至二月皆可昏也此與匏有苦葉詩義相應何氏古義曰嫁娶自季秋至孟春不拘其月及仲春而猶有男女之無室家者則以媒氏會之雖奔不禁奔非淫奔事殺禮簡不能如常昏焉故曰奔也然則仲春之昏固為權制矣夏小正二月綏多士女蓋亦媒氏會之之意周禮疏引王肅駁鄭義亦同肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心罝古音睢仇古渠之反傳箋俱以罝兔之人即為賢者蓋惑於墨子舉閎夭泰顛於罝網之中也伊尹割烹百里自鬻孟子斥為好事者之妄此亦其類若以罝兔與武夫為近則閎夭泰顛豈武夫耶豫曰有奔走豫曰有禦侮謂即出此罝兔之中吾不敢信三復詩言定當屬興陸氏奎勳舉曹植所云開天網以該之頓八紘以掩之為設興之義其説近纖要以肅肅興赳赳椓杙興干城中逵興好仇中林興腹心則義有取爾矣蓋見兔罝之嚴整本義而思輕徑有材力之武夫説文猶樂記所謂聽鐘聲則思武臣也丁丁然築杙於地而張罟其上使兔不能逸隱然有扞禦之象故以興干城干也城也皆所以為禦疏言扞蔽如盾防守如城也丁丁人所聞中逵人所見中林聞見所不及蘇轍兔罝屢進而深故所興亦屢進而重好仇腹心則非直奔走禦侮之才矣三章俱以肅肅冠其首可知臨事而懼為武臣絶大本領亦以見古人相士别具心眼非徒以勇健為才也文王遏密侵阮伐崇戡黎一種蹶生氣象於此可想不待讀皇矣有聲諸詩而後見也朱子曰此文王時周人之詩極其尊稱不過曰公侯而已亦未嘗稱王之一驗凡雅頌稱王者皆追王後所作耳集傳既以屬興而訓義猶仍毛鄭恐非定説采采芣苡薄言采之采采芣苡薄言有之采采芣苡薄言掇之采采芣苡薄言捋之采采芣苡薄言袺之采采芣苡薄言襭之有古音以後同只采芣苡一事而自始至終傳寫曲盡王平仲云芣苡之外有不見不聞者所謂其儀一心如結也陸氏奎勳曰有樛木之不妬忌則有螽斯之宜子孫有桃夭之宜室家即有芣苡之樂有子編詩之序如此陸氏深曰詩凡四十八字內用采字凡十三芣苡字凡十二薄言字凡十二除助語才餘五字耳而敘情委曲從事始終與夫經行道路招邀儔侣以相容與之意藹然可掬天下之至文也即此可以見和平矣王氏肅曰自關雎至芣苡房中之樂按詩當從集傳為賦爾雅芣苡馬舄馬舄車前陸疏幽州人謂之牛舌草孔疏江東人呼為蝦蟆衣毛以為宜懷妊而陸璣陸佃皆以為治難産輔氏廣謂毛公説亦只是陸璣之意非謂能治人之無子也何氏楷曰山海經云芣苡食之宜子然出於西戎又為木名縱有之亦别是一種南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思息集傳從韓詩作思詩本音泳古羊向反永古于兩反韓詩作羕鄭庠古韻江陽庚靑蒸與養敬梗上去通馬古莫補反桃夭罝芣苡猶在境內漢廣汝墳則其流漸遠此編詩之次第也先以木之高竦不可休興女之高潔不可求章首四句其義已足再出四語以咏歎之疊下四不可韻味深長音節淸婉悠揚讀之如見此女之端莊靜一令人肅然起敬苦葉之詩曰深則厲淺則揭漢廣之詩曰不可泳不可方風化之美惡昭然矣秣馬秣駒歐陽氏引史記雖為執鞭所欣慕焉語固圓活但上言之子于歸而此人願效僕役頗覺唐突何氏古義曰秣馬謂親迎也言欲娶之者必秣馬以行親迎之禮而後可明不可以非禮干也鄒氏忠允曰喬木不可休錯薪則可刈也遊女不可求于歸則可效也按詩言娶妻每以析薪起興此詩明言于歸何説似無病二三章承上章不可求來略作開語以致敬慕之意末又重述前語咏歎見其終不可求耳詩曰不可求衍者曰求而不可得失其解矣箋蓋附其意以為説古義曰泳以絶流橫渡言故漢言廣方以順流上下言故江言永張次仲弋志箋記曰婦女嬉遊非美俗遊女不淫其本事而採為盛世之風何也揚子曰習治則傷始亂習亂則好始治文王之時驕主在上放溢恣行裸體牛飲充斥後宫而陌上有整容之女豈易得之事歌王化而及漢廣是立少觀多即此形彼之意當於言外得之按詩宜為興爾雅小枝上繚為喬又句如羽喬又上句曰喬皆言其枝若無枝直上則是檄而非喬也馮疏漢有二源一出鞏昌府秦州之嶓冡山至四川重慶府江津縣入江者西漢水也一出漢中府沔縣之嶓冡山至漢陽府入江者東漢水也胡氏東西二源圖曰西源出隴西嶓冡山東流為嘉陵水合潛為西漢水東源出漢中嶓冡山始出曰漾合沮曰沔東流為漢馮疏江源出成都府茂州岷山西南流經灌縣又東北流經重慶夔州歷常德至武昌合漢水於漢陽之大别山説文方併船也爾雅謂之泭郭云木曰竺二稗竹曰筏小筏曰泭月令收秩薪柴注云大者可析謂之薪沈括云楚亦荆木之别名荆在薪中尤翹翹者故析薪者欲刈之孔疏下章蔞草亦言薪者因此通其文遵彼汝墳伐其條枚未見君子惄如調飢遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇此章説義毛傳最簡箋謂君子反而得見之於思則愈是已役罷寧家而末章云云猶曰勉之以正不幾贅乎陶晚聞師曰伐其枚而又伐其肄以喻王室斬刈之威日朘月削枝幹盡傷生理將盡魴魚所由赬尾也以為感時則非其義矣蓋當時汝旁之國困於虐政有釜魚纍卵之危而文王受命為伯率以供役其家人知必有以安集之也故設為始憂終喜之言而卒乃勉之以正非既見之後猶為此言也曰伐枚曰伐肄曰如燬一種狹隘酷烈剝牀以膚之狀可見曰父母孔邇一種兒憐獸擾喁喁待澤之意可思杜子美新安吏送行勿泣血僕射如父兄用此意也按晚聞師謂詩非婦人語君子指文王蓋南國之歸文王者作後見世本古義其説正同但向來説詩家無不以為婦人詩再考劉向列女傳薛君章句及後漢周磐傳所引皆然故仍從序説毛不言興今按詩意宜為興馮疏汝水出魯陽縣大盂山黃柏谷徑蔡潁州入淮按大盂山在天息山西三百里傳則用水經説今考胡氏導淮圖則馮説為信爾雅釋丘墳大防注謂堤李巡曰崖岸狀如墳墓又釋水汝為濆郭引此詩作濆為大水溢出别為小水之名毛不用釋水用釋丘者以詩墳字從土不從水也若常武傳訓濆為涯則用釋水義戴氏侗曰條枝之修達者枚條之搏直者傳曰肄餘也斬而復生曰肄羅願曰魴體肥不能運其尾加以橫流其勞甚矣張子曰魚搖尾多則血流注尾故赤麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮角古音陸末句不入韻又合三章自為韻關雎至汝墳德化之自家而國也終以麟趾則國之本在家故曰關雎之應也説者謂化成而麟至則癲矣麟興文王后妃趾定角興公子公姓公族于嗟麟兮歎文王后妃亦是歎公子公姓公族所謂至於兄弟也詩所説文麒仁獸也牝曰麟説者執此以為歸美后妃不知對説則分牝牡單舉則麟即麒禮運云麟以為畜大戴禮云毛蟲三百六十而麟為之長豈但舉其牝者乎甚矣固者之不可與言詩也召南説見周南沈氏守正曰岐周久被文王之化其民忘故詩多熙皥而忘南國新變淫亂之俗其心悔故詩多湔洗而露惠元龍詩説曰二南之詩非一時所作有自其前而追詠之者如甘棠行露是矣有從其後而附益之者周室既微王姬下嫁尚循婦道則關雎鵲巢之化及於後者逺矣維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之居御平去通詩所御王肅讀魚據反關雎摰别鳲鳩均一兩詩遙對命義顯然故關雎序曰后妃之德此序亦曰夫人之德也詩牖曰鳩居成巢亦無成有終之義夫人之德借鳩以見之百兩御百兩將百兩成與琴瑟友鐘鼓樂同一喜樂尊奉之意然淫泆咏嘆則關雎深矣居受其成也方嚮而往也一章主迎故曰居二章主送故曰方毛訓為有未詳今用萬邦之方注義盈滿也興媵娣之多也御迎也將送也成成其婚禮不當如傳言成其百兩之禮也百兩形其盛不當如傳言諸侯之子嫁於諸侯送御皆百兩也鵲巢興諸侯之有國鳲鳩興夫人而兼及其媵不當如詩所以鵲興夫人鳩興衆妾也鳩當如傳作鳲鳩爾雅邢疏可據歐陽謂鳩類最多惟今人直謂之鳩者拙鳩耳按爾雅釋鳥無直名鳩者不如舊説之安爾雅鳲鳩鴶鵴注今之布榖也邢疏詩召南云維鳩居之謂此也漢書注車一乘曰一兩朱公遷曰百兩極其盛而言由士昏禮從車二乘等而上之亦恐不及百乘于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宫被之僮僮夙夜在公被之祁祁薄言旋歸沚事上去通蘩之供祭見于左傳再見於夏小正戴德傳又射義云士以采蘩為節樂不失職也序皆與之合可以為定論矣被副編次之總名毛氏謂首飾者得之不當如鄭以為髲鬄夙夜在公總上公侯之事公侯之宫而言蓋正指祭時薄言旋歸則祭畢而歸矣不當如鄭祭前祭後之説聞之師見復陳氏曰詩人美刺每寄於容儀服飾間玉之瑱也象之揥也賤之也充耳琇瑩會辨如星愛之也容兮遂兮垂帶悸兮薄之也美目揚兮巧趨蹌兮惜之也羔裘如膏日出有曜危之也匪伊垂之帶則有餘思之也側辨之俄醜之也赤芾在股邪幅在下慕之也維玉及瑶鞞琫容刀壯之也其笠伊糾其鎛斯趙慶之也貝胄朱綅榮之也如此之類多矣若采蘩夫人廟中愛敬之狀有未易形容者讀被之僮僮數言千載之下如或見之不學詩無以言此之謂也爾雅蘩皤蒿陸疏凡艾白色者為皤蒿夏小正傳曰蘩由胡由胡者蘩母也蘩旁勃也皆豆實也濟南張氏疑為二物非也由胡者其本也故曰母旁勃者采其上體四旁勃然而生蓋自本及枝皆可為豆實按周禮追師掌王后之首服為副編次注副以覆首若今步搖服以從王祭祀編列髮為之若今假紒服之以桑次次第髮長短為之所謂髲髢傳曰被首飾也副編次皆為首飾皆得名被箋乃引為髲髢而疏引少牢被錫證之不知少牢之文本主婦被斷句錫衣侈袂為句錫今文作緆敖繼公曰褖之訛也若以錫為鬄連屬上句則侈袂之衣不知何衣矣陳祥道曰詩被之僮僮少牢主婦被錫衣侈袂皆非髲髢今依毛訓首飾則少牢之被屬次此詩之被屬副無容費辭矣喓喓草蟲躍躍阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷降古户工反後同此詩之義毛鄭失之今從集傳黃氏櫄曰序曰大夫妻而説者以為未嫁之女已失其旨且以草蟲阜螽異類相感而憂念不已則下二章采蕨薇而憂悲豈亦恐為異類相感乎序曰以禮自防非懼為淫風所染而以禮制之也人情思極則易怨大夫妻雖憂念君子而不敢怨其上斯為以禮自防爾陸佃曰忡忡中而不下降下也惙惙綴而不解説解也人喜悅則心和平嚴緝故終以夷言之未見之憂一節緊一節既見之喜亦一節深一節按儀禮合樂召南三詩越草蟲而取采蘋疑其簡錯陸奎勳云齊詩先采蘋而後草蟲見曹氏放齋詩説集傳為賦當從毛作興爾雅釋蟲草蟲負蠜阜螽蠜陸疏草蟲如蝗阜螽蝗子陸佃云草蟲鳴則阜螽躍而從之故阜螽曰蠜草蟲曰負蠜孔疏草蟲鳴晚秋之時爾雅蕨虌注云初生無葉可食江西謂之虌陸佃云狀如大雀拳足如足之蹶故名陸璣曰薇山菜也莖葉皆似小豆據本草薇有二種生水旁葉似萍者爾雅所謂薇也故曰垂水生平原山谷似柳葉者白嶶也此當為白薇朱謀㙔曰采薇采蕨季春時也見歷時久于以采蘋南澗之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釜于以奠之宗室牖下誰其尸之有齊季女下古音户後並同詩首言采蘋藻次言治菹末言薦豆集傳謂循序有常嚴敬整飭即序所稱循法度也五于以疊下而以兩語結之章法絶竒毛鄭引昏義教成之祭王肅則謂大夫妻助祭之詩主毛鄭者據經稱季女主王肅者據序稱大夫妻愚謂毛鄭是也春秋書逆婦薑來逆婦皆未婚時已正其名而易漸之女歸吉歸妹之女承筐又皆以嫁而稱女復何疑於季女之為大夫妻乎所當辨者牖下耳按奧南少東穿壁為交窗其名曰牖在户之西奧不正當牖近見戴震所作宗廟圖甚分曉不得以牖下為奧箋云户牖間之前疏云去牖近故曰牖下也考特牲少牢事主于室主婦薦豆皆自房中奠於筵前無奠於牖下之文惟昏禮自納采至請期主人皆筵於户西西上右几禮皆外設注曰為神布席其為牖下明白可據禮不言祭而教於公宫教于宗室實見於記則教成之後應有祭也牲用魚芼以蘋藻記不及詳義為補其闕耳故牖下之義明而此章之説定矣在牖下者孔氏以為外成之義以女尸祭鄭氏所謂成其婦禮也襄二十八年傳濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也蓋櫽括此詩為言爾雅萍蓱其大者蘋若水上浮萍乃其小者謂之薸而非蘋也郭注分明詩緝誤駁爾雅莙牛藻邢疏引左傳蕰藻言此草聚生故曰蕰蕰聚也毛傳云聚藻陸疏扶風人謂之藻聚為發聲也陸佃云生道旁淺水中蔽芾甘棠勿剪勿伐召伯所茇蔽芾甘棠勿剪勿敗召伯所憩蔽芾甘棠勿剪勿拜召伯所説敗卦韻憩霽韻本通詩多後章深於前章而此詩二三章乃遞淺於前詩遞淺思遞深也集傳用二非特字説義最精詩所云伐者取其條幹敗者殘其枝葉拜者攀援而屈曲之茇曾舍焉憩曾息焉説曾一過而停車焉物之惜也至於微而猶愛人之愛也自其暫而猶思説詩之義盡矣史記謂巡行決獄説苑謂還職止舍俱無足論爾雅杜甘棠注云今之杜梨陸璣云棠梨也又杜赤棠白者棠陸璣云白棠甘棠也少酢滑美赤棠子澀而酢按爾雅上條舉其味言甘則有不甘者矣下條别其色言白者棠則赤者不得單名棠矣毛倒其文曰甘棠杜也殊違爾雅之義又方言杜蹻澀也趙曰杜梨子澀因名據此合陸璣説則甘棠為棠梨赤棠為杜梨矣朱子改用郭注恐亦誤也樊光云赤者為杜白者為棠杜棠實兩物有枤之杜赤棠也蔽芾甘棠白棠也注家牽混故滋後人之疑耳考通志野梨小而酢者為杜海紅子為甘棠近日朱彛尊則謂蘋婆果即甘棠俗呼檳子者乃赤棠也未詳所據存之以質知者厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不汝從夜古音豫後同二三章家字不入韻列女傳説詩多違經義而此傳稱申人女許嫁於酆夫家禮不備而欲迎之女持義不往夫家訟之於理而申女作詩云云實與經義相應韓魯二家皆同康成謂禮不足而強求朱子謂室家之禮未備都用其説首章述其自守之辭下二章鼠牙雀角之疑終明其誣序所以歸美聽訟也誰謂女無家箋言似有室家之道於我語意覺更渾成顧起元曰速獄速訟即是多露沾身不足不從則夙夜之露自多我身之行自潔是亦以首章興下二章之法詩牖角音陸嘴之鋭而鈎者雀有喙而無角説文牙牡齒陸佃云鼠有齒而無牙爾雅墻謂之墉羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公皮古音婆蛇古音陀後同革緎食同韻詩美其人每樂道其衣服容儀王平仲云彼都人士狐裘黃黃其容不改出言有章行歸於周萬民所望即為羔羊之箋傳可也詩牖曰行難自然賢者特甚著一節儉于胸中縱不露于大廷必不能渾忘於私室故退食委蛇為難稍有意便是公孫宏之布被愚按全詩純用咏嘆只末二語錯綜顛倒不但大夫之賢宛乎如接而朝無闕事官有餘間一種太平景象溢於楮墨故曰鵲巢之功所致此篇神似周南不獨可以配兔罝也羔裘朝服非退居服也蓋自公朝服此而退故即所見稱之織素絲為組紃以英飾裘縫疏之言詳矣紽緎總傳義未明胡氏一桂謂縫之􅊳兀為紽有界限為緎合二為一為總區别明畫五字之義無聞嚴氏范氏謂合五羊之皮為一裘其説近鑿戴岷隱續記疑皆絲之量數於理為得殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉質疑靁斯陽遑隔韻子哉平上通望其歸而無棘欲閔其勞而無怨詞美之曰振振君子疑當為大夫遠行從政而非微賤勞苦者之所可當也詩人聞靁起興陽而側側而下靁愈近君子愈遠吕柟不必謂施號令於四方始不敢暇中不敢止終不敢居謝枋得庶幾早畢事而旋歸所謂勸以義集傳不必謂功未成而未得歸也劉氏瑾曰此詩猶周南之有汝墳任氏啓運曰以在字喚違字以違字喚歸字何字若問哉字若呼顧氏夢麟曰此詩為反興之始摽有梅其實七兮求我庶士逮其吉兮摽有梅其實三兮求我庶士逮其今兮摽有梅頃筐塈之求我庶士逮其謂之三今通續讀詩記曰此擇壻之辭父母之心也詩記古義皆同毛以梅興男女之年鄭以梅紀婚姻之時古未有以梅實紀時者毛義為允詩所曰吉納幣也今擇吉也謂告期也比舊説近情事三逮字序所謂及時也謂父母之心欲其及時亦文王之教也集傳取紀時故為賦今用毛義當屬興馮疏郭云梅似杏實酢此江南之梅邢昺引陸疏花葉不同陸自説秦風之梅耳詩在召南應如郭説嘒彼小星三五在東肅肅宵征夙夜在公實命不同嘒彼小星維參與昴肅肅宵征抱衾與裯實命不猶昴讀留寧都魏際瑞詩經原本引律書北至於留謂詩本用留字而漢人書為昴也龍為霖云昴名留非可即讀為留也徐邈音茅白華茅猶同韻夫人無妬忌之行而賤妾安于其命藍田吕氏之言簡而明矣傳以三為心五為噣集傳不從改曰三五言其稀以下章參昴例之恐非其義然傳箋之意以心噣參昴為大星而衆無名之小星隨之在天猶衆妾隨夫人以進御則其説迂曲不可從夫人為太隂之象妾借餘輝以照故取象于星言星則已小矣書曰庶民惟星星有好風星有好雨箕畢豈無名小星相彼下民何緣有尊大之象耶或謂心以三月見於東噣以正月見於東詩人一時起興何緣三五並舉不知宫人進御定非一時或當心在東時或當噣在東時矢口而吟不必刻舟求劍也肅肅毛訓疾貌集傳訓齊遫貌讀書通謂遫與蹙通則齊遫者謹而疾也兩肅肅見其疾謹兩實字見其安命毛不言興當從集傳為興古義三五專指噣噣即柳也步天歌云柳八星曲頭垂似柳近上三星號為酒享宴大酺五星守此詩之作蓋在冬春之交柳在東參昴在南皆一時所見是説存考晉志參十星昴七星孔疏參實三星下三星為伐外四星左右肩股也元命苞曰昴六星蓋北六星為卷舌中一星為天讒晉志兼舉南北元命苞專言北也或曰以窺微鏡測之參凡二十四星昴凡三十六星江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌汜以悔本通小星下能安而序曰惠下江汜上能悔而序曰美媵互見其義也郝氏敬曰小星以日月之光比夫人江汜以洪流之量比正嫡劉氏瑾謂亦周南樛木螽斯之類然安勉殊矣江興嫡汜渚沱興衆媵黃實夫從水決復入取義以喻嫡之始棄而後悔則求義太切非依微起情之謂矣凡興皆含比意而實非比當以意會不當以巧説况例之渚沱其説難通勢必又生别義不如康成大小並流之無岐説也以與過漸相親近悔處歌則終無芥蒂矣按序祗言不以其媵備數耳以猶用也讀詩記如不使大臣怨乎不以之以如此平説甚妥始不與後乃迎之皆説詩者為之辭爾雅決復入為汜邢疏謂凡水決之岐流還入本水者則不必專指夏水矣又小洲曰渚李巡謂四方皆有水則亦不得謂之水岐矣又江為沱注引書曰岷山導江東别為沱疏謂沱水自蜀郡都水縣湔山與江别而更流此注言書曰者指梁州也荆梁皆有沱而郭指梁州者著其别流之處故序曰江沱之間殷周皆并梁入雍故召南之地得至梁州詳見通志野有死麕白茅包之有女懷春吉士誘之林有朴􅈪野有死鹿白茅純束有女如玉舒而脫脫兮無感我帨兮無使尨也吠包誘平上通麕春隔韻脫讀兌商俗靡靡男女之間違道敝化者多矣禮不備而強迎如前章所謂室家不足者是不必云強暴侵陵也召伯奉揚仁風宣布德教民知無禮之可惡而詔以從容誘導死麕所以繼行露之後也毛鄭説義頗滯而大指不失如訓誘為導訓如玉為德訓白茅為潔清訓未章為吉士以禮來之意皆得惟死麕死鹿解義未融又以感帨尨吠為非禮劫脅此漢儒解經拙處按士昏禮納徴束帛儷皮注云皮鹿皮是昏禮當用鹿皮也執皮者必攝之故以包束為言而茅又純潔之物可以藉禮易所謂薄而用可重者是也當昏禮殺止之時女之當嫁者有如玉之德求女之吉士可不用儷皮為禮以相誘導乎昏禮自納采問名以至親迎禮儀周備節次從容舒而脫脫無急遽無苟略也感帨尨吠則躁急欲速非從容誘導之謂矣故兩言無以戒之正與脫脫句相足迫切求之則轉失矣按左傳昭公元年鄭伯享趙孟子皮賦野有死麕之卒章杜注謂喻趙孟以義撫諸侯無以非禮相加陵趙孟賦常棣且曰吾兄弟比以安尨也可使無吠可為是詩之證毛不言興今從朱何彼穠矣唐棣之華曷不肅雍王姬之車何彼穠矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫穠石經作襛華古音敷車古音姑襛雍隔韻次章首句不入韻詩本音以矣李為韻者非首章以肅雍美王姬不敢斥言而但咏其車美意自見次章先女尊王姬也末章先男成婦順也唐棣桃李只是形容盛美維絲伊緡則取合姓綢繆之意此詩新舊諸説紛紜莫定一惑於正風無東周詩故傳箋皆謂武王女因訓平為正李迂仲附之且訓齊為一矣一惑于魯莊之世歸齊者有兩王姬其在元年者為齊襄公其在十一年者為齊桓公襄桓二君皆在位迎娶不可稱子種種疑團莫能開解日知録曰宣王之世未嘗無雅則平王以下豈遂無南此必其詩可存二南之遺音而聖人附之於篇者也且以莊王之事繫於南與以文侯之命附於書一也其説近是又按昏禮記無父者皆稱子襄桓二君雖難臆定要不得以稱子獻疑爾雅唐棣栘郭云似白楊江東呼為夫栘又常棣棣疏小雅常棣之華又本草郁李仁一名棣一名雀李一名車下李七月所謂薁也非此唐棣馮疏陸璣知唐棣常棣各一種却不當以郁李為唐棣論語集注云唐棣郁李也亦陸疏誤之彼茁者葭一發五豝于嗟乎騶虞彼茁者蓬一發五豵于嗟乎騶虞詩所葭古音姑豝古伯吾反虞字不入韻騶虞毛傳以為義獸而賈誼新書謂騶者天子之囿虞者囿之司獸二説皆起於漢儒歐陽本義嚴氏詩緝范氏補傳並主賈説蓋以爾雅釋獸無騶虞而射義有樂官備之文也按虞為司獸古有其官文囿名騶未詳所據或引左傳六騶指為二官彼此牽合彌不可信若騶虞之為獸則見於劉安鴻烈解相如封禪書不獨毛傳也顔師古以為白質黑章張華以為珍獸若虎尾長於身陸璣以為不食生物不履生草諸君博物洽聞語皆符合爾雅諸釋罣漏實多不得緣此遂謂古無是物也至射義樂官備箋謂一發五豝喻得賢人多義不屬於虞官未可援以為證今集傳亦宗毛義無容别為之説至此章詩義疏謂獸五豝惟一發者不忍盡殺仁心如是故于嗟乎歎之實勝中必雙疊之説末句不入韻亭林謂古人言盡而意長歌止而音不絶故有句之餘有章之餘如于嗟麟兮于嗟乎騶虞其樂只且文王蒸哉之類皆章之餘也凡章之餘皆嗟歎之辭不可入韻然合三數章歌之則章之末句又未嘗不自為韻此説得之質疑引劉潢言乎虞自為韻則析句未安亦聲短而節促矣陸堂詩學又謂虞字與嗟字應益破碎不成文皆屬衍説爾雅葭華注曰蘆也葭蘆注曰葦也疏葭一名華葦之未成者然則葭也蘆也葦也一物也其曰蒹薕者似萑而細曰菼薍者似葦而小則别草也詩緝以為一物四名誤矣爾雅齧雕蓬薦黍蓬疏曰説文云蒿也草之不理者月令藜莠蓬蒿並興是也爾雅牝豝毛所據也集傳改為牡豕季本謂將為豆實用牝者非何楷用杜氏説謂春搜擇取不孕者此皆曲為之辭其實春田所以除田豕故專以豝豵言之無暇計其牝牡也特訓詁當有根據耳爾雅豕生三豵二師一特蓋豕生三子謂之豵鄭箋本此集傳則用説文語虞東學詩卷一
