body:
  text: 虞東學詩卷九宗人府主事顧鎮撰大雅一陸氏徳明曰自文王至卷阿十八篇據隆盛之時推序天命上述祖考之美皆國之大事故為正大雅焉民勞以下終蕩之什皆變雅也今分正大雅十八篇為一卷變大雅十三篇為一卷文王之什錢氏詩學曰按序文王以下諸詩未言何人所作惟吕氏春秋引此以為周公之詩文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熈敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼􅒐王之藎臣無念爾祖無念爾祖聿脩厥徳永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚右音以時右平上通京音疆躬龍氏讀涓按易震不于其躬叶鄰言龍説是孚古音浮序言受命作周而箋直云受天命而王天下則惑於中候所云赤雀丹書之事也至三統厯妄穪文王受命九年而崩附㑹九年大統未集之言而帝王世紀遂有稱王改元之説則尤誣經惑世之甚者中庸言武王末受命武王猶至末年受命安得謂文王稱王改元耶詩緝曰凡經中稱文王受命皆謂天命歸之而已文王未嘗稱王也游氏云泰誓稱文王為文考至武成然後稱文王可知已此詩周公述文王之徳業以戒成王詩緝疑於祭祀受釐之後因而陳戒者古義而後遂以為朝㑹之樂集傳兩君相見亦用之國語蓋以昭先王之徳於天下集傳亦以著興亡之所自以示鑒也首尾皆言文王與天為一輔氏而所以合天者只是一敬中以周孫子士之世顯與商孫子士之侯服兩兩相形而宜鑒之意不待末二章而見矣一章言文王之神在上昭明于天毛以在上為在民上今從集傳蓋告王唱首之語尊聸之辭也古義周邦雖舊而命則新朱子謂自后稷以來積仁累義到此時人心奔趨自不能已也顯者光昌之謂以新之氣象言時者應期之謂以新之機候言二句單承新命説非分承四句也一説不顯為丕顯不時為丕時文王陟降在帝左右者文王精神在天與天同運一陟一降無息不與天相依也二章以下乃陳受命作周之實亹亹勉也毛傳文王之勤明徳也鄭箋令善也聞聲聞也鄭箋勉勉於徳不已故令聞亦不已也陳錫敷施也宣十五年羊舌職引詩昭十年晏子引詩皆曰陳錫哉周能施也言亹亹而繼以陳錫由精神心術而達之政事設施也古義哉始也爾雅由能敷恩惠之施以造始周國也鄭箋侯維也毛傳維文王孫子膺此方新之命也對成王言故首稱孫而繫子於後謂成王及其後人耳古義本宗百世為天子支庶百世為諸侯盛徳必百世祀也詩緝凡者總辭諸侯及王朝卿大夫皆可謂士孔疏不顯亦世言周氏子孫亦世世丕顯也末章義問與此章令聞對四章商孫子五章殷士與此章孫子士對立義關動匪直稱頌揚厲而已三章言周士所以世顯者由其先世事我文王謀國之忠翼翼然恭敬也思語辭毛傳皇美也用書注生此王國天生之也王國克生文王教化作成之也詩緝劉氏彛曰多士本由文王陶範而生而王之邦國又賴多士以為安寧猶人勤於菑田反以自養樂于植材反以自庇也四章言所以昭於天聞於人者皆由不已其敬致然穆穆以盛徳氣象言敬則其徳之實也後章所謂脩徳而儀刑之者蓋不出乎此朱子黄氏櫄曰敬於其所當止所謂敬厥止也以為語助者非假大也蘇氏麗數也毛傳服屬也用周禮注大哉天命使臣有商之孫子蘇氏推本言之也商之孫子其數不止於億而天命既集於周維於周臣屬而已所謂仁不可為衆也詩緝五章述殷士祼將之事以為戒也詩緝上章主孫子之世系言則遡其開國之始曰商此主國亡臣周言則指亡時所稱之號曰殷田間蓋周以命集而致商之服商以命去而致服於周則天命靡常矣殷士之膚美敏疾者從其孫子贊祼將於周之京師當周王行作行也祼禮之時服其舊服之黼裳􅒐冠而助祭也禮記殷人􅒐而祭周人尚臭故先祼今殷士初覩周禮以先朝服色贊禮新朝固不勝今昔之感矣田間藎進也毛傳忠愛之篤進進無已故曰忠藎吕記於是呼王之藎臣而告之曰得毋念爾祖文王之徳乎蓋以戒王而不敢斥言猶曰敢告僕夫云爾集傳六章言念祖當鑒殷七章言鑒殷在法祖也聿脩厥徳者脩其敬徳如文王也能敬徳則可以長配天命而多福自求李解當殷未失衆時其配上帝亦如周也今其子孫如此可不以為烱鑒而惕然於命之不易乎吕記曰王者代天理物操典禮命討之柄故曰配命又曰配上帝知命之不易無使天命自我躬而止本義當布明善問度殷廢興由天之故而加毖焉天之事無聲臭可求惟儀法文王則天下信而順之蓋文王與天為一法文王即所以法天也朱子凌濛初曰此篇詩體首尾相銜曹子建白馬篇祖此明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維徳之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥徳不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商殷商之旅其㑹如林矢于牧野維予侯興上帝臨女無貳爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚凉彼武王肆伐大商㑹朝清明一章上辰羊反五章子妹渭上去通六章天莘韻七章隔句韻野讀渚興讀欣明彌郎反前篇言文王受命之事此篇歸美武王故敘太姒詳于太任敘武王詳於文王而首章總目孔疏即為伐殷起案也序言文王有明徳故天復命武王是以文王為縁起坦然明矣詩深謂凡紀一人之事不能不詳其出身之顛末是也諸儒泛言美文武似未得詩要領何黄如謂專頌二母失之尤遠一章述天命之去殷以為末二章張本也明明在下君之善惡不可掩也赫赫在上天之予奪為甚嚴也毛以明明屬文鄭以明明兼屬文武皆非也詩只泛陳天人之理耳今從詩緝天難信而不可恃為君豈不難哉觀紂居天位為殷正適乃使之不得挾四方而有之集傳蓋可見矣以殷適言者與生文王生武王相形古義天既生彼以興周故先位此以亡商也田問彚纂曰使字説得威靈赫然所謂危言以惕之而告諸天之不假易也二章乃述太任生文王以著興周之本也詩人蓋以大任起太姒以文王起武王而武王之能成大業皆文王積功累仁所致故推本言之蓋文王生非偶然惟摯國之仲女自殷商畿内來嫁于周為京室之婦京周京也從後稱之耳箋説誤及與也行列也古義與王季徳堪並列也於是太任有身而生文王焉尊卜曰本其未嫁謂之仲任迨其有子謂之大任三章言文王之徳天人所與也詩緝小心翼翼緝熈敬止也聖人之徳敬為大上與天心合下與人心合故事天則多福集之治人則方國附之朱子泰誓謂文考誕膺天命以撫方夏是也懷來也蘇氏自上帝言之則曰懷自文王言之則曰受四章將言武王之生而特重其母氏之作配文王也文王有盛徳而天心下監大命集焉故於初年黙定厥配在洽之陽以太姒所居言在渭之涘以文王所居言説詳後注兩地睽隔適成佳偶所謂天作之合也古義嘉昏禮也當文王將昏之期而大邦有子蓋非人之所能為矣集傳五章言文王納徴親迎之事也疏云此篇主美文王雖王季尚存皆以文王為主俔譬也韓詩作磬孔氏謂如今俗語譬喻物曰磬作然也譬天之妹尊之之辭易泰卦六五帝乙歸妺亦其義也文禮也集傳卜而得吉則以禮文定其吉祥而納幣焉箋義文王於是親迎於渭水之傍而比船於水加板其上為之浮橋甚盛禮也禮盛則光顯矣傳曰天子造舟諸侯維舟大夫方舟士特舟疏曰文王造制後即以為天子禮六章述大姒生武王而原其自於文王之受命也言天既命文王於周之京矣而克繼大任之女事者惟此莘國以其長女來嫁也集傳上天眷周之厚既生文王又生武王故曰篤生保安之右助之而命之伐商以順而動因天人之所欲故曰燮伐也詩緝七章述武王伐商而誓諸侯之辭也古義殷商之旅其㑹如林武成所謂受率其旅若林㑹於牧野是也矢於牧野牧誓所謂甲子昧爽王朝至於商郊牧野乃誓是也維予侯興以下誓衆之辭予我也侯諸侯也予侯者親之之辭牧誓謂嗟我友邦冡君是也興起也警其起以聽誓也女爾皆指諸侯也古義史記載武王誓師之辭曰勉哉夫子不可再不可三所謂無貳爾心也武王灼見天意所在紂師雖衆固不足畏故稱上帝臨女以鼓其鋭而一其志也舊説謂商衆告武王與矢于牧野句全不相貫八章正言伐商之事以終首章之義也集傳牧野之地洋洋寛廣不事慿險也檀車煌煌然鮮明駟騵彭彭然强盛既整且暇所謂堂堂之陣也凉作亮助也漢書肆遂也維太師尚父如鷹飛揚遂助武王而伐商不必選鋒䧟陣也㑹戰之朝而天下已清明焉所謂一戎衣而天下定也按史記言周公能論歌文武之徳達太王王季之思慮則集傳謂詩作於周公者信矣以為戒成王則首章見其意思固推敘發祥之自以明武王之成王業也篇名大明者鄭謂二聖相承其明日以廣大而先儒相傳則又以在小雅為小明在大雅為大明云周語摰疇之國由大任韋注摰疇二國名仲虺之後傅氏曰摰為殷商畿内國國名記云蔡之平輿有摰亭一統志平輿故城在河南汝寧府東洽陽漢志作郃陽陸奎勲曰言水從洽言邑從郃非因流絶也集傳今流已絶故去水加邑水經注郃陽城南有瀵水東流注於河即洽水也又云郃陽城故有莘邑國名記云今同州之夏陽即漢郃陽有太姒冡古義云其先為虢地後滅於晉國語神降於莘内史過以為在虢受之是也水經注岐水與杜水合逕岐山又屈逕周城南又南逕美陽縣南流注扵渭是渭為周境與莘無渉程子注親迎於渭謂周在渭旁不是出疆説最明畫舊以洽陽渭涘皆指大姒所居非也爾雅駵馬白腹騵檀弓云周人尚赤戎事乗騵牧野説文作坶野水經注自朝歌以南暨清水土地平衍據臯跨澤悉牧野之地緜緜𤓰瓞民之初生自土沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹迺慰迺止迺左迺右迺疆迺理迺宣迺畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼捄之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝迺立臯門臯門有伉迺立應門應門將將迺立冡土戎醜攸行肆不殄厥慍亦不隕厥問柞棫抜矣行道兑矣混夷駾矣維其喙矣虞芮質厥成文王蹶厥生予曰有疏附予曰有先後予曰有奔奏予曰有禦侮下音户右音以畝滿以反家音姑後音户詩所奏與走同當音祖前篇歌論武王而先遡文王之徳此篇追述太王而後及文王之興蓋作周者文王故四始皆以文王為主序曰文王之興本由太王得其義矣朱鬱儀乃疑末章為錯簡作偽者偽魯詩説遂削去之何其妄也果無末章則開端緜緜𤓰瓞句不成贅語耶此詩疑亦周公所作不必定謂戒成王而締造艱難之意具見於詩其亦可為永念者歟一章言在豳時也鄭箋大曰𤓰小曰瓞孔疏𤓰之近本初生者常小其蔓不絶至末而後大集傳立乎文王之世以指太王正如𤓰之有瓞故以為興田間民周民也初生只是初起周昌平承上緜緜之瓞為蹶生起案也自從也集傳土居也毛傳猶今言土著又齊詩作自杜見漢志師古注從沮漆二水間居也稱古公者言其久以著緜緜之義賈公彦曰古者穴居隨地而造在平地則累土為之謂之復言於地上重複為之也髙地則鑿為坎謂之穴曰陶者以瓴甓之類甃之欲其堅固亦以隔土氣也公劉云於豳斯館七月云入此室處而此云未有家室者疏謂豳近西戎處在山谷俗多復穴而居此美在岐新立故曰在豳未有何黄如創為踰梁山後未至岐下時事則游談無根矣二章言至岐下也來朝來之朝也以早朝走馬循西方水涯漆沮之側東行而至岐下也孔疏於時太王盡室以行爰與姜女同來豳民亦遂相率而來宇焉古義何黄如曰此章點内助末章推功四友皆開創大關係須知作者用心之宻三章言定宅於岐也周之原地膴膴然肥美所生之莱堇甘荼苦舊以堇為鳥頭者誤而皆如餳焉則地力之厚信矣謀言始者對契龜言先謀而後卜也契刻也集傳訓楚焞從疏誤也定九年契其軸注同以刀刻龜甲所當灼之處也既刻而後用楚焞灼之視其食墨與否以為兆也曰者龜告之兆告以宜止於是又告以時日之吉可以築室而居也詩緝四章至七章先民事次宗廟次宫室次門社經綸之次第也古義迺慰迺止者慰安從遷之衆俾止居於是也上云曰止此云迺止成龜告之意也詩緝左右東西列之也蘇氏王肅謂開地置邑以居其民也迺疆以定經界迺理以分土宜迺宣以導溝洫迺畝以度廣狹詩緝蓋既定民居即制民産自西至東徧執田事焉張記言民功脩也詩所五章言建宗廟也乃者繼事之辭先成民而後及此也王氏召司空以營國召司徒以興役規模過渉渭取厲時逺矣俾立室家對未有室家言謂揆其基址即考功所稱左祖右社面朝後市也孔疏既營度位處皆以繩正之依其繩直之處而興築則縮束其版版滿築訖乃升下為上以相承載焉箋義俾立二句總下宗廟宫室民社言縮版以載則専言作廟翼翼嚴正也孔疏六章言治宫室也集傳捄以手取土而盛以虆也度接受其土而投之版也疏義削屢墻成脱版削治其凸數數然也劉氏陾陾衆也毛傳薨薨衆聲也集傳登登用力聲毛傳馮馮墻堅聲李氏謂薨薨以下宜皆作聲所治非一室故百堵並舉其民樂於趨事以鼛鼓節之而弗止鼛考工作臯陳祥道曰臯緩也役以勿亟為義故以臯鼓節之故曰弗勝言太王之得人心也輔氏廣曰獨詳板築之事者蓋垣墻所以圍乎外舉此則其中衆役可知也七章言立門社也立其宫之郭門謂之臯門則伉然而髙立其宫之正門謂之應門則將將而正毛傳後遂以為天子之門焉集傳冢土大社也戎醜大衆也舉大事動大衆必有事乎社而後出謂之宜毛傳太王初立冡土以利攸行而後亦以為天子之制蓋隱然有克敵致果之槩故特舉以為服混夷之端黄氏八章言服混夷也詩緝太王雖不能殄絶混夷之慍怒亦不隕墜其聲問之美諸儒皆從鄭以問為聘問按聘問不當以隕言今從集傳久之而生齒漸䌓歸附日衆柞棫則挺拔而遂茂行道則兑通而成谿混夷畏之而奔突竄伏維其喙息而已集傳此章專説太王康成以屬文王者誤讀孟子文耳集傳主言太王是矣後又言已為文王之時猶未能掃除舊説也及註孟子則分畫甚明矣錢氏詩學曰以皇矣篇觀之柞棫拔矣而下皆指太王時也下章方提出文王言之九章言文王由太王之業而興也獨舉虞芮之事者謂遷岐之後治道脩明至文王時而人心歸周雖虞芮猶且質成混夷何能為梗乎蓋以結避狄遷岐之案也詩緝蹶厥生者對初生而言太王初起時尚自微弱至是則蹶然而興箋義蓋王氣勃奮有怒生之象與𤓰瓞光景關照萬時華予曰以下作詩者之辭箋義若曰非特文王聖也其臣與有助焉率下親上曰疏附相導前後曰先後喻徳宣諭曰奔走武臣折衝曰禦侮毛傳雖是章末餘波亦見文王得人之盛而人才為聖化之助者大也解頥此詩以一句興全篇漢魏間猶能用此法集傳作比今從毛為興爾雅瓞瓝其紹瓞孔云近本之𤓰必小於先歳之大𤓰故曰其紹瓞也鄭康成謂公劉遷豳居漆沮之地至太王得民心而興王業故本周之生云於漆沮也顔師古註漢志亦言公劉避狄而來居杜與漆沮之地詩緝曰此言漆沮指豳國是漆沮之上游下言周原傳謂漆沮之間指岐周是漆沮之下流按水經沮水出北地郡直路縣東過馮翊祋音對祤音許縣北東入於洛此沮水之源流也漢志扶風有漆縣漆水在縣西東入渭此漆水之源流也至孔氏引水經云沮水俗謂之漆水則名稱亂矣季氏本曰雍有二漆沮而皆入渭一在漢馮翊之地涇之下流也一在漢扶風之地灃之上游也禹貢導渭東過漆沮則馮翊之漆沮也意者扶風漆沮小而可畧馮翊漆沮大而當詳歟又云岐周在后稷邰城西八十里蓋復其舊封地也沈艮思明辨録曰漆沮之從是祋祤之石川河自土沮漆乃杜陽之漆渠河也周初封有斄在今武功公劉豳國在今三水太王遷岐在今岐山則惟有杜陽之漆而已不曰漆沮而曰沮漆又曰自土沮漆非倒文也蓋沮非水名乃是阻水為澤以為畜魚溉田之用今杜山在招賢鎮壅遏為陂以溉土田漢世猶名為沮渠水又曰漆水之西沿流而東南至岐山入渭蓋豳在漆水東故以漆水為西循水以往抵鳯凰山即所謂岐下也周原在岐山東北與鳯凰山相連蓋即岐山之麓也以此證之漆水與岐山合而無沮水明矣艮思久宦秦中嘗為余言地理之書古今紛錯非身履其地不能核也此説與前賢合其謂沮非沮水則言之鑿鑿為創説云一統志岐山在鳯翔府岐山縣東北十里山有兩岐故名郡縣志故虞城在陜州平陸縣東北五十里芮城在陜州芮城縣西十里古義云平陸芮城俱屬山西平陽府解州在河東史記註引地理志謂芮在馮翊臨晉縣乃河西地與平陸逈不相及芃芃棫樸薪之槱之濟濟辟王左右趣之濟濟辟王左右奉璋奉璋峨峨髦士攸宜渒彼涇舟烝徒楫之周王于邁六師及之倬彼雲漢為章于天周王壽考遐不作人追琢其章金玉其相勉勉我王綱紀四方趣倉九反宜魚何反前篇末言得人故以能官人之詩繼之而官人之本則在王之勉勉始言濟濟敬之形於外也末言勉勉敬之純於中也濟濟之儀又根於勉勉之徳一章述文王用材不棄微小也以芃芃然叢生樸屬鄭箋之白桵材亦微矣猶採之以備薪槱毛傳槱積也興文王之於賢才或隨材而用或蓄以待時雖微不棄如此詩緝本義故濟濟然多容儀之辟王為左右所趣向也趣之奈何國之大事在祀與戎故二章舉祀事三章舉戎事曹氏言此濟濟之辟王其在宗廟則左右執璋瓚以助灌皆峨峨然壯盛之俊士嫺於駿奔無少失度所謂攸宜也其在戎行則六師之士不待戒命而踴躍從王所謂及之也其以涇舟烝徒為興者何黄如曰伐崇道必渉涇春秋繁露引此詩指伐崇事詩緝疑為北征玁狁時事四章言文武之材皆文王有以作成之也彼倬然明大之雲漢昭回於上為天之文章猶文王以文治昭揭於上也詩緝遐之言何周王壽考何不作人者久於其道而化成也五章言作人之事而歸本王身也作之於外而追琢之使有文作之於内而金玉之使有質王氏丘氏惟王之自脩勉勉而不已所謂古之人無斁譽髦斯士故有以維持四方而大綱小紀罔有失墜也觀此詩文武所效則前篇所謂疏附先後奔走禦侮亦畧可見矣古義詩所俱據繁露以首二章為郊天事按董氏從公羊文王受命邪説不可信今從舊説為興朱子謂棫樸至假樂疑多周公作爾雅樸枹也孫炎曰樸屬叢生謂之枹孔疏玉人云大璋中璋邊璋皆璋瓚也郊特牲云灌以圭璋故知璋是璋瓚惟灌用之小宰職云凡祭祀贊祼將之事注云惟宗廟有灌天地大神至尊不祼此奉璋助祼者祭宗廟也瞻彼旱麓榛楛濟濟豈弟君子干禄豈弟瑟彼玉瓚黄流在中豈弟君子福禄攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回降戸工反四章福古墨反上去入通六章平上通序曰受祖蓋言文王承前人積累而興而衍者謬指先祖為太王王季以前鄭因以君子為太王王季是相沿之誤也今從集傳指文王一章以山興先祖毛傳旱山名麓興君子榛楛興福禄惟旱山髙大則麓之得氣厚故林木茂盛惟先徳深長則君子之承藉逺故福禄盛大豈弟樂易也徳盛仁熟和順充積自然樂易也樂易之君子其干禄亦樂易者猶曰自求多福耳詩緝所謂異乎人之求之也迂仲二章申上干禄之義也吕氏彼縝宻之玉瓚必有秬鬯在其中疏曰釀秬為酒以鬱金之草和之芬芳流鬯謂之秬鬯黄如金色在器流動謂之黄流樂易之君子必有福禄下其躬詩緝言受福之有本也先祖遺子孫之業莫大於人材吕記故三章以作人言之鳶能飛而上戾于天風益之翼也魚能躍而下躍于淵水充其氣也故曰豈弟君子遐不作人惠研谿説讀詩記曰作人之盛至如鳶飛魚躍非積累薰陶久且熟者不能蓋其來有自矣此序所謂受祖也四章言報祀先祖以受福也吕記清酒既載所謂奉酒醴以告曰嘉栗㫖酒謂三時不害而民和年豐也騂牡既備所謂奉牲以告曰博碩肥腯謂其畜之碩大蕃滋也疏義如此則先祖饗之而助以大福矣詩緝五章承上言介福之事也疏義柞棫瑟然宻茂則民取以為薪而燎之矣文王有樂易之徳則先祖之神勞來而賜之福矣前後篇多言柞棫豈岐山所産柞棫為多詩人即所見以起興歟六章結言干禄豈弟之義也葛藟延蔓於木之枝榦興文王慿先祖之功而興起也文王本樂易之徳以求福無一毫覬倖之心自不入於回邪表記云得之自是不得自是以聽天命所謂不回而豈弟也朱子謂詩有享祀神勞等語或亦受釐之樂前篇言辟王言六師此篇言騂牡孔氏謂據後事言之其説然也何黄如曰不言山而言麓人君不以髙危峻絶自處人人得而親近之亦人人得而取給之其為豈弟孰加焉此詩人言旱麓之義也漢志漢中南鄭縣旱山涇水所出其地與鳯翔接壤陸疏楛似荆而赤莖似蓍上黨人織以為斗筥箱器又揉以為釵顔監云堪為箭笴思齊太任文王之母思媚周姜京室之婦太姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦雝雝在宫肅肅在廟不顯亦臨無射亦保肆戎疾不殄烈假不瑕不聞亦式不諫亦入肆成人有徳小子有造古之人無斁譽髦斯士二章三句一韻妻弟平上自為韻三章上去通四五章集傳未詳詩貫瑕音胡入轉音樹徳轉音兠斁轉音異各兩句為韻五章皆言文王所以聖也一章專美太任提出文王之母四字為文王張本也文王生於太任而太任有齊莊之徳其氣稟有自來矣思語辭集傳太任能致孝於姑媚愛周姜以盡婦道示法於婦使太姒繼其美聲不妬忌而子孫衆多詩雖美及太姒而義主太任故以嗣徽音言之集傳兼言聖母内助恐非本指二章言文王接神人各得其道也張子文王上順先公推其心以事天地百神無有怨恫下治室家推其道以御宗族邦國無有不順蘇氏詩記曰毫髪不愧於隱微然後近者孚故神罔怨恫始可以刑于寡妻疏曰嫡妻惟一故曰寡三章言純亦不已也詩緝雝雝在宫即刑寡妻之事肅肅在廟即惠宗公之事田間不顯耳目所不到無射彈射所不及射舊竹斁義頗費解今從古義讀如石臨者自外臨之保者已自保也田間此聖人之自强不息也許氏詩記曰上章言神人孚格欲求其所以孚格者當於此觀之四章言從容中道也詩緝戎疾大害也毛傳如羑里之囚是也吕記烈光也本義假大也毛傳言雖大害不絶而文明柔順之徳光大不玷惟其至性安安不待舊聞亦式於度無事教諫亦入於善故能常變無違若此詩深傳所謂性與天合也五章言至誠能化也詩緝文王豈弟作人壯者成而有徳少者學而有造當如造士之造不當訓為今雖文王往矣而肅雝之精神如在無有厭斁士類聞風興起皆有名譽而成俊乂之美焉郝氏蓋非言無斁致譽髦言無斁之心於今譽髦可見耳田間詩記曰聖人澤流萬世莫大於作人故以是終焉典謨作於虞夏已曰稽古此詩追述文王以為古之人蓋同一例皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅作之屏之其菑其翳脩之平之其灌其栵啓之辟之其檉其椐攘之剔之其檿其柘帝遷明徳串夷載路天立厥配受命既固帝省其山柞棫斯抜松柏斯兑帝作邦作對自太伯王季維此王季因心則友則友其兄則篤其慶載錫之光受禄無喪奄有四方維此王季帝度其心貊其徳音其徳克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔既受帝祉施于孫子帝謂文王無然畔援無然歆羡誕先登于岸宻人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祜以對于天下依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王帝謂文王予懷明徳不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝閑閑崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂二章柘古之恕反屏與平韻辟與剔韻徳與配韻通章隔句韻三章友音以四章類比悔祉子上去通五章邦博工反六章池音陀七章革音棘八章禡古音慕萬時華曰緜詩意在敘王業艱難之由故詳在太王遷岐而以文王為歸束此詩意在序王業盛大之由故詳在文王伐宻伐崇而以太王王季為縁起集傳以一二章言天命太王三四章言天命王季五六七八章言天命文王愚謂前雖分言太王王季而章語銜接歸注文王詩固有宗主也開章便提上帝復言帝耆次章言帝遷三章言帝省四章言帝度言帝祉後四章三言帝謂而歸於徳之明而靡悔可見周家世徳久協天心而天之徘徊眷戀以緜八百之祚者亦經詳細鑒觀非倉猝而畀之也序曰美周其㫖深矣一章言天以岐周與太王為文王受命基也莫漢書作瘼病也集傳耆老也鄭箋遲乆也歐義憎惡也式用也鄭箋廓大也此謂岐周也集傳言天臨下監觀惟求民病苦何在而欲安定之蓋民心之外無天心也夏商二國毛傳既失其道於是究度四方之國遲久致察惡其用大而為虐者若以増大䂓模為言當在西顧與宅之後不當先言増大後言乃眷也不如舊説之順今用夾漈語惟太王能以民瘼為念乃眷然西顧而以此岐周與之居也二章言太王宅周之事也立死曰菑自斃曰翳叢生曰灌俱爾雅行生曰栵程子檉河栁也椐樻也檿山桑也爾雅柘亦桑類蘇氏作屏脩平啟闢皆除去之義攘剔則長成之桑柘之性芟剔而後茂也詩緝串習也毛傳夷平也程子蓋太王有明徳天為遷而宅此遂使深阻之區民皆習其平易載路而歸所謂有夷之行從之者如歸市也毛傳惟王者配天天將立文王以為配程子故當太王之時而受命既固焉受命即受與宅之命也三四章皆言王季之事而三章先言帝省山而作邦對見天心之隱有所屬也柞棫拔松柏兑即上作屏等事兑義見緜詩不當别解作邦即此維與宅作對即天立厥配太伯因天心以讓之季季又因兄心以承其讓則季之善事其兄皆因心自然而非有勉强故能篤厚周家之慶而予兄以讓徳之光既受天禄而無失矣至於後人而遂有天下也王氏曰大伯避季而季疑於不友故特言其友以表之自之云者言自大伯讓王季而王業已定矣四章言受禄無喪之實也帝度其心者度其受讓則友之心貊當從樂記作莫音陌左傳同靜也莫其徳音者靜穆而不矜令名也光輝發越曰明古義知類通達曰類詩緝教誨不倦曰長慶賞刑威曰君左傳前敘太王曰帝遷明徳此敘王季曰其徳克明下敘文王曰其徳靡悔又曰予懷明徳是明徳為此詩要領故重言克明為下五者之綱也王大邦謂主岐周而為方伯也慈和徧服曰順擇善而從曰比左傳此又為王此大邦之事傳之文王其徳尤無遺憾厯代帝眷至此而實受其福以延於子孫焉程子曰此二句結之而下述文王之事五章六章言文王伐宻也伐宻之舉疑於黨阮而侵宻土地故五章先託帝謂以發明文王之心畔偏也援黨也詩緝歆者欲之動羡者愛慕也程子然語辭説文言文王無此四者非禁止之謂崖之髙者曰岸登岸者據髙以制下諸侯有為暴亂者先脩威徳以臨之也集傳説理甚精而未恊情事今用本義宻人不恭敢違方伯之約束興兵侵阮犯其共邑文王於是赫怒整旅按止徂共之衆毛傳按止也孟子作遏此蓋救亂安民以厚周家之福荅天下仰望之心而非有所畔援歆羡也六章言文王駐兵國都吕記以為聲援然後興師自阮疆而出髙岡陵阿泉池皆阮境也文王為阮伐宻視阮地如己地故謂之我詩緝非據為己有也度過也古義小山别大山曰鮮爾雅鮮原疑即周原蓋岐山之麓也度鮮原以下言班師而歸於岐周也古義田間方嚮也鄭箋王往也集傳萬邦法之下民歸之一伐宻而天下歸仁也箋以度鮮原為謀徙程事考本詩及史記並無文惟見于書序及皇甫謐之説而岐陽自太王以來三世所居今曰居岐之陽安得指為徙程乎不知先儒何以信之七章八章言文王伐崇也崇侯曽譖文王本詩又有執訊攸馘之事疑於憤兵而張皇擾攘故七章叠舉帝謂以明之聲以色聲音與笑貌也夏以革侈大與變革也文王以明徳致帝之懷不假矜厲不事侈張不作聰明以順天理程子此明徳之實而帝所懷也帝乃命之謀伐仇方戒以糾同與國脩備戎具或以鉤梯援引或以臨車俯瞰或以衝車旁突蓋崇侯助虐殃民罪大於宻而恃强負固非攻不克也仇如仇餉之仇崇侯為萬邦所仇故曰仇方非以譖已而仇之也詢爾以下皆帝謂之辭八章言伐之之事也文王奉天伐罪始猶不忍遽攻故臨車衝車閑而未用詩緝乃崇侯恃其城之髙大毛傳言言髙大也雖文王所使通訊之人左傳杜注執訊通訊問之官程大昌云兵交使在其間故曰執訊也連連不絶彼終頑梗不化於是有所斬馘以警懼之田間猶且安安而不輕暴程子惟是暴白其罪告於神明前既類於上帝矣兹復禡於所征之地王制而招之使來納之使附以孤弱其黨四方聞之已無或侮矣及不得已而盡鋭致攻臨衝之用茀茀然强盛毛傳崇墉之髙大者遂搖動而欲壞韓詩注仡仡搖也疏曰將壞之貌乃聲其罪而伐之縱其兵而肆之離其援而絶之杜其國而滅之四方之人皆以罰當其罪無有拂其心者蓋天誅不可以留而罪人不可以不得集傳故始緩攻之後加戮焉所謂順帝之則也蓋求民之莫者天也文王一怒而安民所以順天心而荅帝眷也諸詩多陳文徳此篇獨耀武功蓋表王業之隆以結帝遷之案而武王之服四方宅鎬京所以為繼伐也左傳司馬子魚曰文王聞崇亂而伐之三旬而不降退脩教而復伐之因壘而降此章首四句即三旬不服之事是類以下乃再駕復伐時事田間爾雅釋木有栵栭郭璞謂栭樹似槲􅈪而庳小子如細栗今案灌栵並言灌非木名則栵亦非木名宜從程解陸疏椐節中腫似扶老即今靈壽也顔師古云檿山桑之有㸃文者食檿之蠶其絲可為琴瑟絃其材可為車轅又可為弓榦孔疏鉤援所以鉤引上城者墨子稱公輸班作雲梯以攻宋蓋此之謂禮書云楚子使解揚登樓車以告宋人蓋臨衝也揚子衝不薺皆言衝車之大爾雅釋天是類是禡師祭也王制天子將出征類乎上帝禡于所征之地注云上帝謂五徳之帝祭於南郊者春官肆師類造上帝注云造猶即也為兆以類禮即祭上帝也言隨兵所嚮而祭之不必南郊但所祭者南郊之帝耳明非人帝禡祭不明何神肆師凡四時之大田獵祭表貉則為位注云貉師祭也祭造軍法者蓋蚩尤或曰黄帝王肅曰宻須氏姞姓之國也漢志安定郡隂宻縣詩宻人國按安定郡即涇州集傳誤注寧州通志阮在岐渭間宻逺而阮近集傳誤註涇州張子曰共阮國地名皇甫謐以阮徂共為三國誤通典崇國在京兆府鄠縣今𨽻西安府夏時扈國殷為崇國路史以為夏後蓋據鯀封崇伯而云也皇極經世商受十八年西伯伐崇自岐徙居豐並無自程徙豐之説經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍虡業維樅賁鼓維鏞於論鼓鐘於樂辟廱於論鼓鐘於樂辟廱鼉鼓逢逢矇瞍奏公從舊本分五章毎章各為一韻亟來囿伏平去入通濯翯躍上入通按來音釐釐之入為力囿古音肄伏古蒲北反靈臺辟廱作於伐崇徙豐之後此篇蓋申皇矣所未盡也陸堂愚謂前篇敘武功此述文徳故下武有聲分言繼文繼伐之事文王徳業莫盛於作人辟廱論樂乃育材之大者孟子引詩特因沼上之問用以誘導時君耳講師泥之遂謂樂其有靈徳以及於鳥獸昆蟲置重舉輕失之逺矣且臺之名靈取其占候天道察知妖祥以為百姓所謂亦是借説詩所序云民始附若專主子來言之誠有如朱子所駁者然玩王在二叚分明茂對咸若氣象鼓鐘二叚則樂行倫清而風俗同道徳一矣文王之徳化至是乃大浹於民心故曰始附也一章言臺成之速也經之者初為量度該下囿沼言之經謂制其廣深營謂定其基址劉氏攻築作也鄭箋不日言速也蓋形容之辭二三章承上言速成之故由於民之趨事也勿亟者愛民之仁子來者事上之義陳氏未有上好仁而下不好義者也言在囿在沼而不言臺者臺以望氣非遊觀之所也鹿易驚逸攸伏安其所也鳥獸遂生則肥澤濯濯翯翯得其養也魚驚則潛牣則躍若其天也兩以王在冠之而對時育物之義見矣四五章述辟廱論樂之事也文王既遊囿沼遂於辟廱合樂而論之其懸樂之具兩端有植木為虡虡上有横木為栒栒上加大版為業業上刻如鋸齒施以采色為崇牙其狀樅樅然也孔疏虡業之上則懸賁之大鼓鏞之大鐘箋疏荀子云鐘隂聲也鼓陽聲也隂陽和而後萬物得鐘鼓應然後八言諧故舉鐘鼓以該八音也於嘆美辭論講求鐘鼓之度以作樂也蘇氏陳氏𤾉曰鐘鼓樂之器而器非樂也有精微之義焉鐘鼓不論無以知其義矣古之論樂者論倫無患則論其情而己其文論而不息則論其文而已論其義則得之於耳而心喻之得之於心而神受之豈特聽其鏗鏘而已鄭箋訓論為倫似不如蘇陳之説之精大司樂以樂語樂徳教國子故於辟廱論之也鼓鐘謂鼓與鐘非鼓其鐘也前敘賁鏞亦先鼓後鐘樂書謂鐘師掌金奏必以鼓倡之是也臺沼遊觀無非可樂之事而稱其樂者乃在辟廱之論鼓鐘所謂樂得英才而教育之菁莪之詩曰樂且有儀其以是歟因復重言申之歎美不已既論之後鼉鼓之聲隆隆而起蓋矇瞍於此方奏樂公所也言鼓不言鐘者天子視學大昕鼓徴辟廱之地以鼓為重也言外有圜橋駐聽聞聲神往之意結法最妙若於論句先言奏樂則此二句不成贅語乎讀書記曰毛鄭以此詩為五章章四句或以為前二章章六句後二章章四句今觀楚椒舉引詩止於麀鹿攸伏蓋全舉前二章之文也然則章句之傳甚逺未可以意改也質疑曰第二章平去入通韻正是每章一韻不必以一韻分兩章陸堂曰第三章麀鹿起語甚佳兩王在對收篇法自合仍作五章讀可也左傳杜注靈臺在京兆鄠縣三輔黄圖靈臺在長安西北四十里靈囿在長安西四十二里靈沼在長安西三十里据此則地有三處但相近耳爾雅鹿牡麚麀牝麚白鳥羽色白者陸佃以為鷺也考工記梓人為筍虡説文云鐘鼓之柎也爾雅木謂之虡大板謂之業又云大鼓謂之鼖考工記韗人鼓長八尺鼓四尺中圍加三之一謂之鼖鼓陳氏樂書十二辰之鐘大鐘也大鐘特懸爾雅所謂鏞也張萱云鏞庸也古人有大功者必銘之鐘以此黄圖辟廱在長安西北四十里毛云水旋丘如璧以節觀者孔云璧體圓而内有孔此水亦圓而内有地猶如璧然以水繞丘所以節約觀者令在外而觀也何黄如曰頌云振鷺于飛于彼西雝則辟廱在西郊韓詩説謂在南方七里内此不足信盧植蔡邕賈逵服䖍潁子容等牽合明堂清廟靈臺辟廱為一袁凖作正論斥之詳見别録陸疏鼉形似蜥蜴四足長丈餘甲如鎧其皮堅厚可冒鼓晉安海物記云鼉宵鳴如桴鼓陸佃謂鼉鼓非特有取於皮亦其聲象鼉鳴故謂鼉鼓下武維周世有哲王三后在天王配于京王配于京世徳作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則媚兹一人應侯順徳永言孝思昭哉嗣服昭兹來許繩其祖武於萬斯年受天之祐受天之祐四方來賀於萬斯年不遐有佐孚古音浮下武不上武也即古詩語書稱歸馬放牛詩稱戢戈櫜矢是也或云下當作文或云下當作大未知所据序曰繼文謂繼先王文徳所謂武王纘太王王季文王之緒也或因詩有成王字疑為康王以後之詩朱子謂考尋文意只當如舊説一章言周家世有文徳而武王配之也人知周以武功定天下不知周之為周並不以武為上下武字宜貼周説不宜便貼武王考於其世大王荒岐王季則友文王敬止此三后者皆哲王也其神既已在天矣武王受命鎬京實與相配其用武者不得已也豈以武為上哉二章言武王所以配三后者由其能求先世之徳而繼之也李解作起也蘇氏求有參經權通常變之義周氏康誥用康乂民作求語意類此蓋三后以天之徳為徳世徳所在即天命所在武王起而求之故配三后即所以配命永言者長存此配命之心不敢一毫有戾於天田間故能成王者之信於天下下篇言自西自東自南自北無思不服成孚之謂也三章言能成孚則有以式下土矣惟其長言孝思而不忘故人皆信之以為則也孝而曰思跡或不合而思無不同所以求世徳者正在於此四章申言孝思維則之義孝為徳之順天下愛戴武王式而則之則所以應一人者維以順徳故永言孝思乃以光四海而嗣先王之事也五章言嗣服奈何蓋不特為今日之式則實為來世之儀刑詩所來許則之而繼承祖宗之武則世世配京配命而受天之福於無窮矣六章申言來許之事繩祖武而受天祐祖心即天心也受天祐而四方賀天心即人心也迂仲所謂得萬國之懽心也不遐有佐者臣民所以輔君朝賀踵至則萬年式之則之媚之而應以順徳所謂逺而有助也蓋求世德永孝思以得天人之效信乎其尚文徳而不尚武功也文王有聲遹駿有聲遹求厥寧遹觀厥成文王烝哉文王受命有此武功既伐于崇作邑于豐文王烝哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后烝哉王公伊濯維豐之垣四方攸同王后維翰王后烝哉豐水東注維禹之績四方攸同皇王維辟皇王烝哉鎬京辟廱自西自東自南自北無思不服皇王烝哉考卜維王宅是鎬京維龜正之武王成之武王烝哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉毎章末句不入韻又合為一韻熊朋來曰匪棘其欲欲字禮記引詩作猶猶孝平去通毛大可龍為霖皆曰孝讀畜按孝畜本音轉通無容改欲為猶芑仕子平上通下武言繼文所以繼其文徳兼三后言有聲言繼伐所以繼其武功乃專指文王言武王定天下以武而序曰繼文文王治豐以文而序曰繼伐皆見尚論深㫖衍者言武王能廣文王之聲卒其伐功則經師之贅矣此篇舊説孔氏以前四章稱文王後四章稱武王竊疑詩為武王作非兩詠文武也前路皆言豐不言鎬何以第五章忽屬武王七章方言宅鎬何以第六章先言鎬京種種疑竇而以王后稱文王尤有未安於心者潛谷鄧氏元錫曰前二章陳文王之伐後六章皆武王作鎬繼伐之事何錢説同其説差合郝仲輿云首尾四章稱文武文始之武終之也文王求寧以始武武王貽孫以終文也中四章稱王后皇王繼諸侯而為天子也一章著伐崇作豐之本也孔子閒居曰三代之王必先其令問是為有聲矣古義遹與聿同發語辭集傳駿大也鄭箋文王之心但求天下之安寧而觀其成功耳非有心於有聲也烝進也爾雅火氣上升也説文蓋熾盛升進之意詩所云舊説作君然恐當為美盛意二章即求寧觀成之事受命受天命以討有罪即皇矣帝謂文王詢爾仇方也田間惟求觀之心切故有此伐崇之武功而因以作豐張子曰民歸日衆無地以容之必至於遷也詩述文王遷豐義止於此三章言武王作鎬以配豐也築城伊淢者築城臨水而溝以為池也毛傳訓淢為溝作豐伊匹者猶雒誥言作周匹休也周公營雒以匹周武王營鎬以匹豐其事同而語亦類不聞以雒誥之言為作周何獨泥此詩之文轉使匹義無着乎文既作豐武復作鎬疑於急圖開拓而匪也惟追文王來豐之孝古義而繼述之耳四章申言匹豐之義王公文王也追稱曰王其爵則公也箋訓公為事非濯即赫濯之濯即遹駿有聲也吕訓濯為滌亦非言文王之駿聲在此豐之垣耳武王在鎬而四方歸之倚為翰焉垣翰皆屏蔽之義所謂匹也知王公之為文王則王后之為武王無疑矣時武王未有天下也五章則為天子矣故進稱皇王而前之維翰者今且維辟也豐在豐水西鎬在豐水東鄭箋豐水東注鎬所見也以禹興武明其王天下之大功也六章言武王作鎬建學而天下化也張子曰靈臺辟廱文王之學也鎬京辟廱武王之學也蓋至是而始為天子之學矣陸堂云辟廱當即文王辟廱豐鎬相去祇二十里未必改作此説可存服而言思心服也集傳周自西土興後乃漸及於東文王化行南國後乃漸及於北故曰自西自東自南自北立言之序如此古義七章追敘宅鎬之先考卜之事也王武王也維武王考卜之以取正於龜而龜出吉兆以正定之因建為都以成其吉兆也詩緝何黄如曰言成之正與遹觀厥成相應八章承上辟廱言言武王樹人以為子孫謀也辟廱之育才如豐水之滋芑芑本穀名今依毛傳為草武王豈無所事乎集傳詒厥孫謀以燕翼子所謂敷求哲人俾輔於爾後嗣是武王之事也蓋文王求寧之心于以成武王追孝之實于以盡序謂繼伐者以此若但以伐紂繼伐崇恐非序者之意據郡縣誌豐水出京兆鄠縣終南豐谷北流入渭而詩云東注者按禹貢導渭自鳥鼠同穴東㑹於豐入於河是豐水北來渭引之東注故曰維禹之績也生民之什田間詩學曰卷阿以上八篇成王時詩厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子誕寘之隘巷牛羊腓字之誕寘之平林㑹伐平林誕寘之寒氷鳥覆翼之鳥乃去矣后稷􅈱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食蓺之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實穎實栗即有邰家室誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畝恒之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歳卬盛于豆于豆于豋其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今一章民嫄韻祀子止韻夙育稷韻二章達他末反副孚逼反轉讀鬀上四句去入通三章字與翼韻去􅈱訏路平去通林林氷自為韻四章匐音白嶷音逆與食為韻幪唪平上通五章茂音老道草茂苞褎秀好平上去通栗室自為韻六章畝滿以反負房以反七章揄蹂叟浮惟韻軷烈嵗去入通八章登升歆今韻時祀悔平上通生民詩有疑義未决者三履帝武敏歆毛以帝為髙辛鄭以帝為上帝朱子用箋説而從爾雅以履帝武敏為句一也誕寘隘巷云云毛鄭以為異之於天下史遷以為不祥而棄之朱子用史記而從康成無人道之説二也誕我祀兩章毛鄭皆以為后稷郊天而毛以嗣歳為此年之秋孔衍毛義鄭以嗣嵗為新嵗祈穀諸儒又以七章為后稷祭宗廟八章為今王郊天配稷三也集傳吕記嚴緝今按巨跡之説出於列子史遷襲之而康成信焉諸儒駁之備矣歐李黄嚴二八兩章皆言上帝而首章獨言帝則指為髙辛者是敏之訓拇雖見釋訓而他無所証敏字絶句以歆屬下於文義亦不順自當以毛傳為正顧祈而得子無故棄之非情理所有蘇洵常力辨史記之誣獨未解稷之何以見棄因引姜氏惡寤生為比然姜特惡之耳未嘗多方致之死地也反覆經文至后稷􅈱矣乃如有所得蓋人之初生皆裂胎而出驟失所依故墮地即啼惟羊連胞而下其産獨易詩以如達為比恐稷生未出胎故無坼副災害之事而啼聲亦不聞也坼副謂破裂其胎災害謂難産皆主稷言非言其母姜嫄驚疑而棄之輾轉移徙屢見異徵至於鳥去乃􅈱則胎破而聲載於路矣玩兩句叠用矣字知前此未嘗􅈱也從此推索則稷之棄也有因非為履巨跡而無人道之故矣後二章皆言時王奉祭末章乃及配天舊説固不可据諸儒分屬稷祀今祀亦似破碎惟康成以為祈穀之郊其義甚諦蓋長至郊配之樂已有思文則此詩應為元日祈穀所用先儒謂二郊皆配以后稷是也古義云長至之郊稷以祖配祈穀之郊稷以功配無教民稼穡之功安得祈穀配帝乎又云思文簡而生民繁者郊止一天故以簡質為尚祈穀則兼天與五帝其禮繁故其詞亦繁也一章述姜嫄禱而生后稷也詩緝民人也與民之初生義同推本周人之生而著所自出為姜嫄也不言父而言母者所生之異因母而見不因父而見也周人世立姜嫄之廟及行大禘則推本於嚳姜嫄之為嚳妃審矣禋之言煙因煙氣之上以致其誠也袁凖祀天而配以先禖以祓除無子之疾謂之郊禖維時帝嚳親行姜嫄在後而踐帝之迹將事齊敏而神歆享之毛傳介者相助之義孫炎攸介以姜嫄助祭言攸止則祭畢時也古義震動也毛傳蓋助祭畢而遂震動有身也左傳邑姜方震夙肅也鄭箋避燕寢居側室以自斂戢也輔氏生分娩也育長養也稱后稷者尊而君之為配天張本也二章明稷生之異以明誕寘之由也誕發語辭集傳彌月終十月也鄭箋先生首生也集傳達羊子也鄭箋産之難者皆由破胎之後或横或逆致成災害也先儒皆言不坼副災害其母其言近褻且亦何因而棄之乎蓋生人之理無不破胎而啼者稷獨不然故言赫然著其靈異也於是驚疑以為不祥豈上帝不寧將降之禍乎抑禋祀不誠神不安其祀而示此異乎田間何使我徒然生子而不可育也集傳居然猶徒然也三章遂言棄之之事腓避也字愛也按采薇註以腓為足隨動毛於此詩訓避亦是動足避之避之所以明愛不必改訓為芘覆自上掩也翼自下藉也隘巷易致踐踏而牛羊避而愛之平林恐致異物損傷又適有伐木之人䕶持之寒冰光易侵入肌骨而鳥上下掩藉之皆所謂赫厥靈也鳥去而􅈱蓋后稷至是始􅈱人聞聲而取之故長大之聲滿於路也四章述稷㓜好種殖之事也詩緝岐嶷立而竦峻之貌古義言頭角嶄然也通解以就口食言能跂立取食以就口也方氏蓋始能匍匐便頭角崢嶸至於能口自食則已有種殖之志鄭箋荏菽大豆也禾役禾之行列也孔疏斾斾枝揚起也集傳穟穟禾多穗也詩話幪幪茂宻也唪唪多實也集傳凡五穀瓜瓞之類經其手植無不美盛史記言棄為兒時好種麻麥麻麥美殆其天性生知天特啟之以生此民歟尊卜五章述后稷掌稼穡而封邰也穀可收曰穡民賴稷教而後有穀可收是民之穡皆稷之穡也古義稷有輔相造化之道教民先去豐草然後擇嘉穀而種之謂之黄茂者黄色而茂盛詩緝齊民要術言收選好穗絶色劁割髙懸之是也方房也苞甲而禾拆也集傳種生不雜也嚴氏曰種之黄茂已是擇種繼言實種于方苞之後故箋言生不雜疏謂不稂不莠是也褎枝葉長也發發管也鄭箋秀始穗也吕記堅實堅成也孔疏好無損壞也田間穎垂末也實繁碩故垂末也王氏栗不秕也集傳左氏所謂嘉栗也所以詳言其生長成熟之次序者見稼穡之艱難非一日所致后稷能教民以盡相之之道故其穡如此詩緝是以堯大其功封之於邰使即有邰而立家室焉言始建國也六章述后稷封邰之後教國人播嘉種以供祭祀也詩緝上章已教民播種矣此特摽種之嘉者以著酒醴粢盛之本蓋秬秠可以和鬱鬯穈芑可以實簠簋解頥四者雜生於地稷能識别而教民種之若自今始降者故書亦云稷降播種也恒徧也毛傳謂徧種之也既成則穫而栖之於畝任負而歸以供祭祀秬秠言穫畝穈芑言負任互文耳集傳張次仲曰祭祀之禮上古有之然不過明水大羮薦血捭豚而已為饎之禮未備也至是始有嘉穀為酒食錢氏詩學云此禮始於唐虞而實自后稷開之故曰肇祀肇祀當如此疏解句謂肇邰國之祀於義小矣七章承肇祀來特加我祀别之明為今王之祀也如何問辭也疏謂美而將説其事故設辭自問也揄抒米出臼也孔疏蹂蹂禾取穀以繼之也集傳或舂或揄四句皆為饎之事載謀載惟四句則綜言内外之祭也謀卜日擇士也集傳惟凡思也説文凡者非一之辭取香蒿合膟膋爇之使臭達牆屋此言祭宗廟也又取牡羊以為犯軷之祭此冬祭行也燔傅諸火也烈貫之而加於火也集傳宗廟與軷皆有尸燔烈所以為尸羞也曹氏自宗廟至於祭行則徧秩矣自粢醴至於燔烈則備物矣皆祭之屬於今嵗者也繼之曰以興嗣嵗則新嵗祈穀之祭從之而起即下章所稱也田間八章言祈穀郊天而以后稷配即上章嗣嵗之祭詩正為此作也古義卬我也爾雅木曰豆瓦曰豋爾雅豆薦菹醢登薦大羮也毛傳於上章言簠簋尊爼之實此章言豆豋或言實或言器互相備也王氏上帝天與五帝也禮書居安也鄭箋歆神食氣也首末兩歆字義同凡祭以氣合神故用椒用桂用蕭用鬱皆以香氣求之謝枋得故曰其香始升上帝居歆也此何但芳臭之薦信得其時誠自后稷降此嘉種肇開酒醴粢盛之祭故我後人得以順時備物世守不替庶幾免於罪悔以迄今日上帝所以歆之也蓋歸功后稷明其實有配天之徳序所謂尊祖也實覃實訏二句依集傳置第三章末月令仲春𤣥鳥至至之日以大牢祠於髙禖天子親往后妃率九嬪御乃禮天子所御飲天子所御幸者於郊禖之庭帶以弓韣授以弓矢於髙禖之前按鄭注禮記謂即髙辛之君立為禖神而蔡邕則訓髙為尊毛於此及𤣥鳥傳皆作郊禖疏曰於郊故謂之郊毛傳邰姜嫄之國孔疏邰國當自有君所以得封后稷者或時君滅絶或遷之他所也羅泌云昔帝嚳娶於有駘氏曰姜嫄生后稷而后稷之封亦曰駘説者謂帝堯以其母國封之然及太王復娶於有駘氏曰太姜是姜姓之駘至周猶存豈得云以是封稷哉不知稷封之駘在武功姜姓之駘在琅邪固不同也爾雅秬黒黍秠一稃二米李廵曰黑黍中有一稃二米者别名為秠又虋音門赤苗芑白苗郭曰今之赤粱粟白粱粟皆好穀又蕭荻郭曰即蒿陸疏今荻蒿是也或云牛尾蒿似白蒿科生可作燭有香氣故祭祀以脂爇之為香許慎以為艾蕭非也禮記疏云一祭之中再度焫蕭郊特牲取膟膟升首祭法建設朝事燔燎羶薌此朝踐焫蕭也薦血腥時又郊特牲云既奠然後焫蕭合羶薌此饋熟焫蕭也薦黍稷時又羊牡羒郭云吳羊曰羝翼雅云羝是牡羊總名羒乃吳羊之羝者説約云周官大馭掌馭玉路以祀及犯軷注云行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭以車轢之而去此出行之軷也月令孟冬其祀行注云行在廟門外之西為軷壤厚二寸廣五尺輪四尺北面設主於軷上疏云禮畢乘車轢之而去此祭行之軷也此詩當以冬祭行言爾雅疏對文則木曰豆瓦曰豋散則皆名豆考工旊人云豆中縣是瓦亦名豆也禮書云豋儀禮作鐙其實大羮食禮用之飲禮不用敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦弓既堅四鍭既鈞舍矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賔以不侮曽孫維主酒醴維醹酌以大斗以祈黄耉黄耉台背以引以翼壽考維祺以介景福斝古音古御斝上去通古義炙既墨反鍛古音胡句鍭樹侮平上去通斗古滴注反釋文音主耉音矩福方墨反此族燕之樂歌也序曰忠厚而衍者附以仁及草木養老乞言於義無當集傳定為燕父兄耆老之詩得之矣而必以祭畢為言者疑於曽孫之稱也按射義貍首詩曰曽孫侯氏考工記祭侯辭曰詒女曽孫則曽孫非獨祭時之稱矣彚纂云祭畢之燕射以為樂於禮文無考又按此詩之射乃因燕而射燕禮記若射則大射正為司射是也至於大射則因祭而射因射而燕今詩無祭事自當以王肅燕射之説為正文按箋以末章為養老吕大臨引王制凡養老有虞氏以燕禮周人脩而兼用故燕亦有主於養老者然此詩自是族燕其授几緝御酌斗祈耉文王世子所謂公與父兄齒也與養老無渉禮書云行葦内睦九族而其詩有或歌或咢洗爵奠斝是燕九族同姓也舊為七章鄭分八章今從集傳為四章一章言設燕之意説約彼敦然聚生道傍之葦方苞而抱籜丘氏方體而成形鄭箋初生之葉泥泥然潤澤其可使牛羊踐履之乎戚戚然内相親毛傳之兄弟其可疎逺而不親近之乎吕嚴於是或陳以筵或授以几蓋族燕尚齒故為差次其具也筵先設几後授而此連言之者詩總其凡亦為下章加禮地也二章言正燕之禮説約蒙上言既陳以廹地之筵復加以藉身之席蓋少者設筵而巳老者必藉席而安也鄭箋既授以憑身之几復加以更僕之侍蓋老者需人以使而人必續代乃給也按燕禮無加席緝御之文而詩云然者豈族燕之禮特優於凡燕抑天子諸侯之燕有不同者歟而戚戚具爾之意即是見矣主人降洗觚酌膳獻賔賔卒爵坐奠酢主人亦如之至主人更洗酌醻賔賔受之奠而不舉以俟旅酬所謂或獻或酢洗爵奠斝也箋義洗奠一物而異稱者文之變耳孔疏醓醢三句即燕禮薦脯醢設折爼羞庶羞之事醢以濡菹其多汁者曰醓孔疏凡薦諸醢皆以醓為首舉此以該諸醢也燔炙脯也嘉殽折爼也國語親戚宴饗則有肴烝脾臄庶羞也疏云燔炙是正饌脾臄為加或歌者笙入以下事或咢徒擊鼓曰咢者騶虞之鼓九節其五節先以聽也三章言燕射之禮説約上四句是視算釋獲之事鄉射禮謂若右勝則曰右賢於左若左勝則曰左賢於右是序賔以賢也敦弓畫弓也疏曰公羊注天子彫弓彫敦古今字彫是畫餙之義金鏃翦羽謂之鍭爾雅鈞參亭也毛傳考工記矢三分一在前二在後注云三訂之而平者前有鐵重也舍釋也徧釋四鍭以中多者為賢也下四句是設豐飲觶之事鄉射禮勝者之弟子洗觶升酌奠於豐上勝者執張弓不勝者執弛弓進立於射位耦揖及階勝者先升堂不勝者進北面立卒觶坐奠於豐上興揖不勝者先降與升者相左交於階前相揖是序賔以不侮也句彀同引滿也孔疏射禮搢三挾一个既挾四鍭亦徧釋之意如樹如手就植之丘氏言貫革而堅正也集傳勝則易於侮故以不侮為徳讀詩記曰四矢既均泛言射者故序以賢四鍭如樹專言勝者故序以不侮四章言射畢終燕而致頌禱之意按文王世子公與族人燕則異姓為賔膳宰為主人方氏慤曰君於同姓無賔之之禮故族燕之賔以異姓据此則上章之賔乃異姓而非父兄也顧膳宰為主人而詩曰曽孫維主者禮記義疏云射後三獻禮成而賔出故曰異姓至讓而止同姓則成之異姓出則無賔無賔則亦不用膳宰為主人而君自為主也酒醴維醹嘉魚所謂㫖且多即燕禮無算爵時也以三尺柄之大斗孔疏瀉酒於樽酌而祝以黄耉而於此黄耉台背之老又使緝御之人詩所在前引之在後翼之鄭箋庶幾享永年之壽為國家之祥而助以大福也詩之深愛悱惻至終燕不倦所謂戚戚也謂之忠厚不亦宜乎集傳興也毛失注周禮序官司几筵注鋪陳曰筵藉之曰席疏言設席之法先設者皆言筵後加者為席此詩箋云王與族人燕年稚者為設筵而已按王席五重莞藻次蒲熊筵即莞蒲之屬為之司几筵文有莞筵蒲筵是也筵席雖同而大小殊製非僅鋪與藉之别而已筵之度九尺考工席之廣三尺三寸三分禮記注九尺之筵鋪之於地藉以三尺三寸三分之席餘筵當有五尺六寸七分用以鋪陳品物為屈為䋫為錯尚有餘地可以升筵行禮蓋筵如今藉地之氊席如今墊褥疏家但以上下明之而不計其廣長之數故為别而著之几亦有五玉彫彤漆素是也周禮注馬融云几長二尺阮諶云長五尺髙廣二尺禮圖云几兩端赤中央黒禮書云席當設於賔未至之先几當授於行禮之際其將授也必拂其授之也必拜送其受也必拜荅執之或横有司徹或中攝聘禮受之或受其足昏禮或受於手間有司徹昏聘公食皆有几冠鄉飲鄉射燕皆無几明堂位夏后氏以琖殷以斝周以爵注云斝畫禾稼禮書云斝有耳風俗通云上口曰臄下口曰函爾雅台背壽也舍人曰皮膚消瘠背若鮐魚劉逵注吳都賦云鯸鮐狀如科斗大者長尺餘有毒馮疏本草作䲅爾雅翼云䲅即今河豚皮有刺觸人手老人皮膚粗硬似之故曰台背但河豚非西北産不知詩人何以入詠按今北河甚多此魚馮氏未之見耳既醉以酒既飽以徳君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融髙朗令終令終有俶公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚𦙍其𦙍維何天被爾禄君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子福方墨反明彌郎反儀音俄時子匱類平上去通壼𦙍上去通此祀廟受釐之樂歌古義言公尸飫其飲食報以大福而命祝嘏之也箋以醉飽指旅酬至無算爵後儒因主燕立説蘇李吕嚴集傳遂以為父兄荅行葦非其義矣詩辭首尾相銜最為朗暢箋以五福訓景福疏家附之東坡遂有既醉備五福論集傳詩記詩緝又皆析祚𦙍為二義不復見詩人指歸所在竊意福之大者莫大於賢嗣而後嗣之賢必由身倡故先以君子之昭明髙朗發其端而嘉告之辭獨惓惓於孝子之錫類下三章纒聯伸引總以反復疏明此意篇中四舉萬年皆統後世為言六帖非苐祝君子之壽也一章言三侑之後尸告㫖告飽而報以萬年大福也既者盡其禮終其事毛傳飽徳者所謂黍稷非馨明徳惟馨也二章言自饋食至於獻尸爾殽具舉而報以昭明之道使萬年為明君也疏義殽謂脊幹骼肩折爼庶羞及牢肝之類介爾昭明謂發其智慮丘氏即商書錫王勇智之意三章承上昭明而極言之願其有終而因致之嘏也融者明之盛髙朗者明之極萬年皆此髙朗則能善其終矣古義終必有始而今既有始集傳蓋據始以願其終也讀詩記曰周之追王止於太王則宗廟之祭尸之尊者乃公尸也傳箋謂公尸用卿非嘉告者以善言來告自此至末皆嘉告之辭四章言嘉告云何惟籩豆之薦既潔清而美鄭箋而助祭之朋友又皆以威儀相檢助謂盡誠敬以祀神而神歆之猶楚茨苾芬孝祀及齊稷匡敕之云也助祭者皆敬則主祭者之威儀自無不敬矣何楷五章言威儀之攝非暫攝也禮之節次不一威儀亦不一而皆中其節故曰孔時也君子有孝子集傳謂主人之嗣子是也舊謂有孝子之行者非特牲旅酬後有嗣舉奠之節文王世子其登餕獻受爵則以上嗣嗣子固與尸為禮者故嘏辭特著之明君子之景福係乎此也君子率其嗣子致孝於宗廟而嗣子又有不匱之孝祭義云博施備物可謂不匱其義然也傳云類善也箋云廣之以教導天下也六章言錫類云何蓋其事即在家庭之間宫中之巷曰壼爾雅下文錫祚𦙍釐士女皆室家之壼也祚福也説文𦙍嗣也毛傳永錫其福祚於後𦙍箋義則孝子之後復生孝子而類錫於萬年矣七章言祚𦙍云何蓋天錫祚於爾之𦙍子還被以爾所受之天禄僕附也至於萬年之久大命依然附屬周書所謂維王子子孫孫永保民也古義八章言景命之僕云何蓋古今治亂之由多起於婦人而周家世有賢妃尤當使徽音常嗣故嘏辭及此釐予也集傳予爾以女之有士行者猶云天立厥配也有女士乃有賢𦙍故曰從以孫子先儒以麟趾為關雎之應斯之謂歟張次仲曰從以孫子則昭明髙朗終始相仍萬年景福皆於此祭承之所謂嘉告者如此序曰太平而衍者謂人有士君子之行於詩無當鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福禄來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福禄來為鳧鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福禄來下鳧鷖在潨公尸來燕來宗既燕于宗福禄攸降公尸燕飲福禄來崇鳧鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱宜魚何反為音譌下音户降户工反艱讀垠龍氏謂假其右旁之音以為韻如福之讀偪也此祭之明日繹而賔尸之樂集傳箋謂明日又設禮而與尸燕是也序言守成推論之如此耳衍序濫及神祗則誤矣以鳧鷖之在興公尸之來而屢易其處者豈禮器所謂于彼于此索祭於祊之義歟涇水近鎬詩人即所見以起興則沙渚潨亹亦據涇水言之前日為尸未免有象神之勞今則為賔而安享其逸黄氏故歴陳其安處和樂如水鳥之得其所也本義篇内五言福禄皆屬主人序所謂太平君子也此詩格調略似小雅首章己盡其意下四章乃反覆詠歎之張記今按全詩雖無大别亦有次第可求者水鳥以得水為安在涇故興寧寧者受几安坐也飲啄以出水為適在沙故興宜宜者行禮順適也水中髙地乃可居在渚故興處處者得其所止也潨為水所㑹有尊象焉故興宗宗者王所尊崇也集傳來宗之宗尊也亹為山峽中足盤桓焉故興止止者留而未去也其言酒殽也一二章言清馨多嘉而已三章言湑脯乃指其名物四章言既燕則就饗之矣五章言欣欣芬芬則饜飫之矣其言福禄也初言自來相就説文次言神之扶助鄭箋三言自天而下四章兩言之先言攸降承上來下言下之不已則積而崇髙故曰來崇末言無有後艱孫月峰謂滿篇懽喜宴樂而以無有後艱句收可見兢兢戒慎意按箋泥衍序神祗祖考之説强分宗廟四方萬物天地社稷山川七祀之尸歐陽氏斥之是矣後人又鑿為后稷祖紺太王王季文王之尸尤為誕妄距詖放淫是在好學深思之君子爾雅鸍沈鳧陸疏大小如鴨卑脚短喙水鳥之謹愿者埤雅鷖鳧屬鳧好没鷖好浮蒼頡解詁鷖鷗也禽經鷗信鳥也爾雅繹又祭也周曰繹商曰彤夏曰復胙鄭目録云上大夫既祭儐尸於堂若下大夫祭畢禮尸於室中天子諸侯之祭明日而繹禮書云繹於明日則異牲賔尸於祭日則正祭之牲而已説文沙水中散石也潨小水入大水也漢志注亹者水流峽間兩岸深若門也假樂君子顯顯令徳宜民宜人受禄于天保右命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑徳音秩秩無怨無惡率由羣匹受禄無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈舊分四章章六句今依詩緝作六章章四句子奬禮反徳都木反上入通命彌吝反命申平去通福古墨反友音以序曰嘉成王義無可更以為荅鳧鷖未敢信也全篇皆言成王能樂其臣民以共享太平之福田間而令徳其本也故首章提其綱下五章承上分疏之一章言可嘉可樂之成王有光顯之善徳以安民官人皆得其宜故能受福禄於天也鄭箋二章申言受禄之實言天既保安之右助之命為天子矣又申命用休焉惟王自求多福宜其子孫蕃衍傳之無窮蓋嘉之而致其祝也三四兩章申言令徳之實穆穆敬也皇皇美也爾雅宜君猶宜王言其有君王之度也舊分屬天子諸侯者非所以然者為其不作聰明以致愆不敢疏略以致忘而能循祖考之舊法也其容止謹宻初筵傳言語有序詩緝此徳音不可以為聲名故能有嫌盡釋有過盡恕田間虚心聽納惟諸臣之同徳者循用之也詩所五章承上言能循舊法而任羣賢所以坐受無疆之福以握持天下之樞要故曰四方之綱也綱舉則紀立不惟君受其福臣亦共享其安蓋上無督責之事下無疑畏之心則君臣猶朋友矣田間故曰燕及朋友也六章又承上言惟羣臣賴上以安故外而百辟内而卿士皆致其媚愛以天子之心為心益勤於職而不懈斯民因得休息焉是不惟燕及朋友抑且燕及庶民而君子宜民人之徳益以光大所以可嘉可樂蓋嘉之而又致其規也讀詩記曰君燕其臣臣媚其君此上下交而為泰之時也泰之時所憂者怠荒而已所以終於不解于位民之攸塈也嚴華谷曰鄭氏以穆皇二句為子孫愆忘二句為成王文義斷續此由分章之誤也穆穆皇皇與抑抑秩秩一體率由舊章與率由羣匹相對皆言成王也又曰不愆不忘為率由舊章言之無怨無惡為率由羣辟言之黄東發曰諸家以六句為章岷隱華谷以四句為章文義甚順錢氏詩學曰穆皇以下通指成王若謂王者不可稱君則大哉堯之為君君哉舜也何以稱焉嚴氏質疑曰威儀以下集註謂稱願子孫之辭玩詩意主於嘉成王不應連章累牘美其子孫今從詩緝所定篤公劉匪居匪康迺場迺疆迺積迺倉迺裹餱糧于橐于囊思輯用光弓矢斯張干戈戚揚爰方啓行篤公劉于胥斯原既庶既繁既順迺宣而無永歎陟則在巘復降在原何以舟之維玉及瑤鞞琫容刀篤公劉逝彼百泉瞻彼溥原迺陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用飽食之飲之君之宗之篤公劉既溥既長既景迺岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒篤公劉于豳斯館渉渭為亂取厲取鍛止基迺理爰衆爰有夾其皇澗遡其過澗止旅迺宻芮鞫之即二章釋文巘音言四章平上通詩所末二句無韻或曰四之字自為韻序言召康公戒成王蓋與周公陳七月之意同七月但陳民俗故繫之風公劉之詩則言遷國剏制之事臨川王氏謂稱時之甚微以懲其盈稱事之甚勤以懲其逸深得召公陳戒之㫖若其庶繁之象兵食之足一時軍制賦法作廟立宗燕饗諸大典並起於此雖草創之時而規模宏逺繫之大雅職是故歟六章皆冠以篤公劉句蓋自不窟失官再世不振惟公劉克篤前烈開周家一代忠厚之治故叠美之以告王使不忘也一章述公劉在西戎而謀遷豳也詩緝公劉以戎翟之間不可安居故不以所居為居不以所安為安鄭箋猶漢髙言我亦欲東耳安能鬱鬱久居此也於是整飭邊郵嚴其守禦古義疆場以邊境言非指田也左傳言疆場無主則民生心故致警備以防戎翟之乘虚突犯為居者設衛也古義疆圍固矣儲偫尤不可虚今有露積倉廩則居者可守有乾餱糧米則行者可賫因思集民遷徙以光大其國無使長處於幽昧而道途之間猶不可以無備也既張弓矢以禦逺又揚舉干戈戚以禦近古義兵威既整防䕶加嚴然後可以開道而行也鄭箋蓋新都址基未定無空國而去之理故居者行者並為經理周宻所以為厚民也二章述至豳相土也集傳原即下章之溥原故著斯字以明之宣布也舊訓為徧今不用言公劉至此原而相度見從遷者之庶繁知其情之咸順乃布告以定都之事尊卜民皆欣然聽命無復愁歎與民不適有居者異矣於是由原而陟髙山復由山而降於原相度形勢反覆周詳雖勞不恤也既上下於山原矣何故復用舟楫乎以用也之如鸜之鵒之之之疑為逝百泉起案也舟訓為帶未見所据今從説文解亦未敢信為必然也維時公劉則有玉瑤所飾之容刀以為佩焉古義讀詩記曰以如是之佩服親如是之勞苦斯其所以為厚民歟三章言營度既定而廬居也溥原廣濶而百泉包絡之非廻環周覽不能審也故雖上下相度又必御舟以逝邶詩汎汎其逝是舟行為逝也而原之四周並得親臨諦視焉説文瞻臨視也南岡即巘之南岡京即原之髙大者也下觀既徧乃復上觀陟南岡而覯於京其向背之形拱峙之勢始未覯而今乃覯也始之降原視其腹裏繼之瞻原周其郛廓始之陟巘從北望南以攬其大凡繼之陟岡從南望北以正其方面詩牖既見此京為衆所宜居之野遂定都於此於是即其野而處之為廬而旅居之如戴公廬漕之廬出號施令詢謀衆庶皆於是焉蓋家室未備草次羈寓之時也詩所四章述營建畢而舉遷廟之禮古義因燕饗而定經制以整屬其民上則皆統於君下則各統於宗也吕記依安也集傳初尚羈寓今則營室成而安居於此也下三句言遷廟之事蹌蹌濟濟凡有事於新廟者威儀皆整齊也筵几神之筵几祭統謂鋪筵設同几是也男女一几為同几既登乃依者主既登坐神即依於筵几也大戴記諸侯遷廟禮奉衣服者至於新廟筵於户牖間君入視奠幣於几東即其事也遷禮既畢乃揀日而祭此越日事故詩所敘止此古義舊以筵几為燕設恐非下五句乃言落成之燕曹者輩類之言孔疏謂羣臣也舊以為羣牧之地恐非造就也説文進之使就我明欲與之燕也執豕酌匏物雖甚質而意則有餘即飲食之間而上下以辨君道彰焉親疏以别宗法立焉太宰以九兩繫邦國之民二曰長以貴得民五曰宗以宗得民其源蓋肇於此舊訓宗為尊今不用五章述授田制賦建立國之本也既溥以原言既長以泉言田間景岡相觀皆就田言通解言考之日景參之髙岡相其隂陽寒暖之宜觀其水泉灌溉之利蘇論使種植各道其宜盡地利也田間以定軍賦則有正而無羡箋義以定税法則合作而均收既而又度山西之田以廣之而豳人之居於是益大矣集傳六章總叙其始終也集傳于豳斯館謂廬旅時將作宫室定民居因令民攝衣渉渭其深者則乘舟横渡取彼厲礪同刀之石經鍛之鐵以備器用至于止基既定乃經理諸務如上授田制賦之類也爰衆爰有以下乃言遷豳以後歸附之人愈多愈有有夾皇澗而兩邊以居者有遡過澗而向水以居者皆所謂旅也來止之旅日以益繁兩澗之旁不足以容又就芮水之外以居之爾雅涯外為鞫蓋風氣日開編民日衆規模日廣有方興未艾之象焉周之王業已兆于此吕記毛鄭乃謂迫逐而遷豈其然哉古義曰邰在今武功縣豳在今邠州皆屬陜西西安府相去特百餘里然自不窟已竄於戎翟之間不居邰矣程泰之謂慶州南三百里有不窟城是公劉自不窟城遷非自邰遷也廣輿記云平凉府涇州有泉眼百餘大旱不竭即百泉也季本云百泉者平凉府北地所出之水皆流入涇至邠州据此則邠州乃涇水所經而百泉則入於涇水自平凉而來者也又曰溥原即豳地以其地廣平則曰原狀其大則曰溥非先有此地名也京大也與溥義同因原地廣大故贊之曰溥又呼之以京耳明辨録曰豳地近涇而逺渭何以遽能渉渭横渡觀下文芮鞫之即而知公劉之民徧於皇過二澗由長武而南聯屬隴州皆其境宇故得渉渭耳史記云自漆沮渡渭若非從隴寶鳯汧更無渉渭之處又曰周禮雍州其川渭汭汭與芮通乃入涇之水名今長武有宣禄川一名黒水河由隴州發源與靈臺河合即古汭水愚按漢志芮水出右扶風汧縣吳山西北東入涇注引此詩為證汧縣今鳯翔府隴州何景明則謂邠州别有芮水入涇其汭水之在隴州者入渭不入涇與志違異當以明辨録之言為正詩總聞曰傍渭澗名甚多有神澗有百澗有長澗有夾澗有歴澗酈氏謂渭水東而右合南山五溪水夾澗流注之恐便是夾其皇澗歴即過也説文云揚飛舉也揚之訓鉞義無所出古義巘通作甗爾雅重甗隒郭云形如累兩甗甗甑也愚謂郭自解重甗之隒耳詩只云巘則非重者但山形如甑而已疏云􅔖者刀鞘之名琫者鞘之上餙愚按三朝禮天子玉琫而珧珌諸侯盪琫而璆珌乃刀鞘受餙之處名為琫耳容刀謂容飾之刀其容飾處當在柄即所謂珌也玉瑤兩物或飾之刀柄或飾之鞘上疏解未融箋云三單無羡卒也朱康流謂軍法五人為伍二伍為什散其什伍布於井里則夫三為屋屋三為井三三而九餘一為單合而再計復得九人則再授一井之田故曰三單此與上下文義似覺聨絡而立説太巧不敢從也泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈一三章皆平上去通二章平上通公劉以下三詩序皆謂召康公戒成王而戒之之意則各有主此篇大指與召誥相表裏蓋欲王以徳化民也召誥之言曰惟王位在徳元小民乃惟刑用於天下越王顯是此篇之的實義疏衍者泥於左傳之文綴以皇天親有徳饗有道傳箋遂以祭祀立説後儒亦以詩言餴饎濯罍是祭祀所用不復置疑獨黄實夫知詩意在於告成王以治民之理而於衍序猶多曲䕶至朱子標之為興而是詩之障蔀撤矣顧取興之意是以挹注之勤興豈弟之徳集傳乃以行潦起君子其義轉寛今參取集解集傳之説而以鄙説申之蓋父母無可棄之子王者無終棄之民蘇傳中養不中才養不才父母之道也道之以徳齊之以禮王者之治也惟君子樂易為徳豈以强教弟以悦安順道其民底於有功如酌行潦者之勤於挹注自然漸致澄清而物歸有用召誥所謂民若有功諴於小民今休也召公之意在於化殷頑故取行潦為喻行潦至濁宜無可用但使酌而挹之大器俟其澄而注之小器以為用孔疏則可沃米再烝以為醴食焉亦可濯罍使潔以備器用焉至於凡物無不可資其盪滌則行潦為挹注所變化矣三章皆發端於泂者戒其無邀近功為廹蹙之治召誥所謂勿以小民淫用匪彛亦敢殄戮用乂也强教則有父之尊悦安則有母之親表記吕注攸歸攸塈皆終首章父母之義張記毛不言興今從集傳為興孔疏釋言云饙餾稔也孫炎曰烝之曰饙説文饙一烝米也餾飯氣流也然則烝米謂之饙饙必餾而熟之故曰饙餾釋訓饎酒食也按周禮司尊彛四時之祭皆有罍周南卷耳我姑酌彼金罍是祭與燕皆有罍不必定為祭器也有卷者阿飄風自南豈弟君子來游來歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有徳以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌一章阿歌南音隔韻三章厚音户七章平上通羽字不入韻八章命彌吝反音冺十章馳音陀集傳謂召康公從成王游歌卷阿之上因王之歌而作此以為戒就詩詞玩之情事應爾後人援引竹書及古樂府神鳯操以實之殊不必也本書所輯非見於經史者概不敢登今按此詩義訓舊解多誤今惟首章托興及七章鳯凰之説從箋一章因游卷阿感飄風而發興也毛義大陵曰阿鄭箋卷曲也毛傳君子指王也集傳詩美君子每言豈弟者君子以豈弟為徳也有虚中屈體之大陵則化養萬物之迴風自南入之箋義興人君虚中屈體則善言得而進之古義有卷者阿興君子也飄風自南興矢音也舊興求賢非也此時王方登阿披風樂而歌之康公因託𢋫歌之義以因也陳所欲言其下九章皆所矢之音也二三四章雖言壽考福禄之盛而寓規於祝全在俾爾彌爾性一句彌滿也滿性之量詩牖即盡性之謂陸堂故三章頌禱之言屢進加隆而此言不易如從舊説以為終其壽命則累幅連章皆成導諛恐非詩意伴奐無凝滯也優游無廹促也詩牖休息也此主游歌之樂言昄大也毛傳章著也蘇傳厚者基圖鞏固之意古義此主富有之業言受命長者自文武受命至今其來長也茀禄康者承藉先業安享其福也此主數世之澤言皆据已然之事而侈言之王當思所以保其終也所願乎王者惟能充滿其徳性毋使虧缺吕記則能肖先公悠久周禮注之業周之先世多壽為山川百神之主而常享此純全之福嘏矣先公酋對目前行樂言百神主對奄有土宇言純嘏常對承藉茀禄言黄實夫曰二章先言至治之樂而後進其保治之説三章先言有天下之盛而後進其保天下之説四章先言享福禄之慶而後進其保福禄之説反而思之先公之業不繼則伴奐優游何足樂宗廟社稷之不我享則土宇昄章何足榮純嘏大福之不可常則受命之長何足恃按三俾字已為用賢伏脉故五章遂言用賢之事蓋俾彌爾性雖存乎王之懋脩而必資賢者之引翼召誥所謂毋遺壽耉是也馮可為依者翼可為輔者集傳孝可為感化者徳可為軌訓者孔疏引導其前也翼相其左右也上言俾爾孰俾之賢者俾之也張記惟得賢以自輔則徳日脩而四方以為法矣六章言王有賢者以禮義相切磋則顒顒然體貌敬順卬卬然志氣髙明鄭箋徳性純粹如圭璋而逺者傳其聲譽近者挹其丰裁古義皆彌性之騐詩牖而得賢之所致也能如此則天下繫於一人而四方以為綱領矣輔氏為則以教化言為綱以政治言詩牖七八章因時有鳳凰至而取以為興鄭箋以下廣言人材之盛也吕記按書君奭篇耉造徳不降我則鳴鳥不聞蔡注卷阿鳴於髙岡乃詠其實則鳯至非妄説也鳯凰于飛翽翽其羽即羽可用為儀之義亦集爰止者覽輝而下猶賢者之觀光於國也亦傅於天者翔於寥廓猶賢者之升用於朝也吉士吉人者臯陶論九徳終之以吉哉周公言立政惟用吉士吉之為言善也説文藹藹猶濟濟毛傳媚者順而不拂之意事君則格心而不犯治民則同欲而不擾所以為吉也張記蓋下集所止上戾於天鳥之性也上而愛君下而愛民賢之心也特不用則不得自効故使之命之維望于王也九章言髙岡之鳯凰髙世之賢也朝陽之梧桐盛明之主也張記前言飛者喻其才智此言鳴者擬其都吁蓋鳯凰非梧桐不棲賢者非明君不附詩所必梧桐有菶萋之盛斯鳯凰有雝喈之鳴故末章承上興意集傳遂戒王以廣用賢才也王者之禮賢也安車以徵之良馬以錫之儀物光備禮數周詳故即從游之車馬極誇其庶多閑馳以𤼵動之不言其事而義自見古大臣隨事進朂往往如此矢詩即矢音不多者見心所欲陳非矢詩所能盡古義遂歌者繼王之聲而歌之所謂賡載歌也集傳何黄如曰詩雖戒王還為賡歌而𤼵故語多諷而無䂓切之辭游卷阿雖實事而𤼵端寄意畢竟是興非賦爾雅鶠鳯其雌皇郭曰鷄頭蛇頸燕頷龜背魚尾五彩色髙六尺許邢曰漢時鳳凰數至漢書云髙五六尺是也説文字從鳥凡聲鳳飛則羣鳥從以萬數故鳯古作朋字山海經云丹山之穴有鳥焉其狀如鶴五彩而文名曰鳳首文曰徳翼文曰順背文曰義膺文曰仁腹文曰信飲食自歌自舞見則天下大安寧爾雅櫬梧又云榮桐木郭皆以為梧桐羅願云梧者植物之多隂者青皮白骨生莢如箕子綴箕上多者至五六含之味如芡桐名榮者以三月華應陽而作其榮可紀故名榮也梧與桐既異而桐之中又有數種青白之外復有岡桐即油桐也今詩所云梧桐乃爾雅所云櫬梧與榮無與虞東學詩卷九
