body:
  text: 虞東學詩卷二宗人府主事顧鎮撰邶鄘衛邶鄘衛在禹貢冀州西阻太行北踰衡漳東南跨河以及兖州桑土之野本紂畿内之地自朝歌而北為邶南為鄘東為衛其大較也漢志謂康叔始封即兼二國康成以地太非制兼并當在後世而衛之滅國經傳無文難以信据按書康誥三篇乃武王封康叔於殷墟而命之之辭而漢書言成王封之者誤從書序也其言邶以封武庚鄘衛之地管蔡分尹不數霍叔而合武庚為三監未必全屬子虚而不無舛誤竊意邶鄘皆武庚封域三叔實監其國而康叔自封於衛及周公誅武庚以康叔能和集殷民因以其地益之不然殷頑遷洛至煩周公親莅至君陳繼尹成王猶反復誥誡何三監叛逆之區未聞有一人鎮撫耶畧為依据漢書訂正其失似近情事至於邶鄘皆衛地而分繫之二國義實難曉舊說以君世為次頃公最先故邶在前鄘柏舟衛淇澳同是武公詩而事有先後故鄘次之衛居後今定中在鄘淇澳在衛所謂先後者殊不可信程子謂從其採得之地朱子謂繫於各國之音夫古音已不可攷而詩中所指之地互見錯陳亦難以區界顧氏炎武曰累言之則曰邶鄘衛專言之則曰衛猶之言殷商言荆楚云爾分而為三者漢儒之訛此据左傳立說然漢儒亦何故誤分之也愚按邶風十九篇歴志淫亂無一美詩疑是著其召禍之本鄘風十篇則中興之詩在焉衛風十篇則美詩居多所謂康叔武公之德於斯可見區别觀之則當時分第之義或有取爾今仍其舊云余以邶鄘為誅武庚後益封祗以事理揣合及見世本古義與余正同而立說較確其言曰康叔封衛在武王時書康誥朕其弟小子封是也其兼有邶鄘在成王時史記以武庚殷餘民封康叔居河淇間是也古義又引逸周書作雒篇今不錄是書例以經史之正者為據不採旁說也邶邶詩十九篇自仁人不遇而夫婦道乖賢才放廢外無分災救患之思而内有敗紀滅倫之變禍亂相尋征徭不息至於父子之愛盡捐而衛之覆亡不待國人使鶴之年矣其次二南之後而居變風之首者仁暴異區政俗相反故讀康誥三篇知其感而被化也獨後讀邶風十九篇知其變而之惡也獨先一統志邶城在衛輝府城東北汎彼柏舟亦汎其流耿耿不寐如有隱憂微我無酒以敖以遊我心匪鑒不可以茹亦有兄弟不可以據薄言往愬逢彼之怒我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也憂心悄悄慍於羣小覯閔既多受侮不少靜言思之寤辟有摽日居月諸胡迭而微心之憂矣如匪澣衣靜言思之不能奮飛集傳卷眷勉反柏舟内貞外固詩牖可勝任載之用而使之汎汎水中無所依薄集傳以興已有可用之才而不見遇箋義所以中宵耿耿不能忘也憂矣而曰隱有隱憂矣而曰如仁之結而不可明言也豈飲酒敖遊之所得解乎惟我心嫉惡太嚴不能如鏡之妍􅑦並納本義是以異道不相安雖以僚友之親昵如兄弟者亦不可恃以為據古義往愬之而反遭其怒也箋說上既不得於君次復不諒於友獨窮困於此時而我心終守而不變不能如石之轉席之卷以屈心而抑志即外之威儀亦無可揀擇取舎以周容為度所謂固時俗之工巧余不忍為此態也惟是悄悄憂心常懼禍至之無日而羣小之申申者方慍怒之不殄而詬病交加侵陵日迫返已自維終無缺䧟則惟摽然而拊心已爾夫日月至明今乃微而不明詩緝是以憂之至於煩寃瞶眊如衣不澣之衣含垢忍尤而莫可如何蓋嘗靜黙自思終不忍舍之而去曰不能奮飛所謂僕夫悲余馬懷蜷局顧而不行仁之至也此詩之義為離騷濫觴五章曲折悲思而忠君憂國之忱守正嫉邪之義溢於言表流連讀之惻然入人心脾非仁人不能為此言也韓嬰劉向皆以為宣姜作集傳不從而猶疑為婦人詩蓋以其辭氣卑順柔弱而疑之及注孟子仍用序說即劉向論㳟顯封事亦引此詩則序謂仁而不遇衍之者謂衛頃公時仁人不遇小人在側言皆信矣舊謂闗雎鵲巢之反者非集傳比也今從毛作興綠兮衣兮綠衣黃裏心之憂矣曷維其已綠兮衣兮綠衣黃裳心之憂矣曷維其亡綠兮衣兮女所治兮我思古人俾無訧兮絺兮綌兮凄其以風我思古人實獲我心女如字訧古音怡風古音孚金反後同首章以表裏興幽顯正義言掩蔽也詩緝次章以衣裳興尊卑正義言倒置也姚舜牧兩言心憂為君憂為君之子憂為國家後日憂故不能止而不能忘也謝枋得三章言妾僭之由在於君子如綠之為衣皆治絲者為之末章則達於事逐時變物隨氣遷理勢之常無足怪者故三章之思古人猶欲效之以無過末章之思古人直謂之獲我心而已是我心素定而古之善處此者特先得所同然耳至此絶無一毫怨懟不平之氣莊姜所以為賢也許疏若以絺綌之遇寒風作秋風紈扇之意豈復能思古人以善處哉序曰莊姜傷已特據其事言之耳困而能通憂而維則鄧元錫莊姜所以自處者蓋已進乎古矣鄭箋改綠為縁不可從集傳比也今從毛作興燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨燕燕于飛頡之頏之之子于歸遠于將之瞻望弗及佇立以泣燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人野古音渚任讀如字不入韻淵身人通陳在衛南故戴嬀大歸於陳而莊姜送之其三章曰逺送於南也初見其羽次但見其飛次但聞其鳴去而愈逺也詩所涕泣如雨初别也佇立以泣既别而久立實勞我心已去而長思也輔氏當天傾地䧟之時煢煢兩寡婦死生訣别有無數心事說不出口乃丁寧付托既欲其擔當又欲其慎宻故以塞淵溫惠淑慎言之凡此皆先君之思而仲氏平日所以朂我者也說到極傷心極真切處嗚咽便止何等沉痛何等包含合觀綠衣燕燕二詩憂而不怨傷而不激至此猶念先君可知日月終風之非斥莊公也顧氏夢麟曰春秋書戊申注三月十七日衛州吁弑其君完是年九月衛人殺州吁於濮此詩之作在州吁未殺之先當春夏之間見燕托興宜也州吁之殺石碏誘之如陳而使陳執之莊姜逺送賦詩疑亦有感動於陳者歟愚按州吁方與諸侯連兵伐鄭而石碏將用陳討賊豈不懼有疎失戴媯之歸必有宻授方畧者至九月使人告陳之語特順風之呼而非事起倉卒者矣當日預聞其謀者獨有莊姜故越禮逺送而諄諄屬之末章任字如字讀則其義豁然而所謂塞淵溫惠淑慎者决非空作譽詞矣以恩相信曰任集傳從箋義不若直以擔當訓之毛朱作興同爾雅嶲周注子嶲鳥出蜀中嶲音規又燕燕鳦注一名𤣥鳥齊人呼鳦孫炎則以嶲周燕燕鳦一物三名說文又以嶲為周燕其訓為鳥者祗名燕不名燕燕集傳用孔疏重言義按爾雅嶲周為一節燕燕鳦又為一節今且依郭注日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧日居月諸下土是冐乃如之人兮逝不相好胡能有定寧不我報日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述前之傷己以莊公後之傷己以州吁不惟先後有次而詞氣神理亦各不同說見燕燕篇蔣仁叔五經蠡測嘗辨之當以序說為主後人之疑序由於衍者之失辭彼為推禍本於先君康成繆附其義遂以之人指莊公而詩義全晦矣夫舎現在凶逆之子而追憾已死之夫反覆指斥無論莊姜之賢决不如此即論泛常情事亦不相應朱子所以改為莊公時詩也愚按莊姜前既不答於夫後復遭此大故煢孑無恃而州吁不循子道狂虐無已無所控告故呼日月而訴之非以喻君與夫人也箋誤一二章言日月照臨下土而丕冐之乃有如是之人違棄古道於我絶無敬愛而不顧養不報德使我困窮至此是日月亦有不照臨不丕冐者矣三四章言日月出於東方朗然照徹而此人狂悖昬惑即言語之間皆無善意詩緝則危亂將至何能使我可忘乎既呼日月而不聞乃嘆父母養我之不終疾痛之極必呼父母也集傳報我不述言所以遇我者不堪稱述吕記猶定姜數獻公之罪曰余以巾櫛事先君而暴妾使余也胡能有定反覆言之吕記謂推原禍亂之由非也州吁弑君篡立亟亟求定於諸侯莊姜知其决無成也故每章申言以著其憂春秋傳謂厚問定君於石子此其證也移之莊公甚無謂矣毛氏作興今從集傳為賦終風且暴顧我則笑謔浪笑敖中心是悼終風且霾惠然肯來莫往莫來悠悠我思終風且曀不日有曀寤言不寐願言則嚏曀曀其陰虺虺其靁寤言不寐願言則懷來古音釐後同詩言州吁如終風之暴嬉笑謔浪無復人子之禮所以中心是悼也且其狂惑如雨土蒙霿雖偶一來顧而終竟寂然如宋光宗間歲一朝重華之類其昬瞶如重陰不開雷發不振令人氣鬱不舒懷抱莫釋則其傷甚矣高如晦曰願言則嚏猶言若肯提起一聲我則願嚏今人打涕便道人說我是也箋義願言則懷亦當如此領㑹五經蠡測曰綠衣歸於自省燕燕但言涕泣且有先君之思無一毫怨尤及觀日月終風二詩明斥過惡與前二詩詞意遼絶竊意施之州吁則可施之莊公則不可况篇次先後已定何必移易集傳比也今從毛為興爾雅釋天日出而風為暴風雨土為霾陰而風為曀月令民多􅍠嚏注􅍠者氣窒於鼻嚏者聲發於口徐錯云腦鼻中氣壅塞噴嚏則通擊鼓其鏜踊躍用兵土國城漕我獨南行從孫子仲平陳與宋不我以歸憂心有忡爰居爰處爰喪其馬于以求之于林之下死生契濶與子成說執子之手與子偕老于嗟濶兮不我活兮于嗟洵兮不我信兮兵古音邦行古音杭後同仲宋忡平去通馬古音姥老古音柳信古伸字末兩章下二句轉韵州吁弑君自立纔五月餘兩書伐鄭皆宋主兵而左氏稱州吁將修先君之怨於鄭使告於宋則兵端自衛矣擊鼓其鏜踊躍用兵形容州吁之阻兵安忍神色俱動本言南行伐鄭特揷役土功築漕城於題外烘托不務令德而虐用其民之意次章乃指出告宋連陳實事斥言時帥憂其不終衆仲所謂不戢將自焚者不我以歸者古義謂既圍東門五日而還矣未幾魯翬帥師來㑹復往伐鄭必師歸在途又聞後命也爰居爰處爰喪其馬毛謂有不還者有亡其馬者于以求之于林之下鄭謂行軍必於山林求其故處近得之其即必死是間余收爾骨之痛歟王肅謂爰居而下三章與其室家訣别者是也若曰失伍離次與此情事不符契濶隔逺之意洵信也說文即上章成說也傳訓為逺其義未聞通典滑州白馬縣衛之漕邑戴公廬漕即此正義云當在河東近楚丘今直隷大名府滑縣毛傳孫子仲謂公孫文仲本衍序凱風自南吹彼棘心棘心夭夭母氏劬勞凱風自南吹彼棘薪母氏聖善我無令人爰有寒泉在浚之下有子七人母氏勞苦睍睆黄鳥載好其音有子七人莫慰母心首章南心韵夭勞轉韵次章但以薪人為韵詩非美孝子錄此詩乃美孝子也以風之鼔物興母以棘之難長興已自心而薪則母之劬勞聖善並見母氏聖善我無令人居然天王聖明臣罪當誅之意下乃痛自刻責以寒泉之可漑黃鳥之可悅責已之不能顧養以慰母是泉鳥之不如也頻喚七子見生子之多曰無曰莫所謂雖多亦奚以為者自責之甚也孟子謂小弁過大凱風過小亦為母但不安其室非有别狀不然失節事大安得云小哉卒由此感悟故曰慰母心而成其志孝子所以可美也許氏名物鈔曰睍睆毛傳好貌箋以興顔色悅也詩緝光鮮貌檀弓華而睆皆以色言俗訛以為黃鳥之聲愚按玉篇云出目貌似較切集傳比也今從毛為興爾雅南風謂之凱風李巡曰南風長養萬物萬物喜樂故曰凱風說文棘酸棗沈括曰棗獨生高而少横枝棘列生卑而成林水經注濮水枝津東逕浚城南而北去濮陽三十五里城側有寒泉岡又輿地記祥符縣北有浚水即漢之浚儀有寒泉坂雄雉于飛泄泄其羽我之懷矣自詒伊阻雄雉于飛下上其音展矣君子實勞我心瞻彼日月悠悠我思道之云遠曷云能來百爾君子不知德行不忮不求何用不臧泄泄其羽下上其音何用不臧也自詒伊阻則忮求之為害矣日久道邁世路嶮巇所以勞我懷思而不已也於是告之以德行戒之以忮求庶幾善處而無患乎不直呼君子而曰百爾君子所謂旅中相聚不止一人人各自善自然相及者歟遭世末流逺從征役僚友之相闗切者憂思而勸戒之如此豈此行役之大夫實造謀興此役者故曰自詒伊阻乎序曰刺宣公蓋推本言之傳箋迂曲不可從諸儒皆以婦人當之亦未知所據或以雄雉起興信為閨怨此尤害辭之甚者興意在第二句不在雄雉也詩人覽物起情不當如此穿鑿若順文解義則集傳為得爾雅雉有十餘種伊洛而南素質五彩皆備成章曰翬江淮而南靑質五彩皆備成章曰鷂匏有苦葉濟有深渉深則厲淺則揭有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡雝雝鳴鴈旭日始旦士如歸妻迨冰未泮招招舟子人渉卬否人渉卬否卬須我友軌古音九否房以反友古音以詩刺衛宣公與夫人並為淫亂序本無失鄭以夫人專指夷姜則有可疑者深厲淺揭毛訓因時制宜鄭喻男女之賢不肖及長幼似皆不得其指濟盈不濡軌傳箋釋義未融雌雄牝牡論亦太滯諸儒都從舊說歐陽本義獨明順今約其辭而㕘合諸家以釋之曰匏葉苦而濟渡深鄭箋未可妄行也彼乃不問淺深惟意所往詩緝如公與夫人之不顧可否惟欲是從也本義夫深水瀰然以車濟之豈有不濡其軌者而彼昏不知喻宣公也詩緝鷕然之雉惟知配偶之求而以聲相呼無復羞恥喻夫人也詩緝不聞雝雝鳴鴈乎士之歸妻猶有禮别宣公曾士庶之弗若歐陽此因雉鳴而言也詩所不見招招舟子乎乘舟之人猶待我友夫人曾行道之弗若歐陽此因濟盈而言也詩所文則相承意實互換而末章又回顧首章極錯縱變化之妙蔡衍鎤詩經尊卜曰前兩章似斥夷姜後兩章似斥宣姜愚按一二四章反覆濟渉三章直指歸妻明說河上新臺之事即前兩章亦斥宣姜也箋以夷姜當之者徒以篇次在新臺之前而疏因摘雉鳴求牡句為之疏解不知雉鳴求牡特魚網鴻離之對靣語耳且未有女不從而男能强刼之者齊為大國宣公雖聞姜美何敢妄行必請於齊而聽之乃作臺以相要求牡之言固非周内也若篇次錯簡詩書多有尤不足疑集傳比也當從毛作興馮氏詩疏謂說文古今注陸璣疏通云匏瓠也惟陸農師云長而瘦上曰瓠短頸大腹曰匏匏苦瓠甘定非一物今攷諸書惟甘苦為可明耳本草有苦瓠瓠之苦者疑是匏矣蓋匏為總名甘者可食苦者佩以渡水又曰軓音范軾前也軌龜美反轂末也禮書云軹轂末亦謂之轊又謂之軌羅中行云車輪廣狹高下皆定於軌軌同則轍迹亦同因謂車轍亦曰軌軌居輪中若濡軌則水渉三尺三寸此謂轂末之軌也孔頴達不知軹亦名軌乃欲改音為軓朱子但取軌牡叶韻不知軌之為軹遂以車轍釋之當從羅氏近日休寧戴震氏作考工圖注引周禮大馭祭兩軹祭軓禮記少儀祭左右軌范兩節注明軓為軾前又引此詩傳由輈已上為軓謂今詩軓作軌以合韻改之也又謂轂末之軹古為􅛓字杜子春改為軹耳其實軹乃輢内交木非轂末也􅛓讀如笄又謂轂末為􅛓軸末為轊轊又軸之長出轂外者不可混為轂末按少儀注以軌為轊頭即杜子春以為軹戴所辨為􅛓也范為軾前即故書為範杜子春以為􅓶周禮所謂祭軓者也因軸末之轊與轂末之􅛓原屬一處相連易滋蒙混杜又改􅛓為軹與輢内之軹相淆彌復錯亂得此搜剔耳目一清特軌為轂末疏義亦然特不當混為轊頭耳而傳謂由輈已上是毛意直為軓故後人疑為合韻改之三百篇中未有可改字就韻者羅說固不可易衛宣公烝於夷姜生伋子事本左傳宛溪顧氏獨辨其誣其說曰閔二年傳惠公之即位也少杜註謂葢年十五六而宣公在位止十九年朔尚有兄壽則奪伋妻事當在即位之元二兩年伋年可娶亦當十五六而宣公之兄桓公凡十六年而為州吁所弑則烝夷姜當在桓公初年矣先君之妾媵當嚴閟深宫而宣公為公子時又出居於邢無由得近即有之亦必閟不令宣乃顯屬諸右公子倡狂無忌如此且石碏老成謀國手定州吁之難創深痛鉅豈有迎立穢迹彰聞之公子而奉以為君此萬萬必無之理竊意夷姜乃宣公未即位時所娶之嫡夫人後因寵衰見廢横加之罪左氏因而甚之耳史記衛世家曰宣公愛夫人夷姜生子伋以為太子絶無曖昧不可道之事尤信而可徵也說雖似創持義極正要之此詩無預夷姜事習習谷風以陰以雨黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死行道遲遲中心有違不逺伊邇薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟涇以渭濁湜湜其沚宴爾新昏不我屑以母逝我梁母發我笱我躬不閱遑恤我後就其深矣方之舟之就其淺矣泳之游之何有何亡黽勉求之凡民有喪匍匐救之不我能慉反以我為讎既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比予于毒我有㫖蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來墍菲體死平上通弟音底舟遊求救平去通讐售平去通此詩反覆低徊叨叨細細極凄切又極纒綿覺廬江小吏妻詩殊淺俗也谷風陰雨便覺愁慘滿目如聞怨聲如見怒色范補傳因告以夫婦同心不宜如此采葑菲者不以根惡而棄其葉美杜注夫婦之間豈當以小嫌而忘其大善苟好音無違程子及爾同死則中心之願也至於被譴而行則違其心矣是以遲遲而不進也乃送我不逺纔及門内恩義之薄尚可言哉我也被棄甚苦而彼也新婚甚樂惟其涇渭不分雖有甚清之沚而彼方宴樂新婚終不以我為潔而與之也我固去矣而資生之具尚存慎母敗我成業葢猶顧惜而不舎也歐陽既乃嘆曰我身且不見省程子何暇恤我去後之物乎猶憶在家之時勤勞作苦黽勉有亡雖至隣里凡民無不盡力周恤我之有德於彼者如此乃不能慉我反視為讐既阻拒我德雖欲强為操畫亦如賈之不售耳因念昔日相與為生常恐生理窮盡及爾其至顛覆今既遂其生育乃比予于毒而棄之我葢如所蓄之美菜然僅堪御冬不可常用今汝既饒裕逸樂安於新婚徒以前日困窮用我御之耳所以怒言怒色詒我以勞苦不能堪之事曷不念昔者困窮時由我而得至安息也蘇氏詩牖曰不宜有怒起下有洸有潰來同心起下不我屑以來德音起下治家勤勞來同死起下既生既育等句來詩人多以風雨喻暴亂嚴氏詩緝范氏補傳皆謂風生大谷習習不止與北風終風無異陸佃云谷風言其自詩話謂風自谷出是也孫炎釋爾雅訓谷為穀誤矣舊說以為和風在此詩猶取反興至小雅谷風之二三章則義難通矣不如嚴范二說為長集傳比也今從毛作興爾雅須葑蓯草木疏云蕪菁也亦名蔓菁郭曰今菘菜埤雅云蕪菁似菘而小有臺俗謂之臺菜其紫花者謂之蘆菔所謂溫菘也又菲芴郭曰土𤓰也孫炎曰葍類又菲意菜郭曰似蕪菁陸璣云似葍莖粗葉厚而長有毛甘美可作羹幽州人謂之芴爾雅謂之蒠菜是陸以二者為一物集傳用陸說箋言二菜上下皆可食而其根有美時有惡時杜預則為上善下惡集傳用箋說爾雅荼苦菜月令孟夏苦菜秀夏小正四月取荼是也詩緝曰荼有三種一曰苦菜二曰委菜三曰英荼此詩及采苓緜之荼皆苦菜也以薅荼蓼委葉也有女如荼英荼也邢疏以為斷之有白汁者非楊慎以為吳葵尤非吳葵乃葽也詳見夏小正注爾雅蒫薺實本草云味甘取其葉作葅及羹亦佳春秋繁露曰薺以冬美是也畿門畿也昌黎譴瘧鬼詩白石為門畿程大昌云笱者以竹為器設逆鬚於其口魚可入不可出承于梁旁透水處毋發我笱者懼其發取已獲之魚方輿紀要曰涇水出陜西平凉府西南四十里开頭山之涇谷東經長武縣北合汭水同流過邠州至高陵縣西南二十里入渭渭水出臨洮府渭源縣西二十五里之南谷山流經鳥䑕山下合汧斜豐鎬四水與涇水合於高陵縣又東歴同州府朝邑縣合漆沮二水又東至華陰縣北而入於河式微式微胡不歸微君之故胡為乎中露式微式微胡不歸微君之躬胡為乎泥中旄丘之葛兮何誕之節兮叔兮伯兮何多日也何其處也必有與也何其久也必有以也狐裘蒙戎匪車不東叔兮伯兮靡所與同瑣兮尾兮流離之子叔兮伯兮褎如充耳葛節日通久古音几式微勸歸旄丘責衛據下序言狄人迫逐黎侯是當時尚未失國衛不救而國乃失耳按宣十五年傳晉伯宗數狄五罪其三曰棄仲章而奪黎氏地不言滅其國也晉既滅潞畧狄土立黎侯而還是黎侯奔衛求援不得而不敢歸也式微之勸歸蓋在伯宗數罪之先矣若已失國將安所歸乎微君之微當如集傳作非解不當如胡文定說為微視黎侯也中露泥中當如王氏言沾濡之辱䧟溺之危不當如毛傳為衛二邑也又按黎在衛西黎侯身已在衛猶云匪車不東者箋謂寓在衛東東萊因謂衛大夫之車不來東嚴華谷反之謂寓亦在西故往衛則東集傳言豈我之車不東告於女李迂仲則謂衛大夫之車不東來錢天錫又言非我車不能渡河以告東方之諸侯陳義紛紜終多疑竇愚意式微作於從亡在東之臣中露泥中皆眼前景况旄丘作於居守在西之臣何多日何其處何其久皆心頭摹擬情事判然言非我車不東來迎君特衛之諸臣無同患相助者耳如此說車東之義似稍直截葛之誕節裘之蒙戎固見閲時之久而疎濶之意憔悴之容已隱隱如繪𤨏尾流離宋儒說義讜已然以之子目君竊所未安况出自忠者之口乎按流離爾雅作鶹鷅鶹鷅少美長醜比衛人之始德終怨即谷風恐懼棄予之意箋義固可取也褎盛服也毛傳言雖往告之而褎然盛服者如以瑱塞耳而無聞也嚴緝以褎為笑此箋未詳所據爾雅旄丘前高注引此詩疏曰釋丘形未嘗指為地名也寰宇記謂旄丘在澶州臨河縣東今大名府開州城北有旄丘恐屬附㑹簡兮簡兮方將萬舞曰之方中在前上處碩人俁俁公庭萬舞有力如虎執轡如組左手執籥右手秉翟赫如渥赭公言錫爵山有榛隰有苓云誰之思西方美人彼美人兮西方之人兮籥翟爵鄭庠分韵同部苓古音隣此詩大義序傅畧同而訓詁各異章首簡字毛訓大鄭訓擇朱訓易鄭說為長何𤣥子曰簡通作柬說文分别之也謂分别其能舞與否將使之舞也方將將也毛以為四方者非萬者舞之總名鄭以為干舞者非疏云月令仲春之月命樂正習舞入學者必釋菜以禮先師此日之方中即彼春入學謂二月日夜中也尚書日中星鳥左傳馬日中而出與此同也在前上處鄭謂前列上頭時方就舞位而碩人處衆舞者之上孔氏以為樂吏即周禮所謂以舞仕者也至於舞時則見其儀觀之偉而發揚蹈厲則有力如虎焉行其綴兆則執轡如組焉皆喻其舞之善也朱氏道行謂因舞而見者得之若别生枝節與上下文義不蒙愚意次章似說干舞三章乃言籥舞錫爵是祭未勞翟祭統謂畀煇胞翟閽者惠下之道也毛傳葢舎菜合舞本有事於瞽宗若燕飲獻工非此時事赫如渥赭與有力二句同例言武舞則才藝之美如彼文舞則顔色之好又如此洵可以承王事者而以煇胞畜之所謂不用賢也鄭以西方美人為周室賢者彼美人為碩人蓋詩人見此碩人惜其才美而不用因憶西周盛時之賢者各載高位如榛之在山苓之在隰無不得其所彼萬舞之賢者其美豈遜於西方之人而無如今之不用何無限感慨含而不露若作本人自嘲其義反淺而近薄舊作三章章六句當從集傳作四章三章章四句一章章六句爾雅大籥謂之產中謂之仲小謂之葯郭云籥如笛三孔而短小黃氏樂典謂宫一羽一角一是也廣雅謂七孔毛傳謂六孔俱未詳陳暘云籥所以為聲翟所以為容聲由陽來故執籥於左容自陰作故秉翟於右陸疏榛栗屬羅願云闗中鄜坊甚多故其字從秦爾雅蘦大苦今甘草邢疏蘦苓字異音義同毖彼泉水亦流於淇有懷於衛靡日不思孌彼諸姬聊與之謀出宿於泲飲餞于禰女子有行逺父母兄弟問我諸姑遂及伯姊出宿于干飲錢于言載脂載牽還車言邁遄臻于衛不瑕有害我思肥泉兹之永歎思須與漕我心悠悠駕言出遊以寫我憂謀古音媒後二章俱轉韻按漢書顔注泲本濟水之字濟水出河東垣縣王屋山至武德入河溢為滎今河南開封府滎澤縣是也滎澤之水渟而不流潛行地下至定陶復出今兗州府曹縣是也寰宇記大禰溝在曹州寃句縣北七十里皆在衛境當從讀詩記為父母國之地集傳言始嫁來時者是也又按隋志邢州内丘縣有干言山李公緒則謂栢人縣有干山言山地既不同山名亦異要非衛境所有當從毛傳為所適國郊肥泉則水經注所謂馬溝水出朝歌城北東南注淇水者也須即故須句國水經注言濮渠東逕須城北漕即州吁所築其為衛地無疑諸姬謂姪媵諸姑伯姊不可以姪媵言當從杜氏左傳注以問為致問詩本空中搆想不必𤨏屑推求而地與人決非可隨口說者故為論之又古義謂此與載馳如出一口亦穆姬作也慮難曰謀說文穆姬志欲救衛思以大義動諸姬何以諸姬為同姓之國孌慕也本說文而與謀興復下二章皆言謀及諸姬之事而齊為覇主伯姊在焉尤欲望援於齊也按須城楚丘南二十八里漕為白馬縣皆今滑縣地載馳之詩曰驅馬悠悠言至於漕此詩亦曰思須與漕則何說似非無稽爾雅釋泉歸異出同為肥酈道元引犍為舎人則云出異歸同王應麟言今是水異出同歸是當以水經注所言為定泉出於衛亦流於衛故以取興出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉王事適我政事一埤益我我入自外室人交徧讁我已焉哉天實為之謂之何哉王事敦我政事一埤遺我我入自外室人交徧摧我已焉哉天實為之謂之何哉敦鄭氏音都回反下三句歎辭哉之亦為韻賢者事於闇君公私交廹而上不見知於君下不見諒於家故作此詩毛朱同窶無財可以為禮貧無財可以自給孔疏王事王家之事政事其國之事適者始辭敦者廹辭益者略辭遺者盡辭此詩疑行役者所作亦從事獨賢之嘆也詩緝大指全在莫知我艱句天實為之無所歸咎之辭也康成謂事君無二志故自決歸之於天出北門亦是興北風其涼雨雪其雱惠而好我擕手同行其虚其邪既亟只且北風其喈雨雪其霏惠而好我擕手同歸其虚其邪既亟只且莫赤匪狐莫黑匪烏惠而好我擕手同車其虚其邪既亟只且邪音徐後同車音姑韋昭謂古惟尺遮反恐未然風饕雪虐滿目慘愁至狐羣烏合為惡如一鄭箋則危亂將至不能以一朝居矣序云刺虐即詩可見必謂衛無虐政恐未然也其虚其邪爾雅作徐邢昺申郭李義謂謙虚閒徐歐本義曰其可皆徐而不進乎程傳曰尚可寛容徐緩乎皆言去之當亟義與爾雅合箋謂虚徐寛仁者今皆為急刻之行語費周折故集傳不取而用歐程說也莫赤莫黑云者范逸齋謂如此而不去是不辨狐赤而烏黑也王荆公解末章同車謂貴者去之按程傳謂同車亦偕行耳但卒章辭益廹切同車有已駕之意東萊吕氏謂同車不必指貴者二說得之集傳比也當從毛為興靜女其姝俟我于城隅愛而不見搔首踟蹰靜女其孌貽我彤管彤管有煒說懌女美自牧歸荑洵美且異匪女之為美美人之貽末章女字從集傳讀汝序以刺時書者十有三篇言男女者居大半焉衍者謂衛君無道夫人失德而毛鄭皆以女德貞静為說引古女史彤管之法左氏定九年傳静女之三章取彤管焉杜注雖悅女美美在彤管是古說皆與毛鄭合也東萊引横渠詩後宫西北邃城隅竢我幽閒念彼姝以為述古賢君賢妃之相與得其義矣鄭謂詩人欲以静女易夫人則迂曲附㑹所以啟後來之紛紛也歐陽氏直例諸溱洧之類而於彤管之明白可据者乃謂樂器亦有管不知此管何物則不免於遁矣總之靜女不可謂淫彤管不可比芍藥則古說不可廢也戴東源考工圖補注云城臺謂之城隅詩曰靜女其姝俟我于城隅媵俟迎之禮也古者諸侯娶必有媵稅駕近郊整車飾然後至城下以俟迎者僾而不見石經作僾說文僾彷彿也迎之未至也始思見其人繼思見其物始言至城下末乃言其來自郊外靜女之刺思賢媵懷女史之法者學者罕聞城隅而詩遂失其傳矣愚謂述城隅之俟所以深刺新臺之要贈管歸荑明其守正而潔白似刺夫人之意居多新臺直刺衛君耳按考工記宫隅之制七雉城隅之制九雉宫與城皆有臺則皆有隅不知横渠所稱後宫西北者何指張次仲詩記彤管筆赤管女史所用鄭箋或謂古以刀為筆安得有管豐南嵎云以刀刻木乃書契之始至黄帝命沮誦為史以漆書紀事於簡以墨書紀言於帛孔子修春秋筆則筆削則削削謂以刀除去竹簡之漆書筆則以墨書於帛也子張書諸紳其不以刀明矣韻㑹茅之始生曰荑孔疏茅潔白之物新臺有泚河水瀰瀰燕婉之求籧篨不鮮新臺有洒河水浼浼燕婉之求籧篨不殄魚網之設鴻則離之燕婉之求得此戚施鮮古音犀洒古音銑浼古音免離古音羅施古式何反末章離施韻之字不入韻二子乘舟汎汎其景願言思子中心養養二子乘舟汎汎其逝願言思子不瑕有害景古影字害蔡氏尊卜音係再見閟宫夫婦之别至新臺而滅矣父子之恩至乘舟而絶矣而詩人猶若不忍盡其辭者然斥宣公者曰籧篨戚施便不容俛仰於人世思二子者曰汎汎其景便不覺慘動於心目詩之妙於立言如此容齋五筆云宣公在位十九年而卒姑以即位之始便成烝亂次年即生伋子勢須十五歲然後娶既娶而奪之又生壽朔朔已能同母譖兄壽又能代為越境非十歲以下兒所能辦也然則十九年之間如何消破陸儼山嘗舉以問穆伯潛伯潛以為宣公上烝當在未即位之前儼山以為其父尚在不應認為已子按史記衛莊公卒後十六年而後桓公被弑迎其弟晉於邢而立之是為宣公宣公嗣為諸侯去父亡十有六年其生伋子豈得謂父在時耶惜伯潛不能舉此折之或謂宣未為君其兄桓公固在肯任其烝庶母生兒而居然以為已子耶愚謂桓公為世子時親見州吁之驕縱致母氏之困阨久思為紾臂之舉若即位之後稍能振刷召石碏而用之去州吁若振籜耳乃容之十六年聽其與叔段為伍釀成禍端而身受之闇弱如此安能防閑其庶母及弟也後公子頑之事亦當惠公在位時可以破疑矣宛溪顧氏則据史記以夷姜為宣公夫人無上烝庶母事詳見匏有苦葉二子乘舟事古義据新序言壽母謀沉伋於河壽知之而與之同舟舟人不能殺未幾又使伋之齊使盜見旌要殺之壽先竊旌往幾及齊而見殺伋至載其尸而還遂自殺若左傳史記列女傳所載皆後一節事按諸書皆言殺之於陸今詩言乘舟與待諸隘者不符古義所引可補正史之闕水經注甄城北岸有新臺爾雅籧篨口柔也戚施面柔也李巡曰籧篨戚施本人疾之名故晉語云籧篨不可使俯戚施不可使仰葢口柔者必仰面觀人顔色而為辭面柔者必低首下人季本云籧篨龜胸疾戚施駝背之疾又說文籧篨粗竹席戚施􅖚􅠴音秋施即蟾蠩也鄘邶鄘皆首栢舟邶之首栢舟也君子吝窮而效逆速禍至莊宣淫亂而遂底滅亡鄘之首栢舟也女貞終吉而有子克家雖宣懿重昏而猶可再造編詩之意深矣通典衛州新鄉縣西南三十二里有鄘城即鄘國古或作庸本庸姓之國春秋大事表云閔二年戴公渡河廬漕至僖二年齊桓公封衛於楚丘今為衛輝府之滑縣此為北楚丘又元和郡縣志淇縣即朝歌東渡河一百十五里至滑縣滑縣東北五里為漕又東北五十五里為楚丘又東北一百三十里至開州為成公再徙之帝丘今屬直隷大名府黄河更在開州北十五里據此則詩中所指之楚丘實在衛州鄘境而非兗州桑土之野矣若曹州曹縣東南四十里之楚丘與曹宋錯壤乃衛之邊境詳具定中篇馮疏誤汎彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只汎彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只儀古音俄末二句天人韻序言共姜自誓而下稱衛世子共伯蚤死其妻共姜守義云云索隠据之以正子長之失是序說不獨為功於經亦且有補於史按䘮大記小斂主人脫髦此諸侯禮既夕記既殯主人脫髦此士禮是君與卿大夫士皆三日而脫髦也髦者用髮為之象幼時鬌鬌以夾囱故髦有兩父死脫左母死脫右今兩髦尚垂則非父亡代立之時矣况諸侯五月而葬嗣君脫髦已久安得入羡自殺猶垂兩髦乎吕氏記曰武公在位五十五年而國語稱其年九十有五猶箴儆於國計初即位當逾四十而共伯齒又加長經何以言兩髦序何以言蚤死是共伯未嘗有見弑之事武公未嘗有簒弑之惡後之傳者妄也毛傳以天為父不可從范逸齋曰女子以母為親故稱母而不稱父愚按姑息兒女出於婦人居多故吕大臨言止是母意毛傳集傳俱屬興下篇同牆有茨不可埽也中冓之言不可道也所可道也言之醜也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也道古音島序曰刺其上則不獨頑與宣姜而惠公在其中矣或云左傳稱惠公之立也少不當以魯莊之例責之按朔未立時已能愬兄及其為君顧不能閑母耶鶉奔二章即是責惠公之辭傳箋解中冓義迂曲難信說文云冓交積材也漢書應劭注中冓材冓在堂之中蓋象對交之形空中搆結深密之處爾雅茨蒺藜是据楚楚者茨說說文則云茅葢屋葢以茅葢屋謂之茨周禮圉師茨牆則翦闔注亦曰葢也今云牆有茨而傳引爾雅文是以蒺藜覆牆如今牆頭設棘之類襄通作攘故毛訓為除君子偕老副笄六珈委委佗佗如山如河象服是宜子之不淑云如之何玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晢也胡然而天也胡然而帝也瑳兮瑳兮其之展也䝉彼縐絺是紲袢也子之淸揚揚且之顔也展如之人兮邦之媛也宜古音俄詩本音次章上去入通為一韻質疑晢音錫從柝不從折從折者征側反集傳誤三章平去通袢符袁反顔古音妍三章皆極言宣姜服飾容貌之盛葢與猗嗟同意劉瑾孔疏於首章不言何服於次章言祭服故尊之以帝天卒章言事君子見賔客之服故以美人言之今按詩意首二章皆言祭服胡然二句言何以稱此容儀成此尊嚴即足上云如之何意非尊之以帝天也展如之人兮邦之媛也亦是重愧之不必如讀詩記言一章末責之二章末問之三章末惜之也毛訓副編髮為之又訓笄為衡笄箋皆不正其失而疏引追衡笄註更加舛誤後儒因仍彌復疎脫或謂箋詩異於註禮不當沾沾考證此懲康成之失而過者恐非考信六藝之義愚按追師副編次註云副之言覆其遺象若今歩揺服之以從王祭祀編則列髮為之其遺象若今假紒音髻服以告桑次次第髮長短為之所謂髲髢也服以見王今云編髮為之是編而非副矣追衡笄注鄭司農云衡維持冠者春秋傳云衡紞紘綖後鄭云王后之衡笄皆以玉為之惟祭服有衡垂於副之兩旁當耳其下以紞懸瑱笄卷髮者馮氏疏云衡笄本二物衡垂於當耳笄横於頭上鄭註垂於兩旁云云釋衡非釋笄也自正義引註於惟祭服有衡句下攔入笄字而兩物遂為一物不復知毛傳之非矣象服當如箋說謂揄音揺翟闕翟翟而言象者象鳥羽而畫之臯陶謨予欲觀古人之象是也紲袢毛謂當暑袢延之服但詁袢字未見紲義孔疏則以袢延為熱氣紲乃去熱之名袢延之為熱氣既不可知而訓紲為泄尤不免於附㑹集傳紲袢束縛意按說文紲系也袢衣無飾也蓋近身裏衣系即束縛之意是衣以縐絺為之加之系焉以自歛飭而展衣䝉其上後漢書輿服志皇后歩揺以黃金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆天鹿辟邪南山豐大特六獸詩所謂副笄六珈者諸爵獸皆翡翠為毛羽金題白珠璫繞以翡翠為華云按此即康成所謂副既笄而加飾如今歩揺上飾者疑古制未必然故又曰古制未聞也周禮内司服掌王后之六服褘衣揄狄闕狄鞠衣展衣褖衣注褘當作翬揄與揺同狄與翟同皆雉名三翟皆祭服鞠衣服以蠶展衣服以見王及賔客褖衣服以燕居及御於王孔疏諸侯夫人於其國衣服與王后同上公夫人得褘衣以下侯伯夫人得揄狄以下按衛為侯國故鄭以此詩之翟為揄翟闕翟也禮書副者翟之配以配褘翟明堂位祭義夫人副褘是也以配揄翟詩副笄六珈其之翟也是也次者褖衣之配士昏禮女次純衣是也然則編為鞠衣展衣之配矣外内命婦服鞠衣展衣者服編褖衣者服次按展玉藻作襢鄭司農謂展衣白故箋以白言毛則謂以丹縠為衣故孫毓以赤言然据說文瑳玉色鮮白則展衣之白可知似當從鄭劉熙釋名揥摘也毛曰所以摘髮疏謂以象骨搔首因以為飾按魏風佩其象揥則象揥直是佩飾佩固有用象者其用則以摘髮耳非必著於首也副笄揄翟盛服之時安得施象揥于首疏說非是爰采唐矣沬之鄉矣云誰之思美孟姜矣期我乎桑中要我乎上宫送我乎淇之上矣爰采麥矣沬之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣沬之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣東冬陽養平上通桑中桑間之同異朱吕反覆詰難而集傳與讀詩記各行其說今考樂記先言鄭衛之音亂國之音次言桑間濮上之音亡國之音明有二等難以混併為一又按史記樂書衛靈公將之晉至濮水夜聞鼓琴聲召師涓聽而寫之見晉平公而奏焉師曠撫而止之曰此亡國之音師延所作與紂為靡靡之樂武王伐紂師延自投濮水故聞此聲必於濮水之上康成亦言濮水之上地有桑間者亡國之音於此水出焉是桑間乃紂樂非此詩明矣凡序稱刺者皆旁觀之詞若以本文我字斷為奔者自作則溱洧之篇女曰士曰云云豈男女相酬唱乎序言世族在位相竊妻妾期于幽逺故詩所舉皆貴族明列其人著其地以醜之韓詩曰匹夫匹婦相㑹于墻隂明日有傳之者矣獨之不可不慎如此此則詩人之意也左傳申叔詭謂巫臣曰夫子有三軍之懼而又有桑中之喜引詩正合朱子据公穀以定姒為定弋因指孟弋為杞女王應麟以鄘本庸姓之國因舉漢之庸光庸生明孟庸之為世族皆可信据蘇氏曰刺無禮則稱孟言雖長而忘禮也美有禮則稱季言雖幼而好禮也毛不言興宜從箋義為興爾雅唐䝉女蘿女蘿菟絲郭曰别二名邢疏唐與䝉或并或别下云䝉玉女郭曰即唐也是又名玉女葑見邶風谷風篇尚書注妹邦紂之都所處於詩國屬鄘通典衛州衛縣有上宫臺按趙岐注孟子以上宫為樓豈詩之上宫亦樓耶淇水出沮洳山至朝歌入河鶉之奔奔鵲之疆疆人之無良我以為兄鵲之疆疆鶉之奔奔人之無良我以為君兄古虚王反後同固是刺宣姜然托為惠公之言則亦刺惠公也詩牖曰我以為兄刺其安為之弟而不知逐我以為君刺其安為之子而不知閑也自墻有茨至此而人道盡天理滅矣郝仲輿曰不再造不可以國故繼之以定之方中陸佃曰鵲知人喜作巢取在木杪枝不取墮地者皆傳枝受卵故一曰乾鵲莊子鳥鵲孺以傳枝少欲故曰孺也爾雅鵲鵙醜其飛也翪言鵲鵙之類不能逺飛但竦翅上下而已又鷯鶉其雄鶛牝痺郭曰䳺屬邢疏䳺即上云鴽鴾母田䑕所化者鶉則蝦蟇所化也張萱云鶉淳也不亂其匹故序謂宣姜鶉鵲之不若定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧靈雨既零命彼倌人星言夙駕說于桑田匪直也人秉心塞淵騋牝三千虚楚平上通京古音疆零古力珍反終焉允臧宜如石經作終然允臧此追美文公之詩一章言其營制宫室䂓模宏逺二章本其始之相度乃統論建國形勢升望降觀而終之以卜愼之至也三章言建國之後務農桑重畜牧以成富庶之業而所以操其本者在秉心之塞淵乃全篇歸宿處也定之方中宜從箋義為記時爾雅釋天營室謂之定箋云定星昏中而正於是可以營制宫室謂小雪時葢夏正十月於周為十二月也揆之以日宜從集傳樹臬度景以定東西正南北按考工記匠人建國水地以縣葢以器長數尺承水引繩中水而及逺則平者凖矣立植以表所平之方縣繩正植則度水面距地者凖矣補注置槷以縣眡以景槷古文臬槷亦謂柱欲取柱景先須柱正欲取柱正當以八繩縣於柱之四正四角繩皆附柱則柱正矣然後眡柱之景賈疏為䂓識日出之景日入之景晝參諸日中之景葢既平中水然後為䂓數重樹槷於中眡槷端景齊䂓者皆識之乃衡界午前午後之景則東西正又中屈之以指槷則南北正補注舊注先畫影端後乃䂓之䂓之交乃審此又是一法若毛傳南視定北凖極古無是說宫為宗廟室為居室應如箋說景山應如毛作大山葢測景之事已見首章升高置臬尤難定其䂓影楚也堂也景山與京也皆升虚之所望也匪直也人言不獨為民人根本之計營建時之精審詳密營建後之勸農考牧皆秉心塞淵處特舉騋牝以著富庶之實中興之䂓模逺已宛溪顧氏兩楚丘辨隱七年戎伐凡伯於楚丘在山東曹縣東南四十里本戎州已氏之邑凡伯過其地因刦掠之杜註所謂濟隂城武西南者是也僖四年衛遷於楚丘在滑縣東六十里於漢為白馬縣杜註無明文而毛傳鄭箋水經注言之甚晰毛云虚漕虚也楚丘有堂邑鄭云自河以東夾於濟水水經注曰白馬濟有白馬城衛文公東徙渡河都之其不得混於城武明矣乃班固地里志於城武下則云齊桓公築城遷衛文公於此既混滑縣之楚丘于城武而文定說春秋于凡伯傳云罪衛不救又混城武之楚丘于滑縣葢兩失之又隋置兩楚丘一在漢已氏縣為南楚丘一在漢白馬縣為北楚丘後改北楚丘為衛南縣通典白馬衛國漕邑衛南衛國楚丘大事表云漕近楚丘俱在滑縣榛見簡兮篇陸佃云栗味鹹北方之樹圖經云栗房當心一子謂之栗楔爾雅椅梓郭云即楸陸疏楸之疎理白色而生子者為梓梓實桐皮曰椅又櫬梧注曰今梧桐又榮桐木注亦曰梧桐然桐有青白赤之異陸疏謂白桐宜琴瑟錢氏謂經典中單稱桐者皆以作琴瑟則爾雅所稱榮者即此詩之桐白桐也所稱櫬梧者疏引卷阿之梧桐嚴華谷謂之靑桐非此桐也說文桼木汁可以䰍物䰍音休蘇頌曰漆木高三丈皮白葉似椿花似槐子若牛李六七月以竹筒針入取汁周禮庾人馬八尺以上為龍七尺以上為騋六尺以上為馬詩舉中言之蝃蝀在東莫之敢指女子有行遠父母兄弟朝隮于西崇朝其雨女子有行遠兄弟父母乃如之人也懷昏姻也大無信也不知命也母古音米命古音彌吝反人姻信命平上去通說約人姻一韻信命一韻亦通蝃蝀止奔道化行也父母兄弟情難割捨女子從人當逺離骨肉豈可苟且叠舉之明不可棄信而違命也末章乃戒止之乃如之人特舉以示鑒故不曰刺而曰止毛不言興然玩詩意當為興不當為比爾雅蝃蝀謂之雩郭云俗名為美人音義色鮮盛者為雄曰虹闇者為雌曰蜺白虎通謂之天弓又謂之帝弓傳言夫婦過禮則虹氣盛君子見戒而懼諱之莫敢指非以喻幽暗之事不可道也周禮十煇九曰隮隮即虹箋以升氣言之由升氣所為也馮疏據玉厯通政經旦見於西則為雨暮見於東則雨止旦見於西而純赤則大雨暮見於東而色黄則雨止集傳正相反相䑕有皮人而無儀人而無儀不死何為相䑕有齒人而無止人而無止不死何俟相䑕有體人而無禮人而無禮胡不遄死歐陽氏云詩意言人不如䑕爾毛鄭以䑕比人此其失也毛言居尊位為闇昧之行鄭言偷食苟得不知廉耻詩皆無此義今從集傳此與上篇辭意嚴厲異於他詩葢大亂之後教化初行疾惡不深則遷善不力然溫柔之教亦少衰矣此可以騐世風之降孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以予之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之序稱美好善而衍者屬之文公臣子毛鄭朱吕皆從之說者乃以求賢為人君事非臣下所專不知進賢達能謂之大夫臣子之美化由君上不必文公親為之也且諸侯旂物上畫交龍不應下用州里所建皎然明矣華谷嚴氏又以見賢載旟禮無明文不知司常建旟其下明言賔客亦如之許鈔卿大夫禮賢謂之賔興嚴氏顧未之攷旟旄旌皆因旟而言許鈔葢九旗之干首皆有旄羽别處在旒縿此詩前舉旄後舉羽中舉旒縿祗是一物不當以設旄為卿大夫建旟為州長素絲毛傳以御馬鄭箋以維縿集傳用鄭義程子則謂素絲束帛也以束帛良馬行禮於賢者紕組祝謂以組紃比合而連屬之黄實夫云素絲紕組祝即實其幣帛筐篚之意良馬四五六即錫馬蕃庶之意也彼姝者子舊說指大夫不如集傳指賢者為得通典浚在濮州濮陽縣東南今在直隷大名府開州載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫䟦渉我心則憂既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟陟彼阿丘言采其蝱女子善懷亦各有行許人尤之衆穉且狂我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之驅古音丘漕古音鄒蝱古音芒行古音杭尤古音怡未嘗歸衛而陡作歸語未嘗怨許而故作怨語陟丘行野特託意言之許氏謂極其思者是也主意在控于大國徒以因極難慿旋反無路一腔義憤寄諸長言比泉水更為悲鬱大夫䟦渉箋言衛大夫來告難按末章大夫屬許不應首尾岐異集傳謂許大夫來止行按夫人本未嘗行抑豈有君夫人輕身去國而大夫奔走追還之理蘇氏指許大夫之唁衛者雖有大夫之往而不足解憂其義長矣我思不遠不能遠而忘也我思不閟不能閟而止也女子善懷亦各有行行道也道在控大國也百爾所思不過慰問之而已周卹之而已不如我之所適别有逺謀所謂有行者也終以義不可往載馳所以賦歟舊分五章集傳從蘇氏作四章序於文公後者安溪李氏謂非本國之詩許今為河南許州府爾雅偏高曰阿丘蝱作􅔾貝母也陸疏葉如栝樓而細小其子在根下如芋子正白四方連累相着有分解也􅔾音萌衛十五國風自南豳而外惟衛詩獨美故季札觀樂而慨然慕康叔武公之德焉夫康叔逺已其詩不可得聞而詩中所陳武公之盛德文公之秉心逈出齊晉秦魯諸賢侯之上宫闈之間如共莊二姜及泉水載馳竹竿河廣四夫人高節卓行實冠諸國雖宣懿重昏國家䘮亂而一旅中興卒綿九百之祚非無故也後之說詩者徒以宣姜淫亂株連一國與鄭同科毋乃目睫之論歟衛本殷紂舊都朝歌之地今為河南衛輝府淇縣後遷楚丘又遷帝丘詳見鄘瞻彼淇奥綠竹猗猗有匪君子如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奥綠竹靑靑有匪君子充耳琇瑩㑹弁如星瑟兮僩兮赫兮喧兮有匪君子終不可諼兮瞻彼淇奥綠竹如簀有匪君子如金如錫如圭如璧寛兮綽兮猗重較兮善戲謔兮不為虐兮三章叠舉有匪而以綠竹之美盛起興有諸中者形諸外要皆切磋琢磨之所致也首章解義大學為精審語錄問武公進德成德之序始終可見一章言學問自修之功二章言威儀服飾之盛三章言德器之成前二章皆有瑟僩赫咺之辭三章但言寛綽戲謔於此見不事矜張自然中禮之意曰說得甚善充耳瑱也琇瑩美石也天子玉瑱諸侯以石毛傳㑹謂弁之縫中琢玉為珠以綴飾之皪皪如星也箋合周禮注詩故云如金如錫知柔知剛也如圭如璧能圓能方也猗較易於矜持武公則寛綽其容戲謔易至陵侮武公則以禮自檢是皆剛柔方圓之相濟也猗重較之猗釋文只是倚義集傳以為嘆辭釋文義長爾雅綠王芻竹篇蓄疏曰人謂之篇竹大學綠作菉韓詩竹作􅗨􅗨亦篇蓄也據此則毛傳當矣陸璣以綠竹為一草古今無從其說者考工註較兩輢上出式者義疏車深四尺四寸謂車箱其前三之一式也後三之二較也當云輢也輢即車箱兩旁立板以其在旁可倚故謂之輢較橫於車之兩旁當云較分冐於兩輢之上下與軹之植者相貫其横之交錯於輢者亦貫之式在前而低較在後而高式崇三尺三寸較崇五尺五寸故鄭云兩輢上出式者也以式低較高望之若兩重然故曰重較祗以式之在兩旁者言不指其當面者式有三面較止二面當面者不可名較也較在旁亦可慿人直立稍後一手可以慿較俛躬向前兩手可以慿式也曲禮孔疏謂式上又横一木為較此繆論也若横於當面則御者射者皆不便於運動即俛而慿式首且為較所觸矣戴震釋車曰揜輿旁謂之輢式前謂之軓軓謂之隂横側車前以䕃軨也縮輢上者謂之較輿前卑於較者謂之式車闌謂之軨車轖間衡從交結者較内之軨謂之軹式下人所對謂之轛按崔豹古今注重較即重耳在車藩上重起如牛角毛傳指為卿士之車於禮無聞考槃在澗碩人之寛獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告澗寛言諼平去通後之稱隱士者器量多狹小獧介惟碩德之人乃能遯世無悶覺塵俗外别有天地故云寛也王肅以言為言先王之道乃見寤言寤歌中具有伊尹耕莘氣象而時不可為之意亦隱隱可想已見復師曰序謂刺君上之失賢朱謂美隱居之得所美在此則刺在彼矣美在言中刺在言外考成槃樂毛傳也考扣槃木器陳說也反復詩言毛義深矣世固有隱而弗成者二泉無眞樂斯弗成矣無可隱斯弗樂矣成其樂乃以成其隱也獨寐獨寤而言言而歌歌而宿無酬對無應和此間消息甚大非逍遥養生一流故以碩人稱之若如鼓盆拊缶之為樂則所謂獧狹而非寛大者矣薖從毛為寛大軸從蘇為盤桓於義得矣終有未能釋然者竊疑薖乃是草而繫之於阿恐亦南陽草廬之類軸以行車而繫之於陸恐亦懸車不出之意及見丹鉛錄採舉要之說謂薖同窩而范逸齋補傳訓軸為卷窩藏卷懷於字訓頗近碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私手如柔荑膚如凝脂領如蝤躋齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖說于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶姜孽孽庶士有朅疏述毛意衣錦褧衣二衣皆如字今從之嚴緝云此詩無一語及莊姜不見答之事但言其族類之貴容貌之好禮儀之備又言齊地廣饒士女佼好以深寓其閔惜之意而已惟大夫夙退二語微見其意而辭亦深婉序題以閔莊姜左傳可証說詩若不用序則以此為閔莊姜可乎輔氏廣曰莊姜之德行文章皆未易及而此詩不言何也朱子曰此但指人所易見者以刺莊公之昏惑而不知耳如此看最好說文褧檾也枲屬爾雅翼今人績為布葢用此為襌衣故謂之褧許鈔嚴緝謂以縠為之非也士昏禮作景玉藻作絅箋言夫人翟衣而嫁今衣錦者在塗之服下章則自近郊正衣服乘車馬而入大事表邢國在今直隷順德府治邢臺縣後遷夷儀今山東東昌府西南十二里有夷儀城周公子封國僖公二十五年滅於衛譚國在今山東濟南府治東南七十里子姓莊公十年滅於齊鄒氏肇敏曰禮惟嫁長女餘皆為媵然碩人既為衛侯妻而邢譚之夫人皆其姊妹行也亦足證漢儒之妄爾雅蝤蠐蝎又蝎桑蠧許鈔蠐螬之類蝤蠐在木中蠐螬在糞土中瓠犀爾雅作瓠棲瓣也又􅘪蜻蜻郭曰如蟬而小方言云有文者謂之螓又䖸羅郭曰蠶娥邢疏此蠶蛹所變者也古義娥似黄蝶而小其眉勾曲如畫釋文鑣馬衘外鐵一名扇汗又名排沫爾雅謂之钀幩鑣飾也以朱飾之故曰朱幩爾雅輿革前謂之鞎後謂之茀翟茀者以翟羽飾茀所謂厭翟也又魚罟謂之罛郭曰最大罟也鱣郭曰大魚有甲無鱗大者長二三丈江東呼為黃魚鮥鮛音叔鮪郭曰鱣屬大者名王鮪小者名鮛鮪建平人呼鮥子陸疏遼東人謂之尉魚葭菼見召南騶虞篇氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子渉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復闗不見復闗泣涕漣漣既見復闗載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑葚于嗟女兮無與士耽士之耽兮猶可說也女之耽兮不可說也桑之落矣其黄而隕自我徂爾三歲食貧淇水湯湯漸車帷裳女也不爽士貳其行士也罔極二三其德三歲為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知咥其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉謀音媒丘音欺葚湛隕貧湯裳爽行俱平上通勞朝暴笑悼平去通婦寐遂知之隔韻亦平上通思哉轉韻讀谷風便覺可憐讀氓便覺可恥詩之移人如此故曰詩可以興纔開口一句而怨毒之情詆訕之意及本非仇偶之實一一形見全篇敘事簡達比之谷風反復叨細者殊别葢本無可訴之寃也序曰刺時而衍者以為美反正謬矣一章述始為所誘而許之奔二章述既為所惑而遂奔之匪我愆期子無良媒者本謀即挈婦去而婦言未曾有人先來告我故行計未辦至秋乃得治裝如次章所言賄遷也兩章傳寫往來踪跡如扮如畫三章乃從棄後追悔從前到狼狽時偏看出許多正理說出許多正論鍾惺正如潘岳臨刑悔恨自知其不可復活也而鄭謂賢者刺之何其傎歟四章正述其見棄之事淇水湯湯漸車帷裳當如集傳謂渡水以歸不當如箋說倒敘奔時也沃若隕黄乃以况情意之盛衰歐義非紀其時如箋義亦不必以色衰為說如疏說士也罔極所謂怨靈脩之浩蕩也五章述其將至家而羞見兄弟詩緝言既遂矣至于暴矣言當食貧之時而我以賄遷既遂其生而遽加以暴也靜言思之躬自悼矣寫狀無可解免意思眞覺無地自容六章述其怨而無所自解之辭及爾偕老老使我怨諸家謂其老而見棄然據總角之晏云云則此婦未笄便為所誘不應三歲便老也詩緝言今未老見棄設若從爾至老其被暴戾必有甚者愈使我怨也淇則有岸隰則有泮言其心無泮岸即上章所謂罔極也不思其反箋謂不復念其前言既與信誓𦂳對而下句是字亦非贅設矣似皆長於集傳鄭司農載師職注布參印書廣二寸長二尺以為幣貿易物頓爾雅作敦一成曰敦丘注成重也漢志東郡有頓丘縣水經注淇水屈逕頓丘西寰宇記澶州臨河縣復闗城在内黃河北岸也孔疏引巾車重翟厭翟安車皆有容葢鄭司農云容謂襜車山東謂之裳帷或曰童容以幃障車之傍如裳以為容飾惟婦人之車飾為然籊籊竹竿以釣于淇豈不爾思逺莫致之泉源在左淇水在右女子有行逺父母兄弟淇水在右泉源在左巧笑之瑳佩玉之儺淇水滺滺檜楫松舟駕言出遊以寫我憂右古音以後同左瑳儺平上通竹竿衛物也淇水泉源衛水也皆童子時所釣遊者朱善而今逺適異國曾不得一往焉因思淇水泉源間游女襍遝何等閒適而已不能如歐陽安得乘舟駕楫出遊於此以寫我憂哉前二章身在此而心在彼後二章思之深而恍然置身淇水泉源間檜楫松舟上矣詩牖比泉水更進一解序言衛女思歸而衍者申以適異國而不見答朱子辨為未見不答之意黄氏櫄曰人惟怨困憔悴之中則思昔日逸樂之事嚴氏粲曰再三極言衛國之樂則知其有所不樂於此矣按末句逗一憂字其情自見特着語和平令人不覺衛女所以賢也毛曰興也其解迂曲今從集傳為賦泉源水經注有二源俱出朝歌西北一名馬溝水一名美溝水二流相承泉響不斷方輿紀要曰輝縣西北七里有蘇門山一名百門山泉通百道衛風所謂泉源在左也或謂之百泉山衛水源於此芄蘭之支童子佩觽雖則佩觽能不我知容兮遂兮垂帶悸兮芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮芄蘭蔓生纏繞非特達之物金履祥興惠公狂穉非令器不能自立也雖佩成人之佩而智不足以知人范補傳才不足以長人程子其不足有為可知容容與遂直遂詩牖悸心動也說文言其舒緩放肆集傳拖長紳而執心不定程子如魯昭公習於容止而猶有童心也黄佐舊說未融諸儒釋悸字皆引更始升殿刮席事恐非其倫亦與驕而無禮不合爾雅雚芄蘭注謂雚芄蔓生斷之有白汁可啖疏曰雚一名芄蘭注言雚芄或傳寫悞芄衍字陸璣謂一名蘿摩是也何黄如乃謂孔氏誤讀爾雅因以莞當之按莞即蒲安得以支言其誤不更甚耶孔疏内則子事父母左佩小觽右佩大觽下别云男女未冠笄者但佩容臭而已故知為成人之佩葢以象骨為之可以解結韘毛訓决象骨為之鄭訓沓朱韋為之陸堂云字既從韋鄭說為近又禮書云射禮右巨指着决所以鈎絃三指着沓即儀禮所謂朱極三所以放絃左臂着拾所以遂絃謂之極者中於指也謂之沓者沓於指也劉向曰能治煩决亂者佩觽能射御者佩决按桓十二年左傳惠公之即位也少杜注云葢年十五六誰謂河廣一葦杭之誰謂宋遠跂予望之誰謂河廣曾不容刀誰謂宋逺曾不崇朝極辨河不廣宋不遠然則不得歸者何也味在言外衛都朝歌在河北宋都睢陽在河南自衛渉宋必渉河故以河廣為言嚴華谷謂是詩作於衛未渡河之前非臆說也是時宋桓尚在襄公方為世子鄭箋乃謂襄公即位而夫人思之與詩義不相應矣集傳亦仍其誤疏謂本不渡河特假有渡者之辭此是曲説詩固從賦不從興也讀詩記載說苑一條宋襄公為太子請於桓公曰請使目夷立公曰何故對曰臣之舅在衛愛臣若終立則不可以往不曰母而曰舅恐傷其父也即此推之而是詩之作必非在襄公即位之後矣四書釋地引劉曰珩言謂不必渡河而仍以故國之山川言者其有深情與按此亦滯於鄭箋而欲稍變疏義以通其説非達詁也伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗此詩時世序無明文康成寔以衛宣公時蔡人衛人陳人從王伐鄭事鄭在衛西而詩云之東既不可信朱子辨說又宣公之詩不應次於惠公之後許氏詩深曰此篇序于宋襄齊桓之間恐是霸主假王命以摟伐序所以書刺時也一章閔其行三章極其思首如飛蓬意緒亂也甘心疾首又加病焉至於心痗則肝胆摧傷矣范氏補傳曰美之則言其君上之閔恤刺之則錄其室家之怨思以為人情不出乎此也毛傳殳長二丈而無刄考工記廬人職謂尋有四尺則丈二也說文積竹為之徐鍇云其體八觚吕記沐潘也左傳遺之潘沭注云米汁可以沐頭嵇康養生論合歡蠲忿萱草忘憂本作萱說文作藼本草即今鹿葱豐熙云食其花健忘一名宜男非合歡也集傳訛古今注合歡樹如梧桐與諼遠别有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏在彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服無裳無帶無服即附於身者之皆無而窮民之無告時君之不恤並見之子云者民間相謂之詞或詩人之所見然也序曰刺時而衍者乃言衛之男女失時䘮其妃偶因引古者凶荒殺禮多昏㑹男女之無夫家者以見時君之不能行此政詩緝謂桃夭摽有梅之變亦是從衍者之説也康成且謂婦人寡而欲與為室家則尤鑿矣韓詩外傳曰昔者不出户而知天下不窺牖而見天道以己之情諒之也已惡饑寒則知天下之欲衣食已惡勞苦則知天下之欲安佚己惡衰乏則知天下之欲富足故先王之法天子親耕后妃親蠶先天下憂衣與食也詩曰心之憂矣之子無裳可謂能見其大詩從毛為興古義詩與木瓜相屬一主施一主報也戴公廬漕齊桓公歸公祭服五稱歸夫人魚軒重錦等物即此詩憂之子無裳無帶無服者也淇在河北時已渡河猶以淇入咏者葢以興復望之耳吳易堂駁其說謂以興復望衛不當比狐媚之獸愚謂以望興復破在淇終覺費辭若狐之取興不足為異左傳卜徒父謂狐蠱必其君不獨雄狐之比齊襄也易未濟亨小狐汔濟濡其尾无攸利程傳謂狐能渡水其老者多疑畏故履水而聽小者未能畏懼則濡尾而不能濟本義汔幾也汔濟濡尾幾濟而猶未濟也易豈取象于狐媚即詩言淇梁淇厲淇側取義於渡水故以狐言之戴公廬漕亦幾濟而未濟時也綏綏者疑畏而恐濡其尾之狀公不為小狐而為老狐所以終濟何氏所稱似與易義相應特未能釋然於三在淇句故不敢主其說為錄而論之以附於後投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也瓜古音孤玖古音几後並同木瓜美齊桓其説相仍惟集傳疑為男女贈答彚纂引朱子集中讀尊孟辨云詩錄木瓜即春秋序績之意亦以善衛人之情也朱子固未嘗終廢序說集傳比也今從之爾雅楙木瓜葉似奈實如小瓜陸農師曰江左右者名柤實如小瓜而有鼻食之津潤不香者謂之木瓜圓而小於木瓜食之酸澀而香者謂之木桃似木瓜而無鼻其品又下謂之木李孔疏瓊玉之美名非玉名也瑶言美石玖言玉名明三者玉石襍也丘中有麻傳云玖石次玉是玖亦非全玉也羅願曰琚處佩之中所以貫蠙珠而上繫於珩下維璜衝牙者也虞東學詩卷二
