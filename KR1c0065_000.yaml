body:
  text: 虞東學詩目録詩類卷一國風一周南召南卷二國風二邶鄘衛卷三國風三王鄭卷四國風四齊魏唐卷五國風五秦陳檜曹豳卷六小雅一鹿鳴至鶴鳴卷七小雅二祈父至四月卷八小雅三北山至何草不黃卷九大雅一文王至板卷十大雅二蕩至召旻卷十一頌一周頌清廟至武卷十二頌二周頌閔豫小子至般魯頌商頌臣等謹案虞東學詩十二卷國朝顧鎮撰鎮字偹九號古湫常熟人常熟古海虞地鎮居城東故亦自號曰虞東乾隆甲戌進士官至宗人府主事是書大旨以講學諸家尊集傳而抑小序博古諸家又申小序而疑集傳集傳既不敢不從小序又不可竟廢于是委曲調停驛騎於兩家之間謂其説本無大異是亦解紛之一術也徵引者凡數十家而歐陽修蘇轍吕祖謙嚴粲四家所取為多雖鎔鑄羣言自為疏解而某義本之某人必於句下注其所出又集傳主於義理於名物訓詁聲音之學皆在所略鎮於是數端皆精心考證具有根柢不徒以空談説經在漢學宋學之間可謂能持其平者矣書雖晚出於讀詩者不為無裨也乾隆四十四年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀例言一欽定詩經傳説彚纂備録古義是書一遵彚纂引據經傳及諸家義疏以證明之一序説惟首句為古序餘則經師各録所聞以綴其下先儒論之已詳今惟以序首一句為主序下之言則擇其合者取焉一毛傳持義正而語未詳鄭箋引據博而擇未精今惟取其詳且精者不敢曲徇也一集傳採輯諸家歸于一緒大撤詩之障蔀為功後學不淺説者謂其盡棄古説獨以已意行之此殊不然詳求朱子説詩大旨與序首不合者特十之二三耳至其訓釋辭義取之傳箋疏者尤多固未嘗盡棄古説也今於古序及集傳不同之處必求稟據明確者從之其有别義可通者則列之圈外亦竊取朱子之義云一朱子序辨大都駁斥經師傅會之説而於序首一句指駁殊少除國風刺忽刺僖刺淫外惟小雅刺幽及頌中郊禘等篇耳書中頗費考核一考證詩義當引他經之明切者為據而史漢之與經合者亦參訂焉一切竹書吕覽管韓諸子之書義難信據槩不敢及一三家之説見於薛君章句及崔靈恩集注者間亦及之以存舊説之一二其子貢詩傳申公詩説顯屬後人偽撰並不採登一古今詩説最繁錢氏詩牖序所載有書可考者一百一十八部其見於漢志隋志唐志宋三朝志四朝志中興志不可更僕數而其中卓然可傳者推歐蘇吕嚴四家而王景文之總聞錢文子之詩傳曹粹中之詩説陳少南李迂仲之詩解亦如驂有靳元明迄今篤學稽古之士勃焉有作所愧耳目短淺無以盡睹前人述作之美今所採者不出數十部而取裁於歐蘇吕嚴居多云一採用成説或於文內指明或於句下注出不敢掠前人之美也其有無關大義順文寫過或未見本書暗與之合不能保其必無惟知言者諒之一音韻之學本非所習今用嚴氏質疑本以通韻為主其不可通者則以轉通之蓋五音得二變以為之旋轉而無不可通之音矣又古人一字恆有數音音隨義變而詩中亦有用此音不用此義者如關雎卒章鐘鼓樂之徐音五教反板六章牖民孔易鄭音亦之類又不在通轉之例並為添注以備考尚冀審音君子加訂正焉欽定四庫全書虞東學詩詩説宗人府主事顧鎮撰序説上詩之有序如頭面之著眉目非是即不復省釋為何人故曰學詩而不求序猶入室而不由户也顧本書既不著作者姓氏史傳所述又言人人殊大約信序者必欲推之卜氏而疑序者必欲斥為衛宏二者亦皆有之而皆非也子夏之生去詩亡甚逺安能臆度而為之序韓愈氏謂智不及者篤論也衛宏後子夏千數百年顧以子夏之智所不及者而鑿空為之其又安能乎二者之失可一言蔽已蓋序之由來本於國史序中已明言之惟采詩之官本其得於何地審其出於何人究其主於何事上之國史國史於是采案所以綴詞其端以授太師而登之絃歌藉非當日隨事紀實則雖孔子之聖無以知之而况於子夏况於衛宏乎程純公所以深信小序而斷其為國史所作無疑也然以為二者亦皆有之何班固之傳毛也曰毛公之學自謂出於子夏而家語稱子夏習於詩而通其義注家舉毛詩序實之而蕭統信焉遂取關雎一序編之文選而題為子夏隋志所謂先儒相承者也不知子夏特習之而傳其説耳即使子夏為之亦必據乎國史而不能自以其察言經師推崇所學欲援子夏以為重後儒沿而成訛此其實也若敬仲學於謝曼卿曼卿之學出於毛公其淵源蓋有所自傳習之餘纂述所聞以相證驗理宜有之隋志謂更加潤溢者是已而范史直以為宏作詩序則不察之過也程泰之曰發序兩語古序也兩語以外續而申之者宏序也古序與宏序混并無别耳今讀其詞往往反覆煩重非出一人之手其為衛宏等之集録殆非臆論潁濱蘇氏欲止存其首之一言庶幾得其體要者矣要之序不必為子夏作而終不可廢不必盡出於衛宏而亦有附會牽合者求之本經參諸羣籍擇其義炳事白者而從焉可也序説下有問於豫者曰序之本於國史子既信之篤矣然子朱子謂周禮太史之屬掌書而不掌詩其説云何曰古者聯事通職更相參佐故瞽矇職諷誦而小史主定之若內史受納訪以詔王聽治則詩亦納訪之一也外史掌四方之志及三皇五帝之書則序之所陳亦志記之屬而前朝之典在焉國家圖籍𨽻於史氏自古及今未之或改言書則羣籍皆在未必詩之不在所掌也問者曰子之説讜已而六詩之教掌於太師則掌詩自有其人於國史乎何居曰太卜實掌三易而韓宣子觀書於太史見易象與春秋豈非太師太卜特掌其教與法而書則藏之太史者乎曰國史既作詩序而序中復言國史明乎得失之迹豈自為之而自贊之歟曰此漢儒所附益也國史所題者發端兩言所謂古序者也餘則毛公衛宏隨所見聞而加之潤溢者前之説著已子何疑於是曰然則程子謂大序非聖人不能作者何復與前説相戾也曰是篇所引多聖人之遺言故程子尊之而非謂序果聖人作也若夫大序之名原於皇甫謐沈重而成於蕭統之文選於義無取孔氏正義云諸序皆一篇之義而此為篇端故特以詩之大綱總舉於此范氏明序篇云關雎為一經之首併論三百篇之大指猶易乾坤之有文言故特詳焉而程子沿於舊名目為大序則亦以無關要義而不加察爾朱子割其首尾以為小序而自詩者志之所之以下為大序亦似於諸序中多添一序不若盡去大小之名而但别白古序經師之説則得失判然無庸費辭矣今觀朱子所辨多序下附益之言經師訓詁之謬非盡序之失也序之失者間亦有之蓋經師流傳歷年久遠斷文錯簡未免沿訛口授耳承豈無乖舛一二之違不掩八九之合故愚於序説固不敢迂詞曲説以徇其失亦不敢以偶然緯繣遂因噎而廢食也譜説詩之所不可廢者序也而其所不可泥者譜也鄭之作譜以表序也而轉以纍序孟子曰誦其詩讀其書不知其人可乎是以論其世也論世知人誦讀之要務而於詩為甚何者書之時世易見而詩之時世難詳幸有古序以粗陳其略而附益其下者又或勉強牽合以離其本而譜且鑿焉何彼穠矣之序曰美王姬也而譜必繫之文王則平王齊侯不得不改訓以從之矣常棣之序曰燕兄弟申之者曰閔管蔡之失道故作常棣焉而譜亦繫之文王則不得不謂推而上之矣至若序之刺幽王者譜復移而刺厲王而情事不相應合緯繣彌甚為鄭學者墨守其説而不變復迂曲其詞以就之而譜之時世遂為經之障蔀序之疻痏焉故曰譜不可泥也雖然譜之失者數端而已餘固非有大失也後儒病其閡隔併序而棄之務為以意逆志之法而倀倀於去聖千年之後將何所據以論其世而知其人乎夫四牡北山並陳勞苦殷靁采緑悉屬懷思同一鼓鐘而辟雍之與淮水何分同一燕飲而伐木之與頍辨何别使非得其時世其不至害辭害志者幾希昔歐陽子作毛詩時世論極詆康成之謬然猶搜其遺譜為之補綴闕亡序而存之以垂於後將使後之學者擇其是而去其非不敢慿恃胸臆秕粳一切嗚呼何其慎也近世何黃如濫引偽書妄更世次目為世本安溪李文貞又強分鹿鳴以下為西都雅楚茨以下為東都雅求之本詩皆無證驗何以折前人之角乎鄭譜果於限斷致滋掊擊而又強生枝節正歐陽子所謂笑奔車之失而疾驅以馳之者也如斯之類皆當闕疑以毋失寡尤之義斯可爾韻説韻非古也古有音而已而動於喉齒牙舌唇之間吐納有輕重其勢不能無轉而非所謂叶也至於餘聲剩語雜以方言如且胥思忌之類並由天籟非假人為自四聲之譜作而叶韻之説興承學之士遂以為一成不易雖矯強繆戾必不可通者亦委曲遷就以從之而古音亡矣所幸三百篇具存猶可反覆推求以庶幾得其萬一而又一歸之叶更何望哉夫詩者商周之作也韻者齊梁之學也以齊梁人所定之韻上律商周時所作之詩雖淺夫小儒知其不可而高賢碩士乃信之不疑者今韻熟復於口而古音不聞於耳不出於叶將舌嬌不可下以為是不可以讀詩也而於古人聲應生變以成其音者不能悉究之以盡其理於是有不可叶不必叶不當叶者而一一叶之其叶之而適得其本音歟叶者不知也叶之而大悖其本音歟叶者亦不顧也夫如是則東可叶西南可叶北而字無正呼詩無正字矣豈理也哉唐陸德明氏謂古人韻緩不煩改字所著釋文廣備音義欲以推求古音而大指所歸猶不離乎齊梁區域至宋鄭庠作古音辨約繁就簡綜為六部又引沙門神珙反紐旁正之例以通其滯而古音始有可求同時吳棫韻補先成而鄭辨出於詩傳既成之後故朱子未見其書止據吳氏叶音補其漏略以為定本良可惜也鄭書既簡要可遵而字不在一紐之內者兼採旁聲尚滋疑惑明陳季立益加搜討作毛詩古音考上參易書下及楚辭參同太玄凡漢魏以來有韻之文臚列為證其説可據本朝顧炎武復為四聲一貫之説而三百篇之詰屈可通叶韻之説真成疣贅矣近日東川龍為霖著本韻一得謂六書諧聲轉注即言韻之祖諧聲即虞書所謂和聲轉注即樂記所謂旋宫發揮蔡氏五音二變之旨於詩樂得其通貫蓋字有四聲古相通用惟是四聲之中各有遠近相隔過逺皆須轉讀以和之大抵通者皆可轉而轉者不必皆通不可通而可轉即二變和五音之妙也後世錮於韻書謂古音已不可求而輾轉矯拂違其自然豈生變成方之義哉故因前人之説而備論之龍雨蒼本韻一得曾於友人處借閲一過其書分平聲十二韻以合十二律分入聲七韻以合七音而以七音收納十二律凖古七均之法以明四聲一貫之理毷氉者或斥為臆撰不知其本於橫渠張子及蔡氏新書黃氏樂典而加務善之今其書逺不可致録其可憶者數條以公同好其書曰人但知於通處尋蹤而不知於轉處察脈豈可與言韻哉記曰聲相應故生變變成方謂之音故徵與角羽與宫各相去二律絶不相通以變徵變宫和之而後通此論韻之大略音律之定理也又曰或以支微齊佳灰無入而以質錫職緝為真靑蒸之入毛西河本章氏韻學集成不知支紙置質四聲天然有口者皆能辨之如鴟梟章既取我子無毁我室則子上而室入東山章鸛鳴於垤婦歎於室灑掃穹窒我征聿至則窒至去而垤室入采芑章以基韻上去入為韻尤屬顯然支微灰皆林鍾徴音基韻統之矣蓋入者聲之會歸平多入少正以由博返約天下豈有無入聲之字乎又曰或謂侵鹽閉口不通東蒸顧亭林本鄭氏古音辨不知公弓庚靑蒸詩中同押者甚多如無羊篇以薪以蒸以雌以雄則東蒸同押矣小戎篇騏駵是中騧驪是驂則東覃同押矣覃通侵鹽載寢載興秩秩德音則侵蒸同押矣如斯之類不勝枚舉愚按樂典言東冬淸靑固當合一虞模麻遮亦不可分所以備二變也以諧聲轉注為主使七音一呼而聚四聲不召自來則一貫之道已此即張子蔡氏以二變通五音之義龍氏蓋本諸此辨體説風雅頌之名定於周初作樂之時各有體格音節雖代逺年湮古樂流散而讀者可以循環諷詠而得之何者音節亡而體格具也傳箋依文解義明而未融馬遷述贊離騷區别風雅得其神理而其言祗為屈子著評非為本書宏義故略而未詳季子聞歌頌聲但云盛德所同則其論寬而不切經生墨守曩聞罔知界别於是王雅降風豳詩析段魯升為頌衛進於雅種種繆悠紛綸而莫能究正矣後儒惑於其説遂謂風非無雅雅非無頌一唱百和六義混淆不知三百舊編部居久定中經散亂夫子重加釐訂自言雅頌得所則風之無所竄入可知學者不奉夫子之言以為論斷而好為新説非所安也朱子集傳出而區明其義皎若日星顧風詩但主國名而周召獨加標目斯義猶晦昔杜預釋左知以南為文樂而未及此詩劉炫釋鼓鐘謂南如周南之意而猶作疑詞宋程泰之始據左傳之文指為南樂實與吕氏春秋之説相應至謂詩題舊無國風則鹵莽而自呈敗闕矣亭林顧氏以南豳雅頌為四詩而列國之風附焉其説較圎而義實支贅蓋南雖樂名不離風部以風附南是風之外别有南而周禮六詩何以不列其名耶若籥章吹豳止於七月一篇豈得與二雅三頌同標名目雖顧氏之意兼及雅頌諸章而數詩體格既殊用亦止於田野非如南之製體純而為用廣也惟是風雅頌雖成三部而部各分體如小雅之聲飄搖和動大雅之奏典則莊嚴頌則周為肅穆商實簡古魯近鋪張竊嘗循其義例求之於風覺二南節短韻長别具深醇之氣迥非列國之風可擬此則所當區論者也標興説賦比興居六義之三而傳家獨標興體亮哉毛氏之深於詩也夫六詩先風風之入物也微故史遷謂詩長於風而孔子刪詩托始焉興之為義近於風故風人之作興居八九當其觸物起情連類寫狀初無指切而擬議環生若近若逺之間其志可觀其言可味也東坡氏之言曰興之為言猶曰其意云爾意觸於當時時去而不可知故類可以意推不可以言解也三者之中興為微妙而與比相鄰易滋回惑故毛氏首標之其專言興者或比或賦文義燦如無容著别康成求義太迫以興為喻往往於傳所不言亦意為興致使比興混淆不分區宇其昧風人之義而失毛氏之指逺矣朱子病其淆也遂謂興有全不取義但取一二字相應者則又矯枉而過之又謂關雎兼比緑衣兼興氓蚩三義錯陳簡兮兩端並設如斯之類不可枚舉似與風非無雅雅非無頌之説同其阻礙竊嘗揆之本經參之毛傳詩之取興全以發端兩言為主所謂感物而起也若隨章逐句枝枝節節以求之則義例轉煩難於指説矣先君子之言曰風人之致莫妙於興比賦之篇皆涵興意特其區宇有定全在開端求劍刻舟轉淆其意耳西漢詩人猶存遺意東京而降雕繪彌工而興道消亡矣余覽束氏補笙皮氏補夏摹古文辭非不爛然可觀而尋其義趣閴爾神凋失興故也是以重歎毛氏之深於詩也正變説風雅正變之説原於詩序朱子從之而夾漈鄭氏山堂章氏力詆其妄蓋泥於美刺以為正變而覺其難通也故欲排而去之不知其暗於世運文章相為升降之故而未嘗虛心涵泳以求之也夫所謂正變者亦從乎時世之大凡及乎詞氣音調之間以得之耳文武成康之盛風俗茂美民氣和樂不必亟亟於頌美其君而主治之淸明皇躬之斂錫無不見焉其士大夫雍容樂易言近指逺所謂樂之隆非極音也昭穆而後淳風漸漓夷厲以來彌滋急刻雖間有令辟而風俗頽敝靡由進於大同緇衣淇澳之思正所謂飢者易食渴者易飲其去二南逺矣采芑六月揚厲軍威嵩高蒸民鋪陳功伐豈復有采薇枤杜下武有聲之遺意乎正變之區蓋在於此而沾沾於美刺之云動成隔礙亦固哉高叟之為詩矣朱子謂先儒本以周公制作時所定者為正風雅固不謂變者皆非美詩其論得之抑商周二頌皆肅穆近古而魯頌辭多夸飾已開勒石紀功之漸無復昔人形容盛德之美成伯瑜氏謂頌亦有變實補序説所未備蓋必正變備陳然後盛衰之迹著學者於以觀世焉而烏乎去之詩樂説凡詩皆樂也樂之八物所以節詩而從律也周禮大司樂以樂語教國子樂語者詩也荀卿曰詩者中聲之所止也蓋以詩為本以聲為用離詩以言樂則鐘鼓之徒樂而非樂也故謂笙詩無辭者鄭夾漈非也離樂以言詩則後世之徒詩而非詩也故謂詩有不入樂者顧亭林非也世徒知雅之用於朝頌之用於廟南之用於鄉人邦國而餘詩者未詳所用遂以為不可入樂而徒陳美刺轉疑司馬氏三百皆絃歌之説為不可信而興詩成樂竟為截然不相侔之事矣昔季子請觀周樂而太師所歌變風變雅皆在焉令非中聲所止則魯之樂工何能強叶諸律以次第歌之朱子斥鄭衛諸詩為里巷狹邪所歌不可用之鬼神賓客夫用之鬼神未聞也用之賓客則鄭伯之享趙孟六卿之餞韓宣叔孫豹之食慶封固有用之者矣至秦穆公之賦六月叔孫穆叔之賦鴻雁中行獻子之賦圻父戎子駒支之賦靑蠅皆變雅也而謂有不入樂之詩乎説者謂賦也非歌也若衛獻公使太師歌巧言之卒章非歌乎且樂有不必盡用之鬼神賓客者詩序云風者主文而譎諫虞書曰工以納言時而揚之注家言樂官誦詩以納諫也又國語稱師針瞍賦矇誦則美刺之詩譜而歌之以朝夕獻善敗於君非即所以用之者歟奚必鬼神賓客之用之始為樂也劉舍人有言詩為樂心聲為樂體樂體在聲瞽師務調其器樂心在詩君子宜正其文可謂達於其旨者矣思無邪説詩者思也發慮在心而形之於言以攄其懷抱繫於作詩之人而不繫於讀詩之人坦然明矣論語之言詩獨詳曰誦曰學曰為皆主於誦詩者也今直曰詩三百一言以蔽之而已是論詩非論讀詩也蓋當巡狩采詩兼陳美刺而時俗之貞淫見焉及其比音入樂誦自瞽矇而後王之法戒昭焉故俗有淳漓詞有正變而原夫作者之初則發於感發懲創之苦心故曰思無邪也鄭衛諸篇古序久著定説惟敬仲等綴詞龎雜箋疏附會間有穿鑿轉使後賢疑而不信夾漈力肆詆排朱子因之作詩序辨悉取刺淫之篇改為淫者自作而於其詞之似涉男女者概目之淫揆之此章之義不無扞格因以思之一字移而屬之讀詩之人竊有未敢即安者夫使詩本有邪而我以無邪之思讀之則必志氣清明執守純固者能然非可概望之人人也且果如是即何藉於詩之觀感乎古之賢人君子不得志於君臣朋友之間而未可以頌言也往往托悰閨閫寄語蹇修以致其纒綿悱惻之意如不知作者之志本出於正而徒泥其辭則屈子九歌真若有目成之事而陳思賦洛必難解於感甄之誣矣豈不枉其情事哉余於朱子之書篤信服膺而學庸章句論孟集注尤夙加研究頗嘗泳其義趣為之申明辨説而此章所陳未敢曲徇者關於説詩大義得則俱得失則俱失也若夫鄭聲之未必即為鄭詩淫之為義未必定屬淫奔則别具鄭篇兹不具論云迹熄詩亡説孟子歷敘羣聖之事而以孔子作春秋繼之迹熄詩亡著明所以作春秋之義實千古道脈所關而諸儒相仍舊説未聞卓論蓋自成康有不能復雅之云而范寧序榖梁遂謂列黍離於國風齊王德於邦君此龜山所據以雅亡為詩亡者也然考趙岐注孟則曰太平道衰王迹止熄頌聲不作故詩亡是漢儒原立兩義後世鄭學盛行遂遺趙説李迂仲兼而存之古義略具王魯齋則謂風雅頌俱亡而安溪詩所又特舉風雅為説論莫能一愚竊以為都非要義所欲究者王迹耳王者之迹何預於詩春秋之作何與於迹此義不明則不獨黍離降風支離難據即迂仲魯齋安溪諸説亦可存而不論蓋王者之政莫大於巡狩述職巡狩則天子采風述職則諸侯貢俗太師陳之以考其得失而慶讓行焉所謂迹也夷厲以來雖經板蕩而甫田東狩舄芾來同撻伐震於徐方疆理及乎南海中興之迹爛然著明二雅之篇可考焉洎乎東遷而天子不省方諸侯不入覲慶讓不行而陳詩之典廢所謂迹熄而詩亡也孔子傷之不得已而托春秋以彰衮鉞所以存王迹於筆削之文而非進春秋於風雅之後今即諸儒所論詩亡者而衷之則魯齋為近蓋詩者風雅頌之總名無容舉彼遺此若疑國風多録東周魯頌亦當僖世則愚謂詩之存亡繫於王迹之熄與不熄不繫於本書之有與無也好學深思之君子尚有以誨豫不逮焉以意逆志説書曰詩言志歌永言而孟子之詔咸丘蒙曰以意逆志是為得之後儒因謂吟哦上下便使人有得又謂少間推來推去自然推出那道理此論讀書窮理之義則可耳詩則當知其事實而後志可見志見而後得失可判也説者又引子貢之知來子夏之起豫以為聖門之可與言詩者如是而後世必求其人鑿其事此孟子所謂固哉高叟者而非聖賢相與言詩之法也不知學者引伸觸類六通四闢無所不可而考其本旨義各有歸如切磋本言學問之事則凡言學問者無不可推而謂詩論貧富可乎素絢本有先後之序則凡有先後者無不可推而謂詩論禮後可乎斷章取義當用之論理論事不可用以釋詩也然則所謂逆志者何他日謂萬章曰頌其詩讀其書不知其人可乎是以論其世也正惟有世可論有人可求故吾之意有所措而彼之志有可通今不問其世為何世人為何人而徒吟哦上下去來推之則其所逆者乃在文辭而非志也此正孟子所謂害志者而烏乎逆之而又烏乎得之孟子之論北山也惟知為行役者之刺王故逆之而得其嘆賢勞之志其論凱風也惟知七子之母未嘗去其室故逆之而得其過小不怨之志不然則普天率土特悉主悉臣之恆談耳凱風自南吹彼棘心亦蓼蓼者莪匪莪伊蒿之同類耳何由於去古茫茫之後核事考情而得其所指哉夫不論其世欲知其人不得也不知其人欲逆其志亦不得也孟子若預憂後世將秕粳一切而自以其察言也特著其説以防之故必論世知人而後逆志之説可用也
